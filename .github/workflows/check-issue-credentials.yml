name: Check Issue for Cloudflare Credentials

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue 编号'
        required: false
        default: '42'
        type: string

permissions:
  issues: write
  contents: write
  actions: write

jobs:
  check-and-deploy:
    name: 检查 Issue 凭证并部署
    runs-on: ubuntu-latest
    outputs:
      found_credentials: ${{ steps.check_credentials.outputs.found_credentials }}
      cloudflare_account_id: ${{ steps.check_credentials.outputs.cloudflare_account_id }}
      cloudflare_api_token: ${{ steps.check_credentials.outputs.cloudflare_api_token }}
      credentials_author: ${{ steps.check_credentials.outputs.credentials_author }}
      last_comment_id: ${{ steps.check_credentials.outputs.last_comment_id }}
      needs_commit: ${{ steps.check_credentials.outputs.needs_commit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pynacl

      - name: Check Issue for credentials
        id: check_credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '42' }}
        run: |
          python .github/scripts/check_issue_and_deploy.py

      - name: Commit state file
        if: steps.check_credentials.outputs.needs_commit == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/.last-checked-comment-id
          git commit -m "chore: update last checked comment ID for issue #42"
          git push

  deploy:
    name: 部署到 Cloudflare Pages
    needs: check-and-deploy
    if: needs.check-and-deploy.outputs.found_credentials == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ needs.check-and-deploy.outputs.cloudflare_api_token }}
          accountId: ${{ needs.check-and-deploy.outputs.cloudflare_account_id }}
          projectName: fengsheng-tech
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

  verify:
    name: 部署后验证
    needs: [check-and-deploy, deploy]
    if: needs.check-and-deploy.outputs.found_credentials == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 15

      - name: Verify site accessibility
        run: |
          echo "=== 验证 https://fengsheng.tech 可访问 ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://fengsheng.tech --max-time 10)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✓ 网站正常响应 (HTTP $HTTP_CODE)"
          else
            echo "  ⚠ 网站响应 HTTP $HTTP_CODE（可能还在部署中）"
          fi

  notify:
    name: 部署完成通知
    needs: [check-and-deploy, deploy, verify]
    if: always() && needs.check-and-deploy.outputs.found_credentials == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const deployResult = '${{ needs.deploy.result }}';
            const author = '${{ needs.check-and-deploy.outputs.credentials_author }}';
            const status = deployResult === 'success' ? '✅ 部署成功' : '❌ 部署失败';
            const icon = deployResult === 'success' ? '🎉' : '⚠️';
            
            const body = `${icon} 部署完成！\n\n` +
              `| 项目 | 状态 |\n` +
              `|------|------|\n` +
              `| 凭证来源 | @${author} |\n` +
              `| 部署状态 | ${status} |\n\n` +
              `部署结果：${deployResult}\n\n` +
              `👉 访问网站：https://fengsheng.tech\n\n` +
              `---\n` +
              `_由自动部署机器人生成_`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 42,
              body: body
            });
