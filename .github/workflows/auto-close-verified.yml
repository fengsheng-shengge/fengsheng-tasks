name: 自动关闭 Issue · "已验证"

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

concurrency:
  group: auto-close
  cancel-in-progress: false

jobs:
  auto-close:
    name: 检测"已验证" → 自动关闭
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request == null
    env:
      TZ: "Asia/Shanghai"
    steps:
      - name: 分析评论内容
        id: check
        run: |
          COMMENT="${{ github.event.comment.body }}"
          AUTHOR="${{ github.event.comment.user.login }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_STATE="${{ github.event.issue.state }}"

          echo "评论作者: $AUTHOR"
          echo "Issue: #$ISSUE_NUM - $ISSUE_TITLE"
          echo "状态: $ISSUE_STATE"
          echo ""
          echo "--- 评论内容 ---"
          echo "$COMMENT"
          echo "----------------"

          # 已经关闭的跳过
          if [ "$ISSUE_STATE" = "closed" ]; then
            echo "→ Issue 已关闭，跳过"
            echo "should_close=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 检测关键词（支持中文全角/半角）
          HAS_VERIFIED=$(echo "$COMMENT" | python3 -c "
          import sys
          text = sys.stdin.read().strip()
          keywords = ['已验证', '验证通过', '没问题', '没问题了', 'OK', 'ok', '✅', '✓', '确认', '已确认', '验收通过', 'done', 'Done', 'DONE']
          for kw in keywords:
              if kw in text:
                  print('1')
                  sys.exit(0)
          print('0')
          ")

          if [ "$HAS_VERIFIED" = "1" ]; then
            echo "→ ✅ 检测到验证通过，准备关闭 Issue #$ISSUE_NUM"
            echo "should_close=true" >> $GITHUB_OUTPUT
          else
            echo "→ 未检测到验证关键词，不处理"
            echo "should_close=false" >> $GITHUB_OUTPUT
          fi

      - name: 关闭 Issue + 写回复
        if: steps.check.outputs.should_close == 'true'
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          AUTHOR="${{ github.event.comment.user.login }}"
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          # 写关闭确认评论
          COMMENT_JSON=$(python3 -c "
          import json
          author = '''$AUTHOR'''
          now = '''$NOW'''
          body = f'''
          ✅ **小扣子已确认关闭本 Issue**

          - 由 @{author} 确认验证通过
          - 关闭时间：{now} 北京时间
          - 部署链接：https://fengsheng.tech

          ---

          > 如后续发现新问题，请直接在此 Issue 继续留言，小扣子会重新激活它。
          '''
          print(json.dumps({'body': body.strip()}))
          ")

          echo "--- 发送关闭确认评论 ---"
          RESULT=$(curl -s -w "\nHTTPCODE=%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_JSON" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUM/comments")

          HTTP_CODE=$(echo "$RESULT" | tail -1 | grep 'HTTPCODE=' | sed 's/.*HTTPCODE=//')
          echo "评论 API 返回 HTTP $HTTP_CODE"

          # 移除 in-progress 标签（如有）
          curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUM/labels/in-progress" > /dev/null

          # 关闭 Issue
          echo "--- 关闭 Issue #$ISSUE_NUM ---"
          CLOSE_RESULT=$(curl -s -w "\nHTTPCODE=%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{"state":"closed"}' \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUM")

          CLOSE_HTTP=$(echo "$CLOSE_RESULT" | tail -1 | grep 'HTTPCODE=' | sed 's/.*HTTPCODE=//')
          echo "关闭 API 返回 HTTP $CLOSE_HTTP"

      - name: 汇总
        if: always()
        run: |
          echo "## Issue 自动关闭流程完成"
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "Issue: #${{ github.event.issue.number }}"
          echo "作者: @${{ github.event.comment.user.login }}"
          echo "是否关闭: ${{ steps.check.outputs.should_close }}"
