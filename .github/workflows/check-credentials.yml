name: 检查 Cloudflare 凭证（每小时）

on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点运行
  workflow_dispatch:       # 也支持手动触发

permissions:
  issues: read
  actions: write

jobs:
  check-credentials:
    name: 检查小鱼儿是否回复了凭证
    runs-on: ubuntu-latest
    steps:
      - name: 获取 Issue #42 最新评论
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 获取 Issue #42 评论 ==="
          # 获取最近10条评论
          COMMENTS=$(gh api "repos/${{ github.repository }}/issues/42/comments?per_page=10&page=1" \
            --jq '.[] | "\(.user.login)|\(.created_at)|\(.body)"')

          COMMENT_COUNT=$(echo "$COMMENTS" | wc -l)
          echo "获取到 $COMMENT_COUNT 条评论"

          # 安全地保存到环境变量（不写入 GITHUB_OUTPUT 避免日志泄露）
          {
            echo 'ISSUE_COMMENTS<<COMMENTS_EOF'
            echo "$COMMENTS"
            echo 'COMMENTS_EOF'
          } >> "$GITHUB_ENV"

          # 显示摘要（不含凭证原文）
          echo "$COMMENTS" | while IFS='|' read -r user date body; do
            echo "  [$user] @ $date"
          done

      - name: 提取 Cloudflare 凭证
        id: extract
        run: |
          FOUND=false
          ACCOUNT_ID=""
          API_TOKEN=""

          # ===== 提取 Account ID（多种格式） =====
          # 格式1: Account ID: xxx / Account_ID=xxx
          if echo "$ISSUE_COMMENTS" | grep -qiE 'account[_ ]?id[:\s=]+'; then
            ACCOUNT_ID=$(echo "$ISSUE_COMMENTS" | grep -oiE 'account[_ ]?id[:\s=]+[a-f0-9]{20,40}' | grep -oE '[a-f0-9]{20,40}' | tail -1)
          fi
          # 格式2: CLOUDFLARE_ACCOUNT_ID=xxx
          if [ -z "$ACCOUNT_ID" ] && echo "$ISSUE_COMMENTS" | grep -qiE 'CLOUDFLARE_ACCOUNT_ID[:\s=]+'; then
            ACCOUNT_ID=$(echo "$ISSUE_COMMENTS" | grep -oiE 'CLOUDFLARE_ACCOUNT_ID[:\s=]+[a-f0-9]{20,40}' | grep -oE '[a-f0-9]{20,40}' | tail -1)
          fi
          # 格式3: 代码块中独立一行的32位hex（紧跟"账户"上下文）
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(echo "$ISSUE_COMMENTS" | grep -iB1 -E '(账户|account)' | grep -oE '[a-f0-9]{32}' | tail -1)
          fi

          # ===== 提取 API Token（多种格式） =====
          # 格式1: API Token: xxx
          if echo "$ISSUE_COMMENTS" | grep -qiE 'api[_ ]?token[:\s=]+'; then
            API_TOKEN=$(echo "$ISSUE_COMMENTS" | grep -oiE 'api[_ ]?token[:\s=]+[A-Za-z0-9_\-]{30,}' | sed 's/^.*api[_ ]\?token[:\s=]\+//i' | tail -1)
          fi
          # 格式2: CLOUDFLARE_API_TOKEN=xxx
          if [ -z "$API_TOKEN" ] && echo "$ISSUE_COMMENTS" | grep -qiE 'CLOUDFLARE_API_TOKEN[:\s=]+'; then
            API_TOKEN=$(echo "$ISSUE_COMMENTS" | grep -oiE 'CLOUDFLARE_API_TOKEN[:\s=]+[A-Za-z0-9_\-]{30,}' | sed 's/^.*CLOUDFLARE_API_TOKEN[:\s=]\+//i' | tail -1)
          fi
          # 格式3: 代码块中的长token（v4.开头或纯字母数字40+字符）
          if [ -z "$API_TOKEN" ]; then
            API_TOKEN=$(echo "$ISSUE_COMMENTS" | grep -oE '`[A-Za-z0-9_\-]{36,}`' | tr -d '`' | tail -1)
          fi

          # ===== 判断 =====
          if [ -n "$ACCOUNT_ID" ] && [ ${#API_TOKEN} -gt 20 ]; then
            FOUND=true
            echo "✅ 找到完整凭证！"
            echo "  Account ID: ${ACCOUNT_ID:0:8}****（已脱敏）"
            echo "  API Token: ****（长度 ${#API_TOKEN}，已脱敏）"
          else
            echo "❌ 尚未找到完整凭证"
            [ -n "$ACCOUNT_ID" ] && echo "  - Account ID: ${ACCOUNT_ID:0:8}****（部分）" || echo "  - Account ID: 未找到"
            [ ${#API_TOKEN} -gt 0 ] && echo "  - API Token: 部分（长度 ${#API_TOKEN}）" || echo "  - API Token: 未找到"
          fi

          # 通过环境文件安全传递（不会出现在步骧日志中）
          echo "credentials_found=$FOUND" >> "$GITHUB_OUTPUT"
          if [ "$FOUND" = true ]; then
            echo "CF_ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"
            echo "CF_API_TOKEN=$API_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: 配置 GitHub Secrets
        if: steps.extract.outputs.credentials_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          echo "=== 配置 GitHub Secrets ==="
          # 需要 ADMIN_TOKEN（有 secrets:write 权限的 PAT）
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️ ADMIN_TOKEN 未配置，无法设置 Secrets"
            echo "请配置一个有 repo scope 的 PAT 作为 ADMIN_TOKEN secret"
            exit 1
          fi

          # 安装 pynacl 用于加密
          pip install pynacl PyJWT 2>/dev/null

          # 获取仓库公钥
          KEY_DATA=$(gh api "repos/${{ github.repository }}/actions/secrets/public-key")
          KEY_ID=$(echo "$KEY_DATA" | jq -r '.key_id')
          PUBLIC_KEY=$(echo "$KEY_DATA" | jq -r '.key')

          # 写入加密辅助脚本
          cat > /tmp/encrypt_secret.py << 'PYSCRIPT'
          import base64, sys, os
          from nacl import public as nacl_public
          pk = base64.b64decode(sys.argv[1])
          value = sys.argv[2]
          sealed_box = nacl_public.SealedBox(nacl_public.PublicKey(pk))
          encrypted = sealed_box.encrypt(value.encode())
          print(base64.b64encode(encrypted).decode())
          PYSCRIPT

          # 加密并设置 secret
          set_secret() {
            local name="$1"
            local value="$2"
            local encrypted
            encrypted=$(python3 /tmp/encrypt_secret.py "$PUBLIC_KEY" "$value")
            gh api "repos/${{ github.repository }}/actions/secrets/$name" \
              -f encrypted_value="$encrypted" \
              -f key_id="$KEY_ID" \
              --method PUT
            echo "✅ $name 已设置"
          }

          set_secret "CLOUDFLARE_ACCOUNT_ID" "$CF_ACCOUNT_ID"
          set_secret "CLOUDFLARE_API_TOKEN" "$CF_API_TOKEN"

      - name: 触发部署
        if: steps.extract.outputs.credentials_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 触发 Cloudflare Pages 部署 ==="
          gh workflow run deploy.yml -f environment=production
          echo "✅ deploy.yml 已触发，production 环境"

      - name: 在 Issue #42 通知成功
        if: steps.extract.outputs.credentials_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTICE_BODY='🤖 **凭证已自动配置，部署已触发**'$'\n\n''小鱼儿回复的 Cloudflare 凭证已被提取并安全配置到 GitHub Secrets：'$'\n''- `CLOUDFLARE_ACCOUNT_ID` ✅'$'\n''- `CLOUDFLARE_API_TOKEN` ✅'$'\n\n''部署 workflow `deploy.yml` 已触发 → [查看 Actions](${{ github.server_url }}/${{ github.repository }}/actions)'$'\n\n''— *由小扣子（Trae）自动执行*'
          gh api "repos/${{ github.repository }}/issues/42/comments" \
            --method POST \
            -f body="$NOTICE_BODY"

      - name: 检查摘要（未找到凭证时）
        if: steps.extract.outputs.credentials_found == 'false'
        run: |
          echo "## ⏳ 小鱼儿尚未回复凭证"
          echo "本次检查未在 Issue #42 中找到 Cloudflare 凭证。"
          echo "下次检查将在 1 小时后自动执行。"
          echo ""
          echo "期望小鱼儿回复格式示例："
          echo '  Account ID: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6'
          echo '  API Token: v4.0-abc123...xyz'
