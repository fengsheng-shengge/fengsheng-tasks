name: Check Cloudflare Credentials

on:
  schedule:
    # 每小时整点运行
    - cron: '0 * * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  check-credentials:
    name: 检查 Cloudflare 凭证
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Issue #42 for credentials
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = 'fengsheng-shengge';
            const repo = 'fengsheng-tasks';
            const issueNumber = 42;
            
            // 获取 Issue 评论
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });
            
            console.log(`找到 ${comments.data.length} 条评论`);
            
            // 搜索凭证
            let accountId = null;
            let apiToken = null;
            
            // 正则表达式匹配凭证
            const accountIdPattern = /(?:CLOUDFLARE_ACCOUNT_ID|Account\s*ID|账户ID)[:：]?\s*([a-f0-9]{32})/i;
            const apiTokenPattern = /(?:CLOUDFLARE_API_TOKEN|API\s*Token|API令牌)[:：]?\s*([A-Za-z0-9_-]{40,})/i;
            
            for (const comment of comments.data) {
              const body = comment.body;
              const user = comment.user.login;
              
              // 检查是否是小鱼儿的评论（可能的各种用户名）
              const xiaoyuerUsers = ['xiaoyuer', '小鱼儿', 'xiaoyu', 'coze-bot'];
              const isXiaoyuer = xiaoyuerUsers.some(name => user.toLowerCase().includes(name.toLowerCase()));
              
              // 提取凭证
              const accountMatch = body.match(accountIdPattern);
              const tokenMatch = body.match(apiTokenPattern);
              
              if (accountMatch) {
                accountId = accountMatch[1];
                console.log(`✅ 找到 Account ID: ${accountId.substring(0, 8)}...${accountId.substring(-8)}`);
                console.log(`   来自用户: ${user}`);
              }
              
              if (tokenMatch) {
                apiToken = tokenMatch[1];
                console.log(`✅ 找到 API Token: ${apiToken.substring(0, 8)}...${apiToken.substring(-8)}`);
                console.log(`   来自用户: ${user}`);
              }
            }
            
            // 设置输出
            core.setOutput('account_id', accountId || '');
            core.setOutput('api_token', apiToken || '');
            core.setOutput('found', accountId && apiToken ? 'true' : 'false');
            
            if (!accountId || !apiToken) {
              console.log('⏳ 未找到完整的 Cloudflare 凭证');
              console.log('等待小鱼儿回复后继续检查...');
            }

      - name: Set GitHub Secrets
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const accountId = '${{ steps.check.outputs.account_id }}';
            const apiToken = '${{ steps.check.outputs.api_token }}';
            
            // 获取仓库公钥
            const publicKey = await github.rest.actions.getRepoPublicKey({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks'
            });
            
            // 使用 libsodium 加密
            const sodium = await import('libsodium-wrappers');
            await sodium.ready;
            
            // 加密 Account ID
            const encryptedAccountId = sodium.crypto_box_seal(
              sodium.from_string(accountId),
              sodium.from_base64(publicKey.data.key)
            );
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              secret_name: 'CLOUDFLARE_ACCOUNT_ID',
              encrypted_value: sodium.to_base64(encryptedAccountId),
              key_id: publicKey.data.key_id
            });
            
            console.log('✅ 成功设置 Secret: CLOUDFLARE_ACCOUNT_ID');
            
            // 加密 API Token
            const encryptedApiToken = sodium.crypto_box_seal(
              sodium.from_string(apiToken),
              sodium.from_base64(publicKey.data.key)
            );
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              secret_name: 'CLOUDFLARE_API_TOKEN',
              encrypted_value: sodium.to_base64(encryptedApiToken),
              key_id: publicKey.data.key_id
            });
            
            console.log('✅ 成功设置 Secret: CLOUDFLARE_API_TOKEN');

      - name: Trigger Deployment
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'production'
              }
            });
            
            console.log('✅ 成功触发部署工作流');
            console.log('查看进度: https://github.com/fengsheng-shengge/fengsheng-tasks/actions');

      - name: Add Comment to Issue
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date().toISOString().replace('T', ' ').substring(0, 19);
            
            const comment = `## ✅ Cloudflare 凭证已配置
            
            **状态**: Secrets 已设置，部署已触发
            
            | Secret | 状态 |
            |--------|------|
            | \`CLOUDFLARE_ACCOUNT_ID\` | ✅ 已配置 |
            | \`CLOUDFLARE_API_TOKEN\` | ✅ 已配置 |
            
            **部署进度**: https://github.com/fengsheng-shengge/fengsheng-tasks/actions
            
            **网站地址**: https://fengsheng.tech
            
            ---
            *此评论由自动化脚本生成 - ${now}*`;
            
            await github.rest.issues.createComment({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              issue_number: 42,
              body: comment
            });
            
            console.log('✅ 成功添加评论到 Issue #42');