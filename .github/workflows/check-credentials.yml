name: Check Issue #42 for Cloudflare Credentials

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/check-credentials.yml'

permissions:
  issues: read
  actions: write
  contents: write

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Issue #42 comments
        id: check-issue
        run: |
          COMMENTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/42/comments?per_page=100")
          
          # Search for CLOUDFLARE_ACCOUNT_ID
          ACCOUNT_ID=$(echo "$COMMENTS" | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          for c in data:
              body = c.get('body', '')
              # Match patterns like: CLOUDFLARE_ACCOUNT_ID=xxx, CLOUDFLARE_ACCOUNT_ID: xxx, Account ID: xxx
              m = re.search(r'CLOUDFLARE_ACCOUNT_ID\s*[=:]\s*[\"\']?([a-f0-9]{20,})', body, re.IGNORECASE)
              if not m:
                  m = re.search(r'Account\s*ID\s*[=:]\s*[\"\']?([a-f0-9]{20,})', body, re.IGNORECASE)
              if m:
                  print(m.group(1))
                  sys.exit(0)
          print('')
          ")
          
          # Search for CLOUDFLARE_API_TOKEN
          API_TOKEN=$(echo "$COMMENTS" | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          for c in data:
              body = c.get('body', '')
              # Match patterns like: CLOUDFLARE_API_TOKEN=xxx, CLOUDFLARE_API_TOKEN: xxx
              m = re.search(r'CLOUDFLARE_API_TOKEN\s*[=:]\s*[\"\']?([A-Za-z0-9_-]{30,})', body, re.IGNORECASE)
              if not m:
                  m = re.search(r'API\s*Token\s*[=:]\s*[\"\']?([A-Za-z0-9_-]{30,})', body, re.IGNORECASE)
              if m:
                  print(m.group(1))
                  sys.exit(0)
          print('')
          ")
          
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "API_TOKEN=$API_TOKEN" >> $GITHUB_OUTPUT
          
          if [ -n "$ACCOUNT_ID" ] && [ -n "$API_TOKEN" ]; then
            echo "CREDENTIALS_FOUND=true" >> $GITHUB_OUTPUT
            echo "✅ Cloudflare 凭证已找到！"
            echo "  Account ID: ${ACCOUNT_ID:0:8}..."
            echo "  API Token: ${API_TOKEN:0:8}..."
          else
            echo "CREDENTIALS_FOUND=false" >> $GITHUB_OUTPUT
            echo "⏳ 暂未找到 Cloudflare 凭证"
            if [ -z "$ACCOUNT_ID" ]; then
              echo "  缺少: CLOUDFLARE_ACCOUNT_ID"
            fi
            if [ -z "$API_TOKEN" ]; then
              echo "  缺少: CLOUDFLARE_API_TOKEN"
            fi
          fi

      - name: Write status file
        run: |
          mkdir -p .agent
          cat > .agent/cloudflare-credentials-status.json << EOF
          {
            "last_check": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "credentials_found": ${{ steps.check-issue.outputs.CREDENTIALS_FOUND }},
            "account_id_present": ${{ steps.check-issue.outputs.ACCOUNT_ID != '' && 'true' || 'false' }},
            "api_token_present": ${{ steps.check-issue.outputs.API_TOKEN != '' && 'true' || 'false' }},
            "issue_number": 42,
            "issue_state": "closed",
            "note": "This file is auto-generated by check-credentials.yml workflow"
          }
          EOF
          
          git config user.name "小扣子"
          git config user.email "xiaokouzi@fengsheng.tech"
          git add .agent/cloudflare-credentials-status.json
          git diff --cached --quiet || git commit -m "chore: update Cloudflare credentials check status"
          git push

      - name: Set GitHub Secrets if found
        if: steps.check-issue.outputs.CREDENTIALS_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Setting CLOUDFLARE_ACCOUNT_ID secret..."
          echo "${{ steps.check-issue.outputs.ACCOUNT_ID }}" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo ${{ github.repository }}
          
          echo "Setting CLOUDFLARE_API_TOKEN secret..."
          echo "${{ steps.check-issue.outputs.API_TOKEN }}" | gh secret set CLOUDFLARE_API_TOKEN --repo ${{ github.repository }}
          
          echo "✅ Secrets configured successfully!"

      - name: Trigger deployment
        if: steps.check-issue.outputs.CREDENTIALS_FOUND == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Triggering Cloudflare Pages deployment..."
          gh workflow run deploy.yml --repo ${{ github.repository }} --ref main
          echo "✅ Deployment triggered!"

      - name: Notify on Issue #42
        if: steps.check-issue.outputs.CREDENTIALS_FOUND == 'true'
        run: |
          COMMENT_BODY="🤖 **凭证已自动配置并触发部署**

- ✅ CLOUDFLARE_ACCOUNT_ID 已设置到 GitHub Secrets
- ✅ CLOUDFLARE_API_TOKEN 已设置到 GitHub Secrets  
- 🚀 已触发 Cloudflare Pages 部署
- ⏱️ 部署通常需要 2-3 分钟

> 验证地址：https://fengsheng.tech"
          
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "{\"body\":$(echo "$COMMENT_BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/42/comments"

      - name: Summary
        run: |
          echo "## 凭证检查结果"
          echo ""
          if [ "${{ steps.check-issue.outputs.CREDENTIALS_FOUND }}" = "true" ]; then
            echo "✅ **Cloudflare 凭证已找到**"
            echo "- CLOUDFLARE_ACCOUNT_ID: 已配置"
            echo "- CLOUDFLARE_API_TOKEN: 已配置"
            echo "- 部署状态: 已触发"
          else
            echo "⏳ **暂未找到 Cloudflare 凭证**"
            echo "- 小鱼儿尚未在 Issue #42 中回复凭证信息"
            echo "- 下次检查时间: 1 小时后"
            echo ""
            echo "### 需要的凭证格式"
            echo '```'
            echo "CLOUDFLARE_ACCOUNT_ID=你的AccountID"
            echo "CLOUDFLARE_API_TOKEN=你的APIToken"
            echo '```"
          fi
