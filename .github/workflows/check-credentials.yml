name: Check Cloudflare Credentials from Issue #42

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  actions: write

jobs:
  check-credentials:
    name: 检查小鱼儿是否回复了凭证
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Issue #42 comments
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 获取 Issue #42 的评论 ==="
          gh api \
            repos/${{ github.repository }}/issues/42/comments \
            --paginate \
            -q '.[] | .user.login + "|" + .created_at + "|" + .body' \
            > /tmp/issue_comments.txt
          TOTAL=$(wc -l < /tmp/issue_comments.txt)
          echo "✓ 共获取 $TOTAL 条评论"

      - name: Search for Cloudflare credentials
        id: extract
        run: |
          echo "=== 搜索凭证关键词 ==="
          ACCOUNT_ID=""
          API_TOKEN=""
          ACCOUNT_ID=$(grep -oP '(?i)(CLOUDFLARE_ACCOUNT_ID|ACCOUNT_ID)\s*[=:\uff1a]\s*\K[a-f0-9]{32}' /tmp/issue_comments.txt | head -1)
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(grep -oP '(?i)account[\s_-]?id\s*[=:\uff1a]\s*\K[a-f0-9]{32}' /tmp/issue_comments.txt | head -1)
          fi
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID=$(grep -oP '\b[a-f0-9]{32}\b' /tmp/issue_comments.txt | head -1)
          fi
          API_TOKEN=$(grep -oP '(?i)(CLOUDFLARE_API_TOKEN|API_TOKEN)\s*[=:\uff1a]\s*\K[A-Za-z0-9_-]{30,}' /tmp/issue_comments.txt | head -1)
          if [ -z "$API_TOKEN" ]; then
            API_TOKEN=$(grep -oP '(?i)api[\s_-]?token\s*[=:\uff1a]\s*\K[A-Za-z0-9_-]{30,}' /tmp/issue_comments.txt | head -1)
          fi
          if [ -z "$API_TOKEN" ]; then
            API_TOKEN=$(grep -oP 'v4-[a-zA-Z0-9_-]{30,}' /tmp/issue_comments.txt | head -1)
          fi
          if [ -n "$ACCOUNT_ID" ] && [ -n "$API_TOKEN" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$ACCOUNT_ID" > /tmp/account_id.txt
            echo "$API_TOKEN" > /tmp/api_token.txt
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Secrets
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACCOUNT_ID=$(cat /tmp/account_id.txt)
          API_TOKEN=$(cat /tmp/api_token.txt)
          echo "$ACCOUNT_ID" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo ${{ github.repository }}
          echo "$API_TOKEN" | gh secret set CLOUDFLARE_API_TOKEN --repo ${{ github.repository }}
          rm -f /tmp/account_id.txt /tmp/api_token.txt

      - name: Trigger Deployment
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --repo ${{ github.repository }} -f environment=production

      - name: Comment on Issue with result
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/42/comments -f body="## 🤖 自动凭证检测报告

由 check-credentials workflow 自动检测到 Cloudflare 凭证已就绪。

- ✅ CLOUDFLARE_ACCOUNT_ID 已配置到 GitHub Secrets
- ✅ CLOUDFLARE_API_TOKEN 已配置到 GitHub Secrets
- 🚀 部署 workflow 已触发

下次部署将使用这些凭证推送到 Cloudflare Pages。"

      - name: Summary
        run: |
          if [ "${{ steps.extract.outputs.found }}" == "true" ]; then
            echo "## ✅ 凭证已找到并配置" >> "$GITHUB_STEP_SUMMARY"
            echo "- CLOUDFLARE_ACCOUNT_ID: 已配置" >> "$GITHUB_STEP_SUMMARY"
            echo "- CLOUDFLARE_API_TOKEN: 已配置" >> "$GITHUB_STEP_SUMMARY"
            echo "- 部署: 已触发" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⏳ 暂未检测到凭证" >> "$GITHUB_STEP_SUMMARY"
            echo "下次检查将在1小时后自动执行。" >> "$GITHUB_STEP_SUMMARY"
          fi
