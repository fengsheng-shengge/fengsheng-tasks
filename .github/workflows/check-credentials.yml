name: Check Cloudflare Credentials
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check credentials in Issue #42
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run credential extraction script
        id: extract
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
        run: node .github/scripts/check-credentials.js

      - name: Update GitHub Secrets if credentials found
        if: steps.extract.outputs.FOUND == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const core = require('@actions/core');
            const accountId = core.getInput('CLOUDFLARE_ACCOUNT_ID');
            const apiToken = core.getInput('CLOUDFLARE_API_TOKEN');

            const owner = 'fengsheng-shengge';
            const repo = 'fengsheng-tasks';

            await github.rest.actions.createOrUpdateRepoSecret({
              owner,
              repo,
              secret_name: 'CLOUDFLARE_ACCOUNT_ID',
              encrypted_value: Buffer.from(accountId).toString('base64')
            });

            await github.rest.actions.createOrUpdateRepoSecret({
              owner,
              repo,
              secret_name: 'CLOUDFLARE_API_TOKEN',
              encrypted_value: Buffer.from(apiToken).toString('base64')
            });

            console.log('Secrets updated successfully');

      - name: Trigger deployment if credentials updated
        if: steps.extract.outputs.FOUND == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'production'
              }
            });
            console.log('Deployment triggered successfully');

      - name: Send notification comment
        if: steps.extract.outputs.FOUND == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              issue_number: 42,
              body: '✅ 凭证检测成功！\n\n已自动提取并配置 Cloudflare 部署凭证到 GitHub Secrets，部署流水线已触发。\n\n- CLOUDFLARE_ACCOUNT_ID: 已配置\n- CLOUDFLARE_API_TOKEN: 已配置（cfut_ 前缀）\n\n等待部署完成...'
            });
