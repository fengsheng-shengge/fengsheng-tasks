name: Check Cloudflare Credentials Hourly
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Issue #42 for credentials
        id: check_credentials
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 42,
              per_page: 150
            });

            let accountId = '';
            let apiToken = '';

            for (const comment of comments.data) {
              const body = comment.body;
              
              const accountIdMatch = body.match(/(?:Account[_-]?ID|account[_-]?id)[：:]?\s*["']?([a-f0-9]{32})["']?/i);
              if (accountIdMatch) {
                accountId = accountIdMatch[1];
              }

              const apiTokenMatch = body.match(/(?:API[_-]?Token|api[_-]?token|Token|token)[：:]?\s*["']?([a-zA-Z0-9_-]{40,})["']?/i);
              if (apiTokenMatch) {
                apiToken = apiTokenMatch[1];
              }

              if (accountId && apiToken) break;
            }

            if (accountId && apiToken) {
              console.log(`Found credentials: Account ID=${accountId}, API Token=${apiToken.substring(0, 10)}...`);
              return { found: true, accountId, apiToken };
            } else {
              console.log('No credentials found in Issue #42 comments');
              return { found: false };
            }

      - name: Set CLOUDFLARE_ACCOUNT_ID Secret
        if: ${{ fromJSON(steps.check_credentials.outputs.result).found == true }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = ${{ steps.check_credentials.outputs.result }};
            
            const publicKey = await github.rest.actions.getRepoPublicKey({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const crypto = require('crypto');
            const encrypted = crypto.publicEncrypt(
              {
                key: publicKey.data.key,
                padding: crypto.constants.RSA_PKCS1_OAEP_PADDING,
                oaepHash: 'sha256'
              },
              Buffer.from(result.accountId)
            );

            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'CLOUDFLARE_ACCOUNT_ID',
              encrypted_value: encrypted.toString('base64'),
              key_id: publicKey.data.key_id
            });

            console.log('CLOUDFLARE_ACCOUNT_ID secret updated');

      - name: Set CLOUDFLARE_API_TOKEN Secret
        if: ${{ fromJSON(steps.check_credentials.outputs.result).found == true }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = ${{ steps.check_credentials.outputs.result }};
            
            const publicKey = await github.rest.actions.getRepoPublicKey({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const crypto = require('crypto');
            const encrypted = crypto.publicEncrypt(
              {
                key: publicKey.data.key,
                padding: crypto.constants.RSA_PKCS1_OAEP_PADDING,
                oaepHash: 'sha256'
              },
              Buffer.from(result.apiToken)
            );

            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'CLOUDFLARE_API_TOKEN',
              encrypted_value: encrypted.toString('base64'),
              key_id: publicKey.data.key_id
            });

            console.log('CLOUDFLARE_API_TOKEN secret updated');

      - name: Trigger Deployment
        if: ${{ fromJSON(steps.check_credentials.outputs.result).found == true }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'production'
              }
            });
            console.log('Deployment workflow triggered successfully')