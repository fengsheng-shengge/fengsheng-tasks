name: Check Cloudflare Credentials Hourly
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Issue #42 for credentials
        id: check_credentials
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 42,
              per_page: 100
            });

            let accountId = '';
            let apiToken = '';

            for (const comment of comments.data) {
              const body = comment.body;
              
              const accountIdMatch = body.match(/Account\s*ID[：:]?\s*([a-f0-9]{32})/i);
              if (accountIdMatch) {
                accountId = accountIdMatch[1];
              }

              const apiTokenMatch = body.match(/API\s*Token[：:]?\s*(CF[A-Za-z0-9_-]+)/i);
              if (apiTokenMatch) {
                apiToken = apiTokenMatch[1];
              }

              if (accountId && apiToken) break;
            }

            if (accountId && apiToken) {
              console.log(`Found credentials: Account ID=${accountId}, API Token=${apiToken.substring(0, 10)}...`);
              return { found: true, accountId, apiToken };
            } else {
              console.log('No credentials found in Issue #42 comments');
              return { found: false };
            }

      - name: Set GitHub Secrets
        if: ${{ fromJSON(steps.check_credentials.outputs.result).found == true }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = ${{ steps.check_credentials.outputs.result }};
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'CLOUDFLARE_ACCOUNT_ID',
              encrypted_value: result.accountId
            });

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'production'
              }
            });
            console.log('Secrets updated and deployment triggered')