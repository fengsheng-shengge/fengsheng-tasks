name: Check Cloudflare Credentials
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check credentials in Issue #42
    runs-on: ubuntu-latest
    permissions:
      issues: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run credential extraction script
        id: extract
        env:
          GITHUB_TOKEN: ${{ secrets.AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
        run: node .github/scripts/check-credentials.js