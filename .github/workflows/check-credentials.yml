name: Check credentials - 小鱼儿回复 Cloudflare 凭证
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: check-credentials
  cancel-in-progress: true

jobs:
  check:
    name: Check Issue #42 for credentials
    runs-on: ubuntu-latest
    permissions:
      issues: read
      actions: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '.github/scripts/package.json'

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Run credential check
        run: node check-credentials.js
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
