name: Check credentials - 小鱼儿回复 Cloudflare 凭证

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: check-credentials
  cancel-in-progress: true

permissions:
  issues: read
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install tweetnacl

      - name: Check credentials in Issue #42
        run: node .github/scripts/check-credentials.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}