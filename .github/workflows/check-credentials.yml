name: Check credentials - 小鱼儿回复 Cloudflare 凭证

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: check-credentials
  cancel-in-progress: true

permissions:
  issues: write
  actions: write
  contents: read

jobs:
  check:
    name: Check Issue #42 for credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/check-credentials.js
