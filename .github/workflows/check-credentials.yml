name: Check credentials - 小鱼儿回复 Cloudflare 凭证
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: check-credentials
  cancel-in-progress: true

permissions:
  issues: read
  actions: write
  contents: read

jobs:
  check:
    name: 检查 Issue #42 凭证
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Run credential check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: fengsheng-shengge
          REPO_NAME: fengsheng-tasks
          ISSUE_NUMBER: 42
        run: node check-credentials.js
        working-directory: .github/scripts
