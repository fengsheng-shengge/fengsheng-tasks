name: Check Cloudflare Credentials from Issue #42

on:
  schedule:
    # 每小时运行一次
    - cron: '0 * * * *'
  workflow_dispatch:
    # 手动触发测试

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Issue #42 comments
        id: get-comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching Issue #42 comments..."
          
          # 获取 Issue 详情
          gh issue view 42 --repo ${{ github.repository }} --json title,body,state,comments > issue_data.json
          
          # 提取评论数量
          COMMENT_COUNT=$(jq '.comments' issue_data.json)
          echo "Found $COMMENT_COUNT comments"
          
          # 获取所有评论
          gh api repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/issues/42/comments --paginate > comments.json
          
          echo "comments_file=comments.json" >> $GITHUB_OUTPUT

      - name: Extract Cloudflare credentials
        id: extract-credentials
        run: |
          python3 scripts/check_cloudflare_credentials.py --extract comments.json > credentials.txt
          
          # 检查是否找到凭证
          if grep -q "ACCOUNT_ID_FOUND" credentials.txt; then
            ACCOUNT_ID=$(grep "ACCOUNT_ID:" credentials.txt | cut -d' ' -f2)
            API_TOKEN=$(grep "API_TOKEN:" credentials.txt | cut -d' ' -f2)
            
            echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
            echo "api_token=$API_TOKEN" >> $GITHUB_OUTPUT
            echo "credentials_found=true" >> $GITHUB_OUTPUT
            
            echo "✓ Found credentials from 小鱼儿's comment!"
          else
            echo "credentials_found=false" >> $GITHUB_OUTPUT
            echo "No credentials found yet. Will check again in 1 hour."
          fi

      - name: Configure GitHub Secrets
        if: steps.extract-credentials.outputs.credentials_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 设置 CLOUDFLARE_ACCOUNT_ID
          echo "${{ steps.extract-credentials.outputs.account_id }}" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo ${{ github.repository }}
          
          # 设置 CLOUDFLARE_API_TOKEN
          echo "${{ steps.extract-credentials.outputs.api_token }}" | gh secret set CLOUDFLARE_API_TOKEN --repo ${{ github.repository }}
          
          echo "✓ GitHub Secrets configured!"

      - name: Trigger deployment
        if: steps.extract-credentials.outputs.credentials_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering Cloudflare Pages deployment..."
          gh workflow run deploy.yml --repo ${{ github.repository }}
          
          echo "✓ Deployment workflow triggered!"

      - name: Add comment to Issue #42
        if: steps.extract-credentials.outputs.credentials_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 42 --repo ${{ github.repository }} --body "## ✅ 凭证已收到并配置

小扣子（Trae）已自动提取小鱼儿提供的 Cloudflare 凭证：

| Secret | 状态 |
|--------|------|
| CLOUDFLARE_ACCOUNT_ID | ✓ 已配置 |
| CLOUDFLARE_API_TOKEN | ✓ 已配置 |

部署工作流已自动触发，请查看 [Actions](https://github.com/${{ github.repository }}/actions) 页面确认部署状态。

---
*此消息由自动化检查脚本发送*"

      - name: Summary
        run: |
          echo "## 检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.extract-credentials.outputs.credentials_found }}" == "true" ]; then
            echo "✅ **凭证已找到并配置**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Secret | 状态 |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| CLOUDFLARE_ACCOUNT_ID | ✅ 已配置 |" >> $GITHUB_STEP_SUMMARY
            echo "| CLOUDFLARE_API_TOKEN | ✅ 已配置 |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "部署工作流已触发: [查看](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ **尚未发现凭证**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "将继续每小时检查 Issue #42 的评论。" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "小鱼儿请在评论中回复以下信息：" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
            echo "Account ID: <你的32位Account ID>" >> $GITHUB_STEP_SUMMARY
            echo "API Token: <你的API Token>" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
          fi