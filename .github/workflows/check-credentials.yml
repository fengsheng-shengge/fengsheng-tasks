name: Check Issue #42 for Cloudflare Credentials

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Issue #42 comments
        id: check-issue
        run: |
          COMMENTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/fengsheng-shengge/fengsheng-tasks/issues/42/comments")
          
          ACCOUNT_ID=$(echo "$COMMENTS" | grep -oP '"body":.*?CLOUDFLARE_ACCOUNT_ID\s*[=:]\s*["\']?\K[a-f0-9]+' | head -1)
          API_TOKEN=$(echo "$COMMENTS" | grep -oP '"body":.*?CLOUDFLARE_API_TOKEN\s*[=:]\s*["\']?\K[A-Za-z0-9_-]+' | head -1)
          
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "API_TOKEN=$API_TOKEN" >> $GITHUB_OUTPUT
          
          if [ -n "$ACCOUNT_ID" ] && [ -n "$API_TOKEN" ]; then
            echo "CREDENTIALS_FOUND=true" >> $GITHUB_OUTPUT
          else
            echo "CREDENTIALS_FOUND=false" >> $GITHUB_OUTPUT
          fi

      - name: Set GitHub Secrets if found
        if: steps.check-issue.outputs.CREDENTIALS_FOUND == 'true'
        run: |
          echo "${{ steps.check-issue.outputs.ACCOUNT_ID }}" | gh secret set CLOUDFLARE_ACCOUNT_ID --body -
          echo "${{ steps.check-issue.outputs.API_TOKEN }}" | gh secret set CLOUDFLARE_API_TOKEN --body -
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deployment
        if: steps.check-issue.outputs.CREDENTIALS_FOUND == 'true'
        run: |
          gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify result
        run: |
          if [ "${{ steps.check-issue.outputs.CREDENTIALS_FOUND }}" = "true" ]; then
            echo "✅ Cloudflare credentials found and deployed!"
          else
            echo "⏳ No credentials found in Issue #42 comments yet."
          fi
