name: 检查小鱼儿是否回复 Cloudflare 凭证

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: '要检查的 Issue 编号（默认 42）'
        required: false
        default: '42'
        type: string
      xiaoyuer_logins:
        description: '小鱼儿的 GitHub 登录名（英文逗号分隔）'
        required: false
        default: 'xiaoyuer-bot,xiaoyuer,coze-bot,coze'
        type: string

concurrency:
  group: check-cloudflare-credentials
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  check:
    name: 检查 Issue 评论并配置 Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装依赖（tweetnacl / tweetnacl-util）
        run: |
          cd .github/scripts
          npm init -y >/dev/null 2>&1 || true
          npm install --no-audit --no-fund tweetnacl tweetnacl-util

      - name: 运行凭证检查
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '42' }}
          XIAOYUER_LOGINS: ${{ github.event.inputs.xiaoyuer_logins || 'xiaoyuer-bot,xiaoyuer,coze-bot,coze' }}
          STATE_FILE: .credentials-state.json
        run: |
          cd .github/scripts
          node check-credentials.js

      - name: 持久化 state 文件
        if: always()
        run: |
          if [ -f .github/scripts/.credentials-state.json ]; then
            mkdir -p .github/workflows/_state
            cp .github/scripts/.credentials-state.json .github/workflows/_state/credentials-state.json
            git config user.name 'xiaokouzi-bot'
            git config user.email 'xiaokouzi-bot@users.noreply.github.com'
            git add .github/workflows/_state/credentials-state.json
            if ! git diff --cached --quiet; then
              git commit -m 'chore: update credentials check state' || true
              git push || echo 'state push failed, will retry next hour'
            fi
          fi