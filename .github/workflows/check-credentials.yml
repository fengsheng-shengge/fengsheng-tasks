name: 检查 Cloudflare 凭证 - Issue #42

on:
  schedule:
    # 每小时整点运行
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-credentials:
    name: 检查小鱼儿是否回复了凭证
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write

    steps:
      - name: 提取 Cloudflare 凭证
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 检查 Issue #42 评论 ==="
          echo "时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          ACCOUNT_ID=""
          API_TOKEN=""

          # 逐页获取评论
          PAGE=1
          while true; do
            COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/42/comments?per_page=100&page=$PAGE" 2>/dev/null || echo "[]")

            COUNT=$(echo "$COMMENTS_JSON" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            echo "📄 第 $PAGE 页，$COUNT 条评论"

            # 遍历每条评论
            for i in $(seq 0 $((COUNT - 1))); do
              USER=$(echo "$COMMENTS_JSON" | jq -r ".[$i].user.login")
              BODY=$(echo "$COMMENTS_JSON" | jq -r ".[$i].body")
              CREATED=$(echo "$COMMENTS_JSON" | jq -r ".[$i].created_at")

              echo "  📝 by $USER at $CREATED (前80字: $(echo "$BODY" | head -c 80)...)"

              # 提取 Account ID — 多种格式
              if [ -z "$ACCOUNT_ID" ]; then
                # 格式: CLOUDFLARE_ACCOUNT_ID=xxx, Account ID: xxx, accountId: xxx 等
                ACCOUNT_ID=$(echo "$BODY" | grep -oiE '(CLOUDFLARE[_-]?ACCOUNT[_-]?ID[[:space:]]*[:=][[:space:]]*|[Aa]ccount[_-]?[Ii][Dd][[:space:]]*[:=][[:space:]]*|accountId[[:space:]]*[:=][[:space:]]*)[a-f0-9]{32}' \
                  | grep -oE '[a-f0-9]{32}' | head -1)
                if [ -z "$ACCOUNT_ID" ]; then
                  # 更宽松的匹配：32位hex
                  ACCOUNT_ID=$(echo "$BODY" | grep -oiE '(CLOUDFLARE[_-]?ACCOUNT[_-]?ID[[:space:]]*[:=][[:space:]]*|[Aa]ccount[_-]?[Ii][Dd][[:space:]]*[:=][[:space:]]*|accountId[[:space:]]*[:=][[:space:]]*)[a-zA-Z0-9_-]{20,}' \
                    | sed -E 's/.*[:=][[:space:]]*//' | head -1)
                fi
              fi

              # 提取 API Token — 多种格式
              if [ -z "$API_TOKEN" ]; then
                # 格式: CLOUDFLARE_API_TOKEN=xxx, API Token: xxx 等
                API_TOKEN=$(echo "$BODY" | grep -oiE '(CLOUDFLARE[_-]?API[_-]?TOKEN[[:space:]]*[:=][[:space:]]*|[Aa][Pp][Ii][[:space:]]*[_-]?[Tt]oken[[:space:]]*[:=][[:space:]]*)[a-zA-Z0-9_-]{30,}' \
                  | sed -E 's/.*[:=][[:space:]]*//' | head -1)
                # Cloudflare API Token 格式: v4s-xxxx... 或类似
                if [ -z "$API_TOKEN" ]; then
                  API_TOKEN=$(echo "$BODY" | grep -oiE 'v4s[a-zA-Z0-9_-]{30,}' | head -1)
                fi
              fi
            done

            PAGE=$((PAGE + 1))
          done

          if [ -n "$ACCOUNT_ID" ] && [ -n "$API_TOKEN" ]; then
            echo "✅ 找到完整凭证！"
            echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
            echo "api_token=$API_TOKEN" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ 未找到完整凭证"
            echo "  - Account ID: $([ -n "$ACCOUNT_ID" ] && echo '已找到' || echo '未找到')"
            echo "  - API Token: $([ -n "$API_TOKEN" ] && echo '已找到' || echo '未找到')"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 配置 GitHub Secrets 并触发部署
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 配置 GitHub Secrets ==="

          # 使用 GitHub API 直接设置 Secrets
          # 获取仓库公钥
          KEY_DATA=$(gh api "repos/${{ github.repository }}/actions/secrets/public-key")

          KEY_ID=$(echo "$KEY_DATA" | jq -r '.key_id')
          PUBLIC_KEY=$(echo "$KEY_DATA" | jq -r '.key')

          echo "📦 公钥 ID: $KEY_ID"

          # 使用 Python 加密 Secret 值
          pip install pynacl -q 2>/dev/null

          encrypt_secret() {
            local SECRET_VALUE="$1"
            python3 -c "
from nacl import public
import base64, sys

public_key = public.PublicKey(base64.b64decode('$PUBLIC_KEY'), curve=public.curve25519.Curve25519)
sealed_box = public.SealedBox(public_key)
encrypted = sealed_box.encrypt(sys.argv[1].encode())
print(base64.b64encode(encrypted).decode())
" "$SECRET_VALUE"
          }

          # 设置 CLOUDFLARE_ACCOUNT_ID
          ENCRYPTED_ACCOUNT_ID=$(encrypt_secret "${{ steps.extract.outputs.account_id }}")
          gh api "repos/${{ github.repository }}/actions/secrets/CLOUDFLARE_ACCOUNT_ID" \
            --method PUT \
            --field encrypted_value="$ENCRYPTED_ACCOUNT_ID" \
            --field key_id="$KEY_ID"
          echo "  ✅ CLOUDFLARE_ACCOUNT_ID 已设置"

          # 设置 CLOUDFLARE_API_TOKEN
          ENCRYPTED_API_TOKEN=$(encrypt_secret "${{ steps.extract.outputs.api_token }}")
          gh api "repos/${{ github.repository }}/actions/secrets/CLOUDFLARE_API_TOKEN" \
            --method PUT \
            --field encrypted_value="$ENCRYPTED_API_TOKEN" \
            --field key_id="$KEY_ID"
          echo "  ✅ CLOUDFLARE_API_TOKEN 已设置"

          # 触发部署
          echo "=== 触发 Cloudflare Pages 部署 ==="
          gh workflow run deploy.yml \
            --repo ${{ github.repository }} \
            --ref main
          echo "  ✅ 部署工作流已触发"

      - name: 通知 Issue - 凭证已收到
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/42/comments" \
            --method POST \
            --field body="## ✅ Cloudflare 凭证已收到并配置

小扣子（Trae）自动检测到凭证回复，已完成以下操作：

| 步骤 | 状态 |
|------|------|
| 提取 CLOUDFLARE_ACCOUNT_ID | ✅ |
| 提取 CLOUDFLARE_API_TOKEN | ✅ |
| 配置 GitHub Secrets | ✅ |
| 触发 Cloudflare Pages 部署 | ✅ |

部署进行中，请查看 [Actions](https://github.com/${{ github.repository }}/actions) 页面。

---
🤖 由小扣子（Trae）自动检查脚本执行 · $(date -u '+%Y-%m-%d %H:%M UTC')"

          # 关闭 Issue
          gh api "repos/${{ github.repository }}/issues/42" \
            --method PATCH \
            --field state=closed

          echo "✅ Issue #42 已关闭"

      - name: 记录检查日志
        if: always()
        run: |
          echo "=== 检查完成 ==="
          echo "时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "凭证状态: ${{ steps.extract.outputs.found || '未找到' }}"