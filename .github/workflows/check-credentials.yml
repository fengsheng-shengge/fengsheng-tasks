name: Check Cloudflare Credentials

on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点运行
  workflow_dispatch:       # 支持手动触发

permissions:
  issues: write
  contents: read
  actions: write

env:
  ISSUE_NUMBER: 42
  REPO: fengsheng-shengge/fengsheng-tasks

jobs:
  check-credentials:
    name: 检查 Issue #42 小鱼儿凭证回复
    runs-on: ubuntu-latest
    steps:
      - name: 获取 Issue 最新评论
        id: comments
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
              sort: 'created',
              direction: 'desc'
            });

            // 记录评论统计
            const totalComments = comments.data.length;
            const users = [...new Set(comments.data.map(c => c.user.login))];
            core.setOutput('total_comments', totalComments);
            core.setOutput('users', users.join(', '));

            // 查找小鱼儿的评论（排除 fengsheng-shengge，即小扣子/生哥）
            const xiaoyuerComments = comments.data.filter(c =>
              c.user.login !== 'fengsheng-shengge' &&
              c.user.login !== 'github-actions[bot]'
            );

            console.log(`总评论数: ${totalComments}`);
            console.log(`评论用户: ${users.join(', ')}`);
            console.log(`小鱼儿评论数: ${xiaoyuerComments.length}`);

            if (xiaoyuerComments.length === 0) {
              core.setOutput('found', 'false');
              core.setOutput('account_id', '');
              core.setOutput('api_token', '');
              console.log('小鱼儿尚未回复凭证');
              return;
            }

            // 从小鱼儿的评论中提取凭证
            let accountId = '';
            let apiToken = '';

            for (const comment of xiaoyuerComments) {
              const body = comment.body;
              console.log(`--- ${comment.user.login} @ ${comment.created_at} ---`);
              console.log(body.substring(0, 300));

              // Account ID - 匹配多种格式
              const accountIdPatterns = [
                /CLOUDFLARE_ACCOUNT_ID\s*=\s*([a-f0-9]{20,})/i,
                /Account\s*ID\s*[:=]\s*([a-f0-9]{20,})/i,
                /`([a-f0-9]{32})`\s*.*Account/i,
              ];

              // API Token (cfut_ 前缀) - 匹配多种格式
              const apiTokenPatterns = [
                /CLOUDFLARE_API_TOKEN\s*=\s*(cfut_[A-Za-z0-9_-]+)/i,
                /API\s*Token\s*[:=]\s*(cfut_[A-Za-z0-9_-]+)/i,
                /`(cfut_[A-Za-z0-9_-]+)`/i,
              ];

              for (const pattern of accountIdPatterns) {
                const match = body.match(pattern);
                if (match && !accountId) {
                  accountId = match[1];
                  console.log(`提取到 Account ID: ${accountId.substring(0, 8)}...`);
                }
              }

              for (const pattern of apiTokenPatterns) {
                const match = body.match(pattern);
                if (match && !apiToken) {
                  apiToken = match[1];
                  console.log(`提取到 API Token: ${apiToken.substring(0, 8)}...`);
                }
              }
            }

            if (accountId || apiToken) {
              core.setOutput('found', 'true');
              core.setOutput('account_id', accountId || '');
              core.setOutput('api_token', apiToken || '');
              console.log(`\n提取结果:`);
              console.log(`  Account ID: ${accountId ? accountId.substring(0, 8) + '...' : '未找到'}`);
              console.log(`  API Token: ${apiToken ? apiToken.substring(0, 8) + '...' : '未找到'}`);
            } else {
              core.setOutput('found', 'false');
              core.setOutput('account_id', '');
              core.setOutput('api_token', '');
              console.log('小鱼儿已回复但未包含有效凭证格式');
            }

      - name: 配置凭证到 GitHub Secrets
        if: steps.comments.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const accountId = '${{ steps.comments.outputs.account_id }}';
            const apiToken = '${{ steps.comments.outputs.api_token }}';

            const setSecret = async (name, value) => {
              if (!value) {
                console.log(`跳过 ${name}: 值为空`);
                return;
              }

              // 获取仓库公钥用于加密
              const { data: pubkey } = await github.rest.actions.getRepoPublicKey({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              // 使用 libsodium 加密
              const sodium = require('libsodium-wrappers');
              await sodium.ready;

              const binKey = sodium.from_base64(pubkey.key, sodium.base64_variants.ORIGINAL);
              const binSecret = sodium.from_string(value);
              const encBytes = sodium.crypto_box_seal(binSecret, binKey);
              const encSecret = sodium.to_base64(encBytes, sodium.base64_variants.ORIGINAL);

              await github.rest.actions.createOrUpdateRepoSecret({
                owner: context.repo.owner,
                repo: context.repo.repo,
                secret_name: name,
                encrypted_value: encSecret,
                key_id: pubkey.key_id,
              });

              console.log(`✅ ${name} 已更新`);
            };

            if (accountId) await setSecret('CLOUDFLARE_ACCOUNT_ID', accountId);
            if (apiToken) await setSecret('CLOUDFLARE_API_TOKEN', apiToken);

      - name: 触发部署
        if: steps.comments.outputs.found == 'true' && steps.comments.outputs.api_token != ''
        uses: actions/github-script@v7
        with:
          script: |
            console.log('触发 Deploy to Cloudflare Pages 工作流...');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'production'
              }
            });
            console.log('✅ 部署工作流已触发');

      - name: 发布检查报告
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const found = '${{ steps.comments.outputs.found }}' === 'true';
            const accountId = '${{ steps.comments.outputs.account_id }}';
            const apiToken = '${{ steps.comments.outputs.api_token }}';
            const totalComments = '${{ steps.comments.outputs.total_comments }}';
            const users = '${{ steps.comments.outputs.users }}';

            const now = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            let body = `## 🔔 小扣子每小时工单巡检报告\n\n**巡检时间**：${now}\n\n---\n\n### 1. Issue #42 - Cloudflare 部署凭证\n\n`;

            if (found && apiToken) {
              body += `**状态**：✅ 检测到小鱼儿回复的 Cloudflare 凭证\n\n`;
              body += `| 凭证 | 状态 |\n|------|------|\n`;
              body += `| CLOUDFLARE_ACCOUNT_ID | ${accountId ? '✅ 已提取' : '⚠️ 未找到'} |\n`;
              body += `| CLOUDFLARE_API_TOKEN | ✅ 已提取 |\n\n`;
              body += `**已执行操作**：\n1. ✅ 凭证已配置到 GitHub Secrets\n2. ✅ 已触发 Deploy to Cloudflare Pages 工作流\n`;
            } else if (found && !apiToken) {
              body += `**状态**：⚠️ 小鱼儿已回复但未包含有效的 API Token（需 \`cfut_\` 前缀）\n\n`;
              body += `请小鱼儿在评论中按以下格式回复：\n\`\`\`\nCLOUDFLARE_ACCOUNT_ID=你的AccountID\nCLOUDFLARE_API_TOKEN=cfut_你的APIToken\n\`\`\`\n`;
            } else {
              body += `**状态**：⏳ 小鱼儿尚未回复 Cloudflare 凭证\n\n`;
              body += `- 评论总数：${totalComments} 条\n`;
              body += `- 评论用户：${users}\n\n`;
              body += `**需要小鱼儿做的事**：\n`;
              body += `1. 登录 https://dash.cloudflare.com/\n`;
              body += `2. 获取 Account ID（首页右侧栏）\n`;
              body += `3. 创建 API Token（My Profile → API Tokens → Create Token → Edit Cloudflare Workers 模板）\n`;
              body += `4. 在本 Issue 下评论回复凭证\n\n`;
              body += `**回复格式**：\n\`\`\`\nCLOUDFLARE_ACCOUNT_ID=你的AccountID\nCLOUDFLARE_API_TOKEN=cfut_你的APIToken\n\`\`\`\n`;
            }

            body += `\n---\n*此报告由小扣子（Trae）每小时自动巡检生成*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body: body
            });
