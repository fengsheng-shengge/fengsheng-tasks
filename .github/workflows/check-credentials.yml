name: Check Cloudflare Credentials
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check Issue #42 for Cloudflare credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get issue comments
        id: get_comments
        run: |
          COMMENTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/42/comments")
          echo "$COMMENTS" > /tmp/comments.json
          echo "comments_count=$(echo "$COMMENTS" | jq '. | length')" >> $GITHUB_OUTPUT

      - name: Extract credentials
        id: extract
        run: |
          ACCOUNT_ID=$(cat /tmp/comments.json | jq -r '.[] | .body' | grep -o -i 'CLOUDFLARE_ACCOUNT_ID\s*[=:]\s*["\']\?\([0-9a-f]\{32\}\)["\']\?' | head -1 | sed 's/.*=\s*//; s/["\']//g')
          API_TOKEN=$(cat /tmp/comments.json | jq -r '.[] | .body' | grep -o -i 'CLOUDFLARE_API_TOKEN\s*[=:]\s*["\']\?\([A-Za-z0-9_-]\{40,\}\)["\']\?' | head -1 | sed 's/.*=\s*//; s/["\']//g')
          
          ACCOUNT_ID_ALT=$(cat /tmp/comments.json | jq -r '.[] | .body' | grep -o -i 'Account\s*ID\s*[=:]\s*["\']\?\([0-9a-f]\{32\}\)["\']\?' | head -1 | sed 's/.*=\s*//; s/["\']//g')
          API_TOKEN_ALT=$(cat /tmp/comments.json | jq -r '.[] | .body' | grep -o -i 'API\s*Token\s*[=:]\s*["\']\?\([A-Za-z0-9_-]\{40,\}\)["\']\?' | head -1 | sed 's/.*=\s*//; s/["\']//g')
          
          ACCOUNT_ID=${ACCOUNT_ID:-$ACCOUNT_ID_ALT}
          API_TOKEN=${API_TOKEN:-$API_TOKEN_ALT}
          
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "API_TOKEN=$API_TOKEN" >> $GITHUB_OUTPUT
          
          if [ -n "$ACCOUNT_ID" ] && [ -n "$API_TOKEN" ]; then
            echo "credentials_found=true" >> $GITHUB_OUTPUT
          else
            echo "credentials_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set GitHub Secrets
        if: steps.extract.outputs.credentials_found == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { ACCOUNT_ID, API_TOKEN } = process.env;
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'CLOUDFLARE_ACCOUNT_ID',
              encrypted_value: ACCOUNT_ID,
              key_id: (await github.rest.actions.getRepoPublicKey({
                owner: context.repo.owner,
                repo: context.repo.repo
              })).data.key_id
            });
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'CLOUDFLARE_API_TOKEN',
              encrypted_value: API_TOKEN,
              key_id: (await github.rest.actions.getRepoPublicKey({
                owner: context.repo.owner,
                repo: context.repo.repo
              })).data.key_id
            });
        env:
          ACCOUNT_ID: ${{ steps.extract.outputs.ACCOUNT_ID }}
          API_TOKEN: ${{ steps.extract.outputs.API_TOKEN }}

      - name: Trigger deployment
        if: steps.extract.outputs.credentials_found == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'production'
              }
            });

      - name: Notify if credentials found
        if: steps.extract.outputs.credentials_found == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 42,
              body: '✅ 小扣子已检测到 Cloudflare 部署凭证！\n\n- 已配置 CLOUDFLARE_ACCOUNT_ID\n- 已配置 CLOUDFLARE_API_TOKEN\n- 已触发部署流水线\n\n等待部署完成后验证网站可访问性。'
            });

      - name: Log result
        run: |
          echo "=== 检查结果 ==="
          echo "评论数量: ${{ steps.get_comments.outputs.comments_count }}"
          echo "找到凭证: ${{ steps.extract.outputs.credentials_found }}"
          echo "Account ID: ${{ steps.extract.outputs.ACCOUNT_ID && '***已找到***' || '未找到' }}"
          echo "API Token: ${{ steps.extract.outputs.API_TOKEN && '***已找到***' || '未找到' }}"