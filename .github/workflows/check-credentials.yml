name: Check Cloudflare Credentials
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-credentials:
    name: Check Issue #42 for Cloudflare Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Issue comments
        id: get-comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/fengsheng-shengge/fengsheng-tasks/issues/42/comments" \
            > /tmp/comments.json

      - name: Extract credentials from comments
        id: extract
        run: |
          ACCOUNT_ID=""
          API_TOKEN=""
          
          while read -r comment; do
            AUTHOR=$(echo "$comment" | jq -r '.user.login')
            BODY=$(echo "$comment" | jq -r '.body')
            
            if [[ "$AUTHOR" == *"xiaoyuer"* || "$BODY" == *"小鱼儿"* ]]; then
              ID_MATCH=$(echo "$BODY" | grep -i -oE 'CLOUDFLARE_ACCOUNT_ID[=:]\s*["\']?([a-f0-9]{32})["\']?' | sed 's/.*=\s*["\']\?\([a-f0-9]\{32\}\)["\']\?/\1/')
              TOKEN_MATCH=$(echo "$BODY" | grep -i -oE 'CLOUDFLARE_API_TOKEN[=:]\s*["\']?([a-zA-Z0-9_-]{40,})["\']?' | sed 's/.*=\s*["\']\?\([a-zA-Z0-9_-]\{40,\}\)["\']\?/\1/')
              
              if [[ -n "$ID_MATCH" ]]; then
                ACCOUNT_ID="$ID_MATCH"
              fi
              if [[ -n "$TOKEN_MATCH" ]]; then
                API_TOKEN="$TOKEN_MATCH"
              fi
            fi
          done < <(jq -c '.[]' /tmp/comments.json)
          
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "API_TOKEN=$API_TOKEN" >> $GITHUB_OUTPUT

      - name: Set secrets if found
        if: ${{ steps.extract.outputs.ACCOUNT_ID != '' && steps.extract.outputs.API_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const publicKey = await github.rest.actions.getRepoPublicKey({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks'
            });
            
            const crypto = require('crypto');
            const encrypt = (value) => {
              return crypto.publicEncrypt(
                { key: publicKey.data.key, padding: crypto.constants.RSA_PKCS1_OAEP_PADDING },
                Buffer.from(value)
              ).toString('base64');
            };
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              secret_name: 'CLOUDFLARE_ACCOUNT_ID',
              encrypted_value: encrypt('${{ steps.extract.outputs.ACCOUNT_ID }}')
            });
            
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              secret_name: 'CLOUDFLARE_API_TOKEN',
              encrypted_value: encrypt('${{ steps.extract.outputs.API_TOKEN }}')
            });

      - name: Trigger deployment
        if: ${{ steps.extract.outputs.ACCOUNT_ID != '' && steps.extract.outputs.API_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              workflow_id: 'deploy.yml',
              ref: 'main'
            });

      - name: Log result
        run: |
          if [[ -n "${{ steps.extract.outputs.ACCOUNT_ID }}" && -n "${{ steps.extract.outputs.API_TOKEN }}" ]]; then
            echo "✅ Found credentials and triggered deployment"
          else
            echo "ℹ No credentials found in Issue #42 comments"
          fi