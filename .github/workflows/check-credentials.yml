name: Check credentials - 小鱼儿回复 Cloudflare 凭证

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: check-credentials
  cancel-in-progress: true

permissions:
  issues: write
  actions: write
  repository-projects: read

jobs:
  check:
    name: Check Issue #42 for credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run credential check script
        run: node .github/scripts/check-credentials.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name || 'fengsheng-tasks' }}