name: Check Cloudflare Credentials
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check Issue #42 for credentials
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
    steps:
      - name: Check Issue #42 comments for credentials
        id: check-credentials
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              issue_number: 42,
              per_page: 100
            });
            
            const accountIdPattern = /(?i)(account[_ -]?id|cloudflare[_ -]?account)\s*[:=]\s*([a-f0-9]{32})/;
            const apiTokenPattern = /(?i)(api[_ -]?token|cloudflare[_ -]?token)\s*[:=]\s*([a-f0-9]{40})/;
            
            let accountId = null;
            let apiToken = null;
            
            for (const comment of comments.data) {
              const body = comment.body || '';
              const login = comment.user?.login || '';
              
              if (body.includes('小鱼儿') || login.toLowerCase().includes('xiaoyu')) {
                const accountMatch = body.match(accountIdPattern);
                const tokenMatch = body.match(apiTokenPattern);
                
                if (accountMatch) {
                  accountId = accountMatch[2];
                  console.log(`Found Account ID from ${login}`);
                }
                if (tokenMatch) {
                  apiToken = tokenMatch[2];
                  console.log(`Found API Token from ${login}`);
                }
              }
            }
            
            if (accountId && apiToken) {
              core.setOutput('found_credentials', 'true');
              core.setOutput('account_id', accountId);
              core.setOutput('api_token', apiToken);
              console.log('Credentials found - will trigger deployment');
            } else {
              core.setOutput('found_credentials', 'false');
              console.log('No credentials found in comments');
            }

      - name: Notify if credentials found
        if: steps.check-credentials.outputs.found_credentials == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              issue_number: 42,
              body: '✅ **凭证检测成功！**\n\n检测到小鱼儿提供的 Cloudflare 部署凭证，即将配置到 GitHub Secrets 并触发部署。\n\n- CLOUDFLARE_ACCOUNT_ID: `已识别`\n- CLOUDFLARE_API_TOKEN: `已识别`\n\n部署完成后将在此更新状态。'
            });

      - name: Trigger deployment
        if: steps.check-credentials.outputs.found_credentials == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'fengsheng-shengge',
              repo: 'fengsheng-tasks',
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
            console.log('Deployment workflow triggered');
