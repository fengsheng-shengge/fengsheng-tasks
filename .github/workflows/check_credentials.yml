name: Check Cloudflare Credentials in Issue #42

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: read
  actions: write
  contents: read

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch Issue #42 comments
        id: fetch-comments
        run: |
          COMMENTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/fengsheng-shengge/fengsheng-tasks/issues/42/comments")
          echo "comments=$COMMENTS" >> "$GITHUB_OUTPUT"

      - name: Extract credentials from comments
        id: extract-credentials
        run: |
          COMMENTS='${{ steps.fetch-comments.outputs.comments }}'
          
          API_TOKEN=$(echo "$COMMENTS" | jq -r '.[] | .body' | grep -i 'CLOUDFLARE_API_TOKEN' | sed -E 's/.*CLOUDFLARE_API_TOKEN[=:]\s*["'\''"]?([A-Za-z0-9_-]+)["'\''"]?.*/\1/' | head -n 1)
          ACCOUNT_ID=$(echo "$COMMENTS" | jq -r '.[] | .body' | grep -i 'CLOUDFLARE_ACCOUNT_ID' | sed -E 's/.*CLOUDFLARE_ACCOUNT_ID[=:]\s*["'\''"]?([0-9a-fA-F]{32})["'\''"]?.*/\1/' | head -n 1)
          
          echo "API_TOKEN=$API_TOKEN" >> "$GITHUB_OUTPUT"
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Secrets if credentials found
        if: ${{ steps.extract-credentials.outputs.API_TOKEN != '' && steps.extract-credentials.outputs.ACCOUNT_ID != '' }}
        run: |
          gh secret set CLOUDFLARE_API_TOKEN --body '${{ steps.extract-credentials.outputs.API_TOKEN }}' --repo fengsheng-shengge/fengsheng-tasks
          gh secret set CLOUDFLARE_ACCOUNT_ID --body '${{ steps.extract-credentials.outputs.ACCOUNT_ID }}' --repo fengsheng-shengge/fengsheng-tasks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deployment if credentials found
        if: ${{ steps.extract-credentials.outputs.API_TOKEN != '' && steps.extract-credentials.outputs.ACCOUNT_ID != '' }}
        run: |
          gh workflow run deploy.yml --repo fengsheng-shengge/fengsheng-tasks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add confirmation comment
        if: ${{ steps.extract-credentials.outputs.API_TOKEN != '' && steps.extract-credentials.outputs.ACCOUNT_ID != '' }}
        run: |
          gh issue comment 42 --body "## ✅ 凭证已收到并配置完成

感谢提供的 Cloudflare 部署凭证！

已完成以下操作：
- ✅ \`CLOUDFLARE_API_TOKEN\` → GitHub Secrets
- ✅ \`CLOUDFLARE_ACCOUNT_ID\` → GitHub Secrets
- ✅ 触发 Cloudflare Pages 部署

部署正在进行中，稍后可访问 https://fengsheng.tech 验证。" --repo fengsheng-shengge/fengsheng-tasks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close Issue #42
        if: ${{ steps.extract-credentials.outputs.API_TOKEN != '' && steps.extract-credentials.outputs.ACCOUNT_ID != '' }}
        run: |
          gh issue close 42 --repo fengsheng-shengge/fengsheng-tasks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}