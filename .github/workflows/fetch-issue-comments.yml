name: Fetch Issue Comments
on:
  push:
    paths:
      - '.github/workflows/fetch-issue-comments.yml'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        default: '42'

permissions:
  issues: write
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Get credential comments from Issue #42
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=42
          echo "=== Fetching comments for Issue #$ISSUE_NUM ==="
          # Get all comments and filter for credential-related content
          gh api repos/${{ github.repository }}/issues/$ISSUE_NUM/comments --paginate --jq '.[] | select(.body | test("account.?id|api.?token|CLOUDFLARE|凭证|credential|cf_|[a-f0-9]{32,}", "i")) | "---COMMENT---\nUser: \(.user.login)\nCreated: \(.created_at)\nBody:\n\(.body)\n---END---"' > /tmp/cred_comments.txt 2>&1
          echo "=== Credential-related comments ==="
          cat /tmp/cred_comments.txt
          echo ""
          echo "=== Last 5 comments ==="
          gh api repos/${{ github.repository }}/issues/$ISSUE_NUM/comments --jq '.[-5:] | .[] | "---COMMENT---\nUser: \(.user.login)\nCreated: \(.created_at)\nBody:\n\(.body[0:500])\n---END---"' >> /tmp/last_comments.txt 2>&1
          cat /tmp/last_comments.txt
