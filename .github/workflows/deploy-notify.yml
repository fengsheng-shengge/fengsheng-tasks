name: 部署通知 · 回复关联 Issue

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  actions: read

concurrency:
  group: deploy-notify
  cancel-in-progress: false

jobs:
  notify:
    name: 部署完成 → 通知关联 Issue
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Shanghai"
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: 分析 commit 中的 issue 编号
        id: analyze
        run: |
          echo "=== 分析最近 10 个 commit 中的 issue 编号 ==="
          echo "当前时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo ""

          # 取最近 10 个 commit 的消息
          COMMITS=$(git log --oneline -10)
          echo "$COMMITS"
          echo ""

          # 提取 #数字 格式的 issue 编号（排除 commit hash 里的字母）
          ISSUE_NUMS=$(git log --oneline -10 | python3 -c "
          import sys, re
          lines = sys.stdin.read()
          nums = set()
          for m in re.findall(r'#(\d{1,4})', lines):
              # 过滤看起来像 commit hash 的（太长的）
              n = int(m)
              if 1 <= n <= 9999:
                  nums.add(n)
          if nums:
              print(','.join(str(x) for x in sorted(nums)))
          else:
              print('')
          ")

          echo "关联 issue: $ISSUE_NUMS"
          echo "issues=$ISSUE_NUMS" >> $GITHUB_OUTPUT

          # 取最新 commit 的摘要
          LATEST_MSG=$(git log -1 --pretty=format:'%s')
          echo "latest_msg=$LATEST_MSG" >> $GITHUB_OUTPUT

          LATEST_COMMIT=$(git log -1 --pretty=format:'%h')
          echo "latest_commit=$LATEST_COMMIT" >> $GITHUB_OUTPUT

      - name: 通知关联 issue
        if: steps.analyze.outputs.issues != ''
        run: |
          ISSUES="${{ steps.analyze.outputs.issues }}"
          COMMIT="${{ steps.analyze.outputs.latest_commit }}"
          LATEST_MSG="${{ steps.analyze.outputs.latest_msg }}"
          NOW=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          echo "需要通知的 issue: $ISSUES"

          IFS=','
          for num in $ISSUES; do
            echo ""
            echo "--- 通知 #$num ---"

            # 先检查 issue 是否已关闭
            ISSUE_STATE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$num" | python3 -c "
              import sys, json
              d = json.load(sys.stdin)
              print(d.get('state', 'unknown'))
              ")

            echo "Issue 状态: $ISSUE_STATE"

            # 生成回复内容
            COMMENT_JSON=$(python3 -c "
            import json
            now = '''$NOW'''
            commit = '''$COMMIT'''
            msg = '''$LATEST_MSG'''
            state = '''$ISSUE_STATE'''

            body = f'''
            🚀 **小扣子已部署更新**

            - 提交时间：{now} 北京时间
            - 提交：`{commit}` — {msg}
            - 部署目标：https://fengsheng.tech

            ---

            **当前状态**：
            - ✅ 代码已推送到 main
            - ✅ CI 检查已完成
            - ✅ Cloudflare Pages 自动部署中（2-3 分钟）

            > 请小鱼儿/生哥打开以下链接验证：
            > https://fengsheng.tech

            > 如确认没问题，请留言「已验证」，将由自动化流程自动关闭本 Issue。
            > 如发现问题，直接留言描述即可，会重新进入处理流程。
            '''

            print(json.dumps({'body': body.strip()}))
            ")

            # 发送评论
            RESULT=$(curl -s -w "\nHTTPCODE=%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "$COMMENT_JSON" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$num/comments")

            HTTP_CODE=$(echo "$RESULT" | tail -1 | grep 'HTTPCODE=' | sed 's/.*HTTPCODE=//')
            echo "评论 API 返回 HTTP $HTTP_CODE"

            # 如果 issue 有 label in-progress，自动移除；如果是部署类型的任务，不自动关闭，等用户确认
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$num/labels/in-progress" > /dev/null

            echo "  已移除 in-progress 标签（如有）"
          done
          unset IFS

      - name: 汇总
        if: always()
        run: |
          echo "## 部署通知完成"
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "关联 Issue: ${{ steps.analyze.outputs.issues || '无' }}"
