name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview
  # 由 check-credentials.yml 在小鱼儿回复凭证后触发
  repository_dispatch:
    types: [deploy-from-credentials]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Cloudflare Pages Rebuild via API
        run: |
          echo "=== 通过 Cloudflare Pages API 触发 Worker + 静态文件重建 ==="
          echo "Account ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Project: fengsheng"

          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/fengsheng/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_CODE:%{http_code}")

          echo "Response: $RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            DEPLOYMENT_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('id','N/A'))" 2>/dev/null || echo "unknown")
            echo "✅ 部署已触发！Deployment ID: $DEPLOYMENT_ID"
            echo "deploy_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          else
            echo "❌ 部署触发失败，尝试使用 pages-action..."
            # Fallback to pages-action
          fi

      - name: Deploy to Cloudflare Pages (fallback)
        if: always()
        uses: cloudflare/pages-action@v1.2.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fengsheng
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

  verify:
    name: 部署后验证
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 15

      - name: Verify site accessibility
        run: |
          echo "=== 验证 https://fengsheng.tech 可访问 ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://fengsheng.tech --max-time 10)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✓ 网站正常响应 (HTTP $HTTP_CODE)"
          else
            echo "  ⚠ 网站响应 HTTP $HTTP_CODE（可能还在部署中）"
          fi

      - name: Verify API endpoints
        run: |
          echo "=== 验证 API 端点 ==="
          # 验证 stats summary
          STATS=$(curl -s https://fengsheng.tech/api/stats/summary --max-time 10)
          echo "Stats Summary: $(echo $STATS | python3 -c 'import sys,json; d=json.load(sys.stdin); print(f\"users={d[\"total_users\"]}, pv={d[\"total_pageviews\"]}\")' 2>/dev/null || echo 'failed')"

          # 验证 daily stats (检查 date:null 是否已修复)
          DAILY=$(curl -s "https://fengsheng.tech/api/stats/daily?days=3" --max-time 10)
          HAS_NULL=$(echo $DAILY | grep -c '"date":null' || true)
          if [ "$HAS_NULL" = "0" ]; then
            echo "  ✓ daily stats 无 date:null（Worker 已更新！）"
          else
            echo "  ⚠ daily stats 仍有 date:null（Worker 未更新）"
          fi

      - name: Verify key pages
        run: |
          echo "=== 验证关键页面 ==="
          for page in index.html breeder.html care-test.html quality-test.html privacy.html; do
            URL="https://fengsheng.tech/$page"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 10)
            echo "  $page → HTTP $CODE"
          done

  notify:
    name: 部署通知
    needs: [deploy, verify]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 生成部署报告
        run: |
          echo "## 🚀 Cloudflare Pages 部署完成"
          echo ""
          echo "| 环境 | 状态 |"
          echo "|------|------|"
          echo "| production | ✅ 已部署 |"
          echo ""
          echo "👉 https://fengsheng.tech"
          echo ""
          echo "部署由小扣子（Trae）自动执行，CI 检查全部通过。"
