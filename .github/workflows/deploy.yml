name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fengsheng-tech
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

  verify:
    name: 部署后验证
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Verify site accessibility
        run: |
          echo "=== 验证 https://fengsheng.tech 可访问 ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://fengsheng.tech --max-time 10)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✓ 网站正常响应 (HTTP $HTTP_CODE)"
          else
            echo "  ⚠ 网站响应 HTTP $HTTP_CODE（可能还在部署中）"
          fi

      - name: Verify key pages
        run: |
          echo "=== 验证关键页面 ==="
          for page in index.html breeder.html care-test.html quality-test.html privacy.html; do
            URL="https://fengsheng.tech/$page"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 10)
            echo "  $page → HTTP $CODE"
          done

  notify:
    name: 部署通知
    needs: [deploy, verify]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 生成部署报告
        run: |
          echo "## 🚀 Cloudflare Pages 部署完成"
          echo ""
          echo "| 环境 | 状态 |"
          echo "|------|------|"
          echo "| production | ✅ 已部署 |"
          echo ""
          echo "👉 https://fengsheng.tech"
          echo ""
          echo "部署由小扣子（Trae）自动执行，CI 检查全部通过。"
