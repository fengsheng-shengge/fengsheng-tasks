name: Debug Cloudflare Deployment

on:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  debug:
    name: Debug Cloudflare API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Cloudflare API
        run: |
          echo "=== 1. 测试 Cloudflare Pages API ==="
          echo "Account ID: \${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Token prefix: \${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # First, try to list existing deployments (GET)
          echo ""
          echo "--- Listing deployments (GET) ---"
          curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/\${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/fengsheng/deployments" \
            -H "Authorization: Bearer \${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP:%{http_code}\n"

          echo ""
          echo "--- Creating deployment (POST) ---"
          RESPONSE=\$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/\${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/fengsheng/deployments" \
            -H "Authorization: Bearer \${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP:%{http_code}")
          echo "\$RESPONSE"

          # Parse HTTP code
          HTTP_CODE=\$(echo "\$RESPONSE" | grep -o 'HTTP:[0-9]*' | cut -d: -f2)
          echo ""
          echo "Final HTTP code: \$HTTP_CODE"

          if [ "\$HTTP_CODE" = "200" ] || [ "\$HTTP_CODE" = "201" ]; then
            echo "✅ Cloudflare API 成功!"
            DEPLOY_ID=\$(echo "\$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('id','N/A'))")
            echo "Deployment ID: \$DEPLOY_ID"
          else
            echo "❌ Cloudflare API 失败"
            # Try to parse error
            ERROR=\$(echo "\$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('errors',[{}])[0].get('message','unknown'))" 2>/dev/null)
            echo "Error: \$ERROR"
            exit 1
          fi

      - name: Fallback: pages-action
        uses: cloudflare/pages-action@v1.2.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fengsheng
          directory: ./
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
