name: Check Cloudflare Credentials

on:
  schedule:
    # 每小时运行一次 (UTC 时间)
    - cron: '0 * * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  check-credentials:
    name: 检查 Issue #42 中的 Cloudflare 凭证
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pynacl

      - name: Check for credentials in Issue #42
        id: check-credentials
        env:
          # 使用有 admin 权限的 PAT 来设置 Secrets；未配置时回退到默认 GITHUB_TOKEN（仅可读取）
          GITHUB_TOKEN: ${{ secrets.CREDENTIAL_CHECK_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          python scripts/check_issue_credentials.py
      
      - name: Summary
        if: always()
        run: |
          echo "检查完成。如果找到凭证，已自动配置并触发部署。"