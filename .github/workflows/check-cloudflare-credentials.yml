name: Check Cloudflare Credentials

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-credentials:
    name: Check Issue #42 for Cloudflare Credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run credential check script
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_cloudflare_credentials.py

      - name: Report status
        if: always()
        run: |
          echo "## 📋 凭证检查结果"
          echo ""
          echo "| 检查项 | 状态 |"
          echo "|--------|------|"
          echo "| 定时触发 | ✅ 已执行 |"
          echo "| Issue #42 | ✅ 已检查 |"
          echo ""
          echo "👉 手动触发: https://github.com/${{ github.repository }}/actions/workflows/check-cloudflare-credentials.yml"
