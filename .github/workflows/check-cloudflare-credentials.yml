name: 检查 Cloudflare 凭证（每小时）
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  check-credentials:
    name: 检查 Issue #42 评论中的凭证
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 检查 Issue #42 最新评论
        id: check_comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 开始检查 Issue #42 的评论 ==="
          LAST_CHECKED_ID="${{ vars.LAST_CHECKED_COMMENT_ID }}"
          echo "上次检查的评论 ID: $LAST_CHECKED_ID"
          COMMENTS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/issues/42/comments?per_page=100&sort=created&direction=desc")
          FOUND_CREDENTIALS=false
          ACCOUNT_ID=""
          API_TOKEN=""
          LATEST_COMMENT_ID=""
          for comment_id in $(echo "$COMMENTS" | jq -r '.[].id'); do
            if [ -n "$LAST_CHECKED_ID" ] && [ "$comment_id" -le "$LAST_CHECKED_ID" ]; then
              continue
            fi
            comment_body=$(echo "$COMMENTS" | jq -r '.[] | select(.id == "'$comment_id'') | .body')
            comment_user=$(echo "$COMMENTS" | jq -r '.[] | select(.id == "'$comment_id'') | .user.login')
            echo "检查评论 #$comment_id (用户: $comment_user)"
            if echo "$comment_body" | grep -qiE "(account[_\s-]?id|账户ID|accountid)" ; then
              extracted_account=$(echo "$comment_body" | grep -oE '[0-9a-fA-F]{32}' | head -1)
              if [ -n "$extracted_account" ]; then
                ACCOUNT_ID="$extracted_account"
                echo "发现 Account ID: $ACCOUNT_ID"
              fi
            fi
            if echo "$comment_body" | grep -qiE "(api[_\s-]?token|API.*Token|令牌)" ; then
              extracted_token=$(echo "$comment_body" | grep -oE '[-_a-zA-Z0-9]{40,}' | head -1)
              if [ -n "$extracted_token" ]; then
                API_TOKEN="$extracted_token"
                echo "发现 API Token（已隐藏）"
              fi
            fi
            LATEST_COMMENT_ID="$comment_id"
            if [ -n "$ACCOUNT_ID" ] && [ -n "$API_TOKEN" ]; then
              FOUND_CREDENTIALS=true
              break
            fi
          done
          echo "found_credentials=$FOUND_CREDENTIALS" >> $GITHUB_OUTPUT
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "api_token=$API_TOKEN" >> $GITHUB_OUTPUT
          echo "latest_comment_id=$LATEST_COMMENT_ID" >> $GITHUB_OUTPUT
          echo "=== 检查结果 ==="
          echo "发现凭证: $FOUND_CREDENTIALS"

      - name: 更新最后检查的评论 ID
        if: steps.check_comments.outputs.latest_comment_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X PUT -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/actions/variables/LAST_CHECKED_COMMENT_ID" -d '{"value":"${{ steps.check_comments.outputs.latest_comment_id }}"}'
          echo "已更新 LAST_CHECKED_COMMENT_ID"

      - name: 配置 GitHub Secrets
        if: steps.check_comments.outputs.found_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 配置 GitHub Secrets ==="
          echo "${{ steps.check_comments.outputs.account_id }}" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo "${{ github.repository }}"
          echo "${{ steps.check_comments.outputs.api_token }}" | gh secret set CLOUDFLARE_API_TOKEN --repo "${{ github.repository }}"
          echo "Secrets 已配置完成"
          gh secret list --repo "${{ github.repository }}"

      - name: 添加发现凭证的评论
        if: steps.check_comments.outputs.found_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 42 --repo "${{ github.repository }}" --body "## ✅ 凭证已接收

小扣子（Trae）已检测到小鱼儿提供的 Cloudflare 凭证，正在配置 GitHub Secrets 并触发部署。

- Account ID: 已配置 ✅
- API Token: 已配置 ✅

下一步：自动触发 [Deploy Workflow](../../actions/workflows/deploy.yml)"

      - name: 触发部署工作流
        if: steps.check_comments.outputs.found_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 触发部署工作流 ==="
          gh workflow run deploy.yml --ref main --repo "${{ github.repository }}" -f environment=production
          echo "部署工作流已触发"
          sleep 5
          gh run list --workflow deploy.yml --repo "${{ github.repository }}" --limit 3

      - name: 未发现凭证时的报告
        if: steps.check_comments.outputs.found_credentials != 'true'
        run: |
          echo "=== 未发现新的凭证 ==="
          echo "将继续每小时检查 Issue #42 的评论，等待小鱼儿回复 Cloudflare 凭证。"