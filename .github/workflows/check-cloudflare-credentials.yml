name: Check Cloudflare Credentials from Issue #42

on:
  schedule:
    - cron: '0 * * * *'        # 每小时整点运行
  workflow_dispatch:             # 允许手动触发

env:
  ISSUE_NUMBER: 42
  DEPLOY_WORKFLOW_FILE: deploy.yml

jobs:
  check-and-configure:
    name: Check Issue #42 & Configure Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch comments from Issue #42
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 获取 Issue #42 评论 ==="
          curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.ISSUE_NUMBER }}/comments?per_page=100" \
            > comments.json
          echo "评论数量: $(jq length comments.json || echo 0)"

      - name: Look for credentials from 小鱼儿
        id: parse
        run: |
          echo "=== 解析小鱼儿评论中的凭证 ==="
          jq -r '.[] | select(.body | test("account[ _-]?id|api[ _-]?token|Cloudflare|小鱼儿"; "i")) | "\(.user.login) (\(.updated_at)): \(.body)"' comments.json > matched_comments.txt || true
          ACCOUNT_ID=""
          API_TOKEN=""
          ACCOUNT_ID=$(grep -oP '[a-f0-9]{32}' matched_comments.txt | head -n 1 || true)
          API_TOKEN=$(grep -oP 'api[_ -]?token[[:space:]]*[:=][[:space:]]*([a-zA-Z0-9_-]{40,})' matched_comments.txt | grep -oP '[a-zA-Z0-9_-]{40,}' | head -n 1 || true)
          if [ -z "$API_TOKEN" ]; then
            API_TOKEN=$(grep -oP '[a-zA-Z0-9_-]{50,}' matched_comments.txt | head -n 1 || true)
          fi
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "api_token_length=${#API_TOKEN}" >> $GITHUB_OUTPUT
          if [ -n "$ACCOUNT_ID" ] && [ -n "$API_TOKEN" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$API_TOKEN" > api_token.txt
            echo "  ✓ 已找到 Account ID 和 API Token"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "  ⏳ 尚未找到完整凭证"
            if [ -z "$ACCOUNT_ID" ]; then echo "    - 缺少 Account ID"; fi
            if [ -z "$API_TOKEN" ]; then echo "    - 缺少 API Token"; fi
          fi

      - name: Configure GitHub Secrets
        if: steps.parse.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          echo "=== 配置 Cloudflare Secrets ==="
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ 未配置 ADMIN_PAT，无法写入 GitHub Secrets"
            exit 1
          fi
          gh auth status
          echo "${{ steps.parse.outputs.account_id }}" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo ${{ github.repository }}
          cat api_token.txt | gh secret set CLOUDFLARE_API_TOKEN --repo ${{ github.repository }}
          echo "  ✓ Secrets 已配置: CLOUDFLARE_ACCOUNT_ID + CLOUDFLARE_API_TOKEN"

      - name: Trigger Deploy Workflow
        if: steps.parse.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 触发部署工作流 ==="
          gh workflow run ${{ env.DEPLOY_WORKFLOW_FILE }} --repo ${{ github.repository }}
          echo "  ✓ deploy.yml 部署已触发"

      - name: Update Issue #42
        if: steps.parse.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 在 Issue #42 中回复确认并关闭 ==="
          gh issue comment ${{ env.ISSUE_NUMBER }} --repo ${{ github.repository }} --body "✅ 已自动提取并配置 Cloudflare 凭证到 GitHub Secrets，已触发 deploy.yml 部署。"
          gh issue edit ${{ env.ISSUE_NUMBER }} --repo ${{ github.repository }} --state closed

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f comments.json matched_comments.txt api_token.txt
