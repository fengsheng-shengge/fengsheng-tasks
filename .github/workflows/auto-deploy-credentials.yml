name: Auto-Configure Cloudflare Credentials from Issue

# 每小时检查 GitHub Issue #42，查看小鱼儿(Coze)是否回复了 Cloudflare 部署凭证
# (Account ID + API Token)。如果检测到完整凭证，自动配置为 GitHub Secrets
# 并触发 deploy.yml 部署工作流。

# ============================================================
# 一次性配置：仓库 Settings → Secrets → New repository secret
#   Name:  AUTOMATION_PAT
#   Value: GitHub PAT（classic，需 `repo` 权限；或 fine-grained：
#          Issues: Read, Actions: Write, Secrets: Write）
# 凭证来源：https://github.com/settings/tokens
# ============================================================

on:
  schedule:
    # 每小时第 15 分钟跑（错开整点高峰，每小时 1 次）
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重处理（忽略已处理标记）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  issues: write

concurrency:
  # 同工作流串行：避免并发同时配置 Secrets
  group: auto-deploy-credentials
  cancel-in-progress: false

jobs:
  check-and-deploy:
    name: 检查小鱼儿是否回复 Cloudflare 凭证
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验 AUTOMATION_PAT 是否配置
        run: |
          if [ -z "${{ secrets.AUTOMATION_PAT }}" ]; then
            echo "::error::缺少 AUTOMATION_PAT secret"
            echo ""
            echo "请到 GitHub 仓库 Settings → Secrets and variables → Actions → New repository secret 添加："
            echo "  Name:  AUTOMATION_PAT"
            echo "  Value: GitHub Personal Access Token"
            echo ""
            echo "PAT 权限要求："
            echo "  - Classic: 勾选 'repo' (Full control of private repositories)"
            echo "  - Fine-grained: Repository access=This repo; Permissions:"
            echo "      Actions: Read & Write"
            echo "      Secrets: Read & Write"
            echo "      Issues: Read"
            echo ""
            echo "生成地址：https://github.com/settings/tokens"
            exit 1
          fi
          echo "✓ AUTOMATION_PAT 已配置"

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取并解析 Issue #42 评论
        id: parse
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
          COZE_BOT_USERNAMES: 'coze-bot,coze,xiaoyuer,Coze-Bot'
          RESULT_FILE: /tmp/cred_result.json
        run: |
          FORCE="${{ inputs.force }}" python scripts/check_cloudflare_credentials.py --repo "${{ github.repository }}" --issue 42 --coze-marker "小鱼儿|Coze|扣子|🤖|🐟" --output /tmp/cred_result.json
          echo "=== 解析结果（已脱敏）==="
          python -c "import json; r=json.load(open('/tmp/cred_result.json')); masked={k:(v if 'token' not in k.lower() and 'account_id' not in k.lower() else '***MASKED***') for k,v in r.items()}; print(json.dumps(masked, ensure_ascii=False, indent=2))"

      - name: 写入 CLOUDFLARE_ACCOUNT_ID
        id: set-account
        if: steps.parse.outputs.has_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
          VALUE: ${{ steps.parse.outputs.account_id }}
        run: |
          echo "正在配置 CLOUDFLARE_ACCOUNT_ID..."
          echo "$VALUE" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo "${{ github.repository }}"
          echo "✓ CLOUDFLARE_ACCOUNT_ID 已写入"

      - name: 写入 CLOUDFLARE_API_TOKEN
        id: set-token
        if: steps.parse.outputs.has_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
          VALUE: ${{ steps.parse.outputs.api_token }}
        run: |
          echo "正在配置 CLOUDFLARE_API_TOKEN..."
          echo "$VALUE" | gh secret set CLOUDFLARE_API_TOKEN --repo "${{ github.repository }}"
          echo "✓ CLOUDFLARE_API_TOKEN 已写入"

      - name: 触发部署工作流
        id: trigger
        if: steps.parse.outputs.has_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
        run: |
          echo "正在触发 deploy.yml ..."
          gh workflow run deploy.yml --ref main
          echo "✓ 部署已触发"
          echo ""
          echo "查看运行：https://github.com/${{ github.repository }}/actions/workflows/deploy.yml"

      - name: 标记评论为已处理（加 👀 反应）
        if: steps.parse.outputs.has_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
          COMMENT_ID: ${{ steps.parse.outputs.comment_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$COMMENT_ID" ]; then
            python scripts/add_eyes_reaction.py
          fi

      - name: 发送成功通知到 Issue
        if: steps.parse.outputs.has_credentials == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
          COMMENT_ID: ${{ steps.parse.outputs.comment_id }}
          AUTHOR: ${{ steps.parse.outputs.comment_author }}
          FORMAT: ${{ steps.parse.outputs.format }}
        run: |
          BODY=$(printf '%s\n' "🤖 **小扣子已自动处理 Cloudflare 凭证** (run: [${COMMENT_ID}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))" "" "- 来源评论：#${COMMENT_ID} (@${AUTHOR})" "- 提取方式：\`${FORMAT}\`" "- ✅ \`CLOUDFLARE_ACCOUNT_ID\` 已写入 Secrets" "- ✅ \`CLOUDFLARE_API_TOKEN\` 已写入 Secrets" "- 🚀 \`deploy.yml\` 已触发 → [查看运行](${{ github.server_url }}/${{ github.repository }}/actions/workflows/deploy.yml)" "" "小鱼儿，部署完成后请回复确认 ✅ 或报错 ❌。")
          printf '%s' "$BODY" | gh issue comment 42 --repo "${{ github.repository }}" --body-file -

      - name: 发送错误通知到 Issue（非静默失败时）
        if: failure() && steps.parse.outputs.has_credentials != 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
        run: |
          BODY=$(printf '%s\n' "🤖 **小扣子定时检查告警** (run: [查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))" "" "- 状态：⚠️ 工作流失败" "- 错误信息：见 Actions 日志" "- 下次检查：1 小时后自动重试" "" "<details><summary>可能原因</summary>" "" "1. \`AUTOMATION_PAT\` 过期或权限不足" "2. 仓库 README 暂未同步到 GitHub" "3. 小鱼儿(Coze)尚未在 Issue #42 回复完整凭证" "" "</details>")
          printf '%s' "$BODY" | gh issue comment 42 --repo "${{ github.repository }}" --body-file - || true

      - name: 总结
        if: always()
        run: |
          echo "## 🤖 Cloudflare 凭证自动配置运行总结"
          echo ""
          echo "| 字段 | 值 |"
          echo "|------|-----|"
          echo "| 是否找到凭证 | ${{ steps.parse.outputs.has_credentials }} |"
          echo "| 来源评论 | ${{ steps.parse.outputs.comment_id }} |"
          echo "| 作者 | ${{ steps.parse.outputs.comment_author }} |"
          echo "| 解析方式 | ${{ steps.parse.outputs.format }} |"
          echo "| 备注 | ${{ steps.parse.outputs.error }} |"
          echo "| 触发时间 | ${{ github.event.repository.updated_at }} |"
