name: Check Issue #42 for Cloudflare Credentials
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (1=only check, 0=deploy)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '0'
      force_recheck:
        description: 'Force recheck even if already deployed'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

jobs:
  check:
    name: Check Issue #42
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
      actions: write
      repository-projects: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyNaCl

      - name: Run check script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || '1' }}
          FORCE_RECHECK: ${{ inputs.force_recheck || '0' }}
        run: |
          python scripts/check_issue_42.py

      - name: Upload progress
        uses: actions/upload-artifact@v4
        with:
          name: deploy-progress
          path: .agent/memory/deploy_progress.json