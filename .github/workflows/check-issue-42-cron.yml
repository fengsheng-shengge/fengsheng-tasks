name: Check Issue #42 for Cloudflare Credentials

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (1=only detect, 0=apply and deploy)'
        required: false
        default: '0'
        type: string
      force_recheck:
        description: 'Force recheck even if already deployed'
        required: false
        default: '0'
        type: string

jobs:
  check-credentials:
    name: Check Issue #42
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: write
      secrets: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        uses: cli/cli-action@v2

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run credential check script
        env:
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          FORCE_RECHECK: ${{ inputs.force_recheck || '0' }}
        run: python3 scripts/check_issue_42.py

      - name: Update step summary
        if: always()
        run: |
          if [ -f .agent/memory/deploy_progress.json ]; then
            echo "## 🔍 Issue #42 检查结果" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 状态 | 说明 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            
            STATUS=$(jq -r '.status' .agent/memory/deploy_progress.json)
            LAST_CHECKED=$(jq -r '.last_checked' .agent/memory/deploy_progress.json)
            
            case $STATUS in
              "NOT_FOUND")
                echo "| ❌ NOT_FOUND | 未在评论中找到 Cloudflare 凭证 |" >> $GITHUB_STEP_SUMMARY
                ;;
              "FOUND_READY")
                echo "| ⚠️ FOUND_READY | 已检测到凭证（Dry Run 模式） |" >> $GITHUB_STEP_SUMMARY
                ;;
              "FOUND_DEPLOYED")
                echo "| ✅ FOUND_DEPLOYED | 凭证已配置并触发部署 |" >> $GITHUB_STEP_SUMMARY
                ;;
              "ERROR")
                echo "| 🔴 ERROR | 检查过程中发生错误 |" >> $GITHUB_STEP_SUMMARY
                ;;
              *)
                echo "| ⚡ UNKNOWN | 未知状态 |" >> $GITHUB_STEP_SUMMARY
                ;;
            esac
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**最后检查时间**: $LAST_CHECKED" >> $GITHUB_STEP_SUMMARY
            
            if [ "$STATUS" = "FOUND_READY" ] || [ "$STATUS" = "FOUND_DEPLOYED" ]; then
              ACCOUNT_MASK=$(jq -r '.credentials_detected.account_id_masked' .agent/memory/deploy_progress.json)
              TOKEN_MASK=$(jq -r '.credentials_detected.api_token_masked' .agent/memory/deploy_progress.json)
              FOUND_BY=$(jq -r '.credentials_detected.found_by' .agent/memory/deploy_progress.json)
              
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**检测到的凭证（脱敏）**:" >> $GITHUB_STEP_SUMMARY
              echo "- CLOUDFLARE_ACCOUNT_ID: \`$ACCOUNT_MASK\`" >> $GITHUB_STEP_SUMMARY
              echo "- CLOUDFLARE_API_TOKEN: \`$TOKEN_MASK\`" >> $GITHUB_STEP_SUMMARY
              echo "- 来源: $FOUND_BY" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## 🔍 Issue #42 检查结果" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 状态 | 说明 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| ⚡ NO_STATE | 状态文件不存在 |" >> $GITHUB_STEP_SUMMARY
          fi