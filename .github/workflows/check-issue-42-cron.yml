name: 每小时检查 Issue #42（Cloudflare 凭证）

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN 模式（1=只检测不写 Secrets/触发 deploy，0=真执行）"
        required: false
        default: "1"
        type: choice
        options: ["1", "0"]
      force_recheck:
        description: "忽略本地状态缓存（1=重置已部署标记）"
        required: false
        default: "0"
        type: choice
        options: ["0", "1"]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  check:
    name: 检查并自动部署
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_REPO_OWNER: fengsheng-shengge
      GITHUB_REPO_NAME: fengsheng-tasks
      ISSUE_NUMBER: "42"
      DEPLOY_WORKFLOW: deploy.yml
      DRY_RUN: ${{ inputs.dry_run || '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 PyNaCl（Secrets 加密需要）
        run: pip install pynacl==1.5.0

      - name: 运行检查脚本
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force_recheck }}" = "1" ] && [ -f .agent/memory/deploy_progress.json ]; then
            echo "force_recheck=1，重置 deploy_progress.json"
            rm -f .agent/memory/deploy_progress.json
          fi
          python scripts/check_issue_42.py

      - name: 状态摘要
        if: always()
        run: |
          {
            echo "## 🛰️ Issue #42 检查结果"
            echo
            if [ -f .agent/memory/deploy_progress.json ]; then
              cat .agent/memory/deploy_progress.json
            else
              echo "_未生成 deploy_progress.json_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"