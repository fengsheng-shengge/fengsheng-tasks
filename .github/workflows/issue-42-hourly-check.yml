name: Hourly Check - Issue #42 Cloudflare Credentials

on:
  schedule:
    # 每小时整点开跑 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue 编号 (默认 42)"
        required: false
        default: "42"
        type: string
      environment:
        description: "部署环境"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - preview

# 写入仓库 Actions Secrets 需要 repo scope 的 token；GITHUB_TOKEN 默认没有该权限，
# 所以这里用 GH_REPO_PAT (需仓库所有者在 Settings → Secrets → Actions 中配置).
permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: issue-42-check
  cancel-in-progress: false

jobs:
  check-and-deploy:
    name: 检查 Issue #42 → 写入 Secrets → 触发部署
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Shanghai"
      GH_TOKEN: ${{ secrets.GH_REPO_PAT || secrets.GITHUB_TOKEN }}
      GITHUB_REPO_OWNER: ${{ github.repository_owner }}
      GITHUB_REPO_NAME: ${{ github.event.repository.name }}
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '42' }}
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 初始化 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 pynacl (libsodium sealed box 加密)
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet pynacl requests

      - name: 检测当前时间（北京时间）
        run: |
          echo "=== 当前时间 (北京时间) ==="
          date -d 'TZ="Asia/Shanghai"'
          echo "=== GitHub Event ==="
          echo "event_name: ${{ github.event_name }}"
          echo "issue_number: ${ISSUE_NUMBER}"

      - name: 执行 Issue #42 凭证检查
        id: check
        run: |
          chmod +x scripts/check_issue_42.py
          python3 scripts/check_issue_42.py

      - name: 写回部署进度状态到本地
        # 把 deploy_progress.json 回写到仓库，防止下一次跑又重复部署
        if: steps.check.outputs.ISSUE_42_STATUS == 'FOUND_READY'
        run: |
          echo "=== 写回 deploy_progress.json ==="
          git config user.name "小扣子(Trae)"
          git config user.email "trae@fengsheng.tech"
          git add .agent/memory/deploy_progress.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(ops): Issue #42 部署进度记录" || true
            git push origin main || true
          else
            echo "没有变化，无需推送。"
          fi

      - name: 汇总报告
        if: always()
        run: |
          echo "## 本轮检查结果"
          echo "- ISSUE_42_STATUS=${{ steps.check.outputs.ISSUE_42_STATUS }}"
          echo "- CLOUDFLARE_ACCOUNT_ID_MASKED=${{ steps.check.outputs.CLOUDFLARE_ACCOUNT_ID_MASKED }}"
