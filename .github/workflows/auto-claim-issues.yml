name: 自动认领工单 · 小扣子

on:
  schedule:
    # 每 2 小时检查一次 (UTC)
    - cron: "0 */2 * * *"
  issues:
    types: [opened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: auto-claim
  cancel-in-progress: false

jobs:
  claim:
    name: 小扣子自动认领工单
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Shanghai"
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 扫描并认领未认领工单
        id: claim
        run: |
          echo "=== 小扣子自动认领工单 ==="
          echo "当前时间 (北京时间): $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo ""

          # 获取所有 open 的 issues
          ISSUES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&per_page=50")

          ISSUE_COUNT=$(echo "$ISSUES" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          count = 0
          if isinstance(data, list):
              for it in data:
                  if 'pull_request' not in it:
                      count += 1
          print(count)
          ")
          echo "开放工单总数: $ISSUE_COUNT"
          echo ""

          # 逐个分析并认领
          CLAIMED_LIST=$(echo "$ISSUES" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if not isinstance(data, list):
              sys.exit(0)

          claimed = []
          # 要跳过的标签（归属其他 Agent）
          skip = ['小眼镜', 'xiaoyanjing', '小豆子', 'xiaodouzi',
                  '小鱼儿', 'xiaoyuer', '小酒窝', 'xiaojiuxian',
                  '小书生', 'xiaoshusheng', '生哥']

          for issue in data:
              if 'pull_request' in issue:
                  continue
              num = issue['number']
              title = issue['title']
              labels = [l['name'] for l in issue.get('labels', [])]
              assignees = [a['login'] for a in issue.get('assignees', [])]

              need_claim = False
              reason = ''

              # 已有归属，跳过
              if any(l in skip for l in labels):
                  status = '跳过（有其他归属）'
              elif assignees:
                  status = '✅ 已有认领人'
              else:
                  need_claim = True
                  status = '🔴 无人认领'
                  reason = '无人认领，小扣子主动接收'
                  # 如果有 小扣子 标签，更优先
                  if '小扣子' in labels or 'xiaokouzi' in labels:
                      reason = '标签指向小扣子'

              print(f'#{num} [{status}] {title[:55]} — labels: {labels}')

              if need_claim:
                  claimed.append(str(num))

          # 输出要认领的列表（空格分隔）
          if claimed:
              print(f'\n→ 需要认领 {len(claimed)} 个: {claimed}')
              print('TO_CLAIM=' + ','.join(claimed), file=sys.stderr)
          else:
              print('\n→ 全部工单已有负责人，无需认领')
              print('TO_CLAIM=', file=sys.stderr)
          " 2>&1 >/dev/null)

          # 解析要认领的编号
          TO_CLAIM=$(echo "$CLAIMED_LIST" | grep 'TO_CLAIM=' | sed 's/.*TO_CLAIM=//' | tail -1)
          echo "待认领编号: $TO_CLAIM"

          if [ -n "$TO_CLAIM" ]; then
            IFS=','
            for num in $TO_CLAIM; do
              echo ""
              echo "--- 认领 #$num ---"

              # 添加 assignee
              RESULT=$(curl -s -w "\nHTTPCODE=%{http_code}" \
                -X POST \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d '{"assignees":["fengsheng-shengge"]}' \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num/assignees")

              HTTP_CODE=$(echo "$RESULT" | tail -1 | grep 'HTTPCODE=' | sed 's/.*HTTPCODE=//')
              echo "API 返回 HTTP $HTTP_CODE"

              # 添加 in-progress 标签
              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d '{"labels":["in-progress"]}' \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num/labels" > /dev/null

              # 添加认领评论
              COMMENT_BODY=$(python3 -c "
              from datetime import datetime, timedelta, timezone
              now = datetime.now(timezone(timedelta(hours=8)))
              msg = f'''
              ✅ **小扣子已认领**

              - 认领时间：{now.strftime('%Y-%m-%d %H:%M:%S')} 北京时间
              - 当前状态：in-progress
              - 预计处理：P0 24h / P1 本周 / P2 迭代内
              - 代码变更将直接推送到 main，经 CI 后自动部署

              > 如属其他同事负责，请回复「转交 + 人名」，小扣子会转分配。
              '''
              print(msg)
              ")

              ESCAPED_BODY=$(python3 -c "
              import json, sys
              text = '''$COMMENT_BODY'''
              print(json.dumps({'body': text}))
              ")

              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d "$ESCAPED_BODY" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$num/comments" > /dev/null

              echo "  ✓ 已添加 assignee + in-progress 标签 + 认领评论"
            done
            unset IFS
          fi

      - name: 汇总报告
        if: always()
        run: |
          echo "## 小扣子工单巡检完成"
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "仓库: ${{ github.repository }}"
