name: 自动认领工单 · 小扣子

on:
  schedule:
    # 每 2 小时检查一次 (UTC)
    - cron: "0 */2 * * *"
  issues:
    types: [opened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: auto-claim
  cancel-in-progress: false

jobs:
  claim:
    name: 小扣子自动认领工单
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Shanghai"
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 扫描并认领未认领工单
        id: claim
        run: |
          echo "=== 小扣子自动认领工单 ==="
          echo "当前时间 (北京时间): $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo ""

          # 获取所有 open 的 issues（带错误处理）
          ISSUES_FILE=$(mktemp)
          HTTP_CODE=$(curl -s -w "%{http_code}" -o "$ISSUES_FILE" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&per_page=50")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ GitHub API 返回 HTTP $HTTP_CODE，无法获取工单列表"
            cat "$ISSUES_FILE" | head -5
            rm -f "$ISSUES_FILE"
            exit 0
          fi

          ISSUES=$(cat "$ISSUES_FILE")
          rm -f "$ISSUES_FILE"

          # 用 Python 统一处理：分析 + 输出认领列表
          CLAIM_RESULT=$(python3 << 'PYEOF'
          import json, sys, os

          data = json.loads(sys.stdin.read())
          if not isinstance(data, list):
              print("❌ API 返回格式异常，不是列表", file=sys.stderr)
              sys.exit(0)

          # 要跳过的标签（归属其他 Agent）
          skip_labels = {
              '小眼镜', 'xiaoyanjing', '小豆子', 'xiaodouzi',
              '小鱼儿', 'xiaoyuer', '小酒窝', 'xiaojiuxian',
              '小书生', 'xiaoshusheng', '生哥'
          }

          issue_count = 0
          claimed = []

          for issue in data:
              if 'pull_request' in issue:
                  continue
              issue_count += 1
              num = issue['number']
              title = issue.get('title', '')
              labels = [l['name'] for l in issue.get('labels', [])]
              assignees = [a['login'] for a in issue.get('assignees', [])]

              need_claim = False
              if any(l in skip_labels for l in labels):
                  status = '跳过（有其他归属）'
              elif assignees:
                  status = '✅ 已有认领人'
              else:
                  need_claim = True
                  status = '🔴 无人认领'
                  if '小扣子' in labels or 'xiaokouzi' in labels:
                      status = '🔴 无人认领（标签指向小扣子）'

              print(f'#{num} [{status}] {title[:55]} — labels: {labels}', file=sys.stderr)

              if need_claim:
                  claimed.append(str(num))

          # 输出结果到 stdout（会被 shell 捕获）
          result = {
              'total': issue_count,
              'to_claim': claimed
          }
          print(json.dumps(result))
          PYEOF
          ) <<< "$ISSUES"

          # 解析 JSON 结果
          TOTAL=$(echo "$CLAIM_RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin)['total'])")
          TO_CLAIM=$(echo "$CLAIM_RESULT" | python3 -c "import json,sys; print(','.join(json.load(sys.stdin)['to_claim']))")

          echo "开放工单总数: $TOTAL"
          echo "待认领编号: ${TO_CLAIM:-无}"
          echo ""

          if [ -z "$TO_CLAIM" ]; then
            echo "→ 全部工单已有负责人，无需认领"
            exit 0
          fi

          IFS=','
          for num in $TO_CLAIM; do
            echo "--- 认领 #$num ---"

            # 添加 assignee
            RESULT=$(curl -s -w "\nHTTPCODE=%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d '{"assignees":["fengsheng-shengge"]}' \
              "https://api.github.com/repos/${{ github.repository }}/issues/$num/assignees")

            HTTP_CODE=$(echo "$RESULT" | tail -1 | grep 'HTTPCODE=' | sed 's/.*HTTPCODE=//')
            echo "  assign API 返回 HTTP $HTTP_CODE"

            # 添加 in-progress 标签
            LABEL_RESULT=$(curl -s -w "\nHTTPCODE=%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d '{"labels":["in-progress"]}' \
              "https://api.github.com/repos/${{ github.repository }}/issues/$num/labels")

            LABEL_HTTP=$(echo "$LABEL_RESULT" | tail -1 | grep 'HTTPCODE=' | sed 's/.*HTTPCODE=//')
            echo "  label API 返回 HTTP $LABEL_HTTP"

            # 添加认领评论（用 Python 生成 JSON 避免 shell 转义问题）
            COMMENT_JSON=$(python3 -c "
          import json
          from datetime import datetime, timedelta, timezone
          now = datetime.now(timezone(timedelta(hours=8)))
          body = f'''✅ **小扣子已认领**

          - 认领时间：{now.strftime('%Y-%m-%d %H:%M:%S')} 北京时间
          - 当前状态：in-progress
          - 预计处理：P0 24h / P1 本周 / P2 迭代内
          - 代码变更将直接推送到 main，经 CI 后自动部署

          > 如属其他同事负责，请回复「转交 + 人名」，小扣子会转分配。'''
          print(json.dumps({'body': body}))
          ")

            COMMENT_RESULT=$(curl -s -w "\nHTTPCODE=%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              -d "$COMMENT_JSON" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$num/comments")

            COMMENT_HTTP=$(echo "$COMMENT_RESULT" | tail -1 | grep 'HTTPCODE=' | sed 's/.*HTTPCODE=//')
            echo "  comment API 返回 HTTP $COMMENT_HTTP"

            echo "  ✓ 已添加 assignee + in-progress 标签 + 认领评论"
          done
          unset IFS

      - name: 汇总报告
        if: always()
        run: |
          echo "## 小扣子工单巡检完成"
          echo "时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "仓库: ${{ github.repository }}"
