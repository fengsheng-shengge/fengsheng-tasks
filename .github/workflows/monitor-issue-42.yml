name: Monitor Issue #42 for Cloudflare Credentials

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not set secrets or trigger deploy)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  issues: read
  actions: read

jobs:
  monitor:
    name: Check Issue #42 and configure credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for credentials and deploy
        env:
          GH_TOKEN: ${{ secrets.SECRETS_PAT || secrets.GITHUB_TOKEN }}
          SECRETS_PAT: ${{ secrets.SECRETS_PAT }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python .github/scripts/check_issue42_credentials.py
