name: Test GitHub API Access
on:
  push:
    branches: [main]
    paths:
      - '.test-api-trigger'
  workflow_dispatch:

permissions:
  issues: read
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test API access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== жµЛиѓХ GitHub API иЃњйЧЃ ==="
          
          RESULT=$(gh api /repos/fengsheng-shengge/fengsheng-tasks/issues/42/comments --jq 'length' 2>&1)
          echo "иѓДиЃЇжХ∞йЗП: $RESULT"
          
          if echo "$RESULT" | grep -q '^[0-9]'; then
            echo "API иЃњйЧЃжИРеКЯ!"
            echo "comments_count=$RESULT" > test-result.txt
          else
            echo "API иЃњйЧЃе§±иі•: $RESULT"
            echo "error=$RESULT" > test-result.txt
          fi

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test-result.txt
          git commit -m "chore: test API result" || echo "no changes"
          git push || echo "push failed"
