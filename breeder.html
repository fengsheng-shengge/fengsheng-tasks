<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>助手养成师 · 风声</title>
<style>
:root{--bg:#f7f4ef;--bg2:#e8e4d9;--dk:#1a1a1a;--p:#3d5a3e;--fire:#c46a3a;--orange:#f5a623;--ts:#555555;--td:#888;--card:#fff;--border:#e8e4d9;--border-h:#3d5a3e;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dk);line-height:1.6;-webkit-font-smoothing:antialiased}
.screen{display:none;padding:20px 16px;max-width:480px;margin:0 auto;min-height:100vh}
.screen.active{display:block}

/* 顶部栏 */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.top-bar .brand{font-size:13px;font-weight:700;color:var(--p);letter-spacing:1px}
.top-bar .tag{font-size:10px;color:var(--td);background:var(--bg2);padding:2px 8px;border-radius:4px}

/* 欢迎页 */
.welcome-icon{font-size:56px;text-align:center;margin:40px 0 16px}
.welcome-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:8px}
.welcome-sub{font-size:14px;color:var(--ts);text-align:center;margin-bottom:32px;line-height:1.7}
.welcome-sub strong{color:var(--p)}
.mode-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s}
.mode-card:active{transform:scale(.97)}
.mode-card.selected{border-color:var(--p);background:rgba(61,90,62,.04)}
.mode-card .mc-title{font-size:15px;font-weight:700;margin-bottom:4px}
.mode-card .mc-desc{font-size:12px;color:var(--ts)}
.mode-card .mc-tag{font-size:10px;color:var(--orange);font-weight:700;margin-top:6px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:disabled{background:var(--bg2);color:var(--td);cursor:not-allowed}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--dk)}
.price-tag{text-align:center;font-size:12px;color:var(--td);margin-top:12px}
.price-tag .original{text-decoration:line-through;margin-right:4px}
.price-tag .free{color:var(--p);font-weight:700}

/* 答题页 */
.progress-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.progress-text{font-size:12px;color:var(--td)}
.progress-fill{flex:1;height:4px;background:var(--bg2);border-radius:2px;margin:0 10px;overflow:hidden}
.progress-fill span{display:block;height:100%;background:var(--p);border-radius:2px;transition:width .3s}
.q-dimension{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;margin-bottom:12px}
.q-scene{font-size:14px;color:var(--ts);margin-bottom:8px;padding:10px 12px;background:rgba(61,90,62,.04);border-radius:var(--r);line-height:1.6}
.q-text{font-size:16px;font-weight:700;margin-bottom:16px}
.q-prompt{font-size:11px;color:var(--td);margin-bottom:10px}
.option-item{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.5}
.option-item:active{transform:scale(.98)}
.option-item.selected{border-color:var(--p);background:rgba(61,90,62,.06)}
.option-item.multi-selected{border-color:var(--orange);background:rgba(245,166,35,.06)}
.option-label{font-weight:700;margin-right:6px}
.text-input{width:100%;border:2px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;font-family:inherit;background:var(--card);resize:none;transition:border-color .2s}
.text-input:focus{outline:none;border-color:var(--p)}
.btn-next{margin-top:16px;display:none}

/* 加载页 */
.loading{text-align:center;padding-top:40vh}
.loading-icon{font-size:48px;animation:bounce 1s infinite}
.loading-text{font-size:14px;color:var(--ts);margin-top:12px}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* 报告页 */
.report{padding-bottom:40px}
.report-header{text-align:center;margin-bottom:24px}
.report-title{font-size:20px;font-weight:800;color:var(--p)}
.report-role{font-size:14px;color:var(--ts);margin-top:4px}
.report-date{font-size:11px;color:var(--td);margin-top:4px}
.report-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.report-section-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--p);display:flex;align-items:center;gap:6px}
.step-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:13px;line-height:1.5}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--p);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-num.done{background:var(--p)}
.step-num.skip{background:var(--bg2);color:var(--td)}
.report-sentence{background:rgba(196,106,58,.08);border-left:3px solid var(--fire);padding:12px 14px;border-radius:0 var(--r) var(--r) 0;font-size:14px;font-weight:600;color:var(--fire);margin:12px 0}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tag{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}
.tag-green{background:rgba(61,90,62,.08);color:var(--p)}
.tag-orange{background:rgba(245,166,35,.1);color:var(--orange)}
.tag-red{background:rgba(196,106,58,.08);color:var(--fire)}
.advice-box{background:rgba(61,90,62,.04);border-radius:var(--r);padding:12px;margin-top:8px}
.advice-box p{font-size:12px;color:var(--ts);margin-bottom:4px;line-height:1.6}
.advice-box p:last-child{margin-bottom:0}
.report-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--td)}
/* 顶部导航栏 */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--bg,#f7f4ef);
  border-bottom:1px solid var(--border,rgba(80,90,70,.09));
  box-shadow:0 1px 4px rgba(0,0,0,.04);height:48px;box-sizing:border-box}
.top-nav .nav-home{display:flex;align-items:center;gap:6px;
  font-size:15px;font-weight:600;color:var(--p,#3d5a3e);
  text-decoration:none;cursor:pointer}
.top-nav .nav-home:hover{opacity:.7}
.top-nav .nav-brand{font-size:13px;color:var(--ts,#7a8478);letter-spacing:2px}
body{padding-top:48px!important}

/* 版权+反馈 */
.page-footer{text-align:center;padding:24px 16px;margin-top:32px;
  border-top:1px solid var(--border,rgba(80,90,70,.09));
  font-size:11px;color:var(--ts,#7a8478);line-height:1.8}
.page-footer .copyright{margin-bottom:8px}
.feedback-bar{display:flex;align-items:center;justify-content:center;
  gap:16px;margin-top:12px;padding:12px;background:var(--card,#fff);
  border-radius:8px;border:1px solid var(--border,rgba(80,90,70,.09))}
.feedback-bar span{font-size:13px;color:var(--tx,#555)}
.feedback-btn{display:inline-flex;align-items:center;gap:4px;
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg,#f7f4ef);cursor:pointer;font-size:13px;
  color:var(--tx,#555);transition:all .15s}
.feedback-btn:hover{background:var(--p,#3d5a3e);color:#fff;border-color:var(--p)}
.feedback-btn.active{background:var(--p,#3d5a3e);color:#fff;border-color:var(--p)}


/* 游戏化进度+鼓励 */
.step-progress{display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0 20px}
.step-dot{width:32px;height:32px;border-radius:50%;background:var(--bg2,#e8e4d9);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--td,#888);transition:all .3s}
.step-dot.done{background:var(--p,#3d5a3e);color:#fff}
.step-dot.current{background:var(--fire,#c46a3a);color:#fff;transform:scale(1.15);box-shadow:0 0 0 3px rgba(196,106,58,.2)}
.step-line{width:20px;height:2px;background:var(--border);transition:background .3s}
.step-line.done{background:var(--p,#3d5a3e)}
.encourage-msg{text-align:center;font-size:13px;color:var(--p,#3d5a3e);font-weight:600;margin:8px 0;padding:8px;background:rgba(61,90,62,.05);border-radius:8px;min-height:36px;transition:all .3s}

</style>

<body>

<div class="top-nav">
  <a href="/" class="nav-home">🏠 返回首页</a>

</div>

<!-- 欢迎页 -->
<div class="screen active" id="screen-welcome">

<!-- 答题页 -->
<div class="screen" id="screen-quiz">

<!-- 加载页 -->
<div class="screen" id="screen-loading">

    <div class="loading-icon">🧬</div>

</div>

<!-- 报告页 -->
<div class="screen" id="screen-report">

</div>

      {label:'B',text:'整理数据/信息，太花时间',score:10},

const FAST_QUESTIONS = FULL_QUESTIONS.filter(q => q.step === 1 || q.step === 5);

// ========== 状态 ==========
let selectedMode = null;
let currentQ = 0;
let answers = [];
let questions = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function selectMode(mode) {
  selectedMode = mode;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.mode-card[data-mode="${mode}"]`).classList.add('selected');
  document.getElementById('btn-start').disabled = false;
}

function startQuiz() {
  if(!selectedMode) selectedMode = 'full';
  questions = selectedMode === 'fast' ? FAST_QUESTIONS : FULL_QUESTIONS;
  currentQ = 0;
  answers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progress-text').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width = `${((currentQ + 1) / questions.length) * 100}%`;

  const dimBadge = document.getElementById('q-dimension');
  dimBadge.textContent = q.dimLabel;
  dimBadge.style.background = q.dimColor + '12';
  dimBadge.style.color = q.dimColor;

  document.getElementById('q-scene').textContent = q.scene;
  document.getElementById('q-text').textContent = q.text;

  const textInput = document.getElementById('text-input');
  const optList = document.getElementById('option-list');

  if (q.type === 'text') {
    optList.innerHTML = '';
    textInput.style.display = 'block';
    textInput.value = '';
    textInput.placeholder = q.placeholder || '输入你的回答...';
    document.getElementById('q-prompt').textContent = '✏️ 自由输入';
    document.getElementById('btn-next').style.display = 'inline-flex';
  } else {
    textInput.style.display = 'none';
    const isMulti = q.type === 'multi';
    document.getElementById('q-prompt').textContent = isMulti ? '☑️ 可多选' : '◉ 单选';
    optList.innerHTML = q.options.map((o, i) => `
      <div class="option-item" data-idx="${i}" onclick="${isMulti ? 'toggleMulti(this)' : 'selectSingle(this)'}">
        <span class="option-label">${o.label}.</span>${o.text}
      </div>
    `).join('');
    document.getElementById('btn-next').style.display = isMulti ? 'inline-flex' : 'none';
  }
}

function selectSingle(el) {
  document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const q = questions[currentQ];
  const idx = parseInt(el.dataset.idx);
  answers[currentQ] = {qId: q.id, score: q.options[idx].score, selected: [idx], text: null};
  setTimeout(() => nextQuestion(), 350);
}

function toggleMulti(el) {
  el.classList.toggle('multi-selected');
  document.getElementById('btn-next').style.display = 'inline-flex';
}

function nextQuestion() {
  const q = questions[currentQ];
  if (q.type === 'multi') {
    const selected = document.querySelectorAll('.option-item.multi-selected');
    if (selected.length === 0) return;
    let totalScore = 0;
    const idxs = [];
    selected.forEach(el => {
      const idx = parseInt(el.dataset.idx);
      idxs.push(idx);
      totalScore += q.options[idx].score;
    });
    const avgScore = Math.round(totalScore / idxs.length);
    answers[currentQ] = {qId: q.id, score: avgScore, selected: idxs, text: null};
  } else if (q.type === 'text') {
    const val = document.getElementById('text-input').value.trim();
    if (!val) return;
    answers[currentQ] = {qId: q.id, score: 8, selected: [], text: val};
  }
  currentQ++;
  if (currentQ >= questions.length) {
    showScreen('screen-loading');
    setTimeout(generateReport, 1000);
  } else {
    renderQuestion();
  }
}

// ========== 报告生成 ==========
function generateReport() {

      <div class="advice-box">${advice || '<p>方向清晰，按6步执行即可。记住：养助手就像带新人，要有耐心，一次专注一个技能</p>'}</div>

<div style="margin-top:24px;padding:24px;background:rgba(61,90,62,.04);border-radius:8px;border:1px solid rgba(61,90,62,.12)">

<script>
/* 助手养成师游戏化 */
(function(){
  const encourages=[
    '第{n}步搞定！你比80%的人更有方向感 💪',
    '进度{pct}%！方案快成型了 🔥',
    '坚持到这里，你已经超越多数人 🎯',
    '你的选择很专业！继续 🎓',
    '好选择！你的助手会更懂你 ✨',
    '每一步都在让助手更懂你的客户 🏠'
  ];
  
  let currentStep=1;
  const totalSteps=6;
  
  // 拦截步骤切换
  const origNext=window.nextStep||window.goStep||null;
  
  // 更新步骤进度指示
  window.updateStepProgress=function(step){
    currentStep=step||currentStep;
    if(typeof track==="function") track("step_complete",{step:currentStep,total_steps:totalSteps});
    let dots=document.querySelector('.step-progress');
    if(!dots){
      // 创建进度指示
      dots=document.createElement('div');
      dots.className='step-progress';
      const page=document.querySelector('.page');
      if(page){
        const hero=page.querySelector('.hero-icon,.hero-title');
        if(hero&&hero.parentElement){
          hero.parentElement.insertBefore(dots,hero.nextSibling?hero.nextSibling.nextSibling:null);
        }
      }
    }
    let html='';
    for(let i=1;i<=totalSteps;i++){
      const cls=i<currentStep?'done':i===currentStep?'current':'';
      html+='<div class="step-dot '+cls+'">'+i+'</div>';
      if(i<totalSteps)html+='<div class="step-line '+(i<currentStep?'done':'')+'"></div>';
    }
    dots.innerHTML=html;
    
    // 鼓励语
    let msg=document.querySelector('.encourage-msg');
    if(!msg){
      msg=document.createElement('div');
      msg.className='encourage-msg';
      dots.after(msg);
    }
    if(currentStep>1){
      const pct=Math.round(currentStep/totalSteps*100);
      const text=encourages[Math.min(currentStep-1,encourages.length-1)].replace('{n}',currentStep).replace('{pct}',pct);
      msg.textContent=text;
    }
  };
  
  // 自动检测步骤变化
  const observer=new MutationObserver(()=>{
    const activeStep=document.querySelector('.step.active,[data-step].active,.current-step');
    if(activeStep){
      const stepNum=parseInt(activeStep.dataset.step||activeStep.dataset.index||0);
      if(stepNum&&stepNum!==currentStep)updateStepProgress(stepNum);
    }
  });
  observer.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class']});
  
  // 初始进度
  setTimeout(()=>updateStepProgress(1),500);
})();
</script>
