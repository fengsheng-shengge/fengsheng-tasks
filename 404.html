<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
  <meta name="description" content="页面不存在 - 风声 fengsheng.tech">
  <title>页面不存在 - 风声</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest-green: #2D5A3D;
      --terracotta: #D97757;
      --cream: #F5F1E8;
      --text: #2A2825;
      --text-soft: #5C5852;
      --border: #D8D0C0;
      --white: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .skip-nav {
      position: absolute;
      left: -9999px;
      top: 0;
      background: var(--forest-green);
      color: var(--white);
      padding: 12px 20px;
      z-index: 9999;
      text-decoration: none;
      border-radius: 0 0 8px 0;
    }

    .skip-nav:focus {
      left: 0;
    }

    header.site-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      background: var(--forest-green);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      color: var(--cream);
      font-weight: 700;
    }

    .brand-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--forest-green);
    }

    nav.site-nav {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    nav.site-nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: color 0.2s;
    }

    nav.site-nav a:hover {
      color: var(--terracotta);
    }

    main#main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
    }

    .error-container {
      max-width: 640px;
      text-align: center;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 64px 48px;
      box-shadow: 0 4px 16px rgba(45, 90, 61, 0.06);
    }

    .error-code {
      font-family: 'Noto Serif SC', serif;
      font-size: 96px;
      font-weight: 700;
      color: var(--terracotta);
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .error-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--forest-green);
      margin-bottom: 16px;
    }

    .error-description {
      font-size: 16px;
      color: var(--text-soft);
      margin-bottom: 40px;
      line-height: 1.8;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--forest-green);
      color: var(--white);
    }

    .btn-primary:hover {
      background: #224A30;
    }

    .btn-secondary {
      background: transparent;
      color: var(--terracotta);
      border: 1.5px solid var(--terracotta);
    }

    .btn-secondary:hover {
      background: var(--terracotta);
      color: var(--white);
    }

    .countdown-hint {
      margin-top: 32px;
      font-size: 13px;
      color: var(--text-soft);
    }

    footer.site-footer {
      background: var(--white);
      border-top: 1px solid var(--border);
      padding: 32px;
      text-align: center;
      color: var(--text-soft);
      font-size: 14px;
    }

    footer.site-footer a {
      color: var(--forest-green);
      text-decoration: none;
    }

    footer.site-footer a:hover {
      text-decoration: underline;
    }

    .footer-nav {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .header-container {
        padding: 16px 20px;
        flex-direction: column;
        gap: 16px;
      }

      nav.site-nav {
        gap: 16px;
        justify-content: center;
      }

      nav.site-nav a {
        font-size: 14px;
      }

      main#main {
        padding: 40px 20px;
      }

      .error-container {
        padding: 48px 24px;
      }

      .error-code {
        font-size: 72px;
      }

      .error-title {
        font-size: 24px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <a class="skip-nav" href="#main" aria-label="跳到主要内容">跳到主要内容</a>

  <header class="site-header" role="banner">
    <div class="header-container">
      <a href="/" class="brand" aria-label="风声首页">
        <span class="brand-mark" aria-hidden="true">风</span>
        <span class="brand-text">风声</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="/" aria-label="返回首页">首页</a>
        <a href="/breeder" aria-label="查看饲养员信息">饲养员</a>
        <a href="/guide" aria-label="查看使用指南">指南</a>
        <a href="/knowledge" aria-label="查看知识库">知识</a>
        <a href="/privacy" aria-label="查看隐私政策">隐私</a>
      </nav>
    </div>
  </header>

  <main id="main" role="main" tabindex="-1">
    <section class="error-container" aria-labelledby="error-title">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 id="error-title" class="error-title">页面不存在</h1>
      <p class="error-description">
        抱歉，您访问的页面已经被风吹散。<br>
        请检查链接是否正确，或返回首页继续浏览。
      </p>
      <div class="actions">
        <a href="/" class="btn btn-primary" aria-label="返回风声首页">返回首页</a>
        <a href="javascript:history.back()" class="btn btn-secondary" aria-label="返回上一页">返回上页</a>
      </div>
      <p class="countdown-hint">
        <span id="countdown">3</span> 秒后自动返回首页（不强制跳转）
      </p>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <nav class="footer-nav" aria-label="页脚导航">
      <a href="/" aria-label="首页">首页</a>
      <a href="breeder" aria-label="Agent培养师">Agent培养师</a>
      <a href="privacy" aria-label="查看隐私政策">隐私政策</a>
      <a href="reply" aria-label="帮助与反馈">帮助</a>
    </nav>
    <p>© 2026 风声 fengsheng.tech</p>
  </footer>

  <script>
    (function() {
      var seconds = 3;
      var countdownEl = document.getElementById('countdown');
      var redirected = false;

      var timer = setInterval(function() {
        seconds--;
        if (countdownEl) {
          countdownEl.textContent = seconds;
        }
        if (seconds <= 0) {
          clearInterval(timer);
          if (!redirected) {
            redirected = true;
            window.location.href = '/';
          }
        }
      }, 1000);

      document.querySelectorAll('.actions a').forEach(function(link) {
        link.addEventListener('click', function() {
          redirected = true;
          clearInterval(timer);
        });
      });
    })();
  </script>
</body>
</html>
