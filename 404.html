<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>页面未找到 · 风声</title>
<style>
:root{--bg:#f7f4ef;--p:#3d5a3e;--p-d:#2c4430;--dk:#1a1a1a;--tx:#555;--ts:#7a8478}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.container{max-width:500px;padding:40px 20px}
.emoji{font-size:64px;margin-bottom:16px}
h1{font-size:28px;font-weight:800;color:var(--dk);margin-bottom:8px}
p{font-size:15px;color:var(--ts);margin-bottom:24px;line-height:1.6}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-block;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;transition:all .15s}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:var(--p-d)}
.btn-secondary{background:transparent;color:var(--p);border:1px solid var(--p)}
.btn-secondary:hover{background:rgba(61,90,62,.05)}
.links{margin-top:24px;font-size:13px;color:var(--ts)}
.links a{color:var(--p);text-decoration:none;margin:0 6px}
.links a:hover{text-decoration:underline}
</style>
</head>
<body>

  </div>
  <div class="links">

  </div>
</div>
</body>
</html>
