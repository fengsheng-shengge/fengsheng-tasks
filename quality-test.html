.report-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}

.score-tag{display:inline-block;padding:6px 14px;background:#FBEDE5;color:#D97757;font-weight:700;border-radius:999px;font-size:14px}

.dot{width:8px;height:8px;border-radius:50%;background:#2D5A3D;flex:none}
.comment{background:#E8EDE3;color:#2D5A3D;padding:18px 22px;border-radius:16px;font-size:15px;line-height:1.7;margin-top:20px}
.toast{position:fixed;left:50%;top:32px;transform:translateX(-50%) translateY(-20px);background:#2D5A3D;color:#fff;padding:12px 22px;border-radius:999px;font-size:14px;opacity:0;transition:all .25s;z-index:200;pointer-events:none;box-shadow:0 8px 24px rgba(45,90,61,.3)}

.footer{border-top:1px solid #EFE8DB;background:#fff;padding:30px 0 24px;margin-top:48px;font-size:14px;color:#6B665E}

<script src="tracker.js" defer></script>
<script>
(function(){
  var DIMS = [
    {key:'light', title:'采光与通风', en:'Light & Ventilation', options:['充足','尚可','需改善']},
    {key:'quiet', title:'安静程度', en:'Quietness', options:['非常安静','一般','有噪音困扰']},
    {key:'thermal', title:'温度舒适', en:'Thermal Comfort', options:['常年舒适','夏天偏热','冬天偏冷']},
    {key:'layout', title:'空间布局', en:'Layout', options:['合理好用','基本够用','需改造']},
    {key:'neighbor', title:'邻里关系', en:'Neighborhood', options:['融洽','一般','需关注']},
    {key:'amenities', title:'配套便利', en:'Amenities', options:['非常便利','基本满足','需改善']}
  ];
  var state = {};
  DIMS.forEach(function(d){ state[d.key] = null; });

  var container = document.getElementById('dims');
  DIMS.forEach(function(dim){
    var box = document.createElement('div');
    box.className = 'dim';
    var top = document.createElement('div');
    top.className = 'dim-top';
    top.innerHTML = '<h3 class="dim-title">' + dim.title + '</h3><span class="dim-en">' + dim.en + '</span>';
    box.appendChild(top);
    var opts = document.createElement('div');
    opts.className = 'dim-opts';
    opts.setAttribute('role','radiogroup');
    opts.setAttribute('aria-label', dim.title + '选项');
    dim.options.forEach(function(label, idx){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dim-opt';
      btn.dataset.dim = dim.key;
      btn.dataset.idx = idx;
      btn.setAttribute('aria-pressed','false');
      btn.setAttribute('aria-label', dim.title + '：' + label);
      btn.textContent = label;
      btn.addEventListener('click', function(){
        state[dim.key] = idx;
        opts.querySelectorAll('.dim-opt').forEach(function(b){
          var active = b.dataset.idx == idx;
          b.classList.toggle('active', active);
          b.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        if (typeof window.fsTrack === 'function') window.fsTrack('quality_pick', {dim:dim.key, idx:idx});
      });
      opts.appendChild(btn);
    });
    box.appendChild(opts);
    container.appendChild(box);
  });

  function scoreMap(idx){
    return 3 - idx;
  }

  document.getElementById('genReport').addEventListener('click', function(){
    var missing = DIMS.some(function(d){ return state[d.key] === null; });
    var name = document.getElementById('name').value.trim();
    var phone = document.getElementById('phone').value.trim();
    if (missing || !name || !phone){
      document.getElementById('formHint').style.display = 'block';
      return;
    }
    document.getElementById('formHint').style.display = 'none';
    renderReport(name);
    if (typeof window.fsTrack === 'function') window.fsTrack('quality_report', {state:state});
    document.getElementById('report').classList.add('show');
    document.getElementById('report').scrollIntoView({behavior:'smooth', block:'start'});
  });

  function renderReport(name){
    var total = 0;
    var values = DIMS.map(function(d){
      var s = scoreMap(state[d.key]);
      total += s;
      return s;
    });
    var max = DIMS.length * 3;
    document.getElementById('reportScore').textContent = '总得分：' + total + ' / ' + max;
    drawRadar(values);
    var legend = document.getElementById('dimLegend');
    legend.innerHTML = '';
    DIMS.forEach(function(d, i){
      var item = document.createElement('div');
      item.className = 'dim-legend-item';
      item.innerHTML = '<span class="dot" aria-hidden="true"></span><span>' + d.title + '：' + d.options[state[d.key]] + '（' + values[i] + '/3）</span>';
      legend.appendChild(item);
    });
    var lowCount = values.filter(function(v){ return v <= 1; }).length;
    var highCount = values.filter(function(v){ return v >= 2; }).length;
    var comment;
    if (lowCount === 0 && values.every(function(v){ return v === 3; })){
      comment = name + ' 的居住品质整体非常优秀，六个维度都处于高水平。建议继续保持，并在细节舒适度（如温湿度、降噪）上做进一步优化，把"好房子"变成"会被羡慕的房子"。';
    } else if (lowCount >= 3){
      comment = name + ' 的居住体验存在若干明显痛点，建议优先处理低分维度：改善采光通风、降低噪音、优化温度体验。这些维度对日常生活品质影响最大，也是最容易被客户感知到的改善方向。';
    } else if (lowCount >= 1){
      comment = name + ' 的居住品质整体良好，但仍有 ' + lowCount + ' 个维度存在改善空间。建议针对具体低分项做一次改善评估，并结合家庭长期使用场景决定是否值得投入改造。';
    } else {
      comment = name + ' 的居住品质整体良好，六个维度都维持在中等以上水平。可以把重点放在"让好的更好"：如提升邻里互动、完善配套便利度，让居住体验更上一层楼。';
    }
    document.getElementById('comment').textContent = comment;
  }

  function drawRadar(values){
    var svg = document.getElementById('radar');
    var cx = 240, cy = 240;
    var maxR = 170;
    var n = 6;
    var labels = DIMS.map(function(d){ return d.title; });
    var angle = function(i){ return -Math.PI/2 + i * (2*Math.PI/n); };
    var point = function(i, r){ return [cx + r*Math.cos(angle(i)), cy + r*Math.sin(angle(i))]; };
    var html = '';
    for (var r = 1; r <= 3; r++){
      var pts = [];
      for (var i = 0; i < n; i++){
        var p = point(i, (maxR/3)*r);
        pts.push(p[0].toFixed(1) + ',' + p[1].toFixed(1));
      }
      html += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="#EFE8DB" stroke-width="1.5"/>';
    }
    for (var i = 0; i < n; i++){
      var p = point(i, maxR);
      html += '<line x1="' + cx + '" y1="' + cy + '" x2="' + p[0].toFixed(1) + '" y2="' + p[1].toFixed(1) + '" stroke="#EFE8DB" stroke-width="1.5"/>';
    }
    var dataPts = [];
    for (var i = 0; i < n; i++){
      var v = values[i];
      var p = point(i, (maxR/3)*v);
      dataPts.push(p[0].toFixed(1) + ',' + p[1].toFixed(1));
    }
    html += '<polygon points="' + dataPts.join(' ') + '" fill="#D97757" fill-opacity=".35" stroke="#D97757" stroke-width="2.5"/>';
    for (var i = 0; i < n; i++){
      var v = values[i];
      var p = point(i, (maxR/3)*v);
      html += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="5" fill="#2D5A3D"/>';
    }
    for (var i = 0; i < n; i++){
      var p = point(i, maxR + 24);
      html += '<text x="' + p[0].toFixed(1) + '" y="' + p[1].toFixed(1) + '" text-anchor="middle" dominant-baseline="middle" font-family="inherit" font-size="14" fill="#2A2825" font-weight="600">' + labels[i] + '</text>';
    }
    svg.innerHTML = html;
  }

  document.getElementById('shareBtn').addEventListener('click', function(){
    var url = location.href;
    try {
      navigator.clipboard.writeText(url).then(function(){ showToast('链接已复制，可粘贴分享'); }, function(){ fallbackCopy(url); });
    } catch(e){
      fallbackCopy(url);
    }
  });

  function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('链接已复制，可粘贴分享'); } catch(e){ showToast('复制失败，请手动复制浏览器地址栏'); }
    document.body.removeChild(ta);
  }

  function showToast(msg){
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add('show'); });
    setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 250); }, 1800);
  }

  document.getElementById('resetBtn').addEventListener('click', function(){
    DIMS.forEach(function(d){ state[d.key] = null; });
    document.querySelectorAll('.dim-opt').forEach(function(b){
      b.classList.remove('active');
      b.setAttribute('aria-pressed','false');
    });
    document.getElementById('name').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('wechat').value = '';
    document.getElementById('report').classList.remove('show');
    document.getElementById('formHint').style.display = 'none';
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
