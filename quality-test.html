<script>
(function(){
  var DIMS = [
    {key:'attitude', title:'服务态度', en:'Service Attitude'},
    {key:'professional', title:'专业度', en:'Professionalism'},
    {key:'response', title:'响应速度', en:'Response Speed'},
    {key:'accuracy', title:'准确度', en:'Accuracy'},
    {key:'initiative', title:'主动性', en:'Initiative'},
    {key:'satisfaction', title:'客户满意度', en:'Client Satisfaction'}
  ];

  var ADVICE = {
    attitude: {
      excellent: '服务态度非常出色，客户体验极佳。继续保持热情、耐心和同理心，让每一位客户都感受到被重视。',
      good: '服务态度良好，多数情况下客户感到满意。建议在沟通中更加主动地关注客户情绪变化，及时给予积极回应。',
      poor: '服务态度需要提升。建议从微笑服务、主动问候和耐心倾听开始，建立更积极的客户互动模式。'
    },
    professional: {
      excellent: '专业度表现出色，对行业知识、产品细节和流程都非常熟悉。建议持续关注行业动态，保持专业领先。',
      good: '专业度基本达标，建议在特定领域（如合同条款、交易流程、建筑知识）做进一步深度学习，提升专业深度。',
      poor: '专业度有待加强。建议制定系统学习计划，定期参加行业培训，积累常见问题处理经验。'
    },
    response: {
      excellent: '响应非常及时，客户需求能得到快速处理。建议保持当前响应节奏，同时关注回复质量的持续提升。',
      good: '响应速度基本满足客户期望，建议在高峰期或复杂问题上建立更高效的响应机制，减少客户等待时间。',
      poor: '响应速度需要加快。建议设置响应时效目标，优化工作流程，确保客户需求在合理时间内得到反馈。'
    },
    accuracy: {
      excellent: '信息准确度极高，客户可以完全信赖你的判断和建议。建议将准确的工作方法总结成标准化流程，分享给团队。',
      good: '信息准确度较好，偶尔有小误差。建议在关键信息传递前做二次确认，建立信息核对清单。',
      poor: '信息准确度需要改进。建议养成"先确认再传递"的习惯，重要信息做好记录和备份，避免凭记忆给出不确定的答复。'
    },
    initiative: {
      excellent: '主动性非常强，能够提前预判客户需求并主动提供解决方案。建议将这种前瞻性思维固化为服务流程的一部分。',
      good: '主动性尚可，但有时需要客户提醒才跟进。建议建立客户跟进提醒机制，在关键节点主动联系客户。',
      poor: '主动性需要加强。建议从"每日主动联系一位客户"开始，逐步培养主动服务意识，将被动响应转变为主动关怀。'
    },
    satisfaction: {
      excellent: '客户满意度非常高，这是长期努力的结果。建议定期收集客户反馈，将满意的服务经验沉淀为可复制的标准。',
      good: '客户满意度良好，但仍有提升空间。建议在服务结束后主动询问客户感受，收集具体改进意见。',
      poor: '客户满意度偏低，需要重点关注。建议主动联系客户了解不满原因，制定针对性的改进计划并定期复盘。'
    }
  };

  var state = {};
  DIMS.forEach(function(d){ state[d.key] = 50; });

  var hasInteracted = false;

  var container = document.getElementById('dims');
  DIMS.forEach(function(dim){
    var box = document.createElement('div');
    box.className = 'dim';

    var top = document.createElement('div');
    top.className = 'dim-top';
    top.innerHTML = '<h3 class="dim-title">' + dim.title + '</h3><span class="dim-en">' + dim.en + '</span>';

    var scoreEl = document.createElement('span');
    scoreEl.className = 'dim-score';
    scoreEl.id = 'score-' + dim.key;
    scoreEl.textContent = '50';
    top.appendChild(scoreEl);
    box.appendChild(top);

    var sliderRow = document.createElement('div');
    sliderRow.className = 'dim-slider-row';

    var labelMin = document.createElement('span');
    labelMin.style.cssText = 'font-size:12px;color:#8A857B;min-width:20px;text-align:center';
    labelMin.textContent = '0';

    var slider = document.createElement('input');
    slider.type = 'range';
    slider.id = 'slider-' + dim.key;
    slider.min = '0';
    slider.max = '100';
    slider.value = '50';
    slider.setAttribute('aria-label', dim.title + '评分');
    slider.addEventListener('input', function(){
      hasInteracted = true;
      var val = parseInt(slider.value, 10);
      state[dim.key] = val;
      scoreEl.textContent = val;
      updateSliderBg(slider, val);
      updateRadar();
      if (typeof window.fsTrack === 'function') {
        window.fsTrack('quality_test_slide', {dim: dim.key, score: val});
      }
    });

    var labelMax = document.createElement('span');
    labelMax.style.cssText = 'font-size:12px;color:#8A857B;min-width:24px;text-align:center';
    labelMax.textContent = '100';

    sliderRow.appendChild(labelMin);
    sliderRow.appendChild(slider);
    sliderRow.appendChild(labelMax);
    box.appendChild(sliderRow);

    updateSliderBg(slider, 50);
    container.appendChild(box);
  });

  function updateSliderBg(slider, val){
    var pct = (val / 100) * 100;
    slider.style.background = 'linear-gradient(to right, #2D5A3D 0%, #2D5A3D ' + pct + '%, #EFE8DB ' + pct + '%, #EFE8DB 100%)';
  }

  function updateRadar(){
    if (!hasInteracted) return;

    var values = DIMS.map(function(d){ return state[d.key]; });
    drawRadar(values);
    renderSuggestions(values);

    var avg = Math.round(values.reduce(function(a,b){ return a+b; }, 0) / values.length);
    document.getElementById('avgScore').textContent = '平均分：' + avg;

    var section = document.getElementById('radarSection');
    if (!section.classList.contains('show')) {
      section.classList.add('show');
    }

    if (typeof window.fsTrack === 'function') {
      window.fsTrack('quality_test_update', {avg: avg});
    }
  }

  function drawRadar(values){
    var svg = document.getElementById('radar');
    var cx = 250, cy = 250;
    var maxR = 200;
    var n = 6;
    var labels = DIMS.map(function(d){ return d.title; });
    var angle = function(i){ return -Math.PI/2 + i * (2*Math.PI/n); };
    var point = function(i, r){ return [cx + r*Math.cos(angle(i)), cy + r*Math.sin(angle(i))]; };

    var html = '';

    // Scale rings at 20, 40, 60, 80, 100
    var scaleValues = [20, 40, 60, 80, 100];
    for (var si = 0; si < scaleValues.length; si++){
      var r = (maxR / 100) * scaleValues[si];
      var pts = [];
      for (var i = 0; i < n; i++){
        var p = point(i, r);
        pts.push(p[0].toFixed(1) + ',' + p[1].toFixed(1));
      }
      var strokeColor = scaleValues[si] === 100 ? '#D0C8B8' : '#EFE8DB';
      html += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="' + strokeColor + '" stroke-width="1.5"/>';
      // Scale label on the top axis (index 0)
      var labelP = point(0, r);
      html += '<text x="' + (labelP[0].toFixed(1)) + '" y="' + (labelP[1].toFixed(1) - 4) + '" text-anchor="middle" font-family="inherit" font-size="10" fill="#8A857B">' + scaleValues[si] + '</text>';
    }

    // Axis lines
    for (var i = 0; i < n; i++){
      var p = point(i, maxR);
      html += '<line x1="' + cx + '" y1="' + cy + '" x2="' + p[0].toFixed(1) + '" y2="' + p[1].toFixed(1) + '" stroke="#EFE8DB" stroke-width="1.5"/>';
    }

    // Data polygon
    var dataPts = [];
    for (var i = 0; i < n; i++){
      var v = values[i];
      var p = point(i, (maxR/100)*v);
      dataPts.push(p[0].toFixed(1) + ',' + p[1].toFixed(1));
    }
    html += '<polygon points="' + dataPts.join(' ') + '" fill="#2D5A3D" fill-opacity=".3" stroke="#2D5A3D" stroke-width="2.5"/>';

    // Data points
    for (var i = 0; i < n; i++){
      var v = values[i];
      var p = point(i, (maxR/100)*v);
      html += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="5" fill="#2D5A3D" stroke="#fff" stroke-width="2"/>';
    }

    // Axis labels
    for (var i = 0; i < n; i++){
      var p = point(i, maxR + 28);
      var anchor = 'middle';
      var ang = angle(i);
      if (ang > -0.1 && ang < 0.1) anchor = 'start';
      else if (ang > Math.PI - 0.1 || ang < -Math.PI + 0.1) anchor = 'end';
      html += '<text x="' + p[0].toFixed(1) + '" y="' + p[1].toFixed(1) + '" text-anchor="' + anchor + '" dominant-baseline="middle" font-family="inherit" font-size="14" fill="#2A2825" font-weight="600">' + labels[i] + '</text>';
    }

    // Score labels at data points
    for (var i = 0; i < n; i++){
      var v = values[i];
      var p = point(i, (maxR/100)*v + 18);
      html += '<text x="' + p[0].toFixed(1) + '" y="' + p[1].toFixed(1) + '" text-anchor="middle" font-family="inherit" font-size="12" fill="#2D5A3D" font-weight="700">' + v + '</text>';
    }

    svg.innerHTML = html;
  }

  function renderSuggestions(values){
    var list = document.getElementById('suggestionList');
    list.innerHTML = '';

    DIMS.forEach(function(dim, i){
      var score = values[i];
      var item = document.createElement('div');
      var level, labelClass, labelText, advice;

      if (score >= 80) {
        level = 'excellent';
        labelClass = 'lvl-excellent';
        labelText = '优秀';
        advice = ADVICE[dim.key].excellent;
      } else if (score >= 60) {
        level = 'good';
        labelClass = 'lvl-good';
        labelText = '良好';
        advice = ADVICE[dim.key].good;
      } else {
        level = 'poor';
        labelClass = 'lvl-poor';
        labelText = '需改善';
        advice = ADVICE[dim.key].poor;
      }

      item.className = 'suggestion-item ' + level;
      item.innerHTML = '<div class="s-dim-name">' + dim.title + '<span class="suggestion-label ' + labelClass + '">' + labelText + '</span></div>' +
        '<div class="s-dim-score">得分：' + score + ' / 100</div>' +
        '<div class="s-dim-advice">' + advice + '</div>';
      list.appendChild(item);
    });
  }

  function showToast(msg){
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add('show'); });
    setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 250); }, 2000);
  }

  function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('链接已复制，可粘贴分享'); } catch(e){ showToast('复制失败，请手动复制浏览器地址栏'); }
    document.body.removeChild(ta);
  }

  // Save button
  document.getElementById('saveBtn').addEventListener('click', function(){
    var values = DIMS.map(function(d){ return state[d.key]; });
    var avg = Math.round(values.reduce(function(a,b){ return a+b; }, 0) / values.length);

    var record = {
      scores: {},
      avg: avg,
      savedAt: new Date().toISOString()
    };
    DIMS.forEach(function(dim){
      record.scores[dim.key] = state[dim.key];
    });

    var existing = [];
    try {
      var raw = localStorage.getItem('quality-test-results');
      if (raw) { existing = JSON.parse(raw); }
    } catch(e){}
    existing.push(record);
    localStorage.setItem('quality-test-results', JSON.stringify(existing));
    showToast('结果已保存到本地');
    if (typeof window.fsTrack === 'function') {
      window.fsTrack('quality_test_save', {avg: avg});
    }
  });

  // Reset button
  document.getElementById('resetBtn').addEventListener('click', function(){
    DIMS.forEach(function(dim){
      state[dim.key] = 50;
      var slider = document.getElementById('slider-' + dim.key);
      var scoreEl = document.getElementById('score-' + dim.key);
      slider.value = 50;
      scoreEl.textContent = '50';
      updateSliderBg(slider, 50);
    });
    hasInteracted = false;
    document.getElementById('radarSection').classList.remove('show');
    document.getElementById('avgScore').textContent = '平均分：-';
    document.getElementById('radar').innerHTML = '';
    document.getElementById('suggestionList').innerHTML = '';
    window.scrollTo({top:0, behavior:'smooth'});
    if (typeof window.fsTrack === 'function') {
      window.fsTrack('quality_test_reset');
    }
  });

  // Initial radar draw
  var initValues = DIMS.map(function(){ return 50; });
  drawRadar(initValues);
})();
</script>
</body>
</html>
