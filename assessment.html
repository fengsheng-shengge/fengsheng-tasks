:root{--bg:#f7f4ef;--bg2:#e8e4d9;--card:#ffffff;--border:rgba(80,90,70,.09);

*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;

/* 通用 */
.screen{display:none;min-height:100vh;padding:24px 16px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
padding:14px 32px;border-radius:var(--r);font-size:16px;font-weight:600;
cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--p);color:#fff}
.btn-primary:hover{background:var(--p-d);transform:translateY(-1px)}
.btn-fire{background:var(--fire);color:#fff}
.btn-fire:hover{background:var(--fire-l)}
.btn-outline{background:transparent;color:var(--p);border:2px solid var(--p)}
.btn-outline:hover{background:var(--p);color:#fff}

/* 首页 */
.welcome-logo{font-size:42px;font-weight:700;color:var(--dk);margin-bottom:8px;letter-spacing:2px}
.welcome-sub{font-size:18px;color:var(--ts);margin-bottom:32px}
.welcome-desc{max-width:480px;text-align:center;margin-bottom:40px;line-height:1.8;color:var(--tx)}
.welcome-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
color:var(--p-d);background:rgba(61,90,62,.06);border:1px solid rgba(61,90,62,.12);
border-radius:16px;padding:4px 14px;margin-bottom:20px;letter-spacing:2px}
.welcome-meta{font-size:13px;color:var(--ts);margin-top:24px}

/* 角色选择 */
.role-title{font-size:24px;font-weight:700;color:var(--dk);margin-bottom:8px;text-align:center}
.role-subtitle{font-size:14px;color:var(--ts);margin-bottom:32px;text-align:center}
.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:520px;width:100%}
.role-card{background:var(--card);border:2px solid var(--border);border-radius:12px;
padding:20px 16px;cursor:pointer;transition:all .2s;text-align:center}
.role-card:hover{border-color:var(--p-l);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.role-card.selected{border-color:var(--p);background:rgba(61,90,62,.04);box-shadow:0 0 0 3px rgba(61,90,62,.12)}
.role-icon{font-size:28px;margin-bottom:8px}
.role-name{font-size:14px;font-weight:600;color:var(--dk)}
.role-tag{font-size:11px;color:var(--ts);margin-top:4px}

/* 答题 */
.quiz-container{max-width:600px;width:100%}
.progress-bar{width:100%;height:4px;background:var(--bg2);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:var(--p);border-radius:2px;transition:width .3s}
.progress-text{font-size:12px;color:var(--ts);margin-bottom:8px;text-align:right}
.q-dimension{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
padding:3px 10px;border-radius:12px;margin-bottom:16px;letter-spacing:1px}
.q-scene{font-size:17px;font-weight:600;color:var(--dk);margin-bottom:8px;line-height:1.6}
.q-text{font-size:15px;color:var(--tx);margin-bottom:6px;line-height:1.7}
.q-prompt{font-size:13px;color:var(--fire);margin-bottom:20px;font-weight:500}
.option-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.option-item{background:var(--card);border:2px solid var(--border);border-radius:10px;
padding:14px 16px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.6;color:var(--tx)}
.option-item:hover{border-color:var(--p-l);background:rgba(61,90,62,.02)}
.option-item.selected{border-color:var(--p);background:rgba(61,90,62,.06);color:var(--dk);font-weight:500}
.option-item.multi-selected{border-color:var(--p);background:rgba(61,90,62,.06)}
.option-label{font-weight:700;color:var(--p);margin-right:8px}

/* 报告 */
.report{max-width:700px;width:100%;padding-bottom:60px}
.report-header{text-align:center;margin-bottom:36px;padding:40px 0 24px;border-bottom:2px solid var(--bg2)}
.report-title{font-size:22px;font-weight:700;color:var(--dk);margin-bottom:4px}
.report-role{font-size:14px;color:var(--ts)}
.report-date{font-size:12px;color:var(--ts)}
.report-section{margin-bottom:32px}
.report-section-title{font-size:17px;font-weight:700;color:var(--dk);margin-bottom:16px;

.report-score-big{font-size:64px;font-weight:800;color:var(--p);line-height:1}
.report-score-label{font-size:14px;color:var(--ts);margin-top:4px}
.report-verdict{font-size:16px;font-weight:600;color:var(--fire);margin:12px 0;line-height:1.6}
.report-sentence{font-size:14px;color:var(--tx);line-height:1.8;background:rgba(196,106,58,.04);
border-left:3px solid var(--fire);padding:12px 16px;border-radius:0 8px 8px 0}

/* 三层 */
.triple-bar{display:flex;gap:16px;margin:16px 0}
.triple-item{flex:1;text-align:center}
.triple-score{font-size:28px;font-weight:700}
.triple-label{font-size:12px;color:var(--ts);margin-top:2px}
.triple-desc{font-size:11px;color:var(--ts);margin-top:4px;line-height:1.4}

/* 雷达图 */
.radar-wrap{width:100%;max-width:480px;margin:0 auto}
#radar-chart{width:100%;height:400px}

/* 六维 */
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dim-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
padding:14px;display:flex;align-items:center;gap:10px}
.dim-icon{font-size:22px}
.dim-info{flex:1}
.dim-name{font-size:13px;font-weight:600;color:var(--dk)}
.dim-scores{font-size:12px;color:var(--ts)}
.dim-bar-wrap{width:100%;height:4px;background:var(--bg2);border-radius:2px;margin-top:4px}
.dim-bar{height:100%;border-radius:2px;transition:width .5s}

/* 短板/优势 */
.item-list{display:flex;flex-direction:column;gap:8px}
.item-row{display:flex;align-items:flex-start;gap:10px;padding:12px;
background:var(--card);border-radius:8px;border:1px solid var(--border)}
.item-rank{font-size:20px;font-weight:700;color:var(--bg2);min-width:28px}
.item-content{flex:1}
.item-title{font-size:14px;font-weight:600;color:var(--dk)}
.item-desc{font-size:12px;color:var(--ts);margin-top:2px;line-height:1.5}

/* 建议 */
.advice-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
padding:16px;margin-bottom:10px}
.advice-num{font-size:11px;font-weight:700;color:var(--fire);margin-bottom:4px}
.advice-title{font-size:14px;font-weight:600;color:var(--dk);margin-bottom:4px}
.advice-text{font-size:13px;color:var(--tx);line-height:1.7}

/* 页脚 */
.report-footer{text-align:center;padding:32px 0;border-top:1px solid var(--bg2);margin-top:40px}
.report-footer-text{font-size:11px;color:var(--ts);line-height:1.8}

/* 加载 */
.loading{display:flex;flex-direction:column;align-items:center;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--bg2);border-top-color:var(--p);
border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 响应式 */
@media(max-width:480px){
.welcome-logo{font-size:32px}
.role-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.role-card{padding:14px 10px}
.dim-grid{grid-template-columns:1fr}
.report-score-big{font-size:48px}
.triple-bar{gap:8px}
.triple-score{font-size:22px}
}

/* 游戏化+即时反馈 */
.progress-bar-wrap{background:var(--bg2,#e8e4d9);border-radius:12px;height:8px;margin:8px 0 16px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--p,#3d5a3e),var(--fire,#c46a3a));border-radius:12px;transition:width .4s ease}
.instant-feedback{position:fixed;top:20%;left:50%;transform:translateX(-50%);background:rgba(61,90,62,.95);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;max-width:80%}
.instant-feedback.show{opacity:1}
.achievement-popup{position:fixed;bottom:20%;left:50%;transform:translateX(-50%) scale(.8);background:linear-gradient(135deg,#3d5a3e,#5a8a4e);color:#fff;padding:16px 24px;border-radius:16px;font-size:13px;z-index:9999;opacity:0;transition:all .4s;pointer-events:none;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.achievement-popup.show{opacity:1;transform:translateX(-50%) scale(1)}
.achievement-popup .ach-icon{font-size:32px;margin-bottom:4px}
.achievement-popup .ach-title{font-size:15px;font-weight:800}
.achievement-popup .ach-desc{font-size:11px;opacity:.85;margin-top:2px}
.question-counter{font-size:12px;color:var(--td,#888);text-align:center;margin-bottom:4px}
.question-counter span{font-weight:800;color:var(--p,#3d5a3e)}

</style>

// ========== 状态 ==========
let selectedRole = null;
let currentQ = 0;
let answers = []; // {qId, score, multiScores}

// ========== 界面 ==========
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// 角色选择
function initRoleGrid() {
  const grid = document.getElementById('role-grid');
  grid.innerHTML = ROLES.map(r => `
    <div class="role-card" data-role="${r.id}" onclick="selectRole('${r.id}')">
      <div class="role-icon">${r.icon}</div>
      <div class="role-name">${r.name}</div>
      <div class="role-tag">${r.tag}</div>
    </div>
  `).join('');
}

function selectRole(id) {
  selectedRole = ROLES.find(r => r.id === id);
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.role-card[data-role="${id}"]`).classList.add('selected');
  document.getElementById('btn-start-quiz').disabled = false;
}

function startQuiz() {
  track("quiz_start", {role: selectedRole ? selectedRole.name : ""});
  currentQ = 0;
  answers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('progress-text').textContent = `${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('progress-fill').style.width = `${((currentQ + 1) / QUESTIONS.length) * 100}%`;
  
  const dimBadge = document.getElementById('q-dimension');
  dimBadge.textContent = q.dimLabel;
  dimBadge.style.background = q.dimColor + '12';
  dimBadge.style.color = q.dimColor;
  
  document.getElementById('q-scene').textContent = q.scene;
  document.getElementById('q-text').textContent = q.text;
  
  const prompt = q.multi ? '☑️ 可多选' : '◉ 单选';
  document.getElementById('q-prompt').textContent = prompt;
  
  const optList = document.getElementById('option-list');
  optList.innerHTML = q.options.map((o, i) => `
    <div class="option-item ${q.multi ? '' : ''}" data-idx="${i}" onclick="${q.multi ? 'toggleMulti(this)' : 'selectSingle(this)'}">
      <span class="option-label">${o.label}.</span>${o.text}
    </div>
  `).join('');
  
  document.getElementById('btn-next').style.display = 'none';
}

function selectSingle(el) {
  const q = QUESTIONS[currentQ];
  document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  const idx = parseInt(el.dataset.idx);
  answers[currentQ] = {qId: q.id, score: q.options[idx].score, multiScores: null};
  
  // 自动下一题
  setTimeout(() => nextQuestion(), 350);
}

function toggleMulti(el) {
  el.classList.toggle('multi-selected');
  // 显示确认按钮
  document.getElementById('btn-next').style.display = 'inline-flex';
}

function nextQuestion() {
  const q = QUESTIONS[currentQ];
  if (q.multi) {
    const selected = document.querySelectorAll('.option-item.multi-selected');
    if (selected.length === 0) return;
    let totalScore = 0;
    let maxScore = 0;
    selected.forEach(el => {
      const idx = parseInt(el.dataset.idx);
      totalScore += q.options[idx].score;
      if (q.options[idx].correct) maxScore += q.options[idx].score;
    });
    // 多选评分：选对核心项得分，选错扣分
    const wrongSelected = Array.from(selected).filter(el => {
      const idx = parseInt(el.dataset.idx);
      return q.options[idx].correct === false;
    });
    let finalScore = maxScore;
    if (wrongSelected.length > 0) finalScore = Math.max(0, maxScore - wrongSelected.length * 3);
    if (maxScore === 0) finalScore = 0;
    answers[currentQ] = {qId: q.id, score: finalScore, multiScores: true};
  }
  
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showScreen('screen-loading');
    setTimeout(generateReport, 800);
  } else {
    renderQuestion();
  }
}

// ========== 报告生成 ==========

  const role = selectedRole;
  const w = role.w;
  
  // 计算各维度得分
  const dims = ['safe','health','neat','warm','beauty','cozy'];
  const empathyScores = {};
  const decisionScores = {};
  const empathyLevels = {L1:[], L2:[], L3:[]};
  
  dims.forEach(d => {
    const eScores = answers.filter((a, i) => QUESTIONS[i].dim === d && QUESTIONS[i].ability === 'empathy');
    const dScores = answers.filter((a, i) => QUESTIONS[i].dim === d && QUESTIONS[i].ability === 'decision');
    
    empathyScores[d] = eScores.length > 0 ? eScores.reduce((s, a) => s + a.score, 0) / eScores.length : 0;
    decisionScores[d] = dScores.length > 0 ? dScores.reduce((s, a) => s + a.score, 0) / dScores.length : 0;
    
    // 标准化到百分制 (最高分10分=100分)
    empathyScores[d] = Math.min(100, Math.round(empathyScores[d] * 10));
    decisionScores[d] = Math.min(100, Math.round(decisionScores[d] * 10));
    
    // 共情层级得分
    dims.forEach(dd => {
      ['L1','L2','L3'].forEach(lv => {
        const lvScores = answers.filter((a, i) => QUESTIONS[i].dim === dd && QUESTIONS[i].ability === 'empathy' && QUESTIONS[i].level === lv);
        if (lvScores.length > 0) {
          empathyLevels[lv].push(lvScores.reduce((s, a) => s + a.score, 0) / lvScores.length);
        }
      });
    });
  });
  
  // 共情三层得分
  const L1 = empathyLevels.L1.length > 0 ? Math.min(100, Math.round(empathyLevels.L1.reduce((s,v)=>s+v,0)/empathyLevels.L1.length * 10)) : 0;
  const L2 = empathyLevels.L2.length > 0 ? Math.min(100, Math.round(empathyLevels.L2.reduce((s,v)=>s+v,0)/empathyLevels.L2.length * 10)) : 0;
  const L3 = empathyLevels.L3.length > 0 ? Math.min(100, Math.round(empathyLevels.L3.reduce((s,v)=>s+v,0)/empathyLevels.L3.length * 10)) : 0;
  
  // 加权综合分
  let empathyTotal = 0, decisionTotal = 0;
  dims.forEach(d => {
    empathyTotal += empathyScores[d] * w[d];
    decisionTotal += decisionScores[d] * w[d];
  });
  empathyTotal = Math.round(empathyTotal);
  decisionTotal = Math.round(decisionTotal);
  const overall = Math.round(empathyTotal * 0.4 + decisionTotal * 0.6);
  
  // 等级
  let grade, gradeDesc;
  if (overall >= 85) { grade = '能帮客户实现'; gradeDesc = '共情和决策都强，客户信任你'; }
  else if (overall >= 70) { grade = '能理解客户，部分能帮到'; gradeDesc = '有短板但基础在，补短板效果明显'; }
  else if (overall >= 55) { grade = '能感知客户，但帮不了多少'; gradeDesc = '共情有但决策弱，急需提升专业能力'; }
  else if (overall >= 40) { grade = '对客户感知不足，也帮不上忙'; gradeDesc = '两个维度都弱，先从共情练起'; }
  else { grade = '需要重新理解"帮客户实现美好居住"'; gradeDesc = '基础缺失，建议从实战中重新建立认知'; }
  
  // 一句话诊断

  if (empathyTotal >= 70 && decisionTotal < 55) sentence = '你懂客户，但帮不了客户——从"理解"到"实现"差一截';
  else if (decisionTotal >= 70 && empathyTotal < 55) sentence = '你方案能力强，但不太懂客户——客户不是数据，得先听明白';
  else if (empathyTotal >= 70 && decisionTotal >= 70) sentence = '你既能理解客户，也能帮客户实现——保持，精进细节';

    health_decision: isStrength ? '你能帮客户判断和改善健康隐患' : '知道客户担心，但给不出方案',
    neat_empathy: isStrength ? '你能理解客户对整洁的痛点' : '对整洁痛点感知一般',
    neat_decision: isStrength ? '你能帮客户规划和实现整洁方案' : '方案也一般',
    warm_empathy: isStrength ? '你能共情客户对温暖的渴望' : '能共情但不够深',
    warm_decision: isStrength ? '你能帮客户营造和提升居住温暖感' : '能共情但不会营造温暖',
    beauty_empathy: isStrength ? '你在意客户对美观的追求' : '不太在意客户对美的追求',

    cozy_empathy: isStrength ? '你特别懂客户对惬意生活的需求' : '对惬意需求关注不足',
    cozy_decision: isStrength ? '帮客户优化惬意生活是拿手活' : '优化惬意度的能力有待提升'
  };
  return descs[point.dim + '_' + point.ability] || '';

function submitData(role, overall, empathy, decision, L1, L2, L3, eScores, dScores) {
  const data = {
    role: role.name,
    overall: overall,
    empathy: empathy,
    decision: decision,
    L1: L1, L2: L2, L3: L3,
    safe_e: eScores.safe, safe_d: dScores.safe,
    health_e: eScores.health, health_d: dScores.health,
    neat_e: eScores.neat, neat_d: dScores.neat,
    warm_e: eScores.warm, warm_d: dScores.warm,
    beauty_e: eScores.beauty, beauty_d: dScores.beauty,
    cozy_e: eScores.cozy, cozy_d: dScores.cozy,
    source: 'assessment'
  };
  
  // v2.1: 移除 formsubmit.co 和 web3forms 邮箱推送，防止垃圾邮件
  // 数据仅通过 tracker.js 上报到 /api/event
  if (typeof track === 'function') track('quiz_complete', data);
}

const _startTime = Date.now();
function track(eventType, extra = {}) {
  const data = {
    event_type: eventType,
    page: "/assessment",
    timestamp: new Date().toISOString(),
    duration_sec: eventType === 'page_view' ? 0 : Math.round((Date.now() - _startTime) / 1000),
    ...extra
  };
  // 仅内部上报，不再外发邮箱
  if (window._fsQueue) {
    window._fsQueue.push(data);
  }
}
document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "hidden") {
    if (typeof track === 'function') track("page_leave", {
      duration_sec: Math.round((Date.now()-_startTime)/1000)
    });
  }
});

    '沟通力':['沟通高手！🗣️','表达清晰有力 📡','沟通是成交的关键 🤝'],
    '洞察力':['洞察力满分！👁️','你看到了别人看不到的 🔎','深挖需求，你最行 🧠'],
    '学习力':['学习能力很强！📖','持续进步中 📈','学无止境，你在路上 🎓'],
    '品质意识':['品质意识很棒！🏠','客户居住品质，你放在心上 ✨','好品质从你开始 💎'],
    '服务意识':['服务意识到位！🛡️','把客户当家人 🤗','好服务=好口碑 🌟'],
    '抗压能力':['抗压能力很强！🛡️','压力之下见真章 💪','逆风翻盘的料 🔥'],
    '职业尊严':['职业尊严感很强！👔','为自己行业正名 🏆','专业自信最吸引人 ✨']
  };
  const defaultFeedback=['答得好！继续加油 💪','不错的判断！🎯','思路很清晰 🧠','继续保持！🔥','越来越顺手了 ✨'];
  
  let answeredCount=0;
  let totalQuestions=28;
  
  // 显示即时反馈
  window.showInstantFeedback=function(dimKey){
    const pool=dimFeedback[dimKey]||defaultFeedback;
    const msg=pool[Math.floor(Math.random()*pool.length)];
    let el=document.getElementById('instant-feedback');
    if(!el){
      el=document.createElement('div');
      el.id='instant-feedback';
      el.className='instant-feedback';
      document.body.appendChild(el);
    }
    el.textContent=msg;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1800);
    answeredCount++;
    updateProgress();
    checkAchievements();
  };
  
  // 更新进度条
  function updateProgress(){
    const fill=document.querySelector('.progress-bar-fill');
    const counter=document.querySelector('.question-counter');
    if(fill)fill.style.width=Math.round(answeredCount/totalQuestions*100)+'%';
    if(counter)counter.innerHTML='第 <span>'+answeredCount+'</span> / '+totalQuestions+' 题';
  }
  
  // 成就检查
  const achievements={
    first:{icon:'🎯',title:'测评先锋',desc:'完成了第一道题',triggered:false},
    quarter:{icon:'🔥',title:'势不可挡',desc:'完成25%测评',triggered:false},
    half:{icon:'⚡',title:'半程英雄',desc:'完成50%测评',triggered:false},
    finish:{icon:'🏆',title:'品质服务者',desc:'完成全部测评',triggered:false}
  };
  
  function checkAchievements(){
    const pct=answeredCount/totalQuestions;
    if(answeredCount===1&&!achievements.first.triggered){showAchievement('first');achievements.first.triggered=true;}
    if(pct>=0.25&&!achievements.quarter.triggered){showAchievement('quarter');achievements.quarter.triggered=true;}
    if(pct>=0.5&&!achievements.half.triggered){showAchievement('half');achievements.half.triggered=true;}
    if(pct>=1&&!achievements.finish.triggered){showAchievement('finish');achievements.finish.triggered=true;}
  }
  
  function showAchievement(key){
    const a=achievements[key];
    let el=document.getElementById('achievement-popup');
    if(!el){
      el=document.createElement('div');
      el.id='achievement-popup';
      el.className='achievement-popup';
      document.body.appendChild(el);
    }
    el.innerHTML='<div class="ach-icon">'+a.icon+'</div><div class="ach-title">'+a.title+'</div><div class="ach-desc">'+a.desc+'</div>';
    setTimeout(()=>el.classList.add('show'),100);
    setTimeout(()=>el.classList.remove('show'),3000);
  }
  
  // 拦截选项点击，触发即时反馈
  // 通过MutationObserver监听测评区域的点击事件
  document.addEventListener('click',function(e){
    const opt=e.target.closest('.option-item, .option-btn, .opt-btn, [data-action="select"], button[class*="option"]');
    if(opt){
      // 从选项上下文推断维度
      const qCard=opt.closest('.question-card, .q-card, [class*="question"]');
      let dimKey='';
      if(qCard){
        const text=qCard.textContent||'';
        Object.keys(dimFeedback).forEach(k=>{if(text.includes(k))dimKey=k;});
      }
      showInstantFeedback(dimKey);
    }
  },true);
})();
</script>
