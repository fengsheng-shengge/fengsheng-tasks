.btn[disabled]{opacity:.5;cursor:not-allowed}
.section{padding:32px 0}

.dim-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dim-opt{background:#F5F1E8;border:2px solid transparent;color:#2A2825;padding:14px 12px;border-radius:12px;cursor:pointer;font-size:14px;text-align:center;font-family:inherit;font-weight:500;line-height:1.5;transition:all .15s}
.dim-opt strong{display:block;color:#2D5A3D;font-size:13px;margin-bottom:4px;letter-spacing:.5px}
.dim-opt:hover{background:#EFE8DB}
.dim-opt.active{background:#2D5A3D;color:#fff;border-color:#2D5A3D;font-weight:600}
.dim-opt.active strong{color:#FBEDE5}
.result{margin-top:20px;display:none}
.result.show{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.result-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.result-head h2{margin:0}
.level-tag{display:inline-block;padding:8px 18px;background:#FBEDE5;color:#D97757;font-weight:700;border-radius:999px;font-size:15px}
.chart-wrap{background:#fff;border-radius:16px;padding:24px;border:1px solid #EFE8DB}

.comment{background:#E8EDE3;color:#2D5A3D;padding:18px 22px;border-radius:16px;font-size:15px;line-height:1.7;margin-top:20px}
.next-step{background:#FBEDE5;color:#8A3A22;padding:18px 22px;border-radius:16px;font-size:15px;line-height:1.7;margin-top:14px}
.next-step strong{color:#D97757}
.cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.footer{border-top:1px solid #EFE8DB;background:#fff;padding:30px 0 24px;margin-top:48px;font-size:14px;color:#6B665E}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}

<script src="/tracker.js" async></script>
<script>
(function(){
  var DIMS = [
    {key:'insight', title:'客户洞察能力', options:[
      {level:'入门', desc:'能记录和整理客户基本信息'},
      {level:'进阶', desc:'能分析客户行为和真实需求'},
      {level:'资深', desc:'能预判客户潜在痛点并提前应对'}
    ]},
    {key:'knowledge', title:'专业知识体系', options:[
      {level:'入门', desc:'懂基础概念，能应对日常问答'},
      {level:'进阶', desc:'能把专业知识应用到真实场景'},
      {level:'资深', desc:'能指导他人，建立体系化认知'}
    ]},
    {key:'communication', title:'沟通表达能力', options:[
      {level:'入门', desc:'能清楚说明一件事情'},
      {level:'进阶', desc:'能说服客户接受合理方案'},
      {level:'资深', desc:'能引导对话，让客户自己做决定'}
    ]},
    {key:'resource', title:'资源整合能力', options:[
      {level:'入门', desc:'会利用已有资源完成任务'},
      {level:'进阶', desc:'会整合跨部门资源解决复杂问题'},
      {level:'资深', desc:'会创造新的资源，推动组织创新'}
    ]},
    {key:'warmth', title:'服务温度感知', options:[
      {level:'入门', desc:'有响应，能满足基本服务要求'},
      {level:'进阶', desc:'有关怀，能感知客户情绪变化'},
      {level:'资深', desc:'有温度，能让客户感受到被理解'}
    ]}
  ];
  var state = {};
  DIMS.forEach(function(d){ state[d.key] = null; });

  var container = document.getElementById('dims');
  DIMS.forEach(function(dim){
    var box = document.createElement('div');
    box.className = 'dim';
    var title = document.createElement('h3');
    title.className = 'dim-title';
    title.textContent = dim.title;
    box.appendChild(title);
    var opts = document.createElement('div');
    opts.className = 'dim-opts';
    opts.setAttribute('role','radiogroup');
    opts.setAttribute('aria-label', dim.title + '自评');
    dim.options.forEach(function(opt, idx){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dim-opt';
      btn.dataset.dim = dim.key;
      btn.dataset.idx = idx;
      btn.setAttribute('aria-pressed','false');
      btn.setAttribute('aria-label', dim.title + '：' + opt.level + ' ' + opt.desc);
      btn.innerHTML = '<strong>' + opt.level + '</strong>' + opt.desc;
      btn.addEventListener('click', function(){
        state[dim.key] = idx;
        opts.querySelectorAll('.dim-opt').forEach(function(b){
          var active = b.dataset.idx == idx;
          b.classList.toggle('active', active);
          b.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        if (typeof window.fsTrack === 'function') window.fsTrack('assess_pick', {dim:dim.key, idx:idx});
      });
      opts.appendChild(btn);
    });
    box.appendChild(opts);
    container.appendChild(box);
  });

  document.getElementById('checkBtn').addEventListener('click', function(){
    var missing = DIMS.some(function(d){ return state[d.key] === null; });
    if (missing){
      document.getElementById('hint').classList.add('show');
      return;
    }
    document.getElementById('hint').classList.remove('show');
    renderResult();
    if (typeof window.fsTrack === 'function') window.fsTrack('assess_result', {state:state});
    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
  });

  document.getElementById('resetBtn').addEventListener('click', function(){
    DIMS.forEach(function(d){ state[d.key] = null; });
    document.querySelectorAll('.dim-opt').forEach(function(b){
      b.classList.remove('active');
      b.setAttribute('aria-pressed','false');
    });
    document.getElementById('result').classList.remove('show');
    document.getElementById('hint').classList.remove('show');
    window.scrollTo({top:0, behavior:'smooth'});
  });

  function renderResult(){
    var values = DIMS.map(function(d){ return (state[d.key] || 0) + 1; });
    var total = values.reduce(function(a,b){ return a+b; }, 0);
    document.getElementById('levelTag').textContent = '总分：' + total + ' / 15';
    var level;
    if (total <= 7) level = {name:'新秀期', color:'#D97757', desc:'你刚刚进入这条成长路径，正在建立对服务、对客户的基本认知。关键不是"会不会"，而是能不能在每一次真实服务中稳定完成基本动作。', next:'接下来的重点：把每一次服务的基本流程跑顺，养成记录客户信息的习惯，并在复盘里写下"这次我本可以做什么"。'};
    else if (total <= 11) level = {name:'成长期', color:'#2D5A3D', desc:'你已经能独立完成常见场景的服务，在关键维度开始形成自己的方法论。需要警惕的是"惯性"—— 用老经验应对新问题。', next:'接下来的重点：主动进入更复杂的场景（比如高预算、多决策人、跨团队协作），刻意练习客户真正的决策线索分析，并把成功的做法沉淀为可分享的模板。'};
    else level = {name:'资深期', color:'#2D5A3D', desc:'你已经具备资深服务者的核心能力：能理解客户、能整合资源、能引导对话、能让客户感受到被看见。成长的下一步不是"更专业"，而是让专业变得可传授。', next:'接下来的重点：开始承担"带新人"或"做培训"的角色，把隐性经验变成显性方法论，并在更复杂的组织问题上做第一次尝试。'};
    document.getElementById('levelTitle').textContent = '当前段位：' + level.name;
    document.getElementById('levelComment').textContent = level.desc;
    document.getElementById('nextStep').innerHTML = '<strong>下一步建议：</strong>' + level.next;
    drawBarChart(values);
  }

  function drawBarChart(values){
    var svg = document.getElementById('barChart');
    var W = 600, H = 420;
    var padding = {top:30, right:30, bottom:70, left:40};
    var plotW = W - padding.left - padding.right;
    var plotH = H - padding.top - padding.bottom;
    var maxVal = 3;
    var n = values.length;
    var barW = plotW / n * 0.62;
    var gap = plotW / n * 0.38;
    var html = '';
    html += '<rect x="0" y="0" width="' + W + '" height="' + H + '" fill="#fff"/>';
    for (var v = 1; v <= maxVal; v++){
      var y = padding.top + plotH - (plotH/maxVal)*v;
      html += '<line x1="' + padding.left + '" y1="' + y + '" x2="' + (W - padding.right) + '" y2="' + y + '" stroke="#EFE8DB" stroke-width="1" stroke-dasharray="4 4"/>';
      html += '<text x="' + (padding.left - 8) + '" y="' + (y + 5) + '" text-anchor="end" font-family="inherit" font-size="12" fill="#8A857B">' + v + '分</text>';
    }
    for (var i = 0; i < n; i++){
      var x = padding.left + i * (plotW/n) + gap/2;
      var val = values[i];
      var barH = (plotH/maxVal) * val;
      var y = padding.top + plotH - barH;
      var isHigh = val === 3;
      var color = isHigh ? '#2D5A3D' : (val === 2 ? '#4B7A5C' : '#D97757');
      html += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + barH + '" rx="10" fill="' + color + '" opacity=".92"/>';
      html += '<text x="' + (x + barW/2) + '" y="' + (y - 8) + '" text-anchor="middle" font-family="inherit" font-size="14" fill="#2A2825" font-weight="700">' + val + '</text>';
      var labelY = padding.top + plotH + 10;
      var label = DIMS[i].title;
      var line1 = label.substring(0, 4);
      var line2 = label.substring(4);
      html += '<text x="' + (x + barW/2) + '" y="' + labelY + '" text-anchor="middle" font-family="inherit" font-size="13" fill="#2A2825" font-weight="600">' + line1 + '</text>';
      if (line2) html += '<text x="' + (x + barW/2) + '" y="' + (labelY + 18) + '" text-anchor="middle" font-family="inherit" font-size="13" fill="#2A2825" font-weight="600">' + line2 + '</text>';
      var sub = DIMS[i].options[state[DIMS[i].key]].level;
      html += '<text x="' + (x + barW/2) + '" y="' + (labelY + (line2 ? 40 : 28)) + '" text-anchor="middle" font-family="inherit" font-size="12" fill="#8A857B">' + sub + '</text>';
    }
    svg.innerHTML = html;
  }
})();
</script>
