<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F1E8;color:#2A2825;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:#2D5A3D;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:900px;margin:0 auto;padding:0 20px}
.skip-nav{position:absolute;left:-9999px;top:0;background:#2D5A3D;color:#fff;padding:12px 20px;z-index:100;text-decoration:none;border-radius:0 0 12px 0}
.skip-nav:focus{left:0}
.header{background:#fff;border-bottom:1px solid #EFE8DB}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand{font-weight:700;font-size:20px;color:#2D5A3D;letter-spacing:1px}
.brand span{color:#D97757}
.nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center;font-size:15px;color:#6B665E}
.nav a{color:#2A2825;padding:6px 10px;border-radius:8px}
.nav a:hover{background:#F5F1E8;text-decoration:none;color:#2D5A3D}
.nav .sep{color:#B8B1A4}
.hero{padding:56px 0 32px;text-align:center}
.hero h1{font-size:clamp(30px,5vw,44px);line-height:1.3;margin:0 0 14px;color:#2A2825;font-weight:700}
.hero h1 em{font-style:normal;color:#D97757}
.hero p.lead{font-size:clamp(15px,2.2vw,19px);color:#5E5952;max-width:620px;margin:0 auto}
.section{padding:32px 0}
.section h2{font-size:clamp(22px,3.5vw,28px);margin:0 0 8px;color:#2A2825}
.section .sub{color:#5E5952;margin:0 0 24px;font-size:14px}

/* Dimension cards */
.dims{display:grid;gap:14px;margin-top:12px}
.dim{background:#fff;border-radius:16px;padding:22px;border:1px solid #EFE8DB;box-shadow:0 2px 6px rgba(42,40,37,.04);transition:border-color .2s}
.dim.completed{border-color:#2D5A3D}
.dim-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.dim-title{font-size:17px;font-weight:700;color:#2A2825;margin:0}
.dim-en{font-size:13px;color:#8A857B;font-weight:500;letter-spacing:.5px}
.dim-desc{font-size:13px;color:#5E5952;margin:4px 0 14px}
.dim-opts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dim-opt{background:#F5F1E8;border:2px solid transparent;color:#2A2825;padding:14px 12px;border-radius:12px;cursor:pointer;font-size:14px;text-align:left;font-family:inherit;font-weight:500;line-height:1.6;transition:all .15s}
.dim-opt strong{display:block;color:#2D5A3D;font-size:14px;margin-bottom:4px}
.dim-opt:hover{background:#E8EDE3;border-color:#B8B1A4}
.dim-opt.active{background:#2D5A3D;color:#fff;border-color:#2D5A3D;font-weight:600}
.dim-opt.active strong{color:#FBEDE5}

/* Action bar */
.action-bar{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;align-items:center}
.progress-text{font-size:14px;color:#6B665E;flex:1;min-width:140px}
.progress-text strong{color:#2D5A3D;font-size:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:999px;padding:14px 28px;font-size:16px;font-weight:600;font-family:inherit;transition:transform .15s ease,box-shadow .15s ease,background-color .2s}
.btn-primary{background:#2D5A3D;color:#fff;box-shadow:0 6px 16px rgba(45,90,61,.25)}
.btn-primary:hover{background:#234a31;text-decoration:none;transform:translateY(-1px)}
.btn-primary[disabled]{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;color:#2A2825;border:1px solid #EFE8DB;padding:12px 20px;font-size:14px}
.btn-ghost:hover{background:#fff;border-color:#D97757;text-decoration:none}

/* Result */
.result{margin-top:24px;display:none;animation:fadeSlide .35s ease}
.result.show{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-card{background:#fff;border-radius:16px;padding:28px;border:1px solid #EFE8DB;box-shadow:0 4px 16px rgba(42,40,37,.06)}
.result-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #EFE8DB}
.result-head h2{font-size:22px;margin:0}
.level-tag{display:inline-block;padding:8px 18px;background:#FBEDE5;color:#D97757;font-weight:700;border-radius:999px;font-size:15px}

.chart-wrap{background:#F5F1E8;border-radius:16px;padding:24px 20px;margin-top:8px}
.chart-wrap svg{width:100%;height:auto;display:block}

.comment{background:#E8EDE3;color:#2D5A3D;padding:18px 22px;border-radius:16px;font-size:15px;line-height:1.7;margin-top:20px}
.comment h4{margin:0 0 10px;color:#2D5A3D;font-size:16px}

.next-step{background:#FBEDE5;color:#8A3A22;padding:18px 22px;border-radius:16px;font-size:15px;line-height:1.7;margin-top:14px}
.next-step h4{margin:0 0 10px;color:#D97757;font-size:16px}
.next-step strong{color:#D97757;display:block;margin-top:8px;font-size:14px}
.next-step .step-item{padding:8px 0;border-bottom:1px dashed #F3D9CA}
.next-step .step-item:last-child{border-bottom:none}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2A2825;color:#fff;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

.footer{border-top:1px solid #EFE8DB;background:#fff;padding:36px 0 28px;margin-top:48px;font-size:14px;color:#6B665E}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer a{color:#6B665E}
.footer .sep{color:#B8B1A4;margin:0 4px}

@media (max-width:640px){
  .wrap{padding:0 16px}
  .hero{padding:40px 0 24px}
  .section{padding:28px 0}
  .dim-opts{grid-template-columns:1fr}
  .nav{font-size:14px}
  .brand{font-size:18px}
}
</style>
</head>

<script src="tracker.js" defer></script>
<script>
(function(){
  var DIMS = [
    {key:'insight', title:'客户洞察能力', en:'Customer Insight',
     desc:'你能在多大程度上读懂客户真正的需求和顾虑',
     options:[
      {level:'入门', score:1,
       desc:'能记录客户的基本信息和表面需求，但不太确定客户真正的决策因素',
       plan:'从"每次服务结束后写 3 条观察笔记"开始：客户说的话 + 客户真正在问什么。先养成观察习惯，不急于下判断。可以从高频场景练习在3-5-10-20-30 分钟服务周期中，哪些线索在反复出现。'},
      {level:'进阶', score:2,
       desc:'能分析客户行为模式和决策因素，形成自己的一套分析习惯',
       plan:'把"需求优先级排序。试着给每1个重要客户画一张"需求地图"：真正在驱动他做决定的3个核心因素是什么。'},
      {level:'资深', score:3,
       desc:'能预判客户潜在痛点并提前应对，能在复杂场景下把握核心问题',
       plan:'你的洞察已经很扎实。接下来的方向是：把隐性经验变成可教的方法论，让团队整体上一个台阶。'}
    ]},
    {key:'knowledge', title:'专业知识体系', en:'Professional Knowledge',
     desc:'你的行业知识、产品理解程度',
     options:[
      {level:'入门', score:1,
       desc:'懂基础概念，能应对日常问题',
       plan:'建立自己的"知识地图"：你的行业里最重要的 20 个概念。每一个都能解释清楚。一周掌握 2-3 个，一个月你会发现自己在知识上的信心会有质的变化。'},
      {level:'进阶', score:2,
       desc:'能把专业知识应用到真实场景中，理解不同客户问题中的专业判断',
       plan:'进入"场景化"阶段：把知识点放在客户真实的案例中去理解。不是"我知道"，而是"在 xxx 情况下我该怎么选"。每周写 1 份"专业 + 场景"对照表。'},
      {level:'资深', score:3,
       desc:'能在复杂问题中给出有专业判断的建议',
       plan:'可以开始做"专业判断"文档"：在不确定的情况下，根据已有信息做出可被质疑的判断。这是从"懂"到"资深"的转折点。'}
    ]},
    {key:'communication', title:'沟通表达能力', en:'Communication',
     desc:'你能在多大程度上清晰、有说服力地与客户交流',
     options:[
      {level:'入门', score:1,
       desc:'能清楚说明一件事情',
       plan:'先练"3句话讲清楚"。开口之前先想一想：我的核心信息是什么？对方最关心什么？多说一句都不不行？把 3 句话讲清楚是一切沟通的起点。'},
      {level:'进阶', score:2,
       desc:'能说服客户接受一个合理的方案',
       plan:'进入"结构化表达"：先讲结论 → 给 3 个理由 → 让对方做选择。这是进阶到资深的关键练习。'},
      {level:'资深', score:3,
       desc:'能引导对话，让客户自己做决定',
       plan:'可以开始练"提问驱动对话"的能力。不是说服，而是通过提出好的问题让客户先理解。这要求对对方的理解比你的表达更重要。'}
    ]},
    {key:'resource', title:'资源整合能力', en:'Resource Integration',
     desc:'在需要跨部门或外部资源时你的配合与推动能力',
     options:[
      {level:'入门', score:1,
       desc:'会利用已有的资源完成任务',
       plan:'从"了解公司所有可用资源清单"开始。你不了解的东西无法为你所用。花 1 周时间，把你日常工作中最常调用的 10 种资源列清楚。'},
      {level:'进阶', score:2,
       desc:'能整合跨部门的资源解决复杂问题',
       plan:'进入"关系驱动"：主动建立你与同事的工作关系。资源不是申请来的，是互相支持出来的。每周主动与 1 个关键同事建立联系并了解他的工作。'},
      {level:'资深', score:3,
       desc:'能创造新资源、推动组织创新',
       plan:'你已经能做"造东西"了。下一步是"造东西"：发起一件能让整个团队受益的事。从小项目开始做，你的影响力会在组织中自然增长。'}
    ]},
    {key:'warmth', title:'服务温度感知', en:'Service Warmth',
     desc:'你是否能让客户感受到被理解和被关注',
     options:[
      {level:'入门', score:1,
       desc:'有响应，能满足基本服务要求',
       plan:'练习"客户叫得出你名字"的练习：每次服务结束后写 1 句观察记录。先做到"客户的情绪状态"而不是只记事件。'},
      {level:'进阶', score:2,
       desc:'有关怀，能感知客户情绪变化并调整回应方式',
       plan:'进入"情绪同步"练习：在对话中注意客户语气、语速变化并同步回应方式。核心不是说对的话，而是说合适的话。'},
      {level:'资深', score:3,
       desc:'能让客户感受到被真正理解和被看见，有长期关系能力',
       plan:'你的温度是稀缺价值。下一步：把"让客户感到被看见"变成你的服务风格，并开始思考"如何让团队也学会这个。这是你从个人优秀到团队影响力的关键一步。'}
    ]}
  ];

  var state = {};
  DIMS.forEach(function(d){ state[d.key] = null; });

  var container = document.getElementById('dims');
  DIMS.forEach(function(dim, dimIdx){
    var box = document.createElement('div');
    box.className = 'dim';
    box.id = 'dim-' + dim.key;

    var top = document.createElement('div');
    top.className = 'dim-top';
    top.innerHTML = '<h3 class="dim-title">' + (dimIdx+1) + '. ' + dim.title + '</h3><span class="dim-en">' + dim.en + '</span>';
    box.appendChild(top);

    var desc = document.createElement('div');
    desc.className = 'dim-desc';
    desc.textContent = dim.desc;
    box.appendChild(desc);

    var opts = document.createElement('div');
    opts.className = 'dim-opts';
    opts.setAttribute('role','radiogroup');
    opts.setAttribute('aria-label', dim.title + '自评');
    dim.options.forEach(function(opt, idx){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dim-opt';
      btn.dataset.dim = dim.key;
      btn.dataset.idx = idx;
      btn.setAttribute('aria-pressed','false');
      btn.setAttribute('aria-label', dim.title + '：' + opt.level + ' ' + opt.desc);
      btn.innerHTML = '<strong>' + opt.level + '</strong>' + opt.desc;
      btn.addEventListener('click', function(){
        state[dim.key] = idx;
        opts.querySelectorAll('.dim-opt').forEach(function(b){
          var active = parseInt(b.dataset.idx, 10) === idx;
          b.classList.toggle('active', active);
          b.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        box.classList.add('completed');
        updateProgress();
        if (typeof window.fsTrack === 'function') window.fsTrack('assess_pick', {dim:dim.key, idx:idx});
      });
      opts.appendChild(btn);
    });
    box.appendChild(opts);
    container.appendChild(box);
  });

  function updateProgress(){
    var done = DIMS.filter(function(d){ return state[d.key] !== null; }).length;
    document.getElementById('progress-count').textContent = done;
    document.getElementById('checkBtn').disabled = done !== DIMS.length;
  }

  document.getElementById('checkBtn').addEventListener('click', function(){
    if (DIMS.some(function(d){ return state[d.key] === null; })){
      toast('请先完成 5 个维度');
      return;
    }
    renderResult();
    if (typeof window.fsTrack === 'function') window.fsTrack('assess_result', {state:state});
    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
  });

  document.getElementById('resetBtn').addEventListener('click', function(){
    DIMS.forEach(function(d){ state[d.key] = null; });
    document.querySelectorAll('.dim-opt').forEach(function(b){
      b.classList.remove('active');
      b.setAttribute('aria-pressed','false');
    });
    document.querySelectorAll('.dim').forEach(function(b){ b.classList.remove('completed'); });
    document.getElementById('result').classList.remove('show');
    updateProgress();
    window.scrollTo({top:0, behavior:'smooth'});
  });

  function renderResult(){
    var values = DIMS.map(function(d){ return (state[d.key] || 0) + 1; });
    var total = values.reduce(function(a,b){ return a+b; }, 0);
    document.getElementById('levelTag').textContent = '总分：' + total + ' / 15';

    // Find strengths (≥2) and weak spots (==1)
    var strengths = [];
    var weak = [];
    DIMS.forEach(function(d, i){
      if (values[i] === 3) strengths.push(d.title);
      if (values[i] === 1) weak.push({title: d.title, plan: d.options[state[d.key]].plan});
    });

    var level;
    if (total <= 7){
      level = {name:'新秀期', color:'#D97757',
        desc:'你刚刚进入这条成长路径，正在建立对服务、对客户的基本认知。关键不是"会不会"，而是能不能在每一次真实服务中稳定完成基本动作。',
        next:'接下来的重点：把每一次服务的基本流程跑顺，养成记录客户信息的习惯，并在复盘里写下"这次我本可以做什么"。'};
    } else if (total <= 11){
      level = {name:'成长期', color:'#2D5A3D',
        desc:'你已经能独立完成常见场景的服务，在关键维度开始形成自己的方法论。需要警惕的是"惯性"——用老经验应对新问题。',
        next:'接下来的重点：主动进入更复杂的场景（如高预算、多决策人、跨团队协作），刻意练习客户真正的决策线索分析，并把成功做法沉淀为可分享的模板。'};
    } else {
      level = {name:'资深期', color:'#2D5A3D',
        desc:'你已经具备资深服务者的核心能力：能理解客户、能整合资源、能引导对话、能让客户感受到被看见。成长的下一步不是"更专业"，而是让专业变得可传授。',
        next:'接下来的重点：开始承担"带新人"或"做培训"的角色，把隐性经验变成显性方法论，并在更复杂的组织问题上做第一次尝试。'};
    }

    document.getElementById('levelTitle').textContent = '当前段位：' + level.name;
    var commentHtml = '<h4 style="margin:0 0 8px">📋 ' + level.name + '画像</h4>' + level.desc;
    if (strengths.length > 0){
      commentHtml += '<div style="margin-top:10px"><strong>你的优势：</strong>' + strengths.join('、') + '</div>';
    }
    document.getElementById('levelComment').innerHTML = commentHtml;

    // Next step section
    var nextHtml = '<h4>🚀 下一步成长计划</h4>';
    if (weak.length > 0){
      weak.forEach(function(w){
        nextHtml += '<div style="padding:8px 0;border-bottom:1px dashed #F3D9CA"><strong>' + w.title + '（当前最弱项）：</strong>' + w.plan + '</div>';
      });
    }
    nextHtml += '<div style="margin-top:10px"><strong style="display:block;color:#D97757;margin-bottom:6px">整体方向：</strong>' + level.next + '</div>';
    document.getElementById('nextStep').innerHTML = nextHtml;

    drawBarChart(values);
  }

  function drawBarChart(values){
    var svg = document.getElementById('barChart');
    var W = 800, H = 480;
    var padding = {top:40, right:30, bottom:120, left:60};
    var plotW = W - padding.left - padding.right;
    var plotH = H - padding.top - padding.bottom;
    var maxVal = 3;
    var n = values.length;
    var barW = plotW / n * 0.55;
    var gap = plotW / n * 0.45;
    var html = '';

    // Background
    html += '<rect x="0" y="0" width="' + W + '" height="' + H + '" fill="#F5F1E8"/>';

    // Grid lines
    for (var v = 1; v <= maxVal; v++){
      var y = padding.top + plotH - (plotH/maxVal)*v;
      html += '<line x1="' + padding.left + '" y1="' + y + '" x2="' + (W - padding.right) + '" y2="' + y + '" stroke="#D9D4C7" stroke-width="1" stroke-dasharray="4 4"/>';
      html += '<text x="' + (padding.left - 12) + '" y="' + (y + 5) + '" text-anchor="end" font-family="inherit" font-size="13" fill="#8A857B" font-weight="600">' + v + '分</text>';
    }

    // Bars
    for (var i = 0; i < n; i++){
      var x = padding.left + i * (plotW/n) + gap/2;
      var val = values[i];
      var barH = (plotH/maxVal) * val;
      var y = padding.top + plotH - barH;
      var color;
      if (val === 3) color = '#2D5A3D';
      else if (val === 2) color = '#4B7A5C';
      else color = '#D97757';
      html += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + barH + '" rx="10" fill="' + color + '" opacity="0.95"/>';
      html += '<text x="' + (x + barW/2) + '" y="' + (y - 10) + '" text-anchor="middle" font-family="inherit" font-size="16" fill="#2A2825" font-weight="700">' + val + '</text>';

      // Label
      var labelY = padding.top + plotH + 20;
      var label = DIMS[i].title;
      var line1 = label.substring(0, 6);
      var line2 = label.substring(6);
      html += '<text x="' + (x + barW/2) + '" y="' + labelY + '" text-anchor="middle" font-family="inherit" font-size="14" fill="#2A2825" font-weight="600">' + line1 + '</text>';
      if (line2) html += '<text x="' + (x + barW/2) + '" y="' + (labelY + 22) + '" text-anchor="middle" font-family="inherit" font-size="14" fill="#2A2825" font-weight="600">' + line2 + '</text>';

      var sub = DIMS[i].options[state[DIMS[i].key]].level;
      html += '<text x="' + (x + barW/2) + '" y="' + (labelY + (line2 ? 52 : 34)) + '" text-anchor="middle" font-family="inherit" font-size="13" fill="#8A857B" font-weight="500">' + sub + '</text>';
    }

    svg.innerHTML = html;
  }

  // Toast
  var toastEl = document.getElementById('toast');
  var toastTimer;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 2200);
  }
})();
</script>
</body>
</html>
