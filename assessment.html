@media (max-width:640px){

}

<script>
(function(){
  var DIM_NAMES = ['客户洞察', '专业知识', '沟通表达', '资源整合', '服务温度'];
  var DIM_KEYS = ['insight', 'knowledge', 'communication', 'resource', 'warmth'];

  var QUESTIONS = [
    // 客户洞察 (0-1)
    {
      dim: 0,
      question: '当客户说"我再看看"时，你通常怎么做？',
      options: [
        {text:'尊重客户，礼貌送别，不做深入追问', score:1},
        {text:'询问客户具体还需要考虑什么，尝试了解顾虑', score:3},
        {text:'通过提问帮助客户梳理真实需求，给出针对性建议', score:5}
      ]
    },
    {
      dim: 0,
      question: '了解客户需求时，你更关注什么？',
      options: [
        {text:'客户的预算和基本要求', score:1},
        {text:'客户的决策逻辑和家庭结构', score:3},
        {text:'客户未说出口的深层需求和生活场景', score:5}
      ]
    },
    // 专业知识 (2-3)
    {
      dim: 1,
      question: '客户询问一个你不确定的问题时，你会？',
      options: [
        {text:'如实说不知道，建议客户自己查', score:1},
        {text:'记下问题，回去查资料后再回复客户', score:3},
        {text:'先用已有知识给出框架性回答，确认后补充详细信息', score:5}
      ]
    },
    {
      dim: 1,
      question: '关于行业最新政策或市场动态，你通常？',
      options: [
        {text:'等公司通知或培训时了解', score:1},
        {text:'主动关注行业资讯，定期学习', score:3},
        {text:'持续跟踪政策变化，预判对客户的影响并提前准备方案', score:5}
      ]
    },
    // 沟通表达 (4-5)
    {
      dim: 2,
      question: '向客户介绍房源时，你的方式更接近？',
      options: [
        {text:'按照标准流程逐一介绍房源信息', score:1},
        {text:'根据客户关注点，重点突出房源优势', score:3},
        {text:'用故事化的方式，让客户想象自己住在里面的场景', score:5}
      ]
    },
    {
      dim: 2,
      question: '客户对价格有异议时，你通常？',
      options: [
        {text:'直接告诉客户这是最低价', score:1},
        {text:'列举房源的价值点，证明价格合理', score:3},
        {text:'先共情客户的感受，再通过对比分析让客户理解价值', score:5}
      ]
    },
    // 资源整合 (6-7)
    {
      dim: 3,
      question: '客户需要超出你服务范围的支持时，你会？',
      options: [
        {text:'告诉客户这不在你的服务范围内', score:1},
        {text:'帮客户找到能提供支持的人或渠道', score:3},
        {text:'主动协调资源，全程跟进直到问题解决', score:5}
      ]
    },
    {
      dim: 3,
      question: '面对复杂的客户需求，你的做法是？',
      options: [
        {text:'按自己的经验独立处理', score:1},
        {text:'请教同事或上级，获取更多信息', score:3},
        {text:'整合内外部资源，为客户制定个性化方案', score:5}
      ]
    },
    // 服务温度 (8-9)
    {
      dim: 4,
      question: '客户在带看过程中表现出犹豫或焦虑时，你通常？',
      options: [
        {text:'继续按计划推进带看流程', score:1},
        {text:'放慢节奏，多给客户一些思考时间', score:3},
        {text:'主动关心客户感受，调整沟通方式，让客户感到被理解', score:5}
      ]
    },
    {
      dim: 4,
      question: '服务结束后，你通常会？',
      options: [
        {text:'完成基本流程，等待客户主动联系', score:1},
        {text:'定期回访，了解客户后续需求', score:3},
        {text:'持续关注客户生活变化，在关键节点主动提供有价值的信息', score:5}
      ]
    }
  ];

  var TOTAL = QUESTIONS.length;
  var currentIdx = 0;
  var answers = new Array(TOTAL).fill(null); // stores score per question

  // DOM refs
  var quizCard = document.getElementById('quizCard');
  var quizDim = document.getElementById('quizDim');
  var quizQuestion = document.getElementById('quizQuestion');
  var quizOptions = document.getElementById('quizOptions');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  var progressLabel = document.getElementById('progressLabel');
  var progressFill = document.getElementById('progressFill');
  var dimensionLabel = document.getElementById('dimensionLabel');
  var quizArea = document.getElementById('quizArea');
  var resultArea = document.getElementById('result');
  var toast = document.getElementById('toast');

  function renderQuestion(idx) {
    currentIdx = Math.max(0, Math.min(TOTAL - 1, idx));
    var q = QUESTIONS[currentIdx];
    quizDim.textContent = DIM_NAMES[q.dim];
    quizQuestion.textContent = q.question;
    dimensionLabel.textContent = DIM_NAMES[q.dim];

    var html = '';
    for (var i = 0; i < q.options.length; i++) {
      var opt = q.options[i];
      var cls = answers[currentIdx] === opt.score ? ' quiz-opt selected' : ' quiz-opt';
      html += '<button class="' + cls + '" data-score="' + opt.score + '" aria-label="选项' + (i+1) + '：' + opt.text + '">';
      html += '<span class="opt-score">' + opt.score + '</span>';
      html += '<span>' + opt.text + '</span>';
      html += '</button>';
    }
    quizOptions.innerHTML = html;

    // Bind click
    var btns = quizOptions.querySelectorAll('.quiz-opt');
    for (var j = 0; j < btns.length; j++) {
      btns[j].addEventListener('click', function(){
        var score = parseInt(this.getAttribute('data-score'), 10);
        answers[currentIdx] = score;
        quizOptions.querySelectorAll('.quiz-opt').forEach(function(b){
          var s = parseInt(b.getAttribute('data-score'), 10);
          b.classList.toggle('selected', s === score);
        });
        if (typeof window.fsTrack === 'function') {
          window.fsTrack('assess_pick', {q: currentIdx + 1, dim: DIM_KEYS[q.dim], score: score});
        }
      });
    }

    // Update progress
    progressLabel.textContent = '第 ' + (currentIdx + 1) + '/' + TOTAL + ' 题';
    progressFill.style.width = ((currentIdx + 1) / TOTAL * 100) + '%';

    // Update nav buttons
    btnPrev.disabled = currentIdx === 0;
    if (currentIdx === TOTAL - 1) {
      btnNext.textContent = '提交测评';
      btnNext.className = 'btn btn-orange';
    } else {
      btnNext.textContent = '下一题';
      btnNext.className = 'btn btn-primary';
    }
  }

  btnPrev.addEventListener('click', function(){
    if (currentIdx > 0) {
      renderQuestion(currentIdx - 1);
      window.scrollTo({top: 0, behavior: 'smooth'});
    }
  });

  btnNext.addEventListener('click', function(){
    if (answers[currentIdx] === null) {
      showToast('请先选择一个选项');
      return;
    }
    if (currentIdx < TOTAL - 1) {
      renderQuestion(currentIdx + 1);
      window.scrollTo({top: 0, behavior: 'smooth'});
    } else {
      // Submit
      submitQuiz();
    }
  });

  function submitQuiz() {
    if (answers.some(function(a){ return a === null; })) {
      showToast('请先完成所有题目');
      return;
    }
    // Calculate dimension scores (each dim has 2 questions, max 10)
    var dimScores = [0, 0, 0, 0, 0];
    for (var i = 0; i < TOTAL; i++) {
      dimScores[QUESTIONS[i].dim] += answers[i];
    }
    var total = dimScores.reduce(function(a,b){ return a+b; }, 0);

    renderResult(dimScores, total);
    if (typeof window.fsTrack === 'function') {
      window.fsTrack('assess_result', {total: total, dimScores: dimScores});
    }
    quizArea.style.display = 'none';
    resultArea.classList.add('show');
    resultArea.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function renderResult(dimScores, total) {
    document.getElementById('levelTag').textContent = '总分：' + total + ' / 50';

    var level;
    if (total <= 20) {
      level = {name:'新秀期', color:'#D97757',
        desc:'你正在建立对服务的基本认知。关键不是"会不会"，而是能不能在每一次真实服务中稳定完成基本动作。',
        next:'接下来的重点：把每一次服务的基本流程跑顺，养成记录客户信息的习惯，并在复盘里写下"这次我本可以做什么"。'};
    } else if (total <= 35) {
      level = {name:'成长期', color:'#2D5A3D',
        desc:'你已经能独立完成常见场景的服务，在关键维度开始形成自己的方法论。需要警惕"惯性"—— 用老经验应对新问题。',
        next:'接下来的重点：主动进入更复杂的场景，刻意练习客户真正的决策线索分析，并把成功的做法沉淀为可分享的模板。'};
    } else {
      level = {name:'资深期', color:'#2D5A3D',
        desc:'你已经具备资深服务者的核心能力：能理解客户、能整合资源、能引导对话、能让客户感受到被看见。成长的下一步是让专业变得可传授。',
        next:'接下来的重点：开始承担"带新人"或"做培训"的角色，把隐性经验变成显性方法论，并在更复杂的组织问题上做第一次尝试。'};
    }
    document.getElementById('levelTitle').textContent = '当前段位：' + level.name;
    document.getElementById('nextStep').innerHTML = '<strong>下一步建议：</strong>' + level.next;

    // Strengths & weaknesses
    var maxScore = Math.max.apply(null, dimScores);
    var minScore = Math.min.apply(null, dimScores);
    var strengthDims = [];
    var weaknessDims = [];
    for (var i = 0; i < 5; i++) {
      if (dimScores[i] === maxScore) strengthDims.push(DIM_NAMES[i]);
      if (dimScores[i] === minScore) weaknessDims.push(DIM_NAMES[i]);
    }

    var strengthHtml = '<strong>你的强项：</strong>' + strengthDims.join('、') + '（得分 ' + maxScore + '/10）';
    if (maxScore >= 8) {
      strengthHtml += '<br>这些领域你已经建立了扎实的认知和方法论，建议在团队中分享你的经验，通过"教"来进一步"学"。';
    } else if (maxScore >= 6) {
      strengthHtml += '<br>这些领域你有不错的基础，继续保持并尝试在真实场景中刻意练习更复杂的案例。';
    } else {
      strengthHtml += '<br>这些领域目前是你的相对优势，但仍有提升空间，建议多观察资深同事的做法，记录每一次服务的得失。';
    }
    document.getElementById('strengthBox').innerHTML = strengthHtml;

    var weaknessHtml = '<strong>提升空间：</strong>' + weaknessDims.join('、') + '（得分 ' + minScore + '/10）';
    if (minScore <= 4) {
      weaknessHtml += '<br>这些领域是你的短板，建议先从基础动作开始练习，比如：每天记录一个客户案例，每周参加一次团队复盘。';
    } else if (minScore <= 6) {
      weaknessHtml += '<br>这些领域你有基础但不够扎实，需要更有意识地学习，建议参加相关培训或向资深同事请教。';
    } else {
      weaknessHtml += '<br>整体能力比较均衡，这些领域虽然相对较低，但基础不错，持续精进即可。';
    }
    document.getElementById('weaknessBox').innerHTML = weaknessHtml;

    // Dimension-specific suggestions
    var suggestions = '';
    for (var d = 0; d < 5; d++) {
      if (dimScores[d] <= 4) {
        var tips = {
          0: '客户洞察：尝试在每次服务后记录三个"客户说了什么"和三个"客户没说什么"，训练自己捕捉隐性需求的能力。',
          1: '专业知识：每天花15分钟阅读一篇行业文章，周末整理成知识卡片，坚持一个月会看到明显变化。',
          2: '沟通表达：练习"先听后说"，每次沟通前默念"客户真正想要的是什么"，尝试用客户的语言回应客户。',
          3: '资源整合：每周认识一位不同部门的同事，了解他们的工作内容，建立一个"我可以找谁帮忙"的资源清单。',
          4: '服务温度：每天给一位老客户发一条关心的信息（不推销），记录客户的反馈，感受温度的力量。'
        };
        suggestions += '<p>' + tips[d] + '</p>';
      }
    }
    if (suggestions) {
      document.getElementById('suggestionBox').innerHTML = '<strong>针对性提升建议：</strong>' + suggestions;
      document.getElementById('suggestionBox').style.display = 'block';
    } else {
      document.getElementById('suggestionBox').style.display = 'none';
    }

    drawBarChart(dimScores);
  }

  function drawBarChart(values){
    var svg = document.getElementById('barChart');
    var W = 600, H = 440;
    var padding = {top:30, right:30, bottom:70, left:40};
    var plotW = W - padding.left - padding.right;
    var plotH = H - padding.top - padding.bottom;
    var maxVal = 10;
    var n = values.length;
    var barW = plotW / n * 0.62;
    var gap = plotW / n * 0.38;

    var html = '';
    html += '<rect x="0" y="0" width="' + W + '" height="' + H + '" fill="#fff"/>';

    // Grid lines
    for (var v = 2; v <= maxVal; v += 2){
      var y = padding.top + plotH - (plotH / maxVal) * v;
      html += '<line x1="' + padding.left + '" y1="' + y + '" x2="' + (W - padding.right) + '" y2="' + y + '" stroke="#EFE8DB" stroke-width="1" stroke-dasharray="4 4"/>';
      html += '<text x="' + (padding.left - 8) + '" y="' + (y + 5) + '" text-anchor="end" font-family="inherit" font-size="12" fill="#8A857B">' + v + '分</text>';
    }

    // Bars
    for (var i = 0; i < n; i++){
      var x = padding.left + i * (plotW / n) + gap / 2;
      var val = values[i];
      var barH = (plotH / maxVal) * val;
      var by = padding.top + plotH - barH;
      var color;
      if (val >= 8) color = '#2D5A3D';
      else if (val >= 6) color = '#4B7A5C';
      else if (val >= 4) color = '#D97757';
      else color = '#C0392B';

      html += '<rect x="' + x + '" y="' + by + '" width="' + barW + '" height="' + barH + '" rx="10" fill="' + color + '" opacity=".92"/>';
      html += '<text x="' + (x + barW / 2) + '" y="' + (by - 8) + '" text-anchor="middle" font-family="inherit" font-size="14" fill="#2A2825" font-weight="700">' + val + '</text>';

      var labelY = padding.top + plotH + 10;
      var label = DIM_NAMES[i];
      html += '<text x="' + (x + barW / 2) + '" y="' + labelY + '" text-anchor="middle" font-family="inherit" font-size="13" fill="#2A2825" font-weight="600">' + label + '</text>';

      var sub = val >= 8 ? '强项' : (val >= 6 ? '良好' : (val >= 4 ? '待提升' : '薄弱'));
      html += '<text x="' + (x + barW / 2) + '" y="' + (labelY + 22) + '" text-anchor="middle" font-family="inherit" font-size="12" fill="' + (val >= 6 ? '#2D5A3D' : '#D97757') + '">' + sub + '</text>';
    }

    svg.innerHTML = html;
  }

  // Save result
  document.getElementById('btnSave').addEventListener('click', function(){
    try {
      var dimScores = [0,0,0,0,0];
      for (var i = 0; i < TOTAL; i++) {
        dimScores[QUESTIONS[i].dim] += answers[i];
      }
      var total = dimScores.reduce(function(a,b){ return a+b; }, 0);
      var record = {
        date: new Date().toISOString(),
        answers: answers.slice(),
        dimScores: dimScores,
        total: total
      };
      localStorage.setItem('assessment-results', JSON.stringify(record));
      showToast('结果已保存到本地');
      if (typeof window.fsTrack === 'function') window.fsTrack('assess_save');
    } catch(e) {
      showToast('保存失败，请检查浏览器存储空间');
    }
  });

  // Retake
  document.getElementById('btnRetake').addEventListener('click', function(){
    answers = new Array(TOTAL).fill(null);
    quizArea.style.display = 'block';
    resultArea.classList.remove('show');
    renderQuestion(0);
    window.scrollTo({top: 0, behavior: 'smooth'});
    if (typeof window.fsTrack === 'function') window.fsTrack('assess_retake');
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(function(){ toast.classList.remove('show'); }, 2000);
  }

  // Init
  renderQuestion(0);
})();
</script>
</body>
</html>
