<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>服务能力标准 · 六维品质居住 · 风声<meta property="og:image" content="https://fengsheng.tech/og-image.png">
</title>
<meta name="description" content="风声六维品质居住标准：安全、健康、整洁、温暖、美观、惬意。定义居住服务品质，让好房子有标准可依。">
<meta name="keywords" content="居住品质标准,六维品质,品质居住,安全,健康,整洁,温暖,美观,惬意,风声,fengsheng">
<meta property="og:title" content="六维品质居住标准 · 风声">
<meta property="og:description" content="安全、健康、整洁、温暖、美观、惬意——六维标准定义品质居住。">
<style>
:root{--bg:#f7f4ef;--p:#3d5a3e;--p-d:#2c4430;--dk:#1a1a1a;--tx:#555;--ts:#7a8478;--border:rgba(80,90,70,.09)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:800px;margin:0 auto;padding:60px 5%}
h1{font-size:32px;font-weight:800;color:var(--dk);margin-bottom:8px}
.subtitle{font-size:18px;color:var(--p);font-weight:600;margin-bottom:32px}
.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.dim-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px}
.dim-card.safe{border-top:3px solid #5e7e5c}
.dim-card.health{border-top:3px solid #6d8f55}
.dim-card.neat{border-top:3px solid #3d5a3e}
.dim-card.warm{border-top:3px solid #c46a3a}
.dim-card.beauty{border-top:3px solid #7e6a90}
.dim-card.cozy{border-top:3px solid #4e7e8e}
.dim-name{font-size:20px;font-weight:800;color:var(--dk);margin-bottom:4px}
.dim-desc{font-size:14px;color:var(--ts);margin-bottom:8px}
.dim-detail{font-size:13px;color:var(--tx);line-height:1.7}
.back-link{display:inline-block;margin-top:32px;color:var(--p);text-decoration:none;font-weight:700;font-size:14px}
.back-link:hover{color:var(--p-d)}
@media(max-width:767px){.dim-grid{grid-template-columns:1fr}h1{font-size:24px}}
</style>
</head>
<body>
<div class="container">
  <h1>六维品质居住标准</h1>
  <p class="subtitle">定义居住服务品质 · 让好房子有标准可依</p>
  <div class="dim-grid">
    <div class="dim-card safe"><div class="dim-name">🔒 安全</div><div class="dim-desc">不出事</div><div class="dim-detail">门锁完好、电路安全、燃气合规、消防设备在位、紧急出口畅通。</div></div>
    <div class="dim-card health"><div class="dim-name">🌿 健康</div><div class="dim-desc">不伤身 · 长期</div><div class="dim-detail">空气质量达标、水质安全、采光通风良好、无有害装修材料。</div></div>
    <div class="dim-card neat"><div class="dim-name">📐 整洁</div><div class="dim-desc">不乱 · 好找</div><div class="dim-detail">物品归位、动线清晰、收纳充足、定期保洁、无卫生死角。</div></div>
    <div class="dim-card warm"><div class="dim-name">☀️ 温暖</div><div class="dim-desc">想回家</div><div class="dim-detail">色调柔和、灯光温馨、家具舒适、有个人空间、有归属感。</div></div>
    <div class="dim-card beauty"><div class="dim-name">🎨 美观</div><div class="dim-desc">统一 · 舒服</div><div class="dim-detail">风格统一、配色协调、软装到位、视觉上有品质感。</div></div>
    <div class="dim-card cozy"><div class="dim-name">🛋️ 惬意</div><div class="dim-desc">放松 · 不被打扰</div><div class="dim-detail">隔音良好、隐私保护、社区安静、可独处可社交。</div></div>
  </div>
  <a class="back-link" href="/">← 返回首页</a>
</div>
</body>
</html>
