<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快回·客户解码器<meta property="og:image" content="https://fengsheng.tech/og-image.png">
</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f4ef;
    --primary: #3d5a3e;
    --primary-light: #5a7d5b;
    --primary-dark: #2d4a2e;
    --accent: #c46a3a;
    --accent-light: #d98a5a;
    --text: #2c2c2c;
    --text-secondary: #6b6b6b;
    --text-muted: #999;
    --border: #e0dcd5;
    --card-bg: #ffffff;
    --card-shadow: 0 1px 4px rgba(0,0,0,0.06);
    --card-shadow-hover: 0 3px 12px rgba(0,0,0,0.1);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s ease;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Page Container ===== */
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    padding: 32px 0 20px;
  }
  .header .icon {
    font-size: 48px;
    margin-bottom: 8px;
    display: block;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.5px;
  }
  .header .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* ===== Steps Indicator ===== */
  .steps-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 24px;
  }
  .step-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    background: var(--border);
    color: var(--text-muted);
    transition: all var(--transition);
  }
  .step-dot.active {
    background: var(--primary);
    color: #fff;
  }
  .step-dot.done {
    background: var(--primary-light);
    color: #fff;
  }
  .step-line {
    width: 40px;
    height: 2px;
    background: var(--border);
    transition: background var(--transition);
  }
  .step-line.done {
    background: var(--primary-light);
  }

  /* ===== Step Sections ===== */
  .step-section {
    display: none;
    animation: fadeSlideIn 0.35s ease;
  }
  .step-section.visible {
    display: block;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .badge {
    font-size: 12px;
    background: var(--primary);
    color: #fff;
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* ===== Domain Cards ===== */
  .domain-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .domain-card {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 8px;
    text-align: center;
    cursor: pointer;
    transition: all var(--transition);
    box-shadow: var(--card-shadow);
    user-select: none;
  }
  .domain-card:hover {
    border-color: var(--primary-light);
    box-shadow: var(--card-shadow-hover);
    transform: translateY(-1px);
  }
  .domain-card.selected {
    border-color: var(--primary);
    background: #f0f7f0;
    box-shadow: 0 0 0 3px rgba(61,90,62,0.12);
  }
  .domain-card .domain-icon {
    font-size: 32px;
    display: block;
    margin-bottom: 6px;
  }
  .domain-card .domain-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  /* ===== Textarea ===== */
  .textarea-wrapper {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--card-shadow);
    transition: border-color var(--transition);
  }
  .textarea-wrapper:focus-within {
    border-color: var(--primary);
  }
  .textarea-wrapper.disabled {
    opacity: 0.5;
    pointer-events: none;
  }
  textarea {
    width: 100%;
    min-height: 140px;
    border: none;
    outline: none;
    resize: vertical;
    padding: 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: transparent;
    line-height: 1.7;
  }
  textarea::placeholder { color: var(--text-muted); }
  .textarea-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px 12px;
    gap: 10px;
  }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(61,90,62,0.3);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 1.5px solid var(--primary);
  }
  .btn-outline:hover {
    background: rgba(61,90,62,0.06);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 8px 14px;
    font-weight: 500;
  }
  .btn-ghost:hover {
    background: rgba(0,0,0,0.04);
    color: var(--text);
  }
  .btn-sm {
    padding: 6px 14px;
    font-size: 13px;
  }
  .btn-accent {
    background: var(--accent);
    color: #fff;
  }
  .btn-accent:hover {
    background: #a85a2f;
  }

  /* ===== Result Cards ===== */
  .result-section {
    margin-top: 20px;
  }
  .result-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--card-shadow);
    border-left: 4px solid var(--primary);
    animation: fadeSlideIn 0.4s ease;
  }
  .result-card.card-dao { border-left-color: #8b5cf6; }
  .result-card.card-fa { border-left-color: #3b82f6; }
  .result-card.card-shu { border-left-color: var(--accent); }
  .result-card .result-label {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-card.card-dao .result-label { color: #7c3aed; }
  .result-card.card-fa .result-label { color: #2563eb; }
  .result-card.card-shu .result-label { color: var(--accent); }
  .result-card .result-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }

  /* ===== Share Bar ===== */
  .share-bar {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  /* ===== History ===== */
  .history-section {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .history-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-item {
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all var(--transition);
    box-shadow: var(--card-shadow);
  }
  .history-item:hover {
    border-color: var(--primary-light);
    box-shadow: var(--card-shadow-hover);
  }
  .history-item .hi-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .history-item .hi-domain {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    background: rgba(61,90,62,0.08);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .history-item .hi-time {
    font-size: 11px;
    color: var(--text-muted);
  }
  .history-item .hi-preview {
    font-size: 13px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 20px 0;
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary-dark);
    color: #fff;
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    .domain-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .header h1 { font-size: 24px; }
    .header .icon { font-size: 40px; }
    .share-bar { flex-direction: column; }
    .share-bar .btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="header">
    <span class="icon">⚡</span>
    <h1>快回·客户解码器</h1>
    <p class="subtitle">读懂客户心里话，回复不再靠猜</p>
  </div>

  <!-- Steps Indicator -->
  <div class="steps-indicator">
    <div class="step-dot active" id="stepDot1">1</div>
    <div class="step-line" id="stepLine1"></div>
    <div class="step-dot" id="stepDot2">2</div>
    <div class="step-line" id="stepLine2"></div>
    <div class="step-dot" id="stepDot3">3</div>
  </div>

  <!-- Step 1: Select Domain -->
  <div class="step-section visible" id="step1">
    <div class="section-title">
      <span class="badge">Step 1</span> 选择业务领域
    </div>
    <div class="domain-grid" id="domainGrid">
      <div class="domain-card" data-domain="estate">
        <span class="domain-icon">🏠</span>
        <span class="domain-name">房产交易</span>
      </div>
      <div class="domain-card" data-domain="rental">
        <span class="domain-icon">🏢</span>
        <span class="domain-name">房屋租赁</span>
      </div>
      <div class="domain-card" data-domain="renovation">
        <span class="domain-icon">🛋️</span>
        <span class="domain-name">整装家居</span>
      </div>
      <div class="domain-card" data-domain="housekeeping">
        <span class="domain-icon">🧹</span>
        <span class="domain-name">家政保洁</span>
      </div>
    </div>
  </div>

  <!-- Step 2: Enter Text -->
  <div class="step-section" id="step2">
    <div class="section-title">
      <span class="badge">Step 2</span> 输入客户原话
    </div>
    <div class="textarea-wrapper disabled" id="textareaWrapper">
      <textarea id="clientText" placeholder="客户说的话（粘贴或输入）..."></textarea>
      <div class="textarea-actions">
        <button class="btn btn-ghost btn-sm" id="btnSample">给我示例</button>
        <button class="btn btn-primary" id="btnDecode" disabled>🔍 解码看看 →</button>
      </div>
    </div>
  </div>

  <!-- Step 3: Result -->
  <div class="step-section" id="step3">
    <div class="section-title">
      <span class="badge">Step 3</span> 解码结果
    </div>
    <div class="result-section" id="resultContainer"></div>
    <div class="share-bar" id="shareBar" style="display:none;">
      <button class="btn btn-outline btn-sm" id="btnCopyText">📋 复制文字</button>
      <button class="btn btn-outline btn-sm" id="btnCopyLink">🔗 复制链接</button>
    </div>
    <div class="history-section" id="historySection">
      <div class="history-title">📜 最近解码</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- External Nav -->
<script src="/assets/fs-nav.js"></script>
<script src="/assets/fs-store.js"></script>

<script>
(function() {
  'use strict';

  // ===== Init FSNav =====
  if (typeof FSNav !== 'undefined' && FSNav.init) {
    FSNav.init('快回·客户解码器');
  }

  // ===== DOM Refs =====
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const step1 = $('#step1');
  const step2 = $('#step2');
  const step3 = $('#step3');
  const dot1 = $('#stepDot1');
  const dot2 = $('#stepDot2');
  const dot3 = $('#stepDot3');
  const line1 = $('#stepLine1');
  const line2 = $('#stepLine2');
  const textareaWrapper = $('#textareaWrapper');
  const clientText = $('#clientText');
  const btnSample = $('#btnSample');
  const btnDecode = $('#btnDecode');
  const resultContainer = $('#resultContainer');
  const shareBar = $('#shareBar');
  const btnCopyText = $('#btnCopyText');
  const btnCopyLink = $('#btnCopyLink');
  const historyList = $('#historyList');
  const toast = $('#toast');

  // ===== State =====
  let selectedDomain = null;
  let currentResult = null;
  let currentClientText = '';
  let toastTimer = null;

  // ===== Domain Samples =====
  const domainSamples = {
    estate: '你们这个价格太贵了，隔壁小区比你们便宜好多。而且户型我也不太满意，客厅太小了。孩子明年要上学，你们这边学区怎么样？',
    rental: '租金能不能便宜点？押一付三太贵了。还有就是我养了一只猫，不知道你们这边让不让养。另外带不带家具家电？',

  };

  // ===== Keyword Database =====
  const keywordDB = {
    // ========== 房产交易 ==========
    estate: {

      groups: [
        {
          id: 'budget',

        {

    // Dot 2
    dot2.classList.remove('active', 'done');
    if (hasResult) dot2.classList.add('done');
    else if (hasDomain) dot2.classList.add('active');

    // Line 2
    line2.classList.toggle('done', hasResult);

    // Dot 3
    dot3.classList.remove('active', 'done');
    if (hasResult) dot3.classList.add('active');
  }

  function showStep(step) {
    step1.classList.remove('visible');
    step2.classList.remove('visible');
    step3.classList.remove('visible');
    if (step === 1) step1.classList.add('visible');
    else if (step === 2) step2.classList.add('visible');
    else if (step === 3) step3.classList.add('visible');
    updateSteps();
  }

  // ===== Step 1: Domain Selection =====
  $('#domainGrid').addEventListener('click', function(e) {
    const card = e.target.closest('.domain-card');
    if (!card) return;
    const domain = card.dataset.domain;

    // Toggle selection
    if (selectedDomain === domain) {
      selectedDomain = null;
      card.classList.remove('selected');
      textareaWrapper.classList.add('disabled');
      btnDecode.disabled = true;
      // Reset step 3
      currentResult = null;
      resultContainer.innerHTML = '';
      shareBar.style.display = 'none';
      step3.classList.remove('visible');
      showStep(1);
    } else {
      // Deselect all
      $$('.domain-card').forEach(c => c.classList.remove('selected'));
      // Select
      selectedDomain = domain;
      card.classList.add('selected');
      textareaWrapper.classList.remove('disabled');
      clientText.focus();
      showStep(2);
      updateSteps();
    }
  });

  // ===== Step 2: Text Input =====
  clientText.addEventListener('input', function() {
    btnDecode.disabled = !clientText.value.trim();
  });

  btnSample.addEventListener('click', function() {
    if (!selectedDomain) return;
    clientText.value = domainSamples[selectedDomain] || '';
    btnDecode.disabled = false;
    clientText.focus();
  });

  // ===== Keyword Matching Engine =====
  function matchKeywords(domain, text) {
    const domainData = keywordDB[domain];
    if (!domainData) return { matched: [], result: { dao: '', fa: '', shu: '' } };

    const matched = [];
    const lowerText = text.toLowerCase();

    domainData.groups.forEach(group => {
      const hits = group.keywords.filter(kw => lowerText.includes(kw.toLowerCase()));
      if (hits.length > 0) {
        matched.push({ groupId: group.id, hits, group });
      }
    });

    // Build result: combine matched groups
    let daoParts = [];
    let faParts = [];
    let shuParts = [];

    if (matched.length === 0) {
      // No match: return generic result
      return {
        matched: [],
        result: {
          dao: '客户表达比较笼统，建议进一步追问以了解真实需求。每一位客户背后都有一个未被满足的需求，耐心倾听是关键。',
          fa: '建议先与客户建立信任关系，不要急于回应。用开放式问题引导客户说出更多信息，找到真正的痛点。',
          shu: '"您说的这些我记下了。为了更好地帮您，我想再了解一下您最看重的是哪一方面？这样我可以更有针对性地帮您分析。"'
        }
      };
    }

    matched.forEach((m, i) => {
      if (m.group.dao) daoParts.push((i + 1) + '. ' + m.group.dao);
      if (m.group.fa) faParts.push((i + 1) + '. ' + m.group.fa);
      if (m.group.shu) shuParts.push((i + 1) + '. ' + m.group.shu);
    });

    return {
      matched,
      result: {
        dao: daoParts.join('\n\n') || '请进一步了解客户需求。',
        fa: faParts.join('\n\n') || '请先深入了解客户的具体情况。',
        shu: shuParts.join('\n\n') || '请先与客户深入沟通后再给出具体话术。'
      }
    };
  }

  // ===== Step 2 -> Step 3: Decode =====
  btnDecode.addEventListener('click', function() {
    if (!selectedDomain || !clientText.value.trim()) return;

    const domain = selectedDomain;
    const text = clientText.value.trim();
    currentClientText = text;

    const { matched, result } = matchKeywords(domain, text);
    currentResult = { domain, clientText: text, matched, result, time: new Date().toISOString() };

    renderResult();
    saveHistory();
    showStep(3);
  });

  // ===== Render Result =====
  function renderResult() {
    if (!currentResult) return;
    const { result, domain, matched } = currentResult;
    const domainData = keywordDB[domain];

    resultContainer.innerHTML = `
      <div class="result-card card-dao">
        <div class="result-label">👁 道·人性规律</div>
        <div class="result-text">${escapeHtml(result.dao).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>')}</div>
      </div>
      <div class="result-card card-fa">
        <div class="result-label">🎯 法·坚持原则</div>
        <div class="result-text">${escapeHtml(result.fa).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>')}</div>
      </div>
      <div class="result-card card-shu">
        <div class="result-label">💬 术·参考话术</div>
        <div class="result-text">${escapeHtml(result.shu).replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>')}</div>
      </div>
    `;
    shareBar.style.display = 'flex';

    // Update history highlight
    renderHistory();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== Share =====
  btnCopyText.addEventListener('click', function() {
    if (!currentResult) return;
    const { result, domain, clientText } = currentResult;
    const domainData = keywordDB[domain];
    const text = `【快回·客户解码器】${domainData.icon} ${domainData.name}

📝 客户原话：
${clientText}

👁 道·人性规律：
${result.dao}

🎯 法·坚持原则：
${result.fa}

💬 术·参考话术：
${result.shu}

—— 由快回·客户解码器生成`;
    copyToClipboard(text);
    showToast('已复制到剪贴板');
  });

  btnCopyLink.addEventListener('click', function() {
    if (!currentResult) return;
    const { domain, clientText } = currentResult;
    const url = new URL(window.location.href.split('?')[0]);
    url.searchParams.set('d', domain);
    url.searchParams.set('t', encodeURIComponent(clientText));
    copyToClipboard(url.toString());
    showToast('链接已复制到剪贴板');
  });

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  // ===== Toast =====
  function showToast(msg) {
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(function() {
      toast.classList.remove('show');
      toastTimer = null;
    }, 2000);
  }

  // ===== History (localStorage) =====
  const HISTORY_KEY = 'fs_reply_history';

  function getHistory() {
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveHistory() {
    if (!currentResult) return;
    const history = getHistory();
    const entry = {
      domain: currentResult.domain,
      clientText: currentResult.clientText,
      result: currentResult.result,
      time: currentResult.time
    };
    // Remove duplicate if same domain+text
    const idx = history.findIndex(h => h.domain === entry.domain && h.clientText === entry.clientText);
    if (idx >= 0) history.splice(idx, 1);
    // Add to front
    history.unshift(entry);
    // Keep only 5
    const trimmed = history.slice(0, 5);
    try {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed));
    } catch (e) {}
  }

  function renderHistory() {
    const history = getHistory();
    if (history.length === 0) {
      historyList.innerHTML = '<div class="history-empty">还没有解码记录，快去试试吧</div>';
      return;
    }

    historyList.innerHTML = history.map(function(h, i) {
      const domainData = keywordDB[h.domain] || { name: h.domain, icon: '📋' };
      const timeStr = formatTime(h.time);
      const preview = h.clientText.length > 40 ? h.clientText.slice(0, 40) + '...' : h.clientText;
      return `<div class="history-item" data-index="${i}">
        <div class="hi-meta">
          <span class="hi-domain">${domainData.icon} ${domainData.name}</span>
          <span class="hi-time">${timeStr}</span>
        </div>
        <div class="hi-preview">${escapeHtml(preview)}</div>
      </div>`;
    }).join('');
  }

  function formatTime(isoStr) {
    try {
      const d = new Date(isoStr);
      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return '刚刚';
      if (diffMin < 60) return diffMin + '分钟前';
      const diffHour = Math.floor(diffMin / 60);
      if (diffHour < 24) return diffHour + '小时前';
      const diffDay = Math.floor(diffHour / 24);
      if (diffDay < 7) return diffDay + '天前';
      return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    } catch (e) {
      return '';
    }
  }

  historyList.addEventListener('click', function(e) {
    const item = e.target.closest('.history-item');
    if (!item) return;
    const idx = parseInt(item.dataset.index);
    const history = getHistory();
    const entry = history[idx];
    if (!entry) return;

    // Restore state
    selectedDomain = entry.domain;
    currentClientText = entry.clientText;
    clientText.value = entry.clientText;
    btnDecode.disabled = false;

    // Highlight domain card
    $$('.domain-card').forEach(c => {
      c.classList.remove('selected');
      if (c.dataset.domain === entry.domain) c.classList.add('selected');
    });

    currentResult = {
      domain: entry.domain,
      clientText: entry.clientText,
      matched: [],
      result: entry.result,
      time: entry.time
    };

    textareaWrapper.classList.remove('disabled');
    renderResult();
    showStep(3);
    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // ===== URL Restore on Load =====
  function restoreFromURL() {
    const params = new URLSearchParams(window.location.search);
    const domain = params.get('d');
    const text = params.get('t');

    if (!domain || !text || !keywordDB[domain]) return false;

    selectedDomain = domain;
    currentClientText = decodeURIComponent(text);
    clientText.value = currentClientText;
    btnDecode.disabled = false;
    textareaWrapper.classList.remove('disabled');

    const { matched, result } = matchKeywords(domain, currentClientText);
    currentResult = { domain, clientText: currentClientText, matched, result, time: new Date().toISOString() };

    // Highlight domain card
    $$('.domain-card').forEach(c => {
      c.classList.remove('selected');
      if (c.dataset.domain === domain) c.classList.add('selected');
    });

    renderResult();
    saveHistory();
    showStep(3);
    return true;
  }

  // ===== Init =====
  function init() {
    // Check URL params first
    if (!restoreFromURL()) {
      // Show step 1
      showStep(1);
    }
    // Render history
    renderHistory();
  }

  init();

})();
</script>
</body>
</html>
