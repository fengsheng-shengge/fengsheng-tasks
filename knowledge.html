            {id:'TRX-008',domain:'trade',name:'ACN（Agent Cooperation Network）',alias:'经纪人合作网络、贝壳ACN',def:'将交易全流程拆分为多角色，按贡献分配佣金的合作机制。',source:'- 《房地产经纪管理办法》第十九条 - 贝壳ACN2.0规则',srcType:'部门规章',attrs:'房源方：录入、维护、实勘+客源方：客源开发、带看、成交+分佣：房源方30%+40%、客源方60%+70%+信用：红/黄/黑线管理+原则：房源唯一、业绩统分、禁跨区',scene:'- 新人入职不了解分佣机制，需要解释合作网络运作时 - 经纪人之间因带看归属产生争议，需要明确角色分工时 - 客户问\"为什么买这套房你们店的人都在跟进\"，解释多人服务时  正反向话术： - 正向：\"这套房有录入方、维护方、实勘方，您是客源方，各方按贡献分佣，保证每环节都有人负责。\" - 反向：\"别说\'ACN就是大家抢客户\'——房源归属是唯一的，谁录入归谁，其他人是配合角色，按规则分佣。\"',posSpeech:'',negSpeech:'',consumerQ:'为什么一套房有好几个经纪人在忙活？',simpleAnswer:'ACN合作网络就像一个团队打配合：有人负责找房源、有人负责维护、有人负责带客户看房，各干各的活各拿各的钱。',consumerBenefit:'每个环节都有专人负责，不用担心没人管你'},
            {id:'TRX-009',domain:'trade',name:'单边代理',alias:'单方代理、独立代理',def:'经纪人仅代表买方或卖方一方利益，为委托人争取最大利益的代理模式。',source:'- 《房地产经纪管理办法》第三条 - 深圳中介协会单边代理指引',srcType:'部门规章',attrs:'立场：只对委托方负责+目标：卖方求高价快成交；买方求低价好房源+权责：较居间更清晰+背景：深圳2023年率先推行',scene:'- 客户问\"你是代表我还是代表业主\"，需要明确经纪人立场时 - 推行单边代理的城市，经纪人需要向客户解释服务模式变化时 - 经纪人被质疑\"偏心另一方\"，需要说明职业操守时  正反向话术： - 正向：\"我是您的专属经纪人，只帮您争取最大利益，您放心，我看房、谈价都会站在您的角度。\" - 反向：\"别说\'我帮双方说话/我尽量公平\'——单边代理只代表一方，说帮双方是居间思维，反而让客户不信任。\"',posSpeech:'',negSpeech:'',consumerQ:'经纪人到底站谁那边？帮我还是帮卖家？',simpleAnswer:'单边代理就是经纪人只代表你这一方，帮你砍价、帮你挑毛病，不会两边讨好。',consumerBenefit:'有人一心一意替你说话，不会被对方牵着走'},
            {id:'TRX-010',domain:'trade',name:'独家委托',alias:'独家代理、独家房源',def:'卖方（买方）仅委托一家经纪机构在期限内代理交易的委托模式。',source:'- 《房地产经纪执业规则》 - 《民法典》第九百三十三条（任意解除权）',srcType:'部门规章',attrs:'形式：书面协议，期限、底价、服务内容+期限：3+6个月为主+违约：中途解约或自行成交可能付违约金+区别：独家委托=仅一家；独家代理=仅代表一方',scene:'- 业主问\"能不能同时挂几家中介\"，需要解释独家委托时 - 独家委托期内业主想解约，需要说明法律后果时 - 客户问\"独家是不是意味着只能买这套\"，需要澄清误解时  正反向话术： - 正向：\"签独家的话我们会把精力更集中在这套房上，推广资源倾斜，但您仍可自主选择是否成交。\" - 反向：\"别说\'签独家你就只能卖给我\'——独家委托是排他协议，不影响您最终决策权，不想卖可以协商解约。\"',posSpeech:'',negSpeech:'',consumerQ:'独家委托是什么意思，是不是只能找你一家？',simpleAnswer:'独家委托就是你只让一家中介帮你卖房，他们会集中资源推你的房，但你不满意可以解约，房子还是你的。',consumerBenefit:'中介更上心推你的房，不用被多家中介互相压价'},
            {id:'TRX-011',domain:'trade',name:'产权调查',alias:'产调、房屋核验、权属调查',def:'查询不动产登记信息，核实权属、抵押、查封、限制交易等关键产权信息的服务动作。',source:'- 《不动产登记暂行条例》第二十七条 - 《不动产登记资料查询暂行办法》第四条 - 《房地产经纪管理办法》第二十二条',srcType:'部门规章',attrs:'查询主体：权利人、利害关系人+查询内容：产权人、面积、用途、抵押、查封、异议、预告登记+效力：可依法查询复制+实操：经纪协助买方核验',scene:'- 签约前客户问\"这房子有没有问题\"，需要核实产权状态时 - 发现产权人去世、离异分割等特殊情况，需要确权时 - 买方全款购房，担心抵押查封风险时  正反向话术： - 正向：\"我帮您拉一份产调，看看产权人、抵押、查封情况，正常的话会显示\'无限制\'，您心里有底。\" - 反向：\"别说\'查了没问题是干净的房子\'——产调查不到居住权、租赁备案等隐性权利，客户入住可能踩坑。\"  ---',posSpeech:'',negSpeech:'',consumerQ:'买之前能不能查一下这房子的底细？',simpleAnswer:'产权调查就是帮你查这套房是谁的、有没有抵押、有没有被法院封、有没有别人惦记着，查清楚再掏钱。',consumerBenefit:'掏钱之前知道底细，不怕踩坑'},
            {id:'TRX-012',domain:'trade',name:'抵押查封',alias:'查封、抵押状态、限制交易',def:'房屋存在抵押权或被司法/行政机关查封，导致处分受限的权利限制状态。',source:'- 《民法典》第三百九十四条起 - 《不动产登记暂行条例实施细则》第八十七条起',srcType:'部门规章',attrs:'抵押：债务担保、不转移占有+查封：司法限制处分+效果：未解前不能过户+情形：贷款未清、涉诉、债务纠纷',scene:'- 发现房屋有抵押登记，客户问\"能不能买\"时 - 业主欠债被查封，客户担心付款后过不了户时 - 贷款未还清需要交易，需要解释解押流程时  正反向话术： - 正向：\"房子有抵押正常，关键是解押方案——可以帮您用首付还、也可以走带押过户，钱进监管账户安全。\" - 反向：\"别说\'查封没事，等解封就行\'——查封期间无法过户，付了钱可能房财两空，必须解封才能交易。\"',posSpeech:'',negSpeech:'',consumerQ:'房子有抵押或被查封了还能买吗？',simpleAnswer:'有抵押的房子很常见，贷款没还清就是抵押状态，关键是先解押再过户；被查封的不能过户，千万别碰。',consumerBenefit:'分清哪种能买哪种不能买，不花冤枉钱'},
            {id:'TRX-013',domain:'trade',name:'不动产权证',alias:'房产证、不动产证、大红本',def:'不动产登记机构核发、证明权利人享有不动产权利的法定凭证。',source:'- 《不动产登记暂行条例》第二十条、第五条',srcType:'部门规章',attrs:'证书：产权证（权利人）、登记证明（他项）+内容：权利人、坐落、面积、用途、权利类型+效力：登簿生效+时限：受理后30个工作日',scene:'- 过户完成后客户问\"什么时候能拿到证\"，需要说明办理周期时 - 业主无法提供原件，客户担心产权问题时 - 客户办理落户、抵押贷款，需要出示不动产权证时  正反向话术： - 正向：\"递件后一般5-7个工作日出证，现在都是电子证，跟纸质同等效力，窗口也能打印。\" - 反向：\"别说\'证没出来不算你的房子\'——产权以登簿为准，证只是凭证，登簿后房子就是你的，证早晚能拿。\"',posSpeech:'',negSpeech:'',consumerQ:'房产证是什么样的？什么时候能拿到？',simpleAnswer:'不动产权证就是证明这房子是你的那个红本本，过户后一般5到7个工作日能拿到，现在还有电子版同样有效。',consumerBenefit:'拿到证房子才是你的，等几天心里踏实'},
            {id:'TRX-014',domain:'trade',name:'交易不成退佣',alias:'交易保障、佣金退还、兜底承诺',def:'签约后因非消费者原因未完成交易，平台承诺退还佣金的服务保障。',source:'- 《房地产经纪管理办法》第十九条 - 贝壳\"交易不成，佣金无理由退\"',srcType:'部门规章',attrs:'适用：非买方违约解约+范围：退佣金，不退定金+免责：买方自身原因+兑付：贝壳5个工作日内',scene:'- 签约后因政策变化/贷款拒批等非客户原因交易终止，需要申请退佣时 - 客户担心\"万一买不成钱打水漂\"，需要介绍服务保障时 - 经纪人需要用服务承诺建立客户信任时  正反向话术： - 正向：\"您放心，签了贝壳的服务协议，因非您原因交易不成，佣金5个工作日内无理由退给您。\" - 反向：\"别说\'退佣要看情况\'或\'不一定能退\'——平台有明确承诺，说法模糊会让客户觉得你在敷衍，失去信任。\"',posSpeech:'',negSpeech:'',consumerQ:'万一买了最后没成交，中介费能退吗？',simpleAnswer:'交易不成退佣就是：不是你的原因导致买不成，佣金原路退回，5个工作日到账。',consumerBenefit:'买不成不亏钱，敢放心出手'},
            {id:'TRX-015',domain:'trade',name:'漏水披露补偿',alias:'房屋漏水保障、渗水赔付',def:'经纪人未尽披露义务导致房屋漏水，平台承诺补偿损失的保障机制。',source:'- 《民法典》第五百条、第九百六十二条 - 贝壳漏水披露补偿试点',srcType:'部门规章',attrs:'范围：厨卫/阳台/外墙漏水+义务：签约前问询、看房检查+补偿：维修费、延误入住、装修/家具、租金损失+触发：交房后发现、买方不知情',scene:'- 雨天带看，客户关注墙角/窗框是否有渗水迹象时 - 签约前客户问\"这房子有没有漏过水\"，需要如实披露时 - 交房后发现漏水，客户投诉需要启动补偿流程时  正反向话术： - 正向：\"带看的时候我专门检查了厨卫和阳台墙角，这几个地方目前干燥无水渍，您放心。\" - 反向：\"别说\'没看到漏就是没漏\'或\'以前的事谁知道\'——经纪人有过问义务，客户入住才发现漏水，平台介入你可能担责。\"',posSpeech:'',negSpeech:'',consumerQ:'买完入住发现漏水怎么办？',simpleAnswer:'漏水披露补偿就是：经纪人带你看房时必须检查有没有漏过水，入住后才发现漏水且之前没告诉你，平台赔你损失。',consumerBenefit:'漏了有人兜底，不用自己掏钱修别人的问题'},
            {id:'TRX-016',domain:'trade',name:'房价评估',alias:'房屋估价、房产评估、市场价值评估',def:'专业机构或系统基于市场数据测算房屋价值的行为。',source:'- 《房地产估价规范》GB/T 50291-2015',srcType:'国家标准',attrs:'方法：比较法、收益法、成本法+用途：贷款审批、定价参考、计税+主体：银行评估机构、平台估价系统+时效：3+6个月',scene:'- 客户贷款时银行要求评估报告，需要解释评估流程时 - 业主挂盘价与市场价差距大，客户问\"这价格靠谱吗\"时 - 客户询问\"评估价能不能做低一点省税\"，需要严正拒绝时  正反向话术： - 正向：\"评估价是银行参考的市场价，最终以银行认定为准，成交价是实际交易价，两者会有差异。\" - 反向：\"别说\'可以帮你把评估价做低点省税\'——高评套贷是违规骗贷，情节严重要坐牢，别碰这条红线。\"',posSpeech:'',negSpeech:'',consumerQ:'这房子到底值多少钱？卖家报价靠谱吗？',simpleAnswer:'房价评估就是用专业方法算出这套房的市场价，银行贷款也认这个价，不是卖家想卖多少就多少。',consumerBenefit:'心里有杆秤，不被人漫天要价'},
            {id:'TRX-017',domain:'trade',name:'限购政策查询',alias:'购房资格查询、限购查询',def:'查询城市对户籍、社保、套数、人才、离异等群体的购房限制政策。',source:'- 国办发〔2013〕17号 - 住建部2024\"四个取消\"',srcType:'部门规章',attrs:'主体：地方政府+维度：户籍、社保/个税、套数、人才、离异+渠道：住建官网、政务平台、经纪系统+变化：动态调整',scene:'- 客户首次咨询购房资格，需要核查是否具备购买条件时 - 外地客户/人才购房，需要确认是否有额外名额时 - 客户离婚后再购房，需要核实离婚年限限制时  正反向话术： - 正向：\"您的情况我帮您核一下——户籍这边没限制，社保满2年有名额，我查完给您个准信。\" - 反向：\"别说\'你应该有资格\'或\'差不多能买\'——限购政策差一天都不行，没确认清楚客户买了也过不了户，纠纷就大了。\"  ---',posSpeech:'',negSpeech:'',consumerQ:'我到底有没有资格买房？',simpleAnswer:'限购政策查询就是帮你查你所在城市的买房门槛：户籍、社保年限、已有几套房，一条条对清楚再出手。',consumerBenefit:'先确认能不能买，不白忙活'},
            {id:'TRX-018',domain:'trade',name:'预售许可证',alias:'预售证、商品房预售许可',def:'开发商向主管部门申请，获准预售商品房的行政许可凭证。',source:'- 《城市商品房预售管理办法》第六条、第五条',srcType:'部门规章',attrs:'条件：缴齐土地出让金、规划/施工许可证、投资≥25%+公示：无证不得预售+处罚：没收违法所得、最高罚预付款1%+时限：受理10日内决定',scene:'- 客户问\"这新房能不能买\"，需要核验开发商是否具备销售资质时 - 客户被要求先付定金，经纪人需要确认是否有预售证时 - 客户担心新房烂尾，需要解释证照与监管账户关系时  正反向话术： - 正向：\"我帮您查一下，这个楼盘证照齐全——有预售证才能收定金，没有的话钱直接打给监管账户才安全。\" - 反向：\"别说\'没证也安全，我们帮你盯着\'——无证预售是违法，收了钱不受保护，客户可能钱房两空。\"',posSpeech:'',negSpeech:'',consumerQ:'这新房能买吗？开发商手续齐不齐？',simpleAnswer:'预售许可证就是政府发的‘允许卖’的批文，有这个证才能收定金，没有证的楼盘千万别碰。',consumerBenefit:'看到证才掏钱，不怕买到烂尾楼'},
            {id:'TRX-019',domain:'trade',name:'认购vs签约',alias:'认购书与正式合同、预约与本约',def:'认购（预约）约定将来签约；签约（本约）确立买卖权利义务。',source:'- 《民法典》第四百九十五条、第五百八十七条 - 商品房买卖司法解释第五条',srcType:'部门规章',attrs:'法律：预约合同vs买卖合同+定金：认购定金抵房款、违约适用定金罚则+认购：房号、面积、总价、定金、期限+签约：产权、付款、交付、违约等完整条款',scene:'- 客户看中新房但还在犹豫，销售催促交认购定金时 - 客户交了认购金后反悔，想退定金时 - 客户问\"认购和签合同有什么区别\"，需要解释法律效力时  正反向话术： - 正向：\"认购书是预约，确定您有购买意向，定金会抵房款，签正式合同才算成交，您想清楚再认购。\" - 反向：\"别说\'认购就是走个流程\'——认购书有法律效力，定金受定金罚则保护，签了不想买可能一分都退不回来。\"',posSpeech:'',negSpeech:'',consumerQ:'认购和签合同是一回事吗？交了认购金能退吗？',simpleAnswer:'认购是‘我打算买’先交个定金占位置，签约才是正式买；认购金如果自己反悔一般退不了，想清楚再交。',consumerBenefit:'搞清两步的区别，不被催着稀里糊涂交钱'},
            {id:'TRX-020',domain:'trade',name:'销控',alias:'销售控制、捂盘、房源控制',def:'开发商对房源价格、推售节奏、展示统一管理的行为。',source:'- 建房〔2010〕53号、建房〔2018〕58号',srcType:'部门规章',attrs:'合法：自主定价、分期推售、一房一价+违规：捂盘惜售、制造抢购、哄抬房价+系统：可售/已售/预留状态管理+红线：严禁捂盘、哄抬、制造假象',scene:'- 客户问\"为什么有些楼层没有卖\"，怀疑捂盘时 - 开发商饥饿营销、制造抢购氛围，需要向客户解释时 - 客户被逼下定，需要提醒合规销售行为时  正反向话术： - 正向：\"取证后10天内要公开全部房源，您看中的楼层没卖可能真有人定了，您可以要求公开可售房源清单。\" - 反向：\"别说\'这套没有了/被人定了\'——捂盘惜售是违规，被查实开发商要被处罚，别帮开发商制造虚假紧张。\"',posSpeech:'',negSpeech:'',consumerQ:'楼盘说这层卖完了是不是真的？',simpleAnswer:'销控是开发商管房源的方式，有些楼层是真卖了，有些是故意藏着不卖制造紧张感，你可以要求看可售房源清单。',consumerBenefit:'不被饥饿营销忽悠，想买的房不会莫名其妙没了'},
// 域2·房屋租赁（展示核心5条）
{id:'RNT-001',domain:'rental',name:'长租公寓',alias:'长租住宅、租赁住房',def:'由专业机构运营，提供标准化、规范化服务的长期租赁住房产品。',source:'《住房租赁条例》第2条',srcType:'行政法规',attrs:'产权性质+服务内容+运营主体+合同期限',scene:'企业员工宿舍租赁/城市青年租房',posSpeech:'专业运营、标准服务，租得放心',negSpeech:'不是普通出租房，是专业长租公寓',consumerQ:'长租公寓跟普通租房有什么不一样？',simpleAnswer:'长租公寓是专门的公司统一装修、统一管理、统一出租的房子，住进去不用跟房东打交道，有事找管家。',consumerBenefit:'有人管事有人修东西，不用看房东脸色'},
{id:'RNT-002',domain:'rental',name:'房源管理',alias:'房源信息管理、房源维护',def:'对可租赁房屋的信息进行采集、更新、展示和维护的全过程。',source:'《房地产经纪管理办法》第15条',srcType:'部门规章',attrs:'数据维度+操作主体+更新机制+展示规范',scene:'平台房源更新/经纪人房源录入',posSpeech:'信息准、更新快，找房效率高',negSpeech:'信息过期就是在浪费客户时间',consumerQ:'网上租房信息靠不靠谱？',simpleAnswer:'房源管理就是有人负责把房子信息采回来、核实准、更新快，保证你在网上看到的跟实际一样。',consumerBenefit:'看到啥就是啥，不浪费时间跑冤枉路'},
{id:'RNT-003',domain:'rental',name:'租金贷',alias:'租金贷款、分期付租',def:'金融机构向租客提供的用于支付租金的消费贷款产品。',source:'住建部等6部门《关于整顿规范住房租赁市场秩序的意见》',srcType:'部门规章',attrs:'贷款主体+利率+期限+风险提示',scene:'租客资金安排/租赁金融风险提示',posSpeech:'租金贷不是必需品，量力而行',negSpeech:'诱导租客贷款付租，是行业毒瘤',consumerQ:'租房让我贷款付租金，该不该办？',simpleAnswer:'租金贷就是借钱交房租，表面月供少但总钱更多，万一中间退租贷款还得还，能不贷就不贷。',consumerBenefit:'不被套路背上贷款，租个房不背债'},
{id:'RNT-004',domain:'rental',name:'押金退还',alias:'退押金、押金纠纷',def:'租赁关系结束后，房东按约定退还租客预交的押金。',source:'《民法典》第714条；《住房租赁条例》第24条',srcType:'法律+行政法规',attrs:'押金标准+扣除规则+退还时限+争议处理',scene:'退租结算/押金纠纷调解',posSpeech:'合同写清扣什么、退多少，清清楚楚',negSpeech:'押金一交就要不回来，这叫霸王条款',consumerQ:'退租时押金能不能全退回来？',simpleAnswer:'押金退还是有规则的：合同里写了什么能扣什么不能扣，到期按约定退，不是房东说了算。',consumerBenefit:'该退的钱退得回来，不被随便扣'},
{id:'RNT-005',domain:'rental',name:'租客服务',alias:'租后服务、租客权益',def:'租赁期间为租客提供的居住保障和增值服务。',source:'《住房租赁条例》第3章',srcType:'行政法规',attrs:'维修响应+投诉渠道+社区活动+权益告知',scene:'租客体验管理/服务标准制定',posSpeech:'租的不是房子，是居住服务',negSpeech:'收了租金就消失，那叫房东不叫服务商',consumerQ:'租了房子以后出了事找谁？',simpleAnswer:'租客服务就是住进去以后有人管你：东西坏了有人修、有投诉有人听、有问题有渠道解决。',consumerBenefit:'住着有人管，不用自己扛'},
            {id:'RNT-006',domain:'rental',name:'换租服务',alias:'转租服务；置换服务',def:'为租客提供将现有租赁合同转让给新租户的服务。',source:'《住房租赁条例》第21条',srcType:'部门规章',attrs:'流程要求：需经房东同意+费用结构：可能涉及中介费或违约金',scene:'租客因工作变动需换租；房东接受换租请求',posSpeech:'我们提供便捷的换租服务，帮助您解决租赁变更需求。',negSpeech:'别说不能换租，我们有专业的换租服务支持。',consumerQ:'租期没到但我要搬走怎么办？',simpleAnswer:'换租服务就是帮你把剩下的租期转给新租客，但要房东同意，可能要付一点手续费。',consumerBenefit:'不用硬撑到租期结束，有出路'},
            {id:'RNT-007',domain:'rental',name:'租约',alias:'租赁合同；租赁协议',def:'租户与房东之间就房屋租赁达成的书面协议。',source:'《中华人民共和国民法典》第七百零三条',srcType:'部门规章',attrs:'期限：明确起止日期+条款：包含权利义务等内容',scene:'签订租赁合同；租约到期续签',posSpeech:'我们提供正规的租约，保障双方权益。',negSpeech:'别说没有合同，我们有正式的租赁协议。',consumerQ:'租房合同里该写些什么？',simpleAnswer:'租约就是你和房东的书面约定：租多久、多少钱、谁修东西、提前走怎么办，都写清楚才签。',consumerBenefit:'口说无凭写下来，出了事有据可查'},
            {id:'RNT-008',domain:'rental',name:'押金',alias:'保证金；预付款',def:'租户在签订租赁合同时向房东支付的用于保证履行合同的款项。',source:'《住房租赁条例》第19条',srcType:'部门规章',attrs:'金额：通常为一个月租金+退还条件：需符合合同规定',scene:'租户支付押金；租约结束退还押金',posSpeech:'我们提供合理的押金政策，保障您的资金安全。',negSpeech:'别说不收押金，我们有明确的押金管理制度。',consumerQ:'租房押金一般交多少？怎么保证能退？',simpleAnswer:'押金通常是一个月房租，退租时只要没欠租没搞坏东西就该全退，合同里写清楚就行。',consumerBenefit:'交出去的钱有数，该退的退得明白'},
            {id:'RNT-009',domain:'rental',name:'房屋状态',alias:'房屋状况；房源状态',def:'描述房屋当前的可用性、装修情况及维护状态的综合信息。',source:'《房地产经纪管理办法》第14条',srcType:'部门规章',attrs:'可用性：是否可立即入住+维护状态：是否需要维修',scene:'查看房源信息；房东更新房屋状态',posSpeech:'我们提供详细的房屋状态信息，让您了解真实情况。',negSpeech:'别说不提供房屋状态，我们有完整的房源信息。',consumerQ:'房子现在什么状况？能直接搬进去吗？',simpleAnswer:'房屋状态告诉你这房子能不能马上住、装修怎么样、有没有需要修的地方，看清楚再决定。',consumerBenefit:'搬进去不踩坑，心里有数'},
            {id:'RNT-010',domain:'rental',name:'租赁备案 | 房屋租赁登记',alias:'房屋租赁登记备案、租赁合同备案',def:'指房屋出租人与承租人依法向住房保障部门或相关机构办理的房屋租赁合同备案手续，用于确认租赁关系合法有效',source:'《城市房屋租赁管理办法》第十四条、《民法典》第七百零三条',srcType:'部门规章',attrs:'1. 主体：出租人、承租人 2. 对象：租赁合同 3. 程序：提交材料、审核、备案 4. 效力：法律效力、政策依据 5. 时间：签订合同后30日内',scene:'适用于房屋租赁合同签订后，用于保障双方权益、办理居住证、申请公积金等场景',posSpeech:'',negSpeech:'',consumerQ:'租房要不要去政府备案？有什么用？',simpleAnswer:'租赁备案就是去房管部门登个记，让租房关系有官方记录，办居住证、提公积金、小孩上学都用到。',consumerBenefit:'办了备案有凭证，享政策不卡壳'},
            {id:'RNT-011',domain:'rental',name:'续租 | 延续租赁',alias:'续约、租赁续期',def:'指租赁合同期满后，承租人继续承租该房屋的行为，通常需重新签订租赁合同或书面确认',source:'《民法典》第七百三十四条、《城市房屋租赁管理办法》第二十条',srcType:'部门规章',attrs:'1. 主体：承租人、出租人 2. 对象：原租赁合同 3. 行为：续约、重新签约 4. 条件：租金、条款协商一致 5. 法律效力：新合同生效后原合同终止',scene:'适用于租赁合同到期后，承租人希望继续使用房屋的情况',posSpeech:'',negSpeech:'',consumerQ:'租期到了想继续住怎么办？',simpleAnswer:'续租就是合同到期后跟房东重新签或者确认继续住，租金可能要重新谈，提前说别等最后一天。',consumerBenefit:'不用到期搬走，续上接着住'},
            {id:'RNT-012',domain:'rental',name:'退租交接 | 房屋交还',alias:'房屋交还、退房手续',def:'指承租人在租赁合同终止时，将房屋按约定状态交还给出租人的过程，包括清点物品、结清费用、检查房屋状况等',source:'《民法典》第五百五十七条、《城市房屋租赁管理办法》第二十一条',srcType:'部门规章',attrs:'1. 主体：承租人、出租人 2. 对象：房屋及附属设施 3. 行为：交房、验收、结算 4. 内容：水电燃气结清、物品归还、损坏赔偿 5. 法律效力：交接确认后视为合同履行完毕',scene:'适用于租赁合同终止时，确保双方权益不受损的交接流程',posSpeech:'',negSpeech:'',consumerQ:'退租时要做什么？怎么交接才不吃亏？',simpleAnswer:'退租交接就是搬走时把房子检查一遍、东西点清、水电燃气结清、该修的修好，双方确认签字才算完。',consumerBenefit:'交接清楚不留尾巴，押金不被扣'},
            {id:'RNT-013',domain:'rental',name:'中介服务费 | 房产中介佣金',alias:'房产中介佣金、中介费',def:'指房屋中介机构为促成租赁交易而收取的服务费用，通常由承租人或出租人承担',source:'《房地产经纪管理办法》第十八条、《民法典》第九百六十条',srcType:'部门规章',attrs:'1. 主体：中介机构、承租人/出租人 2. 对象：租赁交易 3. 收费方式：一次性支付、分期支付 4. 标准：按成交金额比例收取 5. 合规性：需明码标价、开具发票',scene:'适用于通过中介机构进行房屋租赁时的费用支付环节',posSpeech:'',negSpeech:'',consumerQ:'租房为什么要交中介费？交多少合理？',simpleAnswer:'中介服务费是帮你找房、带看、签合同的服务报酬，一般不超过一个月租金，必须明码标价开发票。',consumerBenefit:'花明白的钱，享清楚的服务'},
            {id:'RNT-014',domain:'rental',name:'租客权益 | 承租人权利',alias:'承租人权利',def:'指承租人在租赁过程中依法享有的权利，包括但不限于房屋使用权、隐私权、维修请求权、押金返还权等',source:'《民法典》第七百零三条、第七百一十二条、第七百一十三条',srcType:'部门规章',attrs:'1. 主体：承租人 2. 对象：租赁合同、房屋 3. 权利内容：使用、维护、安全、信息知情 4. 法律依据：《民法典》《消费者权益保护法》 5. 实现方式：合同约定、法律维权',scene:'适用于租客在租赁过程中维护自身合法权益的场景',posSpeech:'',negSpeech:'',consumerQ:'租客有哪些权利是房东不能碰的？',simpleAnswer:'租客权益包括：住了就不能随便赶你走、东西坏了有权要求修、押金到期该退、隐私不能侵犯。',consumerBenefit:'知道自己的权利，不怕被欺负'},
            {id:'RNT-015',domain:'rental',name:'租金与支付',alias:'租金收取、房租缴纳',def:'按合同约定支付租金的行为，依据《民法典》第七百二十一条，租金支付期限由双方约定，无约定或约定不明的，租赁期限不满一年的应在届满时支付',source:'《民法典》第七百二十一条；《住房租赁条例》第十七条',srcType:'部门规章',attrs:'支付主体：承租人+支付对象：出租人或指定方+支付形式：约定的货币形式+支付周期：月付/季付/半年付/年付+逾期处理：催告后可解除合同',scene:'租户按时缴纳租金；房东催缴逾期租金；合同约定支付方式',posSpeech:'租金按时付，租期有保障',negSpeech:'拖欠租金会触发解约，最后还得补齐',consumerQ:'房租怎么交？拖几天会怎样？',simpleAnswer:'租金按合同约定的时间和方式交，拖太久房东可以解除合同让你搬走，最好设个自动转账别忘。',consumerBenefit:'按时交租住得稳，不给自己找麻烦'},
            {id:'RNT-016',domain:'rental',name:'房东义务 | 出租人责任',alias:'出租人责任、房东责任',def:'指出租人在租赁关系中依法应履行的义务，包括保证房屋权属清晰、提供符合居住条件的房屋、承担房屋修缮责任、配合办理相关手续等，依据《民法典》第七百一十条、第七百一十一条、第七百一十三条',source:'《民法典》第七百一十条、第七百一十一条、第七百一十三条',srcType:'部门规章',attrs:'1. 责任主体：房东 2. 责任内容：房屋状态、维修、配合 3. 责任范围：法定 4. 责任后果：违约赔偿',scene:'房屋交付、维修申请、投诉处理等场景',posSpeech:'',negSpeech:'',consumerQ:'房东该做什么？房子坏了该谁修？',simpleAnswer:'房东必须保证房子能住人，水管电路这些大件坏了房东修，灯泡水龙头这些日常消耗你自己换。',consumerBenefit:'该房东管的不能推给你，住着不用自己掏大钱'},
            {id:'RNT-017',domain:'rental',name:'转租 | 再租赁',alias:'再租赁、二次出租',def:'指承租人将承租的房屋部分或全部再次出租给第三方的行为，依据《民法典》第七百一十六条，转租须经出租人书面同意，否则视为违约',source:'《民法典》第七百一十六条',srcType:'部门规章',attrs:'1. 行为主体：承租人 2. 行为对象：第三方 3. 行为前提：出租人同意 4. 行为后果：违约责任',scene:'房屋使用、合同变更、违规处理等场景',posSpeech:'',negSpeech:'',consumerQ:'租房期间能不能把房子再转租给别人？',simpleAnswer:'转租必须房东书面同意，不然就是违约，房东可以让你走人还不退押金。',consumerBenefit:'想转租先打招呼，不走冤枉路'},
            {id:'RNT-018',domain:'rental',name:'群租房',alias:'合租房；多人合租',def:'将一套住房分割成多个房间或区域，由多名租客分别居住，通常未符合国家或地方对居住空间和安全标准的要求。',source:'《城市房屋租赁管理办法》《关于加强群租房安全管理的通知》',srcType:'部门规章',attrs:'空间分割方式：违规隔断或改造+居住人数：超出正常居住密度+安全隐患：消防、用电、结构风险',scene:'租客寻找低价房源需辨别是否群租；政府整治违规群租行动中',posSpeech:'建议选择正规、合规的合租房源，保障居住安全。',negSpeech:'别选未经审批的群租房，法律风险和安全隐患都很大。',consumerQ:'群租房那么便宜，能住吗？',simpleAnswer:'群租房是把一套房隔成很多小间塞很多人，消防逃生都成问题，便宜但危险，出了事没保障。',consumerBenefit:'安全比便宜重要，别拿命省钱'},
            {id:'RNT-019',domain:'rental',name:'廉租房·公租房',alias:'保障性住房；政府补贴住房',def:'由政府提供、面向低收入群体或特定人群的租赁住房，租金低于市场价，具有申请门槛和使用限制。',source:'《公共租赁住房管理办法》《保障性住房建设管理规定》',srcType:'部门规章',attrs:'申请条件：收入/户籍/社保等门槛+租金标准：市场价的30%-70%+产权归属：政府或指定机构',scene:'低收入家庭申请住房保障；新就业大学生、外来务工人员租房',posSpeech:'符合条件可申请公租房，享受政府住房保障。',negSpeech:'不符合条件别硬占，被清退还得赔钱。',consumerQ:'收入不高能申请政府补贴的房子吗？',simpleAnswer:'廉租房和公租房是政府给低收入群体的保障房，租金远低于市场价，但得符合条件才能申请。',consumerBenefit:'符合条件就能住上便宜又安心的房'},
            {id:'RNT-020',domain:'rental',name:'房屋维修责任',alias:'修缮义务；维护责任',def:'在租赁关系中，根据合同约定或法律规定，由房东或租客承担房屋设施设备的维修和维护责任。',source:'《中华人民共和国民法典》第七百一十二条、七百一十三条',srcType:'部门规章',attrs:'责任主体：房东承担主体结构/管道电路，租客承担日常使用损耗+费用承担：合同约定为准+时效要求：影响居住的需及时维修',scene:'水电故障、家具损坏、墙面渗漏等维修情况',posSpeech:'签合同前把维修责任写清楚，避免扯皮。',negSpeech:'房东不修？租客可依法维权，别忍着。',consumerQ:'租的房子东西坏了谁出钱修？',simpleAnswer:'水管电路墙面这些主体结构房东修，灯泡水龙头你自己弄，合同里最好提前写清楚谁管什么。',consumerBenefit:'谁修谁出钱说清楚，不用跟房东扯皮'},
            {id:'RNT-021',domain:'rental',name:'租客违约',alias:'租户违约；承租人违约',def:'租客未按合同约定履行义务，如拖欠租金、提前退租、擅自转租等行为。',source:'《中华人民共和国民法典》第七百二十一条、七百二十五条',srcType:'部门规章',attrs:'违约类型：欠租/提前退租/擅自转租/违规使用+违约后果：违约金/赔偿/合同解除',scene:'租客拖欠租金催缴；租客擅自转租发现后处理',posSpeech:'按时履约，别影响信用记录和以后租房。',negSpeech:'租客违约要付违约金，严重的话还会被起诉。',consumerQ:'租客什么行为算违约？会怎样？',simpleAnswer:'拖欠房租、提前跑路、偷偷转租都算违约，要赔违约金，严重的房东可以赶人。',consumerBenefit:'知道底线在哪，不踩雷不亏钱'},
            {id:'RNT-022',domain:'rental',name:'房东违约',alias:'业主违约；出租人违约',def:'房东未按合同约定履行义务，如擅自涨租、提前收回房屋、不履行维修责任等行为。',source:'《中华人民共和国民法典》第七百一十六条、七百一十八条',srcType:'部门规章',attrs:'违约类型：单方涨租/提前收房/不修不赔+违约后果：退还租金/赔偿损失/继续履行',scene:'房东单方面终止合同；房东恶意涨价逼走租客',posSpeech:'房东应诚信履约，维护租赁秩序。',negSpeech:'房东违约要赔钱，买卖不破租赁，卖房也得租客同意才能走。',consumerQ:'房东随便涨房租、提前赶我走怎么办？',simpleAnswer:'房东单方面涨价、提前收房都是违约，你可以拒绝、要求赔偿，买卖不破租赁，卖房也不能赶租客。',consumerBenefit:'合同没到期谁也赶不走你，有法律撑腰'},
            {id:'RNT-023',domain:'rental',name:'租赁中介·经纪机构',alias:'中介公司；房产中介',def:'依法设立、从事房屋租赁信息发布、居间撮合、合同签订等服务的专业机构。',source:'《房地产经纪管理办法》《住房租赁管理条例》',srcType:'部门规章',attrs:'资质要求：需持房地产经纪备案证书+服务内容：信息发布/带看/签约/过户+收费标准：月租金的50%-100%',scene:'委托中介出租房源；通过中介租房签约',posSpeech:'选正规中介，交易安全有保障。',negSpeech:'警惕黑中介，虚假信息和乱收费的坑不少。',consumerQ:'怎么判断一个租房中介靠不靠谱？',simpleAnswer:'正规中介有备案证书、明码标价、开正式发票，黑中介啥都没有还可能骗钱，签约前先查资质。',consumerBenefit:'找对人办事，不被黑中介坑'},
            {id:'RNT-024',domain:'rental',name:'整租·合租',alias:'整套出租；分租',def:'整租指整套房屋由一个租客独立使用；合租指多租客共同使用一套房屋的不同房间。',source:'《城市房屋租赁管理办法》《住房租赁市场规范指引》',srcType:'部门规章',attrs:'使用人数：整租1方/合租2方以上+隐私程度：整租高/合租低+价格差异：合租人均成本低30%-50%',scene:'单身人士选择整租或合租；合租需明确公共区域使用规则',posSpeech:'根据预算和需求选整租或合租，住得舒服最重要。',negSpeech:'别图便宜选非法群租房，安全隐患太大。',consumerQ:'整租和合租怎么选？',simpleAnswer:'整租一个人住整套自在但贵，合租分摊便宜但要跟人共用厨房卫生间，看你的预算和习惯。',consumerBenefit:'选适合自己钱包和生活方式的，不委屈自己'},
            {id:'RNT-025',domain:'rental',name:'租金评估·定价',alias:'租金估值；租金定价',def:'根据市场供需、地段、房屋状况等因素，对房屋租金进行合理评估和定价的过程。',source:'《住房租赁市场发展指导意见》《房地产估价规范》',srcType:'部门规章',attrs:'评估方法：比较法/收益法/成本法+影响因素：地段/楼层/装修/配套/供需+定价策略：市场价/略低快速出租/略高等优质租客',scene:'房东定价参考；租客议价依据',posSpeech:'合理定价，快速出租，空置才是最大损失。',negSpeech:'定价太高没人看，太低自己亏，参考同小区成交价最靠谱。',consumerQ:'这房租多少钱合适？怎么知道有没有被坑？',simpleAnswer:'租金评估就是看看同小区、同类型房子别人租多少，给你一个参考价，太高没人租太低自己亏。',consumerBenefit:'有个市场价当参照，不被坑也不瞎要价'},
            {id:'RNT-026',domain:'rental',name:'租赁纠纷',alias:'租房争议；租赁矛盾',def:'在房屋租赁过程中，因合同履行、租金支付、房屋使用等问题引发的争议或冲突。',source:'《中华人民共和国民法典》《人民调解法》《仲裁法》',srcType:'部门规章',attrs:'纠纷类型：租金/维修/违约/押金/转租+调解方式：协商/调解/仲裁/诉讼+法律途径：民事诉讼/仲裁',scene:'租金拖欠协商；房屋损坏赔偿争议',posSpeech:'协商优先，谈不拢走法律途径，别拖。',negSpeech:'纠纷不及时处理，损失只会越来越大。',consumerQ:'跟房东闹矛盾了怎么解决？',simpleAnswer:'租房纠纷先自己谈，谈不拢找社区调解，还不行就上法院，别拖着越拖越难。',consumerBenefit:'有理有据有渠道，不用忍气吞声'}
// 域3·整装家居整体交付（15条）——消费者友好版
,{id:'DEC-001',domain:'decor',name:'整装整体交付（一站式装修服务）',alias:'全案整装、一站式交付、拎包入住、全包装修',def:'就是你找一家公司，从设计、选材、施工到验收售后全部包办，不用你到处跑。核心是"效果图什么样，装完就是什么样"，预算说多少就多少，中途不加钱。',source:'《住宅全案整装服务标准》（中国房地产业协会，2026年1月实施）',srcType:'行业标准',attrs:'设计→报价→签约→施工→验收→售后全流程+效果一致性+预算即决算',scene:'上班族没时间盯装修/怕装修被坑想一站式解决/对装修不懂想省心',posSpeech:'您上班忙，我们全包，效果图就是实景图，预算即决算',negSpeech:'设计一套交付一套，那叫拼凑不叫整装',consumerQ:'装修能不能一次搞定不用我操心？',simpleAnswer:'整装整体交付就是从设计到施工到家具全包，你拎包入住，不用自己一样样找人干。',consumerBenefit:'一个电话全搞定，不用当包工头'}
,{id:'DEC-002',domain:'decor',name:'交付标准与验收依据（装修合格的标准清单）',alias:'验收标准、交付规范、装修合格线、验收清单',def:'装修完怎么算合格？国家有标准清单，包括墙面平不平、水电通不通、环保达不达标等。这是你的维权依据，必须写进合同。',source:'《建筑装饰装修工程质量验收标准》GB 50210-2018',srcType:'国家标准',attrs:'合同附件清单+合格/不合格判定标准+签字确认',scene:'装修完不知道该怎么验收/装修公司说合格但你觉得有问题/需要维权依据',posSpeech:'验收标准写进合同附件，逐项对照，不达标不签字',negSpeech:'最怕合同里不写验收标准，装成什么样全凭装修公司一张嘴',consumerQ:'装修完了怎么知道合不合格？',simpleAnswer:'交付标准是一张验收清单，逐项对照检查，瓷砖空鼓、墙面不平、柜门歪斜都能查出来。',consumerBenefit:'有标准可对照，不达标就返工不糊弄'}
,{id:'DEC-003',domain:'decor',name:'交付策划流程（开工前的准备清单）',alias:'整装策划、开工前准备、装修准备会',def:'签约后开工前，设计师、项目经理、施工队长要一起确认设计方案、材料清单、施工计划。这就像装修前的"作战会议"，准备越细，后面问题越少。',source:'《住宅全案整装服务标准》第4章',srcType:'行业标准',attrs:'设计确认+材料锁定+施工计划+各方签字',scene:'马上要开工了不知道要准备什么/担心开工后各种问题/想提前规避风险',posSpeech:'开工前我们三方一起确认，设计、材料、工期都定好再动工',negSpeech:'不策划直接开工，变更多、工期拖、预算超',consumerQ:'装修开工前要做哪些准备？',simpleAnswer:'交付策划就是开工前把要干啥、花多少钱、什么顺序都列清楚，按单子走不遗漏。',consumerBenefit:'提前心里有谱，开工不手忙脚乱'}
,{id:'DEC-004',domain:'decor',name:'工程款构成与计价方式（装修钱花在哪儿）',alias:'整装报价、装修费用、装修预算明细',def:'装修总价由哪些部分组成？设计费、材料费（主材+辅材）、人工费、管理费、税金。正规公司会列明细清单，每项多少钱一清二楚。',source:'《住宅全案整装服务标准》第5章',srcType:'行业标准',attrs:'设计费+主材费+辅材费+人工费+管理费+税金=总价',scene:'拿到报价单看不懂/担心被乱收费/想对比不同公司报价',posSpeech:'每一项费用都列清楚，设计费多少、材料费多少、人工费多少，一目了然',negSpeech:'报价只有一个总数，材料什么牌子、人工多少钱都不写，那叫黑箱',consumerQ:'装修报价和最后花的钱能一样吗？',simpleAnswer:'透明报价就是预算即决算，说花多少就花多少，不中途加钱不加项。',consumerBenefit:'说多少钱就多少钱，不被加项加钱坑'}
,{id:'DEC-005',domain:'decor',name:'预算控制与变更管理（管住装修不超标）',alias:'增项管理、预算超支、恶意增项',def:'装修最怕什么？开工后不断加钱！好的装修公司会签"预算即决算"，任何变更必须你签字同意，恶意增项还要双倍赔偿。',source:'《住宅全案整装服务标准》第5章；贝壳被窝"恶意增项双倍返还"',srcType:'行业标准',attrs:'预算锁定+变更签字+恶意增项双倍赔偿',scene:'装修中途被要求加钱/预算从10万变成15万/担心被恶意增项',posSpeech:'我们签预算即决算，任何增项必须您签字，恶意增项双倍赔',negSpeech:'开工后不停加钱，水电要加、瓷砖要升级，预算从10万变成15万',consumerQ:'效果图看着好看，装出来能一样吗？',simpleAnswer:'设计一致性就是效果图长什么样装出来就长什么样，不是看着美装完丑。',consumerBenefit:'所见即所得，不被效果图骗'}
,{id:'DEC-006',domain:'decor',name:'支付方式与节点（按进度付款，干一步付一步）',alias:'分期付款、工程款节点、先干活后付钱',def:'别一次性付全款！正规装修是按进度付款：签合同付一部分，水电做完付一部分，泥木做完付一部分，最后验收合格付尾款。钱在手里，话语权就在手里。',source:'《住宅全案整装服务标准》第6章',srcType:'行业标准',attrs:'签合同→水电完工→泥木完工→油漆完工→竣工验收→质保金',scene:'装修公司要求一次性付全款/担心付了钱不好好干活/想知道什么时候该付多少钱',posSpeech:'按进度付款，水电做完您验收合格再付下一笔，钱跟进度走',negSpeech:'一次性付全款，后面出了问题你说了不算',consumerQ:'装修用的材料安全吗？品牌靠谱吗？',simpleAnswer:'主材选品就是用的板材、涂料、瓷砖都是说好的品牌和环保等级，不偷换不缩水。',consumerBenefit:'住进去不担心甲醛，用的材料认得牌子'}
,{id:'DEC-007',domain:'decor',name:'环保标准与检测（装完能不能安全入住）',alias:'甲醛检测、室内空气质量、装修污染',def:'装修完能不能马上住？要看甲醛、苯等有害物质是否超标。国家标准规定甲醛≤0.08mg/m³，完工7天后检测达标才能入住，尤其是有孕妇、宝宝的家庭。',source:'《室内空气质量标准》GB/T 18883-2022',srcType:'国家标准',attrs:'甲醛≤0.08mg/m³+完工7天后检测+有孕妇宝宝更要测',scene:'装修完急着入住/家里有孕妇宝宝担心环保/想知道什么时候能安全入住',posSpeech:'完工7天后第三方检测，甲醛达标才交付，孕婴家庭放心住',negSpeech:'装完就催你入住，检测都不敢做，甲醛超标受害的是你自己',consumerQ:'装修施工有没有标准？会不会乱来？',simpleAnswer:'施工规范是干活的规矩：水电怎么走、墙怎么砌、防水刷几遍都有标准，不按标准干就是不合格。',consumerBenefit:'按标准施工，住着不漏不裂不操心'}
,{id:'DEC-008',domain:'decor',name:'材料验收与问题处理（材料到场先验货）',alias:'主材验收、辅材确认、材料对单',def:'瓷砖、地板、涂料等材料送到工地，你必须现场核对品牌、型号、数量对不对。对不上合同的坚决不能施工，拍照留证。',source:'《定制家具安装服务规范》GB/T 42588-2023',srcType:'国家标准',attrs:'品牌型号核对+数量清点+拍照留证+不对就换',scene:'材料送到不知道对不对/担心被偷换材料/发现材料品牌和合同不一样',posSpeech:'材料到场您亲自验收，品牌型号对得上合同再施工，不对就换',negSpeech:'材料到了就装，等发现品牌不对已经贴墙上了',consumerQ:'装修完出了问题还管不管？',simpleAnswer:'售后保障就是装完后在一定期限内出了问题免费修，不用自己再掏钱。',consumerBenefit:'装完有人兜底，住着不心慌'}
,{id:'DEC-009',domain:'decor',name:'施工交底规范（开工前各方碰头会）',alias:'技术交底、开工交底、装修动员会',def:'开工前，设计师、项目经理、施工队长要和你一起开会，确认设计方案、施工工艺、材料要求。这就像装修前的"对表"，确保大家理解一致。',source:'《建筑装饰装修工程质量验收标准》GB 50210-2018第3.1节',srcType:'国家标准',attrs:'设计意图+施工工艺+材料要求+验收标准+各方确认',scene:'担心设计师的想法工人理解不了/开工前想再确认一遍方案/各方沟通不到位',posSpeech:'开工前四方交底，设计、施工、材料要求都确认清楚再动工',negSpeech:'不交底就开工，设计师要的是A，工人做出来是B',consumerQ:'装修完多久能住？甲醛安全吗？',simpleAnswer:'环保标准是装修后室内空气必须达标才能交房，甲醛、苯这些有害物浓度低于国标，住进去不伤身。',consumerBenefit:'不用闻味儿猜安不安全，数据说话能放心住'}
,{id:'DEC-010',domain:'decor',name:'工期管理与延误责任（装修多久能完工，拖了怎么办）',alias:'工期延误、工期保障、装修拖延',def:'装修一般多久？90-120天是合理工期。工期必须写进合同，延误了怎么赔偿也要约定。口头承诺没用，白纸黑字才作数。',source:'《住宅全案整装服务标准》第8章',srcType:'行业标准',attrs:'合理工期90-120天+延误赔偿标准+不可抗力除外',scene:'装修公司承诺3个月完工结果拖了半年/租房过渡等不起/想知道延误怎么赔偿',posSpeech:'工期写进合同，延误按天赔偿，特殊情况提前沟通',negSpeech:'工期口头说说不写合同，拖半年你也没辙，租房过渡多花的钱自己扛',consumerQ:'装修会不会装着装着加钱？',simpleAnswer:'增项控制就是合同外不让加钱，每项变更必须你签字同意，不签字不加钱。',consumerBenefit:'不加钱不增项，预算不失控'}
,{id:'DEC-011',domain:'decor',name:'隐蔽工程验收（封起来就看不见的部分，必须先验）',alias:'水电验收、中间验收、隐蔽工程',def:'水电管线、防水层这些做完会被瓷砖、墙面盖住，看不见了。所以封之前必须验收：水管打不打压、电路通不通、防水漏不漏。这一步不做，后面出问题要砸墙。',source:'《建筑装饰装修工程质量验收标准》GB 50210-2018第3.1.4条',srcType:'国家标准',attrs:'水管打压测试+电路检测+防水闭水试验+拍照留证+签字确认',scene:'水电做完了要封墙了/不知道隐蔽工程要不要验收/担心水电出问题',posSpeech:'隐蔽工程封闭前必须验收，水管打压、电路检测、防水闭水，全部合格签字再封',negSpeech:'水电封了再验，出了问题砸墙才知道，代价太大了',consumerQ:'装修多久能完工？会不会拖着？',simpleAnswer:'工期管理就是定好哪天完工就哪天完工，延期有赔偿，不让你无限等。',consumerBenefit:'说好哪天住就哪天住，不被拖着'}
,{id:'DEC-012',domain:'decor',name:'竣工验收标准（最终验收，逐项过）',alias:'整装验收、最终验收、收房 checklist',def:'全部装修完了，要逐项验收：墙面平不平、开关灵不灵、水龙头漏不漏水、环保达不达标。拿着验收清单一条条过，不合格的不签字。',source:'《建筑装饰装修工程质量验收标准》GB 50210-2018',srcType:'国家标准',attrs:'墙面/地面/门窗检查+水电功能测试+环保检测+整改清单',scene:'装修完了不知道怎么验收/担心有质量问题没发现/装修公司催着签字',posSpeech:'验收清单逐项过，您满意了再签字，有问题我们整改到您满意',negSpeech:'不验收就签字，住进去发现墙面开裂、水龙头漏水，后悔莫及',consumerQ:'水电改造为什么那么重要？',simpleAnswer:'水电改造是装修的隐蔽工程，埋在墙里地下，出了问题要砸墙凿地重来，一次干好最重要。',consumerBenefit:'水电一次到位，住进去不出幺蛾子'}
,{id:'DEC-013',domain:'decor',name:'质保范围与期限（装修完出了问题谁负责）',alias:'整装质保、保修期、售后保障',def:'装修完出了问题谁管？水电和防水保5年，装修保2年，主体结构终身。但注意：质保从竣工验收合格那天算起，不是从开工算。',source:'《住宅全案整装服务标准》第9章',srcType:'行业标准',attrs:'水电5年+防水5年+装修2年+质保从验收合格日起算',scene:'装修完一年后墙面开裂/水管漏水不知道找谁/担心售后没人管',posSpeech:'质保白纸黑字写进合同，水电防水5年，装修2年，出了问题我们负责',negSpeech:'口头承诺质保10年，出事找不到人，电话不接微信不回',consumerQ:'全屋定制柜子靠谱吗？会不会跟想的不一样？',simpleAnswer:'全屋定制是按你家尺寸量身做柜子衣柜鞋柜，量尺出图你确认了再生产，装完严丝合缝。',consumerBenefit:'空间不浪费，东西有地儿放'}
,{id:'DEC-014',domain:'decor',name:'售后服务承诺（住进去以后的服务保障）',alias:'整装售后、维保服务、维修响应',def:'住进去以后出问题怎么办？正规公司承诺响应时效：比如2小时内响应，48小时上门，质保期内免费修。这些要写进合同。',source:'《住宅全案整装服务标准》第9章',srcType:'行业标准',attrs:'响应时效+上门维修+质保期内免费+服务记录',scene:'住进去后发现小问题/联系售后没人理/想知道维修怎么收费',posSpeech:'售后2小时响应，48小时上门，质保期内免费修，每次服务有记录',negSpeech:'交了钱就失联，售后电话永远打不通，小问题拖成大问题',consumerQ:'装修过程中谁来检查质量？',simpleAnswer:'质检节点就是在关键环节（水电完工、贴砖完工、刷漆完工）有人来验收，不合格立刻改，不等全部干完才发现。',consumerBenefit:'问题早发现早改，不等到最后返工'}
,{id:'DEC-015',domain:'decor',name:'投诉处理机制（遇到问题有地方说理）',alias:'整装投诉、维权渠道、投诉升级',def:'装修出了问题，装修公司不理怎么办？先内部投诉，不行找行业协会，再不行打12315或起诉。记住：保留证据（合同、照片、聊天记录）是关键。',source:'《消费者权益保护法》第39条',srcType:'部门规章',attrs:'内部投诉→行业协会→12315→法律途径+证据保留',scene:'装修质量差公司不管/想投诉不知道去哪/需要维权指导',posSpeech:'投诉有渠道，处理有时限，不满意可以升级，我们不怕您维权',negSpeech:'投诉无门，推诿扯皮，消费者只能自认倒霉',consumerQ:'装修不满意找谁说理？',simpleAnswer:'投诉处理机制就是你有地方反映问题、有人跟进解决、有明确时效，不用忍着没人管。',consumerBenefit:'有意见有人听，有问题有人管'}

,{id:'HOM-001',domain:'homekeep',name:'家政服务·帮你打理家的专业帮手',alias:'家政、阿姨、保洁、家务外包、请人做家务',def:'就是请人帮你做家务、带孩子、照顾老人，让你从繁琐的家务中解放出来。适合工作忙、有老人小孩、或者想提升生活品质的家庭。',source:'《家政服务业管理暂行办法》（商务部2012年）；国务院办公厅《关于促进家政服务业提质扩容的意见》',srcType:'部门规章',attrs:'保洁+做饭+带娃+照顾老人+收纳整理',scene:'双职工家庭没时间做家务/有新生儿需要专业护理/老人独居需要陪伴/换季大扫除忙不过来',posSpeech:'请个靠谱阿姨，回家就能躺平，生活质量直接翻倍',negSpeech:'为了省钱全靠自己扛，累病了去医院更花钱',consumerQ:'家政服务到底能帮我干什么？',simpleAnswer:'家政服务就是找专业的人帮你干家务：打扫、做饭、带娃、照顾老人，你忙不过来的事有人替你干。',consumerBenefit:'忙不过来有人搭手，家有人打理'}
,{id:'HOM-002',domain:'homekeep',name:'日常保洁·定期上门打扫',alias:'定期保洁、日常打扫、固定阿姨、包月保洁',def:'阿姨按约定时间（每周或每月）来家里做常规打扫，包括扫地拖地、擦桌子、清理厨房卫生间等。就像给家请了个"定期清洁工"，保持家里基本整洁。',source:'《家政服务规范》SB/T 10643-2011',srcType:'行业标准',attrs:'打扫频率+服务时长+覆盖区域+是否自带工具',scene:'上班族每周家里乱糟糟/有宠物需要经常清理毛发/希望家里长期保持整洁',posSpeech:'每周来一次，家里永远干干净净，朋友来串门不用提前收拾',negSpeech:'平时不打扫，等到过年才大扫除，累到腰酸背痛',consumerQ:'日常保洁跟自己打扫有什么区别？',simpleAnswer:'日常保洁是专人定期上门，用专业工具和清洁剂把你家从上到下收拾一遍，比自己擦得干净省力。',consumerBenefit:'别人帮你干活，你省下时间干正事'}
,{id:'HOM-003',domain:'homekeep',name:'深度保洁·全屋彻底大扫除',alias:'大扫除、精细保洁、全屋清洁、年底扫除',def:'比日常保洁更彻底，会把平时打扫不到的死角都清理干净，比如窗户玻璃、油烟机内部、床底、天花板等。适合家里很久没彻底打扫，或者搬家、换季的时候。',source:'《家政服务规范》SB/T 10643-2011',srcType:'行业标准',attrs:'死角清洁+玻璃擦拭+厨房深度去油+卫生间除垢+消毒杀菌',scene:'过年过节大扫除/租房退房要还原/刚装修完要彻底清洁/换季清理积攒的灰尘',posSpeech:'一年做一次深度保洁，平时日常保洁轻松很多',negSpeech:'只做表面功夫，柜子顶上、床底下的灰积了厚厚一层',consumerQ:'家里太久没彻底打扫了怎么办？',simpleAnswer:'深度保洁是全屋大扫除：油烟机拆洗、沙发底下的灰、窗户轨道的垢，犄角旮旯全给你弄干净。',consumerBenefit:'焕然一新，住着舒坦'}
,{id:'HOM-004',domain:'homekeep',name:'开荒保洁·新房装修后首次清洁',alias:'新房开荒、装修后保洁、入住前清洁、粗保洁',def:'新房装修完后的第一次全面清洁，要清除装修留下的水泥点、油漆渍、玻璃胶、灰尘等。这是入住前必须做的一步，否则家里全是装修残留。',source:'《家政服务规范》SB/T 10643-2011',srcType:'行业标准',attrs:'清除装修残留+擦玻璃+地面除胶+全面除尘+消毒',scene:'新房装修完准备入住/二手房翻新后要重新住/租房装修后要交房',posSpeech:'开荒做彻底，入住才安心，不然灰尘甲醛天天吸',negSpeech:'装修完不打扫直接住，满屋子灰尘和刺鼻气味',consumerQ:'新房装修完第一次打扫找谁？',simpleAnswer:'开荒保洁是新房装修后的首次清洁，处理建筑垃圾、擦玻璃、除胶渍，自己干又累又干不好。',consumerBenefit:'别人帮你干脏活累活，你直接拎包入住'}
,{id:'HOM-005',domain:'homekeep',name:'家政人员资质·阿姨的背景靠不靠谱',alias:'健康证、身份证、从业资格、背景调查、信用记录',def:'请家政阿姨前，要确认她身份真实、身体健康、有基本培训。正规渠道会查身份证、健康证，有的还有技能培训证书和信用记录。这是为了你家的人身和财产安全。',source:'国务院办公厅《关于促进家政服务业提质扩容的意见》；商务部家政服务信用信息平台',srcType:'部门规章',attrs:'身份证核验+健康证有效期+培训证书+信用记录+有无犯罪记录',scene:'第一次请阿姨不放心/通过中介找人要确认身份/家里有老人小孩更要注意安全',posSpeech:'查过身份、看过健康证，用起来心里踏实',negSpeech:'路边随便找的阿姨，身份证都没核实，出了事人都找不到',consumerQ:'家里东西太多太乱怎么办？',simpleAnswer:'收纳整理是专业人帮你规划东西怎么放、放哪里，让每样东西都有自己的位置，找得到放得下。',consumerBenefit:'家里不再乱糟糟，想要的东西伸手就拿到'}
,{id:'HOM-006',domain:'homekeep',name:'家政服务合同·把约定写清楚才放心',alias:'家政合同、服务协议、用工协议、雇佣合同',def:'请家政服务前签的书面协议，写清楚做什么、做多久、多少钱、双方的权利和责任。别嫌麻烦，这是出问题时的唯一依据。',source:'《民法典》第九百一十九条；《家政服务规范》SB/T 10643-2011',srcType:'行业标准',attrs:'服务内容明细+服务时间+费用标准+双方责任+违约处理+解约条件',scene:'长期请住家阿姨要签合同/通过平台下单确认服务条款/发生纠纷需要维权依据',posSpeech:'合同写清做什么、做多长时间、多少钱，白纸黑字最靠谱',negSpeech:'口头说好了就行，结果阿姨中途涨价，一点办法没有',consumerQ:'空调冰箱洗衣机里面脏不脏？要不要洗？',simpleAnswer:'家电清洗是拆开深度清洁里面看不见的脏东西，空调里的灰、冰箱里的味儿、洗衣机里的垢，洗完健康又省电。',consumerBenefit:'家电干净寿命长，吹出来的风不呛人'}
,{id:'HOM-007',domain:'homekeep',name:'钟点工·按小时计费的灵活保洁',alias:'小时工、计时保洁、临时阿姨、按小时算的保洁',def:'按小时收费的家政服务，你可以灵活预约，需要几小时就约几小时。适合临时有客人来、或者某个区域需要重点打扫的情况。',source:'《家政服务规范》SB/T 10643-2011',srcType:'行业标准',attrs:'每小时价格+最低时长+服务范围+预约方式',scene:'周末家里来客人临时打扫/厨房油烟机脏了单独清洁/不想长期请人，偶尔需要帮忙',posSpeech:'需要就叫，不用长期养人，灵活又省钱',negSpeech:'只按小时算不约定范围，做了两小时还没擦完玻璃，算谁的',consumerQ:'好衣服不想自己洗怕洗坏怎么办？',simpleAnswer:'洗护服务是专业洗衣服：高档面料、皮衣、羽绒服都能处理，不会缩水变形掉色。',consumerBenefit:'贵衣服放心洗，穿出去跟新的一样'}
,{id:'HOM-008',domain:'homekeep',name:'住家保姆·住在你家的全能帮手',alias:'住家阿姨、住家保姆、24小时阿姨、全职家政',def:'住在雇主家里，全天候负责做饭、打扫、照顾老人或孩子的阿姨。适合需要全天候有人照顾的家庭，比如双职工带小孩、或者老人需要陪伴。',source:'《家政服务规范》SB/T 10643-2011；国务院办公厅家政提质扩容意见',srcType:'行业标准',attrs:'住家安排+工作内容+休息时间+食宿条件+节假日安排',scene:'双职工家庭没人接送孩子/老人独居需要日夜陪伴/家里人口多家务量大',posSpeech:'住家阿姨全天候照顾，上班也安心，回家有热饭',negSpeech:'住家阿姨休息时间没写清楚，半夜有事找不到人',consumerQ:'床上真的有螨虫吗？怎么除？',simpleAnswer:'除螨服务是用专业设备把床垫被子里看不见的螨虫和排泄物吸出来，晒太阳解决不了的问题它能解决。',consumerBenefit:'睡得安心不痒痒，皮肤不过敏'}
,{id:'HOM-009',domain:'homekeep',name:'育婴服务·专业照顾宝宝和产妇',alias:'月嫂、育儿嫂、母婴护理、带娃阿姨、月子护理',def:'专门照顾0-3岁宝宝和产妇的服务，包括给宝宝喂奶、洗澡、做抚触，以及照顾产妇身体恢复。月嫂是月子期间的专业护理，育儿嫂是长期带娃的帮手。',source:'《家政服务规范》SB/T 10643-2011；《育婴员国家职业技能标准》',srcType:'行业标准',attrs:'照顾宝宝+产妇护理+喂养指导+早教互动+夜间陪护',scene:'刚生完宝宝需要月子护理/产假结束要回去上班/新手爸妈不会带娃需要指导',posSpeech:'专业月嫂在，新手妈妈不慌，宝宝照顾得明明白白',negSpeech:'随便找个阿姨带娃，连基本的拍嗝都不会',consumerQ:'保姆能帮我做什么？',simpleAnswer:'保姆是住家或白班帮你操持家务的人：做饭、打扫、买菜、照顾老人小孩，家里的日常她管。',consumerBenefit:'家里有人管，你安心上班不牵挂'}
,{id:'HOM-010',domain:'homekeep',name:'老人照护·让爸妈在家安心养老',alias:'居家养老、老人陪护、护工、养老护理、陪老人',def:'上门照顾居家老人的生活起居，包括做饭、陪聊、提醒吃药、协助洗澡等。让老人不用去养老院，在家也能得到专业照顾。',source:'《中华人民共和国老年人权益保障法》；国务院《关于推进养老服务发展的意见》',srcType:'部门规章',attrs:'生活照料+健康监测+用药提醒+陪伴聊天+应急处理',scene:'父母独居子女不放心/老人术后需要康复护理/失能老人需要专人陪护',posSpeech:'老人在家有人陪，儿女在外也放心，比养老院更自在',negSpeech:'老人照护不只是做饭打扫，万一摔倒没人知道就麻烦了',consumerQ:'生完宝宝需要人照顾，月嫂能帮什么？',simpleAnswer:'月嫂是产后专业护理：帮产妇恢复身体、帮新生儿喂奶洗澡、教你育儿，不只是做饭洗衣服。',consumerBenefit:'月子里有人懂行照顾，大人小孩都安心'}
,{id:'HOM-011',domain:'homekeep',name:'家政保险·给双方的一份保障',alias:'家政险、阿姨意外险、雇主责任险、用工保险',def:'给家政服务买的保险，万一阿姨工作中受伤，或者不小心损坏了家里东西，保险可以赔付。花小钱买安心，对阿姨和雇主都是保护。',source:'银保监会《关于促进家政服务保险发展的指导意见》',srcType:'部门规章',attrs:'阿姨人身意外+雇主责任+物品损坏赔付+保费谁出',scene:'长期雇佣阿姨建议购买/通过正规平台下单通常包含保险/阿姨工作中发生意外',posSpeech:'买了保险再用家政，阿姨受伤不用你掏钱赔',negSpeech:'没买保险，阿姨擦窗户摔了，医药费全得你出',consumerQ:'上班没人带娃，育儿嫂能放心吗？',simpleAnswer:'育儿嫂是专门带孩子的人：喂饭、哄睡、陪玩、教东西，比普通保姆更懂孩子。',consumerBenefit:'有人帮你带娃，孩子有人看你有班上'}
,{id:'HOM-012',domain:'homekeep',name:'家政平台·网上找阿姨更靠谱',alias:'家政App、网上找阿姨、家政公司、线上预约',def:'像打车软件一样，用手机App就能预约家政服务。平台上有阿姨的评价、价格、服务项目，不满意可以投诉，比路边找更有保障。',source:'《电子商务法》；商务部家政服务信用信息平台',srcType:'部门规章',attrs:'在线预约+价格透明+用户评价+售后保障+投诉渠道',scene:'第一次找家政不知道去哪/想对比多家服务和价格/需要快速预约临时保洁',posSpeech:'平台下单，有评价有保障，出了问题找平台',negSpeech:'路边随便找的阿姨，干完活出问题，人都联系不上',consumerQ:'家里有人不能自理怎么办？',simpleAnswer:'护工是照顾不能自理家人的专业人员：喂饭、翻身、擦洗、陪看病，比家里人更专业更省力。',consumerBenefit:'家人有人照料，你不用24小时守着'}
,{id:'HOM-013',domain:'homekeep',name:'家政服务标准化·服务有标准才不乱',alias:'服务规范、标准化流程、统一服务标准、正规家政',def:'好的家政服务应该有统一的标准，比如打扫流程、服务时长、验收标准都规定好。这样每次服务体验都差不多，不会这次好下次差。',source:'《家政服务规范》SB/T 10643-2011；国务院办公厅家政提质扩容意见',srcType:'行业标准',attrs:'服务流程统一+质量检查+收费标准透明+人员培训到位',scene:'换了新阿姨服务质量下降/想确认服务是否达标/对比不同家政公司的服务差异',posSpeech:'标准化服务，每次来都知道要做什么，质量稳定有保障',negSpeech:'没有标准，每次来的阿姨打扫方式都不一样，时好时坏',consumerQ:'请的家政人员干活时受伤了谁赔？',simpleAnswer:'家政保险就是给家政人员上了保险，干活时出了意外保险公司赔，不用你自掏腰包。',consumerBenefit:'出了事不用自己扛，保险兜底不破财'}
,{id:'HOM-014',domain:'homekeep',name:'家政培训与认证·阿姨有没有真本事',alias:'持证上岗、培训证书、职业培训、技能认证、正规培训',def:'正规的家政阿姨应该接受过专业培训，有相应的技能证书。比如月嫂要有育婴证，护工要有护理证。培训过的阿姨服务更专业、更安全。',source:'《育婴员国家职业技能标准》；《养老护理员国家职业技能标准》',srcType:'行业标准',attrs:'培训内容+技能证书+等级划分+持续学习',scene:'请月嫂要看有没有育婴证/请护工要看护理资质/想确认阿姨的专业水平',posSpeech:'持证上岗的阿姨，带娃、护理都更专业，让人放心',negSpeech:'没培训没证书的阿姨，服务质量全凭运气',consumerQ:'请的阿姨靠不靠谱？有没有查过底细？',simpleAnswer:'背景调查是查阿姨的身份、健康、信用、过往工作记录，有问题的提前筛掉不让你碰上。',consumerBenefit:'来的都是查过的，敢放心让进门'}
,{id:'HOM-015',domain:'homekeep',name:'家政投诉与维权·遇到问题别忍气吞声',alias:'家政维权、服务投诉、纠纷处理、投诉渠道、维权方式',def:'家政服务不满意或者出了问题，比如阿姨偷懒、损坏东西、甚至偷东西，要懂得维权。可以找平台投诉、打12315、或者报警。记得先保留证据。',source:'《消费者权益保护法》第39条；《家政服务规范》SB/T 10643-2011',srcType:'部门规章',attrs:'平台投诉+12315+报警+证据保留+赔偿协商',scene:'阿姨服务质量差要投诉/家里东西被损坏要索赔/遇到纠纷不知道怎么办',posSpeech:'先拍照留证据，再投诉维权，12315和平台都是靠山',negSpeech:'吃了哑巴亏不吭声，下一个人还是受害者',consumerQ:'家政服务不满意怎么投诉维权？',simpleAnswer:'家政投诉维权就是有渠道反映问题、有流程跟进处理、有结果给你答复，不是投诉无门只能忍。',consumerBenefit:'花钱不憋屈，有理有地方说'}

// TAL-001 房产经纪人
,{id:'TAL-001A',domain:'talent',name:'房产经纪人·初级',alias:'实习经纪人、置业顾问助理',def:'在指导下完成房源录入、客户带看、合同签署等基础经纪业务，需掌握基本法规和交易流程。',source:'国家职业分类大典（2024年版）；人社部《房地产经纪专业人员职业资格制度暂行规定》',srcType:'国家标准',attrs:'等级：五级（初级工）+要求：高中以上学历，通过初级考试+能力：熟悉交易流程、能独立完成带看和签约+监管：需在执业经纪人指导下工作',scene:'新人入职、基础房源维护、客户带看执行',posSpeech:'新人有师傅带，成长有路径',negSpeech:'没证就上岗，客户权益没保障',consumerQ:'刚入行的房产经纪人能信吗？',simpleAnswer:'初级经纪人刚拿证上路，懂基本流程但经验不多，适合有老手带的情况，别全指望他一个人搞定。',consumerBenefit:'知道他几斤几两，该追问就追问'}
,{id:'TAL-001B',domain:'talent',name:'房产经纪人·中级',alias:'执业经纪人、资深置业顾问',def:'独立负责房源开发、客户维护、交易谈判等全流程，具备市场分析和客户服务综合能力。',source:'国家职业分类大典（2024年版）；人社部《房地产经纪专业人员职业资格制度暂行规定》',srcType:'国家标准',attrs:'等级：四级（中级工）+要求：取得房地产经纪人协理资格或2年以上从业经验+能力：独立开发房源、谈判议价、处理复杂交易+监管：可独立执业，需年度继续教育',scene:'二手房买卖全流程、新房代理、租赁业务',posSpeech:'持证上岗、信息真实，帮你选房更高效',negSpeech:'光靠嘴说没用，专业知识不过硬客户不信你',consumerQ:'怎么判断一个经纪人是熟手还是新手？',simpleAnswer:'中级经纪人干了几年、成交过不少单，能独立帮你走完全流程，该注意的坑他都见过。',consumerBenefit:'找个干过的人带你，少走弯路'}
,{id:'TAL-001C',domain:'talent',name:'房产经纪人·高级',alias:'金牌经纪人、店长、区域合伙人',def:'具备团队管理、市场研判、复杂交易风控等高级能力，可带领团队并参与企业战略决策。',source:'国家职业分类大典（2024年版）；人社部《房地产经纪专业人员职业资格制度暂行规定》',srcType:'国家标准',attrs:'等级：三级（高级工）+要求：取得房地产经纪人职业资格或5年以上从业经验+能力：团队管理、市场研判、复杂交易风控、培训带教+监管：可担任门店负责人，参与企业战略',scene:'团队管理、大客户维护、复杂交易处理、新人培训',posSpeech:'金牌经纪人带团队，服务更有保障',negSpeech:'没管理能力的资深经纪人，天花板太低',consumerQ:'买卖房子这么大的事，经纪人得多厉害才行？',simpleAnswer:'高级经纪人经验丰富、专业过硬，疑难杂症能处理，谈判砍价有一套，大事找他最稳。',consumerBenefit:'大事有人扛，关键时刻不掉链子'}
// TAL-002 居住服务顾问
,{id:'TAL-002A',domain:'talent',name:'居住服务顾问·初级',alias:'客户服务专员、生活管家助理',def:'在指导下完成客户需求收集、服务对接和基础咨询，熟悉居住服务各环节流程。',source:'《城市更新十五五规划》（国发〔2026〕12号）；住建部"物业服务进家庭"工作指引',srcType:'国家标准',attrs:'等级：五级（初级工）+要求：大专以上学历，通过企业服务培训认证+能力：需求收集、服务对接、基础咨询+监管：需在高级顾问指导下工作',scene:'客户需求收集、服务对接执行、基础咨询',posSpeech:'新人有师傅带，成长有路径',negSpeech:'没培训就上岗，客户需求理解不透',consumerQ:'帮我租房的人靠谱吗？他懂不懂租房？',simpleAnswer:'初级租赁经纪人能帮你找房带看，但租约细节和纠纷处理可能不太熟，记得自己多上心。',consumerBenefit:'知道他的能力边界，该自己把关的自己来'}

function init(){
  const params=new URLSearchParams(location.search);
  if(params.get('tab')&&DOMAINS.some(d=>d.id===params.get('tab')))currentDomain=params.get('tab');
  const tabs=document.getElementById('domain-tabs');
  tabs.innerHTML=DOMAINS.map(d=>`<div class="domain-tab ${d.id===currentDomain?'active':''}" data-domain="${d.id}" onclick="switchDomain('${d.id}')">${d.icon} ${d.name}（${d.count}）</div>`).join('');
  // 填充FAQPage JSON-LD schema（帮助AI理解词条问答）
  const faqScript=document.getElementById('faq-schema');
  if(faqScript&&ENTRIES.length>0){
    const entities=[];
    ENTRIES.forEach(e=>{
      if(e.consumerQ&&e.simpleAnswer&&e.simpleAnswer.length>5){
        entities.push({
          "@type":"Question",
          "name":e.consumerQ,
          "acceptedAnswer":{
            "@type":"Answer",
            "text":e.simpleAnswer
          }
        });
      }
    });
    if(entities.length>0){
      try{
        const faqData=JSON.parse(faqScript.textContent);
        faqData.mainEntity=entities.slice(0,100);// 最多100条，避免schema过长
        faqScript.textContent=JSON.stringify(faqData,null,0);
      }catch(e){}
    }
  }
  renderPolicyCard();
  renderSceneTabs();
  renderQaExamples();
  updateSceneCount();
  renderEntries();
  renderProductRecommend();

  // 搜索框事件监听
  const searchInput=document.getElementById('search-input');
  if(searchInput){
    let debounceTimer;
    searchInput.addEventListener('input',function(){
      clearTimeout(debounceTimer);
      debounceTimer=setTimeout(()=>{
        const results=searchEntries(this.value);
        renderSearchResults(results,this.value);
        if(this.value.trim().length>=2){
          track.use('search',{query:this.value.trim(),resultCount:results.length,domain:currentDomain});
        }
      },200);
    });
    searchInput.addEventListener('focus',function(){
      if(this.value.trim().length>=2){
        const results=searchEntries(this.value);
        renderSearchResults(results,this.value);
      }
    });
    document.addEventListener('click',function(e){
      if(!e.target.closest('.search-wrap')){
        const resultsEl=document.getElementById('search-results');
        if(resultsEl) resultsEl.classList.remove('active');
      }
    });
  }
}

function renderSceneTabs(){
  const container=document.getElementById('scene-tabs');
  if(!container) return;
  container.innerHTML=SCENES.map(s=>`<div class="scene-tab ${s.id===currentScene?'active':''}" data-scene="${s.id}">${s.name}</div>`).join('');
  container.querySelectorAll('.scene-tab').forEach(t=>t.addEventListener('click',function(){
    currentScene=this.dataset.scene;
    container.querySelectorAll('.scene-tab').forEach(tab=>tab.classList.toggle('active',tab===this));
    track.use('scene_filter',{scene:currentScene,domain:currentDomain});
    renderEntries();
    updateSceneCount();
  }));
}

function togglePolicyEntries(){
  const el=document.getElementById('policy-entries');

    el.style.display='block';
    hint.textContent='▲ 收起政策词条';

    hint.textContent='▼ 点击展开'+POLICY_CARD.count+'条政策词条';

function switchDomain(id){
  if(typeof track==="object"&&track.use){
    track.use('domain_switch',{from:currentDomain,to:id});
  } else if(typeof track==="function"){
    track("tab_switch",{tab:id});
  }
  currentDomain=id;
  document.querySelectorAll('.domain-tab').forEach(t=>t.classList.toggle('active',t.dataset.domain===id));
  renderEntries();
  renderProductRecommend();
}

function searchEntries(query){
  if(!query||query.length<2) return [];
  query=query.toLowerCase();
  return ENTRIES.filter(e=>
    (e.name&&e.name.toLowerCase().includes(query))||
    (e.alias&&e.alias.toLowerCase().includes(query))||
    (e.def&&e.def.toLowerCase().includes(query))||
    (e.consumerQ&&e.consumerQ.toLowerCase().includes(query))||
    (e.simpleAnswer&&e.simpleAnswer.toLowerCase().includes(query))||
    (e.scene&&e.scene.toLowerCase().includes(query))||
    (e.posSpeech&&e.posSpeech.toLowerCase().includes(query))||
    (e.negSpeech&&e.negSpeech.toLowerCase().includes(query))
  ).slice(0,8);
}

function renderSearchResults(results,query){
  const container=document.getElementById('search-results');
  if(!container) return;
  if(results.length===0){
    container.innerHTML=`<div class="search-no-results">未找到"${query}"相关词条</div>`;
    container.classList.add('active');
    return;
  }
  container.innerHTML=results.map(e=>`
    <div class="search-result-item" data-id="${e.id}">
      <div class="result-name">${e.name}</div>
      <div class="result-q">${e.consumerQ||e.def||''}</div>
    </div>`).join('');
  container.querySelectorAll('.search-result-item').forEach(item=>{
    item.addEventListener('click',function(){
      const id=this.dataset.id;
      document.getElementById('search-input').value='';
      container.classList.remove('active');
      // 滚动到对应词条并高亮
      document.querySelectorAll('.entry-card').forEach(c=>c.classList.remove('highlight'));
      const target=document.querySelector(`[data-entry-id="${id}"]`);
      if(target){target.scrollIntoView({behavior:'smooth',block:'center'});target.classList.add('highlight');setTimeout(()=>target.classList.remove('highlight'),2000);}
    });
  });
  container.classList.add('active');
}

function updateSceneCount(){
  const filtered=getFilteredEntries();
  const count=document.getElementById('scene-count');
  if(count) count.textContent=`显示${filtered.length}条相关词条`;
}

function getFilteredEntries(){
  let entries=ENTRIES.filter(e=>e.domain===currentDomain);
  // 场景过滤
  if(currentScene!=='all'){
    const scene=SCENES.find(s=>s.id===currentScene);
    if(scene){
      entries=entries.filter(e=>
        scene.keywords.some(kw=>
          (e.name&&e.name.includes(kw))||
          (e.scene&&e.scene.includes(kw))||
          (e.def&&e.def.includes(kw))||
          (e.posSpeech&&e.posSpeech.includes(kw))||
          (e.negSpeech&&e.negSpeech.includes(kw))
        )
      );
    }
  }
  // 搜索过滤（如果搜索框有内容）
  const query=document.getElementById('search-input')?.value?.trim();
  if(query&&query.length>=2){
    entries=entries.filter(e=>
      (e.name&&e.name.toLowerCase().includes(query.toLowerCase()))||
      (e.alias&&e.alias.toLowerCase().includes(query.toLowerCase()))||
      (e.def&&e.def.toLowerCase().includes(query.toLowerCase()))||
      (e.consumerQ&&e.consumerQ.toLowerCase().includes(query.toLowerCase()))
    );
  }
  return entries;
}

function renderQaExamples(){
  const container=document.getElementById('qa-examples');
  if(!container) return;
  // 从所有词条的consumerQ字段提取真实消费者问题
  const questions=ENTRIES
    .filter(e=>e.consumerQ)
    .map(e=>({q:e.consumerQ,id:e.id}))
    .sort(()=>Math.random()-0.5)
    .slice(0,6);
  container.innerHTML=questions.map(item=>`<div class="qa-tag" data-id="${item.id}">${item.q}</div>`).join('');
  container.querySelectorAll('.qa-tag').forEach(tag=>{
    tag.addEventListener('click',function(){
      const id=this.dataset.id;
      const qText=this.textContent;
      if(typeof track==="object"&&track.use){
        track.use('qa_click',{entryId:id,question:qText,domain:currentDomain});
      }
      // 滚动到对应词条并高亮
      document.querySelectorAll('.entry-card').forEach(c=>c.classList.remove('highlight'));
      const target=document.querySelector(`[data-entry-id="${id}"]`);
      if(target){
        target.scrollIntoView({behavior:'smooth',block:'center'});
        target.classList.add('highlight');
        setTimeout(()=>target.classList.remove('highlight'),3000);
      }
    });
  });
}

    if(e.srcType.includes('部门规章'))sourceLinks+='<a class="source-link" href="https://www.mohurd.gov.cn" target="_blank">住建部官网</a> ';
    if(e.srcType.includes('平台'))sourceLinks+='<a class="source-link" href="https://www.ke.com" target="_blank">贝壳平台</a> ';
    // 溯源层
    const traceLayer=`
      <div class="layer-content" data-layer="trace">
        <div class="detail-row"><span class="detail-label">📄 法规原文：</span><span class="detail-val">${e.source}</span></div>
        <div class="detail-row"><span class="detail-label">🏷️ 来源类型：</span><span class="source-badge ${badgeCls}">${e.srcType}</span></div>

        </div>
      </div>`;

    const consumerBenefit=e.consumerBenefit?'<div class="entry-consumer-benefit">'+e.consumerBenefit+'</div>':'';

    const faqSection=faqRows?`<div class="entry-faq"><div class="faq-header">❓ 常见问答（${e.faq.length}条）</div>${faqRows}</div>`:'';
    // 扩展字段：对比表
    const compareSection=e.compareTable?'<div class="entry-compare"><div class="compare-header">⚖️ 对比参考</div><div class="compare-content">'+e.compareTable+'</div></div>':'';
    // 扩展字段：权威引用
    const authRef=e.authRef?'<div class="entry-auth-ref"><span class="detail-label">📚 权威引用：</span><span class="detail-val">'+e.authRef+'</span></div>':'';

    const layerTabs=`<div class="layer-tab active" onclick="switchLayer(this,'detail')">📋 详情</div><div class="layer-tab" onclick="switchLayer(this,'trace')">🔗 溯源</div>${hasAiFields?'<div class="layer-tab" onclick="switchLayer(this,\'aiview\')">🤖 AI解读</div>':''}`;

        <div class="layer-content" data-layer="aiview">
          ${e.consumerNarrative?'<div class="detail-row"><span class="detail-label">🏠 客户视角：</span><span class="detail-val">'+e.consumerNarrative+'</span></div>':''}

          ${e.posSpeech?'<div class="detail-row speech"><span class="detail-label">✅ 正向话术：</span><span class="detail-val">'+e.posSpeech+'</span></div>':''}
          ${e.negSpeech?'<div class="detail-row speech"><span class="detail-label">⚠️ 反向话术：</span><span class="detail-val">'+e.negSpeech+'</span></div>':''}
        </div>
        ${traceLayer}
        ${hasAiFields?aiLayerContent:''}
      </div>
      <div class="expand-hint">▼ 查看详情/出处</div>
    </div>`;
  }).join('');
}

function switchLayer(tab,layer){
  const container=tab.closest('.entry-detail');
  container.querySelectorAll('.layer-tab').forEach(t=>t.classList.remove('active'));
  container.querySelectorAll('.layer-content').forEach(c=>c.classList.remove('active'));
  tab.classList.add('active');
  container.querySelector('[data-layer="'+layer+'"]').classList.add('active');
}

function toggleDetail(card){
  const nameEl=card.querySelector(".entry-name");
  const entryId=card.dataset.entryId||'';
  if(typeof track==="object"&&track.use){
    track.use('entry_expand',{entryId,entryName:nameEl?nameEl.textContent:'',domain:currentDomain});
  } else if(typeof track==="function"){
    track("lookup",{entry_name:nameEl?nameEl.textContent:"",tab:currentDomain});
  }
  const detail=card.querySelector('.entry-detail');
  detail.classList.toggle('open');
}

init();
if(typeof track==="function") track("page_view",{referrer:document.referrer});
