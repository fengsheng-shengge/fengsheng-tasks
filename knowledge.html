<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F1E8;color:#2A2825;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:#2D5A3D;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:960px;margin:0 auto;padding:0 20px}
.skip-nav{position:absolute;left:-9999px;top:0;background:#2D5A3D;color:#fff;padding:12px 20px;z-index:100;text-decoration:none;border-radius:0 0 12px 0}
.skip-nav:focus{left:0}
.header{background:#fff;border-bottom:1px solid #EFE8DB;position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.brand{font-weight:700;font-size:20px;color:#2D5A3D;letter-spacing:1px}
.brand span{color:#D97757}
.header-nav{display:flex;gap:4px;align-items:center;font-size:14px}
.header-nav a{color:#2A2825;padding:6px 10px;border-radius:8px}
.header-nav a:hover{background:#F5F1E8;text-decoration:none;color:#2D5A3D}
.header-nav .sep{color:#B8B1A4}
.hero{padding:48px 0 28px;text-align:center}
.hero h1{font-size:clamp(30px,5vw,48px);line-height:1.25;margin:0 0 12px;color:#2A2825;font-weight:700}
.hero h1 em{font-style:normal;color:#D97757}
.hero p.lead{font-size:clamp(15px,2vw,18px);color:#5E5952;max-width:560px;margin:0 auto 24px}

/* Search */
.search-bar{position:relative;max-width:560px;margin:0 auto 0}
.search-bar input{width:100%;padding:14px 48px 14px 20px;border:2px solid #EFE8DB;border-radius:999px;font-family:inherit;font-size:16px;background:#fff;color:#2A2825;outline:none;transition:border-color .2s,box-shadow .2s}
.search-bar input:focus{border-color:#2D5A3D;box-shadow:0 0 0 4px rgba(45,90,61,.1)}
.search-bar input::placeholder{color:#B8B1A4}
.search-bar .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#B8B1A4;pointer-events:none}
.search-results{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:#fff;border-radius:16px;border:1px solid #EFE8DB;box-shadow:0 8px 30px rgba(42,40,37,.12);max-height:360px;overflow-y:auto;z-index:40}
.search-results.show{display:block}
.search-result-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F5F1E8;cursor:pointer;transition:background .15s}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:#F5F1E8}
.search-result-item .sr-name{font-weight:600;font-size:14px;color:#2A2825}
.search-result-item .sr-domain{font-size:12px;color:#B8B1A4;margin-left:8px;background:#F5F1E8;padding:2px 8px;border-radius:999px}
.search-result-item .sr-desc{font-size:13px;color:#5E5952;margin-top:2px}
.search-result-item .sr-star{color:#B8B1A4;cursor:pointer;font-size:18px;padding:4px;flex-shrink:0;margin-left:8px}
.search-result-item .sr-star.saved{color:#D97757}
.search-empty{text-align:center;padding:28px;color:#5E5952;font-size:14px}
.search-highlight{background:#FBEDE5;border-radius:2px}

/* Toolbar */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.toolbar .tab{background:#fff;border:2px solid #EFE8DB;padding:8px 18px;border-radius:999px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:#5E5952;transition:all .15s}
.toolbar .tab:hover{border-color:#B8B1A4;color:#2A2825}
.toolbar .tab.active{background:#2D5A3D;color:#fff;border-color:#2D5A3D}
.toolbar .tab .badge{background:#D97757;color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;margin-left:4px;font-weight:700}

/* Section */
.section{padding:32px 0}
.section h2{font-size:clamp(20px,3vw,26px);margin:0 0 6px;color:#2A2825}
.section .sub{color:#5E5952;margin-bottom:20px;font-size:14px}

/* Daily term */
.daily-term{background:linear-gradient(135deg,#2D5A3D,#3A6B4D);color:#fff;border-radius:16px;padding:28px 28px;margin-bottom:28px;position:relative;overflow:hidden}
.daily-term::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.05);border-radius:50%}
.daily-term .daily-label{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:#A8C9B5;margin-bottom:6px}
.daily-term .daily-name{font-size:24px;font-weight:700;margin-bottom:6px}
.daily-term .daily-domain{font-size:14px;color:#A8C9B5;margin-bottom:10px}
.daily-term .daily-desc{font-size:15px;color:#E8EDE3;line-height:1.7;margin-bottom:14px}
.daily-term .daily-actions{display:flex;gap:10px}
.daily-term .daily-save{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);padding:8px 18px;border-radius:999px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;transition:background .2s}
.daily-term .daily-save:hover{background:rgba(255,255,255,.25)}
.daily-term .daily-save.saved{background:#D97757;border-color:#D97757}

/* Domain cards */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:16px;padding:22px 20px;border:1px solid #EFE8DB;box-shadow:0 2px 6px rgba(42,40,37,.04);transition:transform .2s ease,box-shadow .2s ease;cursor:pointer}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(42,40,37,.08);border-color:#D97757}
.card.selected{border-color:#2D5A3D;box-shadow:0 6px 18px rgba(45,90,61,.18)}
.card-title{font-weight:700;font-size:17px;color:#2A2825;margin:0 0 6px}
.card-count{color:#D97757;font-size:12px;display:inline-block;background:#FBEDE5;padding:3px 8px;border-radius:999px;margin-bottom:8px;font-weight:600}
.card p{margin:4px 0 0;color:#5E5952;font-size:13px;line-height:1.6}
.card-icon{height:42px;color:#2D5A3D;margin-bottom:8px}

/* Terms panel */
.panel{background:#fff;border-radius:16px;padding:28px;border:1px solid #EFE8DB;box-shadow:0 4px 12px rgba(42,40,37,.06);margin-bottom:24px;display:none}
.panel.show{display:block}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #EFE8DB;flex-wrap:wrap;gap:10px}
.panel-header h3{margin:0;font-size:20px;color:#2D5A3D}
.panel-header .panel-back{background:transparent;border:1px solid #EFE8DB;padding:6px 14px;border-radius:999px;font-size:13px;cursor:pointer;font-family:inherit;color:#6B665E;transition:all .15s}
.panel-header .panel-back:hover{background:#F5F1E8;color:#2A2825}
.panel p.intro{color:#5E5952;margin:0 0 18px;font-size:14px}
.terms{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.term{background:#F5F1E8;border-radius:12px;padding:16px;border:1px solid #EFE8DB;position:relative;transition:border-color .2s}
.term:hover{border-color:#D97757}
.term-name{font-weight:700;color:#2A2825;font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.term-desc{color:#5E5952;font-size:13px;line-height:1.6}
.term-star{position:absolute;top:10px;right:10px;background:transparent;border:none;color:#B8B1A4;font-size:18px;cursor:pointer;padding:4px;transition:color .15s}
.term-star:hover{color:#D97757}
.term-star.saved{color:#D97757}

/* Bookmarks section */
.bookmarks-section{display:none}
.bookmarks-section.show{display:block}
.bookmarks-empty{text-align:center;padding:40px;color:#5E5952;font-size:15px;background:#fff;border-radius:16px;border:1px solid #EFE8DB}
.bookmarks-empty .empty-icon{font-size:40px;margin-bottom:12px;color:#B8B1A4}
.bookmarks-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.bookmark-item{background:#fff;border-radius:12px;padding:16px;border:1px solid #EFE8DB;display:flex;justify-content:space-between;align-items:flex-start}
.bookmark-item .bm-info{flex:1}
.bookmark-item .bm-name{font-weight:700;font-size:15px;color:#2A2825;margin-bottom:4px}
.bookmark-item .bm-domain{font-size:12px;color:#B8B1A4;margin-bottom:4px}
.bookmark-item .bm-desc{font-size:13px;color:#5E5952;line-height:1.6}
.bookmark-item .bm-remove{background:transparent;border:none;color:#B8B1A4;cursor:pointer;font-size:18px;padding:4px;flex-shrink:0}
.bookmark-item .bm-remove:hover{color:#D97757}

/* History */
.history-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:20px;font-size:13px;color:#6B665E}
.history-bar .history-label{color:#B8B1A4;flex-shrink:0}
.history-bar .history-tag{background:#fff;border:1px solid #EFE8DB;padding:4px 12px;border-radius:999px;cursor:pointer;transition:all .15s;font-family:inherit;font-size:12px;color:#5E5952}
.history-bar .history-tag:hover{background:#F5F1E8;color:#2A2825;border-color:#B8B1A4}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2A2825;color:#fff;padding:12px 24px;border-radius:999px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* CTA */
.cta{background:#2D5A3D;color:#fff;border-radius:16px;padding:36px 28px;text-align:center;margin-top:20px}
.cta h3{margin:0 0 10px;font-size:clamp(20px,3vw,24px);color:#fff}
.cta p{margin:0 0 18px;color:#E8EDE3;font-size:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:999px;padding:14px 28px;font-size:16px;font-weight:600;font-family:inherit;transition:transform .15s ease,background-color .2s}
.btn-primary{background:#D97757;color:#fff;box-shadow:0 6px 16px rgba(217,119,87,.3)}
.btn-primary:hover{background:#c06649;text-decoration:none;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#2A2825;border:2px solid #2D5A3D}
.btn-sm{padding:8px 16px;font-size:13px}
.footer{border-top:1px solid #EFE8DB;background:#fff;padding:36px 0 28px;margin-top:48px;font-size:14px;color:#6B665E}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer a{color:#6B665E}
@media (max-width:720px){
  .wrap{padding:0 16px}
  .hero{padding:36px 0 22px}
  .section{padding:24px 0}
  .cards{grid-template-columns:1fr;gap:12px}
  .terms{grid-template-columns:1fr;gap:10px}
  .bookmarks-grid{grid-template-columns:1fr}
  .footer-inner{flex-direction:column;text-align:center}
  .panel-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>

// Build flat term index for search
var flatTerms = [];
domains.forEach(function(d) {
  d.terms.forEach(function(t) {
    flatTerms.push({ name: t.name, desc: t.desc, domain: d.title, domainId: d.id });
  });
});

// ========== STATE ==========
var STORAGE_KEY = 'knowledge-base';
function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { bookmarks: [], history: [], dailyDate: '' };
  } catch(e) { return { bookmarks: [], history: [], dailyDate: '' }; }
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

var state = loadState();
var currentView = 'domains';

// ========== TOAST ==========
var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ========== BOOKMARKS ==========
function isBookmarked(termName) {
  return state.bookmarks.some(function(b) { return b.name === termName; });
}
function toggleBookmark(termName, termDesc, domainName, domainId) {
  var idx = state.bookmarks.findIndex(function(b) { return b.name === termName; });
  if (idx !== -1) {
    state.bookmarks.splice(idx, 1);
    saveState(state);
    toast('已取消收藏');
    renderBookmarkStars();
    return false;
  } else {
    state.bookmarks.push({ name: termName, desc: termDesc, domain: domainName, domainId: domainId, time: Date.now() });
    saveState(state);
    toast('☆ 已收藏！');
    renderBookmarkStars();
    return true;
  }
}
function renderBookmarkStars() {
  // Update all star buttons in the currently visible panel
  document.querySelectorAll('.term-star').forEach(function(btn) {
    if (isBookmarked(btn.dataset.term)) {
      btn.classList.add('saved');
      btn.textContent = '★';
    } else {
      btn.classList.remove('saved');
      btn.textContent = '☆';
    }
  });
  // Update daily star
  var dailyBtn = document.getElementById('daily-save-btn');
  if (dailyBtn && dailyBtn.dataset.term) {
    if (isBookmarked(dailyBtn.dataset.term)) {
      dailyBtn.classList.add('saved');
      dailyBtn.textContent = '★ 已收藏';
    } else {
      dailyBtn.classList.remove('saved');
      dailyBtn.textContent = '☆ 收藏';
    }
  }
  // Update bookmark count
  document.getElementById('bookmark-count').textContent = state.bookmarks.length;
  // Update search star icons
  document.querySelectorAll('.sr-star').forEach(function(btn) {
    if (isBookmarked(btn.dataset.term)) {
      btn.classList.add('saved');
      btn.textContent = '★';
    } else {
      btn.classList.remove('saved');
      btn.textContent = '☆';
    }
  });
}

// ========== HISTORY ==========
function addHistory(domain) {
  state.history = state.history.filter(function(h) { return h.id !== domain.id; });
  state.history.unshift({ id: domain.id, title: domain.title });
  if (state.history.length > 5) state.history = state.history.slice(0, 5);
  saveState(state);
  renderHistory();
}
function renderHistory() {
  var bar = document.getElementById('history-bar');
  var tags = document.getElementById('history-tags');
  if (state.history.length === 0) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  tags.innerHTML = state.history.map(function(h) {
    return '<button class="history-tag" type="button" data-id="' + h.id + '">' + h.title + '</button>';
  }).join('');
  tags.querySelectorAll('.history-tag').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var d = domains.find(function(dd) { return dd.id === btn.dataset.id; });
      if (d) { showDomain(d.id, d); switchView('domains'); }
    });
  });
}

// ========== DAILY TERM ==========
function getDailyTerm() {
  var today = new Date().toISOString().slice(0, 10);
  if (state.dailyDate === today) {
    // Use the same term as today
    var hash = 0;
    for (var i = 0; i < today.length; i++) { hash = ((hash << 5) - hash) + today.charCodeAt(i); hash |= 0; }
    var idx = Math.abs(hash) % flatTerms.length;
    return flatTerms[idx];
  }
  state.dailyDate = today;
  var seed = 0;
  for (var j = 0; j < today.length; j++) { seed = ((seed << 5) - seed) + today.charCodeAt(j); seed |= 0; }
  var idx2 = Math.abs(seed) % flatTerms.length;
  saveState(state);
  return flatTerms[idx2];
}

function renderDailyTerm() {
  var dt = getDailyTerm();
  document.getElementById('daily-name').textContent = dt.name;
  document.getElementById('daily-domain').textContent = dt.domain;
  document.getElementById('daily-desc').textContent = dt.desc;
  var saveBtn = document.getElementById('daily-save-btn');
  saveBtn.dataset.term = dt.name;
  saveBtn.dataset.desc = dt.desc;
  saveBtn.dataset.domain = dt.domain;
  saveBtn.dataset.domainId = dt.domainId;
  if (isBookmarked(dt.name)) {
    saveBtn.classList.add('saved');
    saveBtn.textContent = '★ 已收藏';
  } else {
    saveBtn.classList.remove('saved');
    saveBtn.textContent = '☆ 收藏';
  }
  document.getElementById('daily-goto').addEventListener('click', function(e) {
    e.preventDefault();
    var d = domains.find(function(dd) { return dd.id === dt.domainId; });
    if (d) { showDomain(d.id, d); switchView('domains'); }
  });
}

// ========== SEARCH ==========
var searchInput = document.getElementById('search-input');
var searchResults = document.getElementById('search-results');
var searchTimer;

searchInput.addEventListener('input', function() {
  clearTimeout(searchTimer);
  var q = this.value.trim();
  if (!q) { searchResults.classList.remove('show'); return; }
  searchTimer = setTimeout(function() { doSearch(q); }, 200);
});

searchInput.addEventListener('focus', function() {
  if (this.value.trim() && flatTerms.length > 0) doSearch(this.value.trim());
});

document.addEventListener('click', function(e) {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.classList.remove('show');
  }
});

function doSearch(q) {
  var lower = q.toLowerCase();
  var results = flatTerms.filter(function(t) {
    return t.name.toLowerCase().indexOf(lower) !== -1 || t.desc.toLowerCase().indexOf(lower) !== -1 || t.domain.toLowerCase().indexOf(lower) !== -1;
  });
  if (results.length === 0) {
    searchResults.innerHTML = '<div class="search-empty">未找到相关词条，试试其他关键词</div>';
    searchResults.classList.add('show');
    return;
  }
  var html = results.slice(0, 15).map(function(t) {
    var saved = isBookmarked(t.name) ? ' saved' : '';
    var star = isBookmarked(t.name) ? '★' : '☆';
    return '<div class="search-result-item" role="option" data-domain="' + t.domainId + '" data-term="' + t.name + '">' +
      '<div><div class="sr-name">' + highlight(t.name, q) + '<span class="sr-domain">' + t.domain + '</span></div>' +
      '<div class="sr-desc">' + highlight(t.desc, q) + '</div></div>' +
      '<button class="sr-star' + saved + '" type="button" data-term="' + t.name + '" data-desc="' + t.desc + '" data-domain="' + t.domain + '" data-domainid="' + t.domainId + '" aria-label="' + (saved ? '取消收藏' : '收藏') + '">' + star + '</button>' +
      '</div>';
  }).join('');
  if (results.length > 15) html += '<div class="search-empty">还有 ' + (results.length - 15) + ' 条结果，输入更精确的关键词</div>';
  searchResults.innerHTML = html;
  searchResults.classList.add('show');

  // Bind clicks
  searchResults.querySelectorAll('.search-result-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      if (e.target.closest('.sr-star')) return;
      var d = domains.find(function(dd) { return dd.id === item.dataset.domain; });
      if (d) { showDomain(d.id, d); switchView('domains'); }
      searchResults.classList.remove('show');
      searchInput.value = '';
    });
  });
  searchResults.querySelectorAll('.sr-star').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleBookmark(btn.dataset.term, btn.dataset.desc, btn.dataset.domain, btn.dataset.domainid);
      // Re-render search results
      doSearch(q);
    });
  });
}

function highlight(text, q) {
  var lower = text.toLowerCase();
  var idx = lower.indexOf(q.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<span class="search-highlight">' + text.slice(idx, idx + q.length) + '</span>' + text.slice(idx + q.length);
}

// Keyboard navigation
searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    searchResults.classList.remove('show');
    searchInput.blur();
  }
});

// ========== DOMAIN CARDS ==========
var cardsContainer = document.getElementById('domain-cards');
var panel = document.getElementById('knowledge-panel');

domains.forEach(function(domain) {
  var card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('role', 'listitem');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', domain.title + '，' + domain.count);
  card.setAttribute('data-id', domain.id);
  card.innerHTML =
    '<svg class="card-icon" viewBox="0 0 48 48" aria-hidden="true"><rect x="6" y="8" width="36" height="32" rx="4" fill="none" stroke="#2D5A3D" stroke-width="2.5"/><path d="M12 18 H24 M12 26 H36 M12 34 H28" stroke="#D97757" stroke-width="2.5" stroke-linecap="round"/></svg>' +
    '<span class="card-count">' + domain.count + '</span>' +
    '<div class="card-title">' + domain.title + '</div>' +
    '<p>' + domain.desc + '</p>';
  card.addEventListener('click', function() { showDomain(domain.id, domain); markSelected(card); });
  card.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      showDomain(domain.id, domain);
      markSelected(card);
    }
  });
  cardsContainer.appendChild(card);
});

function markSelected(selectedCard) {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('selected'); });
  selectedCard.classList.add('selected');
}

function showDomain(id, domain) {
  var termsHtml = domain.terms.map(function(t) {
    var saved = isBookmarked(t.name) ? ' saved' : '';
    var star = isBookmarked(t.name) ? '★' : '☆';
    return '<div class="term"><div class="term-name">' + t.name + '</div><div class="term-desc">' + t.desc + '</div>' +
      '<button class="term-star' + saved + '" type="button" data-term="' + t.name + '" data-desc="' + t.desc + '" data-domain="' + domain.title + '" data-domainid="' + domain.id + '" aria-label="' + (saved ? '取消收藏' : '收藏') + '">' + star + '</button></div>';
  }).join('');

  panel.innerHTML =
    '<div class="panel-header"><h3>' + domain.title + ' · 词条列表</h3>' +
    '<button class="panel-back" type="button" onclick="closePanel()">← 返回列表</button></div>' +
    '<p class="intro">' + domain.desc + ' 共 ' + domain.terms.length + ' 条核心词条。</p>' +
    '<div class="terms" role="list">' + termsHtml + '</div>';
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'start'});

  // Bind star buttons
  panel.querySelectorAll('.term-star').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var saved = toggleBookmark(btn.dataset.term, btn.dataset.desc, btn.dataset.domain, btn.dataset.domainid);
      if (saved) {
        btn.classList.add('saved');
        btn.textContent = '★';
      } else {
        btn.classList.remove('saved');
        btn.textContent = '☆';
      }
    });
  });

  addHistory(domain);
  if (typeof window.fsTrack === 'function') {
    window.fsTrack('knowledge_domain', {domain: id});
  }
}

function closePanel() {
  panel.classList.remove('show');
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('selected'); });
  document.getElementById('domains-view').scrollIntoView({behavior:'smooth',block:'start'});
}

// ========== VIEW SWITCHING ==========
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  if (view === 'domains') {
    document.querySelector('[data-view="domains"]').classList.add('active');
    document.getElementById('domains-view').style.display = '';
    document.getElementById('bookmarks-view').classList.remove('show');
    document.getElementById('cta-section').style.display = '';
  } else {
    document.querySelector('[data-view="bookmarks"]').classList.add('active');
    document.getElementById('domains-view').style.display = 'none';
    document.getElementById('bookmarks-view').classList.add('show');
    document.getElementById('cta-section').style.display = 'none';
    renderBookmarks();
  }
}

document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    switchView(tab.dataset.view);
  });
});

// ========== BOOKMARKS VIEW ==========
function renderBookmarks() {
  var container = document.getElementById('bookmarks-content');
  if (state.bookmarks.length === 0) {
    container.innerHTML = '<div class="bookmarks-empty"><div class="empty-icon">📚</div><p>还没有收藏任何词条。<br>浏览业务域或搜索词条，点击 ☆ 即可收藏。</p></div>';
    return;
  }
  var html = '<div class="bookmarks-grid">';
  state.bookmarks.slice().reverse().forEach(function(b) {
    html += '<div class="bookmark-item">' +
      '<div class="bm-info"><div class="bm-name">' + b.name + '</div>' +
      '<div class="bm-domain">' + b.domain + '</div>' +
      '<div class="bm-desc">' + b.desc + '</div></div>' +
      '<button class="bm-remove" type="button" data-term="' + b.name + '" aria-label="取消收藏">×</button>' +
      '</div>';
  });
  html += '</div>';
  container.innerHTML = html;

  container.querySelectorAll('.bm-remove').forEach(function(btn) {
    btn.addEventListener('click', function() {
      toggleBookmark(btn.dataset.term, '', '', '');
      renderBookmarks();
      renderBookmarkStars();
    });
  });
}

// ========== INIT ==========
renderDailyTerm();
renderHistory();
renderBookmarkStars();
document.getElementById('bookmark-count').textContent = state.bookmarks.length;

// Daily save button
document.getElementById('daily-save-btn').addEventListener('click', function() {
  var btn = this;
  var saved = toggleBookmark(btn.dataset.term, btn.dataset.desc, btn.dataset.domain, btn.dataset.domainId);
  if (saved) {
    btn.classList.add('saved');
    btn.textContent = '★ 已收藏';
  } else {
    btn.classList.remove('saved');
    btn.textContent = '☆ 收藏';
  }
});

if (typeof window.fsTrack === 'function') {
  window.fsTrack('knowledge_view');
}
</script>
