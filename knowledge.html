      { name: '信任建立', desc: '通过专业、真诚建立客户信任。' },
      { name: '跟进节奏', desc: '客户跟进的频率与方式。' },
      { name: '成交信号', desc: '客户表现出的购买意向信号。' }
    ]
  }
];

const cardsContainer = document.getElementById('domain-cards');
const panel = document.getElementById('knowledge-panel');

domains.forEach(function(domain) {
  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('role', 'listitem');
  card.setAttribute('tabindex', '0');
  card.setAttribute('aria-label', domain.title + '，' + domain.count);
  card.setAttribute('data-id', domain.id);
  card.innerHTML =
    '<svg class="card-icon" viewBox="0 0 48 48" aria-hidden="true"><rect x="6" y="8" width="36" height="32" rx="4" fill="none" stroke="#2D5A3D" stroke-width="2.5"/><path d="M12 18 H24 M12 26 H36 M12 34 H28" stroke="#D97757" stroke-width="2.5" stroke-linecap="round"/></svg>' +
    '<span class="card-count">' + domain.count + '</span>' +
    '<div class="card-title">' + domain.title + '</div>' +
    '<p>' + domain.desc + '</p>';
  card.addEventListener('click', function() { showDomain(domain.id, domain); markSelected(card); });
  card.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      showDomain(domain.id, domain);
      markSelected(card);
    }
  });
  cardsContainer.appendChild(card);
});

function markSelected(selectedCard) {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('selected'); });
  selectedCard.classList.add('selected');
}

function showDomain(id, domain) {
  let termsHtml = domain.terms.map(function(t) {
    return '<div class="term"><div class="term-name">' + t.name + '</div><div class="term-desc">' + t.desc + '</div></div>';
  }).join('');

  panel.innerHTML =
    '<h3>' + domain.title + ' · 示例词条</h3>' +
    '<p class="intro">' + domain.desc + ' 以下展示 10 个最常用词条，完整 450+ 词条可在企业版中查看。</p>' +
    '<div class="terms" role="list">' + termsHtml + '</div>';
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'start'});
  if (typeof window.fsTrack === 'function') {
    window.fsTrack('knowledge_domain', {domain: id});
  }
}
</script>
</body>
</html>
