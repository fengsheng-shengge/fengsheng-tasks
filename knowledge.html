{id:'TRX-005',domain:'trade',name:'资金监管',alias:'第三方资金托管',def:'交易资金由银行或指定机构托管，按约定条件释放，保障买卖双方资金安全。',source:'住建部《关于加强房地产中介管理促进行业健康发展的意见》',srcType:'部门规章',attrs:'监管协议+资金存入+条件释放+利息归属',scene:'交易资金安全保障/风险防控',posSpeech:'钱不经过经纪人手，银行托管到过户完成',negSpeech:'不监管资金，等于把积蓄交给陌生人'},
            {id:'TRX-006',domain:'trade',name:'递件',alias:'递件受理、送件、产权递件',def:'指买卖双方将过户材料提交不动产登记机构，审核后出具受理凭证的业务环节。',source:'- 《不动产登记暂行条例》第十五条、第十七条',srcType:'部门规章',attrs:'材料清单：身份证明、产权证、合同、完税凭证、监管协议、贷款合同+受理凭证：不动产登记受理凭证，载明办结时间+补正：材料不齐一次性告知+撤回：受理后登簿前双方可申请撤回',scene:'- 客户问\"递件是不是就等于过户成功了\"时，需要澄清审核和登簿的区别 - 准备材料时客户不清楚要带什么，经纪人需核对清单时 - 递件后客户着急问\"怎么还没出证\"时  正反向话术： - 正向：\"材料已经递进去了，窗口给了受理凭证，上面有预计办结时间，咱们等着领证就行。\" - 反向：\"别说\'递件了今天就能拿证\'——受理只是开始，审核要时间，期间还可能要求补材料。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-007',domain:'trade',name:'房源维护',alias:'房源管理、盘源维护',def:'指卖方经纪人对受托房源进行信息更新、实地维护、业主关系维护等持续性服务工作总称。',source:'- 《房地产经纪管理办法》第二十二条 - 贝壳ACN维护责任规则',srcType:'部门规章',attrs:'信息维护：价格、状态、钥匙保管更新+实地维护：户型、装修、设施定期核实+业主关系：反馈行情、带看、市场动态+实勘更新：图片、视频、VR更新+维护周期：建议≤30天，超期影响曝光',scene:'- 录入新房源时，需对房屋信息进行实地核实和标准化维护时 - 业主咨询\"你们怎么帮我卖房子\"，经纪人展示维护动作时 - 客户质疑房源信息真实性，需要维护方承担责任时  正反向话术： - 正向：\"我每周会跟业主碰一次盘，更新带看反馈和市场行情，图片每月核实一次，保证展示跟实际一致。\" - 反向：\"别说\'维护就是挂网上等着\'——维护包括定期实勘、信息更新、业主沟通，敷衍了事平台会扣信用分，信息失实要担责。\"  ---',posSpeech:'',negSpeech:''},
            {id:'TRX-008',domain:'trade',name:'ACN（Agent Cooperation Network）',alias:'经纪人合作网络、贝壳ACN',def:'将交易全流程拆分为多角色，按贡献分配佣金的合作机制。',source:'- 《房地产经纪管理办法》第十九条 - 贝壳ACN2.0规则',srcType:'部门规章',attrs:'房源方：录入、维护、实勘+客源方：客源开发、带看、成交+分佣：房源方30%+40%、客源方60%+70%+信用：红/黄/黑线管理+原则：房源唯一、业绩统分、禁跨区',scene:'- 新人入职不了解分佣机制，需要解释合作网络运作时 - 经纪人之间因带看归属产生争议，需要明确角色分工时 - 客户问\"为什么买这套房你们店的人都在跟进\"，解释多人服务时  正反向话术： - 正向：\"这套房有录入方、维护方、实勘方，您是客源方，各方按贡献分佣，保证每环节都有人负责。\" - 反向：\"别说\'ACN就是大家抢客户\'——房源归属是唯一的，谁录入归谁，其他人是配合角色，按规则分佣。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-009',domain:'trade',name:'单边代理',alias:'单方代理、独立代理',def:'经纪人仅代表买方或卖方一方利益，为委托人争取最大利益的代理模式。',source:'- 《房地产经纪管理办法》第三条 - 深圳中介协会单边代理指引',srcType:'部门规章',attrs:'立场：只对委托方负责+目标：卖方求高价快成交；买方求低价好房源+权责：较居间更清晰+背景：深圳2023年率先推行',scene:'- 客户问\"你是代表我还是代表业主\"，需要明确经纪人立场时 - 推行单边代理的城市，经纪人需要向客户解释服务模式变化时 - 经纪人被质疑\"偏心另一方\"，需要说明职业操守时  正反向话术： - 正向：\"我是您的专属经纪人，只帮您争取最大利益，您放心，我看房、谈价都会站在您的角度。\" - 反向：\"别说\'我帮双方说话/我尽量公平\'——单边代理只代表一方，说帮双方是居间思维，反而让客户不信任。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-010',domain:'trade',name:'独家委托',alias:'独家代理、独家房源',def:'卖方（买方）仅委托一家经纪机构在期限内代理交易的委托模式。',source:'- 《房地产经纪执业规则》 - 《民法典》第九百三十三条（任意解除权）',srcType:'部门规章',attrs:'形式：书面协议，期限、底价、服务内容+期限：3+6个月为主+违约：中途解约或自行成交可能付违约金+区别：独家委托=仅一家；独家代理=仅代表一方',scene:'- 业主问\"能不能同时挂几家中介\"，需要解释独家委托时 - 独家委托期内业主想解约，需要说明法律后果时 - 客户问\"独家是不是意味着只能买这套\"，需要澄清误解时  正反向话术： - 正向：\"签独家的话我们会把精力更集中在这套房上，推广资源倾斜，但您仍可自主选择是否成交。\" - 反向：\"别说\'签独家你就只能卖给我\'——独家委托是排他协议，不影响您最终决策权，不想卖可以协商解约。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-011',domain:'trade',name:'产权调查',alias:'产调、房屋核验、权属调查',def:'查询不动产登记信息，核实权属、抵押、查封、限制交易等关键产权信息的服务动作。',source:'- 《不动产登记暂行条例》第二十七条 - 《不动产登记资料查询暂行办法》第四条 - 《房地产经纪管理办法》第二十二条',srcType:'部门规章',attrs:'查询主体：权利人、利害关系人+查询内容：产权人、面积、用途、抵押、查封、异议、预告登记+效力：可依法查询复制+实操：经纪协助买方核验',scene:'- 签约前客户问\"这房子有没有问题\"，需要核实产权状态时 - 发现产权人去世、离异分割等特殊情况，需要确权时 - 买方全款购房，担心抵押查封风险时  正反向话术： - 正向：\"我帮您拉一份产调，看看产权人、抵押、查封情况，正常的话会显示\'无限制\'，您心里有底。\" - 反向：\"别说\'查了没问题是干净的房子\'——产调查不到居住权、租赁备案等隐性权利，客户入住可能踩坑。\"  ---',posSpeech:'',negSpeech:''},
            {id:'TRX-012',domain:'trade',name:'抵押查封',alias:'查封、抵押状态、限制交易',def:'房屋存在抵押权或被司法/行政机关查封，导致处分受限的权利限制状态。',source:'- 《民法典》第三百九十四条起 - 《不动产登记暂行条例实施细则》第八十七条起',srcType:'部门规章',attrs:'抵押：债务担保、不转移占有+查封：司法限制处分+效果：未解前不能过户+情形：贷款未清、涉诉、债务纠纷',scene:'- 发现房屋有抵押登记，客户问\"能不能买\"时 - 业主欠债被查封，客户担心付款后过不了户时 - 贷款未还清需要交易，需要解释解押流程时  正反向话术： - 正向：\"房子有抵押正常，关键是解押方案——可以帮您用首付还、也可以走带押过户，钱进监管账户安全。\" - 反向：\"别说\'查封没事，等解封就行\'——查封期间无法过户，付了钱可能房财两空，必须解封才能交易。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-013',domain:'trade',name:'不动产权证',alias:'房产证、不动产证、大红本',def:'不动产登记机构核发、证明权利人享有不动产权利的法定凭证。',source:'- 《不动产登记暂行条例》第二十条、第五条',srcType:'部门规章',attrs:'证书：产权证（权利人）、登记证明（他项）+内容：权利人、坐落、面积、用途、权利类型+效力：登簿生效+时限：受理后30个工作日',scene:'- 过户完成后客户问\"什么时候能拿到证\"，需要说明办理周期时 - 业主无法提供原件，客户担心产权问题时 - 客户办理落户、抵押贷款，需要出示不动产权证时  正反向话术： - 正向：\"递件后一般5-7个工作日出证，现在都是电子证，跟纸质同等效力，窗口也能打印。\" - 反向：\"别说\'证没出来不算你的房子\'——产权以登簿为准，证只是凭证，登簿后房子就是你的，证早晚能拿。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-014',domain:'trade',name:'交易不成退佣',alias:'交易保障、佣金退还、兜底承诺',def:'签约后因非消费者原因未完成交易，平台承诺退还佣金的服务保障。',source:'- 《房地产经纪管理办法》第十九条 - 贝壳\"交易不成，佣金无理由退\"',srcType:'部门规章',attrs:'适用：非买方违约解约+范围：退佣金，不退定金+免责：买方自身原因+兑付：贝壳5个工作日内',scene:'- 签约后因政策变化/贷款拒批等非客户原因交易终止，需要申请退佣时 - 客户担心\"万一买不成钱打水漂\"，需要介绍服务保障时 - 经纪人需要用服务承诺建立客户信任时  正反向话术： - 正向：\"您放心，签了贝壳的服务协议，因非您原因交易不成，佣金5个工作日内无理由退给您。\" - 反向：\"别说\'退佣要看情况\'或\'不一定能退\'——平台有明确承诺，说法模糊会让客户觉得你在敷衍，失去信任。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-015',domain:'trade',name:'漏水披露补偿',alias:'房屋漏水保障、渗水赔付',def:'经纪人未尽披露义务导致房屋漏水，平台承诺补偿损失的保障机制。',source:'- 《民法典》第五百条、第九百六十二条 - 贝壳漏水披露补偿试点',srcType:'部门规章',attrs:'范围：厨卫/阳台/外墙漏水+义务：签约前问询、看房检查+补偿：维修费、延误入住、装修/家具、租金损失+触发：交房后发现、买方不知情',scene:'- 雨天带看，客户关注墙角/窗框是否有渗水迹象时 - 签约前客户问\"这房子有没有漏过水\"，需要如实披露时 - 交房后发现漏水，客户投诉需要启动补偿流程时  正反向话术： - 正向：\"带看的时候我专门检查了厨卫和阳台墙角，这几个地方目前干燥无水渍，您放心。\" - 反向：\"别说\'没看到漏就是没漏\'或\'以前的事谁知道\'——经纪人有过问义务，客户入住才发现漏水，平台介入你可能担责。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-016',domain:'trade',name:'房价评估',alias:'房屋估价、房产评估、市场价值评估',def:'专业机构或系统基于市场数据测算房屋价值的行为。',source:'- 《房地产估价规范》GB/T 50291-2015',srcType:'国家标准',attrs:'方法：比较法、收益法、成本法+用途：贷款审批、定价参考、计税+主体：银行评估机构、平台估价系统+时效：3+6个月',scene:'- 客户贷款时银行要求评估报告，需要解释评估流程时 - 业主挂盘价与市场价差距大，客户问\"这价格靠谱吗\"时 - 客户询问\"评估价能不能做低一点省税\"，需要严正拒绝时  正反向话术： - 正向：\"评估价是银行参考的市场价，最终以银行认定为准，成交价是实际交易价，两者会有差异。\" - 反向：\"别说\'可以帮你把评估价做低点省税\'——高评套贷是违规骗贷，情节严重要坐牢，别碰这条红线。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-017',domain:'trade',name:'限购政策查询',alias:'购房资格查询、限购查询',def:'查询城市对户籍、社保、套数、人才、离异等群体的购房限制政策。',source:'- 国办发〔2013〕17号 - 住建部2024\"四个取消\"',srcType:'部门规章',attrs:'主体：地方政府+维度：户籍、社保/个税、套数、人才、离异+渠道：住建官网、政务平台、经纪系统+变化：动态调整',scene:'- 客户首次咨询购房资格，需要核查是否具备购买条件时 - 外地客户/人才购房，需要确认是否有额外名额时 - 客户离婚后再购房，需要核实离婚年限限制时  正反向话术： - 正向：\"您的情况我帮您核一下——户籍这边没限制，社保满2年有名额，我查完给您个准信。\" - 反向：\"别说\'你应该有资格\'或\'差不多能买\'——限购政策差一天都不行，没确认清楚客户买了也过不了户，纠纷就大了。\"  ---',posSpeech:'',negSpeech:''},
            {id:'TRX-018',domain:'trade',name:'预售许可证',alias:'预售证、商品房预售许可',def:'开发商向主管部门申请，获准预售商品房的行政许可凭证。',source:'- 《城市商品房预售管理办法》第六条、第五条',srcType:'部门规章',attrs:'条件：缴齐土地出让金、规划/施工许可证、投资≥25%+公示：无证不得预售+处罚：没收违法所得、最高罚预付款1%+时限：受理10日内决定',scene:'- 客户问\"这新房能不能买\"，需要核验开发商是否具备销售资质时 - 客户被要求先付定金，经纪人需要确认是否有预售证时 - 客户担心新房烂尾，需要解释证照与监管账户关系时  正反向话术： - 正向：\"我帮您查一下，这个楼盘证照齐全——有预售证才能收定金，没有的话钱直接打给监管账户才安全。\" - 反向：\"别说\'没证也安全，我们帮你盯着\'——无证预售是违法，收了钱不受保护，客户可能钱房两空。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-019',domain:'trade',name:'认购vs签约',alias:'认购书与正式合同、预约与本约',def:'认购（预约）约定将来签约；签约（本约）确立买卖权利义务。',source:'- 《民法典》第四百九十五条、第五百八十七条 - 商品房买卖司法解释第五条',srcType:'部门规章',attrs:'法律：预约合同vs买卖合同+定金：认购定金抵房款、违约适用定金罚则+认购：房号、面积、总价、定金、期限+签约：产权、付款、交付、违约等完整条款',scene:'- 客户看中新房但还在犹豫，销售催促交认购定金时 - 客户交了认购金后反悔，想退定金时 - 客户问\"认购和签合同有什么区别\"，需要解释法律效力时  正反向话术： - 正向：\"认购书是预约，确定您有购买意向，定金会抵房款，签正式合同才算成交，您想清楚再认购。\" - 反向：\"别说\'认购就是走个流程\'——认购书有法律效力，定金受定金罚则保护，签了不想买可能一分都退不回来。\"',posSpeech:'',negSpeech:''},
            {id:'TRX-020',domain:'trade',name:'销控',alias:'销售控制、捂盘、房源控制',def:'开发商对房源价格、推售节奏、展示统一管理的行为。',source:'- 建房〔2010〕53号、建房〔2018〕58号',srcType:'部门规章',attrs:'合法：自主定价、分期推售、一房一价+违规：捂盘惜售、制造抢购、哄抬房价+系统：可售/已售/预留状态管理+红线：严禁捂盘、哄抬、制造假象',scene:'- 客户问\"为什么有些楼层没有卖\"，怀疑捂盘时 - 开发商饥饿营销、制造抢购氛围，需要向客户解释时 - 客户被逼下定，需要提醒合规销售行为时  正反向话术： - 正向：\"取证后10天内要公开全部房源，您看中的楼层没卖可能真有人定了，您可以要求公开可售房源清单。\" - 反向：\"别说\'这套没有了/被人定了\'——捂盘惜售是违规，被查实开发商要被处罚，别帮开发商制造虚假紧张。\"',posSpeech:'',negSpeech:''},

{id:'RNT-001',domain:'rental',name:'长租公寓',alias:'长租住宅、租赁住房',def:'由专业机构运营，提供标准化、规范化服务的长期租赁住房产品。',source:'《住房租赁条例》第2条',srcType:'行政法规',attrs:'产权性质+服务内容+运营主体+合同期限',scene:'企业员工宿舍租赁/城市青年租房',posSpeech:'专业运营、标准服务，租得放心',negSpeech:'不是普通出租房，是专业长租公寓'},

let currentDomain='quality-customer';

function init(){
  const params=new URLSearchParams(location.search);
  if(params.get('tab')&&DOMAINS.some(d=>d.id===params.get('tab')))currentDomain=params.get('tab');
  const tabs=document.getElementById('domain-tabs');
  tabs.innerHTML=DOMAINS.map(d=>`<div class="domain-tab ${d.id===currentDomain?'active':''}" data-domain="${d.id}" onclick="switchDomain('${d.id}')">${d.icon} ${d.name}（${d.count}）</div>`).join('');
  renderPolicyCard();
  renderEntries();
}

function renderPolicyCard(){
  const p=POLICY_CARD;
  const entries=ENTRIES.filter(e=>e.domain===p.id);
  document.getElementById('policy-card').innerHTML=`
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:20px;cursor:pointer" onclick="togglePolicyEntries()">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:28px">${p.icon}</span>
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--dk)">${p.name}</div>
          <div style="font-size:11px;color:var(--td);margin-top:2px">${p.desc} · ${p.count}词条</div>
        </div>
      </div>
      <a href="${p.link}" onclick="event.stopPropagation()" style="display:inline-block;padding:7px 14px;background:var(--p);color:#fff;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap">查看完整执行方案 →</a>
    </div>
    <div id="policy-entries" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      ${entries.map(e=>{
        const badgeCls=e.srcType.includes('国家')?'badge-gb':e.srcType.includes('法律')?'badge-law':e.srcType.includes('学术')?'badge-academic':e.srcType.includes('平台')?'badge-platform':'badge-industry';
        return `<div class="entry-card" onclick="event.stopPropagation();toggleDetail(this)" style="margin-bottom:8px">
          <div class="entry-header"><span class="entry-name">${e.name}</span><span class="entry-id">${e.id}</span></div>
          <div class="entry-alias">别名：${e.alias}</div>
          <div class="entry-def">${e.def}</div>
          <div class="entry-source"><span class="src-label">📖 出处：</span><span class="source-badge ${badgeCls}">${e.srcType}</span> ${e.source.split('；')[0]}</div>
          <div class="entry-detail" onclick="event.stopPropagation()">
            <div class="layer-tabs">
              <div class="layer-tab active" onclick="switchLayer(this,'detail')">📋 详情</div>
              <div class="layer-tab" onclick="switchLayer(this,'trace')">🔗 溯源</div>
            </div>
            <div class="layer-content active" data-layer="detail">
              <div class="detail-row"><span class="detail-label">属性拆解：</span><span class="detail-val">${e.attrs}</span></div>
              <div class="detail-row"><span class="detail-label">适用场景：</span><span class="detail-val">${e.scene}</span></div>
              <div class="detail-row speech"><span class="detail-label">✅ 正向话术：</span><span class="detail-val">${e.posSpeech||'暂无'}</span></div>
              <div class="detail-row speech"><span class="detail-label">⚠️ 反向话术：</span><span class="detail-val">${e.negSpeech||'暂无'}</span></div>
            </div>
            <div class="layer-content" data-layer="trace">
              <div class="detail-row"><span class="detail-label">📄 法规原文：</span><span class="detail-val">${e.source}</span></div>
              <div class="detail-row"><span class="detail-label">🏷️ 来源类型：</span><span class="source-badge ${badgeCls}">${e.srcType}</span></div>
              <div class="detail-row"><span class="detail-label">🔗 溯源查询：</span><span class="detail-val">${e.srcType.includes('政策')?'<a class="source-link" href="https://www.gov.cn" target="_blank">中国政府网</a> <a class="source-link" href="https://www.mohurd.gov.cn" target="_blank">住建部官网</a>':e.srcType.includes('行业')?'<a class="source-link" href="https://www.cnki.net" target="_blank">中国知网</a>':'暂无在线链接'}</span></div>
            </div>
          </div>
          <div class="expand-hint">▼ 点击展开详情</div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:var(--td);text-align:center;margin-top:8px" id="policy-toggle-hint">▼ 点击展开${p.count}条政策词条</div>
  </div>`;
}

function togglePolicyEntries(){
  const el=document.getElementById('policy-entries');
  const hint=document.getElementById('policy-toggle-hint');
  if(el.style.display==='none'){
    el.style.display='block';
    hint.textContent='▲ 收起政策词条';
  }else{
    el.style.display='none';
    hint.textContent='▼ 点击展开'+POLICY_CARD.count+'条政策词条';
  }
}

function switchDomain(id){
  if(typeof track==="function") track("tab_switch",{tab:id});
  currentDomain=id;
  document.querySelectorAll('.domain-tab').forEach(t=>t.classList.toggle('active',t.dataset.domain===id));
  renderEntries();
}

function renderEntries(){
  const list=document.getElementById('entry-list');
  const filtered=ENTRIES.filter(e=>e.domain===currentDomain);
  list.innerHTML=filtered.map((e,idx)=>{
    const badgeCls=e.srcType.includes('国家')?'badge-gb':e.srcType.includes('法律')?'badge-law':e.srcType.includes('学术')?'badge-academic':e.srcType.includes('平台')?'badge-platform':'badge-industry';
    // 溯源链接：根据srcType生成
    let sourceLinks='';
    if(e.srcType.includes('国家'))sourceLinks+='<a class="source-link" href="https://std.samr.gov.cn" target="_blank">国家标准信息平台</a> ';
    if(e.srcType.includes('法律')||e.source.includes('民法典'))sourceLinks+='<a class="source-link" href="https://www.gov.cn" target="_blank">中国政府法规查询</a> ';
    if(e.srcType.includes('学术'))sourceLinks+='<a class="source-link" href="https://www.cnki.net" target="_blank">中国知网</a> ';
    if(e.srcType.includes('部门规章'))sourceLinks+='<a class="source-link" href="https://www.mohurd.gov.cn" target="_blank">住建部官网</a> ';
    if(e.srcType.includes('平台'))sourceLinks+='<a class="source-link" href="https://www.ke.com" target="_blank">贝壳平台</a> ';
    // 溯源层
    const traceLayer=`
      <div class="layer-content" data-layer="trace">
        <div class="detail-row"><span class="detail-label">📄 法规原文：</span><span class="detail-val">${e.source}</span></div>
        <div class="detail-row"><span class="detail-label">🏷️ 来源类型：</span><span class="source-badge ${badgeCls}">${e.srcType}</span></div>
        <div class="detail-row"><span class="detail-label">🔗 溯源查询：</span><span class="detail-val">${sourceLinks||'暂无在线链接'}</span></div>
        <div class="detail-row" style="margin-top:8px;padding:6px 8px;background:rgba(61,90,62,.04);border-radius:4px;font-size:11px;color:var(--td)">
          💡 提示：以上链接为权威查询入口，具体条文请在平台内搜索法规编号或名称
        </div>
      </div>`;
    return `
    <div class="entry-card" onclick="toggleDetail(this)">
      <div class="entry-header"><span class="entry-name">${e.name}</span><span class="entry-id">${e.id}</span></div>
      <div class="entry-alias">别名：${e.alias}</div>
      <div class="entry-def">${e.def}</div>
      <div class="entry-source"><span class="src-label">📖 出处：</span><span class="source-badge ${badgeCls}">${e.srcType}</span> ${e.source.split('；')[0]}</div>
      <div class="entry-detail" onclick="event.stopPropagation()">
        <div class="layer-tabs">
          <div class="layer-tab active" onclick="switchLayer(this,'detail')">📋 详情</div>
          <div class="layer-tab" onclick="switchLayer(this,'trace')">🔗 溯源</div>
        </div>
        <div class="layer-content active" data-layer="detail">
          <div class="detail-row"><span class="detail-label">属性拆解：</span><span class="detail-val">${e.attrs}</span></div>
          <div class="detail-row"><span class="detail-label">适用场景：</span><span class="detail-val">${e.scene}</span></div>
          <div class="detail-row speech"><span class="detail-label">✅ 正向话术：</span><span class="detail-val">${e.posSpeech||'暂无'}</span></div>
          <div class="detail-row speech"><span class="detail-label">⚠️ 反向话术：</span><span class="detail-val">${e.negSpeech||'暂无'}</span></div>
        </div>
        ${traceLayer}
      </div>
      <div class="expand-hint">▼ 点击展开详情</div>
    </div>`;
  }).join('');
}

function switchLayer(tab,layer){
  const container=tab.closest('.entry-detail');
  container.querySelectorAll('.layer-tab').forEach(t=>t.classList.remove('active'));
  container.querySelectorAll('.layer-content').forEach(c=>c.classList.remove('active'));
  tab.classList.add('active');
  container.querySelector('[data-layer="'+layer+'"]').classList.add('active');
}

function toggleDetail(card){
  var name=card.querySelector(".entry-name");
  if(name && typeof track==="function") track("lookup",{entry_name:name.textContent,tab:currentDomain});
  const detail=card.querySelector('.entry-detail');
  detail.classList.toggle('open');
}
