*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:#555;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.fs-nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.fs-nav-brand{font-size:16px;font-weight:700;color:var(--p);text-decoration:none;display:flex;align-items:center;gap:4px}
.fs-nav-links{display:flex;gap:6px}
.fs-nav-links a{padding:5px 10px;font-size:12px;color:#555;text-decoration:none;border-radius:6px;transition:all .15s;white-space:nowrap}
.fs-nav-links a:hover{background:rgba(61,90,62,.05);color:var(--p)}
.fs-nav-menu{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--p);padding:8px}
@media(max-width:767px){
.fs-nav-links{display:none;position:absolute;top:52px;left:0;right:0;background:#fff;flex-direction:column;padding:10px;border-bottom:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fs-nav.open .fs-nav-links{display:flex}
.fs-nav-menu{display:block}
}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{text-align:center;max-width:400px}
.icon{width:96px;height:96px;margin:0 auto 20px}
.icon svg{width:100%;height:100%}
.card h1{font-size:22px;font-weight:800;color:var(--dk);margin-bottom:12px;letter-spacing:.02em}
.card p{font-size:13.5px;color:var(--ts);line-height:1.8;margin-bottom:28px}
.card .coming-soon{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--dk);background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.06);border-radius:24px;padding:10px 24px;transition:all .2s}
.card .coming-soon:hover{background:rgba(0,0,0,.07)}
.page-footer{text-align:center;padding:20px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--ts);line-height:1.8}
