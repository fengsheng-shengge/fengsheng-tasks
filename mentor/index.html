<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>风声 · 开单导师</title>
<meta name="description" content="专属开单导师——帮你拆解客户真需求，手把手教你开单。">
<meta property="og:title" content="开单导师 · 风声">
<meta property="og:description" content="帮你拆解客户真需求，手把手教你开单">
<meta property="og:image" content="https://fengsheng.tech/og-image.png">
<meta property="og:url" content="https://fengsheng.tech/mentor/">
<style>
:root{--bg:#f7f4ef;--border:rgba(80,90,70,.09);--p:#3d5a3e;--p-d:#2c4430;--fire:#c46a3a;--dk:#1a1a1a;--ts:#7a8478;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:#555;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow:hidden}

/* Nav */
.fs-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.fs-nav-brand{font-size:15px;font-weight:700;color:var(--p);text-decoration:none;display:flex;align-items:center;gap:4px}
.fs-nav-links{display:flex;gap:4px}
.fs-nav-links a{padding:4px 8px;font-size:11px;color:#555;text-decoration:none;border-radius:6px;transition:all .15s;white-space:nowrap}
.fs-nav-links a:hover{background:rgba(61,90,62,.05);color:var(--p)}
.fs-nav-menu{display:none;background:none;border:none;font-size:18px;cursor:pointer;color:var(--p);padding:6px}
@media(max-width:767px){
  .fs-nav-links{display:none;position:absolute;top:48px;left:0;right:0;background:#fff;flex-direction:column;padding:8px;border-bottom:1px solid var(--border);box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:99}
  .fs-nav.open .fs-nav-links{display:flex}
  .fs-nav-menu{display:block}
}

/* Chat Header */
.chat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-title{font-size:14px;font-weight:700;color:var(--dk)}
.chat-subtitle{font-size:11px;color:var(--ts);margin-top:1px}

/* Messages Area */
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:4px}

.msg{max-width:85%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{align-self:flex-start}
.msg-user{align-self:flex-end}
.msg-bubble{padding:10px 14px;border-radius:var(--r);font-size:13.5px;line-height:1.7;word-break:break-word}
.msg-bot .msg-bubble{background:#fff;border:1px solid var(--border);color:var(--dk);border-top-left-radius:2px}
.msg-user .msg-bubble{background:var(--p);color:#fff;border-top-right-radius:2px}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:10px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);border-top-left-radius:2px;width:fit-content;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--ts);animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Quick suggestions */
.suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 8px;flex-shrink:0}
.sug-btn{padding:6px 12px;font-size:12px;border:1px solid rgba(61,90,62,.2);background:rgba(61,90,62,.04);color:var(--p);border-radius:16px;cursor:pointer;transition:all .15s;white-space:nowrap}
.sug-btn:hover{background:rgba(61,90,62,.1);border-color:rgba(61,90,62,.3)}

/* Input Area */
.chat-input-wrap{display:flex;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end}
.chat-input{flex:1;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:13.5px;resize:none;outline:none;font-family:inherit;line-height:1.5;max-height:100px;background:var(--bg);color:var(--dk)}
.chat-input:focus{border-color:rgba(61,90,62,.3)}
.chat-input::placeholder{color:var(--ts)}
.send-btn{width:40px;height:40px;border-radius:var(--r);background:var(--p);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--p-d)}
.send-btn:disabled{background:#ccc;cursor:not-allowed}
.send-btn svg{width:18px;height:18px}

/* Welcome state */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;text-align:center;gap:12px}
.welcome-icon{font-size:48px}
.welcome h2{font-size:18px;font-weight:800;color:var(--dk)}
.welcome p{font-size:13px;color:var(--ts);line-height:1.7;max-width:300px}

/* Error */
.msg-error .msg-bubble{background:#fef2f2;border-color:#fecaca;color:#dc2626}

/* Footer */
.page-footer{text-align:center;padding:8px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--ts);flex-shrink:0;background:#fff}
</style>
</head>
<body>

<nav class="fs-nav">
  <a href="/" class="fs-nav-brand">🌬️ <span>风声</span></a>
  <div class="fs-nav-links">
    <a href="/">首页</a>
    <a href="/quality-test/">品质测评</a>
    <a href="/care-test/">关怀测评</a>
    <a href="/reply/">客户解码</a>
    <a href="/mentor/" style="color:var(--p);font-weight:700">开单导师</a>
    <a href="/ip-design/">IP设计</a>
    <a href="/knowledge">知识底座</a>
  </div>
  <button class="fs-nav-menu" onclick="this.parentElement.classList.toggle('open')">☰</button>
</nav>

<div class="chat-header">
  <div class="chat-avatar">🌬️</div>
  <div>
    <div class="chat-title">开单导师</div>
    <div class="chat-subtitle">专注租赁的AI陪练</div>
  </div>
</div>

<div class="chat-body" id="chatBody">
</div>

<div class="suggestions" id="suggestions">
  <button class="sug-btn" onclick="sendSuggestion(this)">客户说再看看，怎么推？</button>
  <button class="sug-btn" onclick="sendSuggestion(this)">客户预算藏着不说，怎么挖？</button>
  <button class="sug-btn" onclick="sendSuggestion(this)">新人第一步该做什么？</button>
</div>

<div class="chat-input-wrap">
  <textarea class="chat-input" id="chatInput" placeholder="比如：客户说预算3000，怎么推荐？" rows="1" onkeydown="handleKey(event)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
  </button>
</div>

<div class="page-footer">
  🌬️ 风声 · 通过独立价值获得尊重 · fengsheng.tech © 2026<br><a href="https://beian.miit.gov.cn/" target="_blank" style="color:inherit;text-decoration:none">京ICP备2026041809号</a>
</div>

<script>
const API_URL = '/mentor-api/chat';
const chatBody = document.getElementById('chatBody');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const suggestions = document.getElementById('suggestions');

let conversationId = null;
let isStreaming = false;
let hasUserMessage = false;

// Show opening message on load
function showOpeningMessage() {
  const openingText = `你好！我是开单导师，专注租赁的AI陪练——帮你搞定从找客到签约的每一步。\n\n我能帮你：\n🔥 场景话术 — 客户说"再看看"、预算藏着不说，每个卡点都有回法\n🌊 客户读懂 — 帮你听出真需求、挖出真实预算\n📐 开单策略 — 7步走法，从带看到签约不再乱打乱撞\n📚 职业成长 — 从"做单"到"做专业"的路径\n\n每次对话给你可直接用的话术和策略，不是大道理。\n\n直接说你的情况👇`;
  const msg = document.createElement('div');
  msg.className = 'msg msg-bot';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.whiteSpace = 'pre-line';
  bubble.textContent = openingText;
  msg.appendChild(bubble);
  chatBody.appendChild(msg);
  scrollToBottom();
}

// Auto-resize textarea
chatInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendSuggestion(btn) {
  chatInput.value = btn.textContent;
  sendMessage();
}

function hideSuggestions() {
  if (suggestions) suggestions.style.display = 'none';
}

function addMessage(role, text, isError) {
  if (!hasUserMessage && role === 'user') {
    hasUserMessage = true;
    hideSuggestions();
  }
  const msg = document.createElement('div');
  msg.className = 'msg msg-' + (role === 'user' ? 'user' : 'bot') + (isError ? ' msg-error' : '');
  msg.innerHTML = '<div class="msg-bubble"></div>';
  msg.querySelector('.msg-bubble').textContent = text;
  chatBody.appendChild(msg);
  scrollToBottom();
  return msg;
}

function addTypingIndicator() {
  hideWelcome();
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typingIndicator';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatBody.appendChild(el);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function scrollToBottom() {
  chatBody.scrollTop = chatBody.scrollHeight;
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  chatInput.value = '';
  chatInput.style.height = 'auto';

  // Add user message
  addMessage('user', text);

  // Add typing indicator
  addTypingIndicator();

  try {
    const body = { message: text, user_id: getOrCreateUserId() };
    if (conversationId) body.conversation_id = conversationId;

    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      throw new Error('API请求失败: ' + resp.status);
    }

    removeTypingIndicator();

    // Create bot message for streaming
    const botMsg = addMessage('bot', '');
    const bubble = botMsg.querySelector('.msg-bubble');
    let fullText = '';

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('event:')) continue;
        if (line.startsWith('data:')) {
          const dataStr = line.slice(5).trim();
          if (!dataStr) continue;
          try {
            const data = JSON.parse(dataStr);
            // Capture conversation_id
            if (data.conversation_id && !conversationId) {
              conversationId = data.conversation_id;
            }
            // Handle answer deltas
            if (data.type === 'answer' && data.content) {
              fullText += data.content;
              bubble.textContent = fullText;
              scrollToBottom();
            }
            // Handle completed answer
            if (data.type === 'answer' && data.is_last) {
              // Stream complete for this message
            }
          } catch (e) {
            // Ignore parse errors for non-JSON lines
          }
        }
      }
    }

    if (!fullText) {
      bubble.textContent = '（未收到回复，请重试）';
    }

  } catch (err) {
    removeTypingIndicator();
    addMessage('bot', '连接失败: ' + err.message, true);
    console.error('Chat error:', err);
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    chatInput.focus();
  }
}

function getOrCreateUserId() {
  let uid = localStorage.getItem('fs_mentor_uid');
  if (!uid) {
    uid = 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    localStorage.setItem('fs_mentor_uid', uid);
  }
  return uid;
}

// Show opening message and focus input on load
showOpeningMessage();
chatInput.focus();
</script>
</body>
</html>
