      read: '客户真正在问的不是价格，而是"你们能不能让我家的日常生活不被打乱"。对安全、稳定的优先级高于一切 — 他在筛选一个"靠谱的人"，而不是"便宜的方案"。',
      reply: '"我先安排设计师和您一起，把老人的使用动线、卫浴安全细节和厨房操作区做一次实景沟通，同时给您一个分阶段的施工计划 — 每一步都让您提前知道家里会发生什么。"',
      next: '下一步建议：准备一份"对家中老人友好的工艺清单"，并强调施工期间的分阶段保护和日常清洁恢复，建立确定性。'
    },
    service: {
      keywords: ['稳定性','与老人/孩子相处','服务可预期','长期安排'],
      read: '客户希望的不是"偶尔一次干净"，而是"家里有人能长期、稳定、靠谱地帮忙"。他在筛选可托付的人 — 第一印象不是价格，而是"这个阿姨会不会和我家人合得来"。',
      reply: '"我先给您介绍一位在相似家庭场景中长期服务的阿姨，我们第一次上门做一次试服务 — 您当场感受节奏和细节，再决定是否长期。"',
      next: '下一步建议：在第一次服务前和客户做一次 15 分钟的"家庭节奏问卷"，了解孩子作息、老人使用习惯，让阿姨提前做好准备。'
    }
  };

  // ============ STATE ============
  var state = {domain: null};
  var STORAGE_KEY = 'decoder-history';

  function loadHistory(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  function saveHistory(list){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }catch(e){}
  }

  // ============ TOAST ============
  var toastEl = document.getElementById('toast');
  var toastTimer;
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 2000);
  }

  // ============ DOMAIN CARDS ============
  document.querySelectorAll('.domain').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.domain').forEach(function(b){ b.setAttribute('aria-pressed','false'); });
      btn.setAttribute('aria-pressed','true');
      state.domain = btn.dataset.domain;
      document.getElementById('sel-domain').style.display = 'inline-block';
      document.getElementById('sel-domain-name').textContent = domainLabels[state.domain];
      renderSampleChips();
      if (typeof window.fsTrack === 'function') {
        window.fsTrack('decoder_select_domain', {domain: state.domain});
      }
    });
  });

  function renderSampleChips(){
    var chips = document.getElementById('sample-chips');
    var wrap = document.getElementById('sample-chips-wrap');
    if (!state.domain){ wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    var scenes = domainScenes[state.domain].slice(0, 3);
    chips.innerHTML = scenes.map(function(s, i){
      return '<button class="sample-chip" type="button" data-idx="' + i + '">' + s.slice(0, 18) + '…' + '</button>';
    }).join('');
    chips.querySelectorAll('.sample-chip').forEach(function(chip){
      chip.addEventListener('click', function(){
        document.getElementById('scene').value = scenes[parseInt(chip.dataset.idx, 10)];
        document.getElementById('scene').focus();
      });
    });
  }

  // ============ SAMPLE BUTTON ============
  document.getElementById('sample').addEventListener('click', function(){
    if (!state.domain) {
      toast('请先选择一个业务域');
      document.querySelector('.domains').scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    var scenes = domainScenes[state.domain];
    var idx = Math.floor(Math.random() * scenes.length);
    document.getElementById('scene').value = scenes[idx];
    document.getElementById('scene').focus();
    if (typeof window.fsTrack === 'function') window.fsTrack('decoder_sample', {domain: state.domain});
  });

  // ============ CLEAR ============
  document.getElementById('clear').addEventListener('click', function(){
    document.getElementById('scene').value = '';
    document.getElementById('result').classList.remove('show');
    document.getElementById('scene').focus();
  });

  // ============ ANALYZE ============
  document.getElementById('analyze').addEventListener('click', function(){
    var scene = document.getElementById('scene').value.trim();
    if (!scene) {
      toast('请先输入一段客户场景，或点击"给我示例"');
      return;
    }
    if (!state.domain) {
      toast('请先选择一个业务域');
      document.querySelector('.domains').scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    var a = analyses[state.domain];
    var kwBox = document.getElementById('keywords');
    kwBox.innerHTML = '';
    a.keywords.forEach(function(k){
      var span = document.createElement('span');
      span.className = 'kw';
      span.textContent = k;
      kwBox.appendChild(span);
    });
    document.getElementById('read').textContent = a.read;
    document.getElementById('reply').textContent = a.reply;
    document.getElementById('next').textContent = a.next;
    var box = document.getElementById('result');
    box.classList.add('show');
    box.scrollIntoView({behavior:'smooth', block:'center'});

    // Save to history
    var history = loadHistory();
    history.unshift({
      domain: state.domain,
      domainName: domainLabels[state.domain],
      scene: scene,
      reply: a.reply,
      time: new Date().toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})
    });
    if (history.length > 6) history = history.slice(0, 6);
    saveHistory(history);
    renderHistory();

    if (typeof window.fsTrack === 'function') {
      window.fsTrack('decoder_analyze', {domain: state.domain, length: scene.length});
    }
  });

  // ============ COPY REPLY ============
  var copyBtn = document.getElementById('copy-reply');
  copyBtn.addEventListener('click', function(){
    var text = document.getElementById('reply').textContent.trim();
    if (!text) { toast('还没有可复制的话术'); return; }

    // Modern copy with fallback
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        copyBtn.classList.add('copied');
        copyBtn.textContent = '已复制 ✓';
        setTimeout(function(){ copyBtn.classList.remove('copied'); copyBtn.textContent = '复制'; }, 1800);
        toast('话术已复制，可直接粘贴到微信或通话记录');
      }).catch(function(){ fallbackCopy(text); });
    } else {
      fallbackCopy(text);
    }

    function fallbackCopy(t){
      var ta = document.createElement('textarea');
      ta.value = t;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try{
        document.execCommand('copy');
        copyBtn.classList.add('copied');
        copyBtn.textContent = '已复制 ✓';
        setTimeout(function(){ copyBtn.classList.remove('copied'); copyBtn.textContent = '复制'; }, 1800);
        toast('话术已复制');
      }catch(e){ toast('长按文字可手动复制'); }
      document.body.removeChild(ta);
    }
  });

  // ============ HISTORY ============
  function renderHistory(){
    var history = loadHistory();
    var section = document.getElementById('history-section');
    var list = document.getElementById('history-list');
    if (history.length === 0) {
      section.classList.remove('show');
      return;
    }
    section.classList.add('show');
    list.innerHTML = history.map(function(h, i){
      return '<div class="history-item" data-idx="' + i + '">' +
        '<div class="h-meta"><span class="h-domain">' + h.domainName + '</span><span>' + h.time + '</span></div>' +
        '<p class="h-scene">' + escapeHtml(h.scene) + '</p>' +
        '<p class="h-reply">💬 ' + escapeHtml(h.reply) + '</p>' +
        '</div>';
    }).join('');
    list.querySelectorAll('.history-item').forEach(function(item){
      item.addEventListener('click', function(){
        var idx = parseInt(item.dataset.idx, 10);
        var h = loadHistory()[idx];
        if (!h) return;
        // Restore domain
        document.querySelectorAll('.domain').forEach(function(b){
          b.setAttribute('aria-pressed', b.dataset.domain === h.domain ? 'true' : 'false');
        });
        state.domain = h.domain;
        document.getElementById('sel-domain').style.display = 'inline-block';
        document.getElementById('sel-domain-name').textContent = h.domainName;
        // Restore scene
        document.getElementById('scene').value = h.scene;
        renderSampleChips();
        // Scroll to tool
        document.getElementById('tool').scrollIntoView({behavior:'smooth', block:'start'});
        // Auto-analyze
        document.getElementById('analyze').click();
      });
    });
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // ============ INIT ============
  renderHistory();
})();
</script>
</body>
</html>
