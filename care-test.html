<main id="main" role="main">
  <section class="hero" aria-labelledby="hero-title">
    <div class="wrap">
      <h1 id="hero-title">客户<em>解码器</em></h1>
      <p class="lead">30 秒读懂客户，个性化话术生成。先理解客户，再选择怎么说。</p>
      <a href="#tool" class="btn btn-orange" aria-label="开始试用">开始试用 →</a>
    </div>
  </section>

  <section id="tool" class="section" aria-labelledby="t-title">
    <div class="wrap">
      <div class="toolbox">
        <h2 id="t-title" style="margin:0 0 4px;font-size:22px">客户场景输入</h2>
        <p class="hint">填写客户的基本信息和场景，系统将生成个性化的客户画像与建议策略。</p>

        <div class="form-group">
          <label for="houseType">户型</label>
          <select id="houseType" aria-label="选择户型">
            <option value="">-- 请选择 --</option>
            <option value="1">一居</option>
            <option value="2">两居</option>
            <option value="3">三居</option>
            <option value="4">四居及以上</option>
          </select>
        </div>

        <div class="form-group">
          <label for="budget">预算（万元）</label>
          <input type="number" id="budget" placeholder="例如：300" aria-label="客户预算" min="0" step="1">
        </div>

        <div class="form-group">
          <label for="needs">客户需求</label>
          <textarea id="needs" placeholder="例如：希望靠近地铁站，周边有学校和商超，采光要好…" aria-label="客户需求"></textarea>
        </div>

        <div class="form-group">
          <label for="painPoints">客户痛点</label>
          <textarea id="painPoints" placeholder="例如：之前看过的房子采光太差，担心贷款压力大，上班通勤时间长…" aria-label="客户痛点"></textarea>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <button class="btn btn-primary" type="button" id="analyze" aria-label="开始分析">开始分析</button>
          <button class="btn" type="button" id="sample" style="background:#fff;border:1px solid #EFE8DB;color:#2D5A3D;padding:12px 20px" aria-label="给我一个示例">给我示例</button>
        </div>

        <div class="result" id="result" role="status" aria-live="polite">
          <div class="block">
            <h4>客户画像摘要</h4>
            <div id="profileTags"></div>
            <p id="profileSummary" style="margin:8px 0 0"></p>
          </div>
          <div class="block">
            <h4>关键需求梳理</h4>
            <p id="keyNeeds" style="margin:0"></p>
          </div>
          <div class="block">
            <h4>建议策略</h4>
            <ol class="strategy-list" id="strategies"></ol>
          </div>
          <div class="block">
            <h4>注意事项</h4>
            <div class="warn" id="warnings"></div>
          </div>
          <div class="result-actions">
            <button class="btn btn-primary" type="button" id="saveBtn" aria-label="保存结果">保存结果</button>
            <button class="btn btn-ghost" type="button" id="shareBtn" aria-label="分享结果">分享</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
(function(){
  var sampleData = {
    '1': {budget:'200', needs:'希望靠近地铁站，最好步行10分钟内，周边有便利店和餐馆，一个人住求安静。', painPoints:'之前看过的房子隔音太差，楼上有小孩晚上吵闹，担心安全问题和物业不作为。'},
    '2': {budget:'350', needs:'夫妻两人住，想要一个书房，离公司不要太远，小区环境好有绿化。', painPoints:'看过几个小区感觉密度太高，电梯等太久，担心未来升值空间不大。'},
    '3': {budget:'500', needs:'一家三口加老人，需要三房，孩子要上学，附近要有好学校，客厅要大一些。', painPoints:'学区房太贵压力大，二手房的装修质量参差不齐，怕买到问题房。'},
    '4': {budget:'800', needs:'四口之家加父母，需要大户型，最好有保姆间，社区高端配套齐全，有车位。', painPoints:'看过的楼盘要么位置偏要么太贵，担心交房延期，配套兑现慢。'}
  };

  var profileDB = {
    '1': {tags:['单身/独居','通勤优先','品质敏感','安静需求'], summary:'客户为单身或独居状态，注重个人生活品质和通勤效率。对居住环境的安静程度和安全有较高要求，预算相对有限但愿意为品质付费。'},
    '2': {tags:['年轻夫妻','功能分区','环境优先','成长型家庭'], summary:'客户为年轻夫妻，处于家庭组建初期。对空间功能分区（如书房）有明确需求，同时关注小区环境和通勤便利性，属于功能实用型客户。'},
    '3': {tags:['三口之家','教育优先','多代同住','改善型需求'], summary:'客户为有孩家庭，兼顾老人同住需求。教育资源和空间布局是核心关注点，属于典型的改善型需求，对品质和性价比有双重考量。'},
    '4': {tags:['大家庭','高端改善','配套导向','品质生活'], summary:'客户为多代同住的大家庭，经济实力较强。追求高端社区配套和居住品质，对车位、保姆间等功能性配套有刚性需求，属于高端改善型客户。'}
  };

  var needsDB = {
    '1': '通勤效率第一，对距离地铁站步行时间的敏感度极高；需要基本生活配套（便利店、餐饮）；对室内隔音、物业服务和安全有明确要求。',
    '2': '需要明确的功能分区（书房/办公区）；关注小区整体密度和居住舒适度；对通勤时间有容忍但不应过长；关注资产保值增值潜力。',
    '3': '学区资源是核心刚性需求；需要足够的卧室数量满足多代同住；客厅空间要大以满足家庭互动；对装修质量的可靠性和二手房的潜在问题非常关注。',
    '4': '大户型空间是基本要求；保姆间和车位等高端配套是刚需；社区品质和配套兑现能力是决策关键；对交房时间和开发商信誉度高度关注。'
  };

  var strategiesDB = {
    '1': ['优先推荐地铁沿线步行10分钟以内的房源，用"通勤时间地图"直观展示优势', '准备隔音实测数据或安静时段体验方案，消除客户对噪音的顾虑', '推荐配套成熟的社区，强调物业口碑和安全管理措施'],
    '2': ['筛选带书房或可改造出书房的户型，在带看时现场演示功能分区方案', '准备小区容积率、绿化率等数据对比，突出低密度社区的优势', '提供周边同类小区近3年的价格走势，帮助客户建立升值信心'],
    '3': ['制作学区对比表，包含学校排名、入学政策、步行距离等信息，让客户一目了然', '准备"三代同堂"空间方案，展示如何利用户型满足老人和孩子的不同需求', '联合同小区已成交业主的装修案例，提供可参考的改造方案和预算'],
    '4': ['提供开发商品牌实力和过往项目交付记录，建立客户对交房的信心', '制作"配套兑现时间表"，将社区规划中的配套与实际交付时间清晰对应', '推荐同级别高端社区进行横向对比，突出本项目的稀缺性和差异化优势']
  };

  var warningsDB = {
    '1': '注意客户预算上限，不要过度推荐超出预算的房源；关注客户对安全的敏感度，带看时注意时间安排和路线选择。',
    '2': '客户对"未来升值"有期待但不宜过度承诺；注意客户对小区密度的偏好，避免推荐高容积率楼盘。',
    '3': '学区政策可能变化，需提醒客户关注最新入学政策；二手房的潜在问题要充分披露，建立信任。',
    '4': '高端客户对服务质量要求高，需全程保持专业度和响应速度；配套兑现时间需以开发商官方信息为准，不可轻信口头承诺。'
  };

  function showToast(msg){
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(function(){ t.classList.add('show'); });
    setTimeout(function(){ t.classList.remove('show'); setTimeout(function(){ t.remove(); }, 250); }, 2000);
  }

  function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('链接已复制，可粘贴分享'); } catch(e){ showToast('复制失败，请手动复制浏览器地址栏'); }
    document.body.removeChild(ta);
  }

  document.getElementById('sample').addEventListener('click', function(){
    var ht = document.getElementById('houseType').value;
    if (!ht) {
      alert('请先选择户型');
      return;
    }
    var s = sampleData[ht];
    document.getElementById('budget').value = s.budget;
    document.getElementById('needs').value = s.needs;
    document.getElementById('painPoints').value = s.painPoints;
    if (typeof window.fsTrack === 'function') {
      window.fsTrack('care_test_sample', {houseType: ht});
    }
  });

  function getAnalysis(houseType, budget, needs, painPoints){
    var type = houseType || '1';
    var profile = profileDB[type] || profileDB['1'];
    var needsText = needsDB[type] || needsDB['1'];
    var strategies = strategiesDB[type] || strategiesDB['1'];
    var warnings = warningsDB[type] || warningsDB['1'];

    var budgetHint = '';
    var b = parseInt(budget, 10) || 0;
    if (type === '1' && b > 0 && b < 200) { budgetHint = '预算偏紧，需重点关注性价比。'; }
    else if (type === '1' && b >= 200 && b < 400) { budgetHint = '预算适中，有一定选择空间。'; }
    else if (type === '1' && b >= 400) { budgetHint = '预算充裕，可考虑品质升级。'; }
    else if (type === '2' && b > 0 && b < 300) { budgetHint = '预算偏紧，两居选择范围有限。'; }
    else if (type === '2' && b >= 300 && b < 600) { budgetHint = '预算适中，可覆盖大部分两居房源。'; }
    else if (type === '2' && b >= 600) { budgetHint = '预算充裕，可考虑高品质社区。'; }
    else if (type === '3' && b > 0 && b < 400) { budgetHint = '预算偏紧，三居选择压力较大。'; }
    else if (type === '3' && b >= 400 && b < 800) { budgetHint = '预算适中，可覆盖主流三居房源。'; }
    else if (type === '3' && b >= 800) { budgetHint = '预算充裕，可考虑学区或高端社区。'; }
    else if (type === '4' && b > 0 && b < 600) { budgetHint = '预算偏紧，大面积户型选择有限。'; }
    else if (type === '4' && b >= 600 && b < 1200) { budgetHint = '预算适中，可覆盖大多数改善型房源。'; }
    else if (type === '4' && b >= 1200) { budgetHint = '预算充裕，可考虑高端豪宅。'; }

    if (budgetHint) {
      profile.summary = profile.summary + ' ' + budgetHint;
    }

    var painSummary = '';
    if (painPoints && painPoints.trim()) {
      var painLen = painPoints.trim().length;
      if (painLen > 30) {
        painSummary = '客户已明确表达具体痛点，沟通中注意先共情再提供解决方案，避免直接否定客户的担忧。';
      } else {
        painSummary = '客户痛点表述较简短，建议在沟通中进一步深挖具体场景和顾虑。';
      }
    }

    return {
      tags: profile.tags,
      summary: profile.summary,
      needs: needsText,
      strategies: strategies,
      warnings: warnings + (painSummary ? ' ' + painSummary : ''),
      houseType: type,
      budget: b,
      needsRaw: needs || '',
      painPointsRaw: painPoints || ''
    };
  }

  document.getElementById('analyze').addEventListener('click', function(){
    var houseType = document.getElementById('houseType').value;
    var budget = document.getElementById('budget').value.trim();
    var needs = document.getElementById('needs').value.trim();
    var painPoints = document.getElementById('painPoints').value.trim();

    if (!houseType) {
      alert('请先选择户型');
      return;
    }
    if (!needs && !painPoints) {
      alert('请至少填写客户需求或痛点');
      return;
    }

    var analysis = getAnalysis(houseType, budget, needs, painPoints);

    var tagBox = document.getElementById('profileTags');
    tagBox.innerHTML = '';
    analysis.tags.forEach(function(t){
      var span = document.createElement('span');
      span.className = 'tag';
      span.textContent = t;
      tagBox.appendChild(span);
    });

    document.getElementById('profileSummary').textContent = analysis.summary;
    document.getElementById('keyNeeds').textContent = analysis.needs;

    var stratList = document.getElementById('strategies');
    stratList.innerHTML = '';
    analysis.strategies.forEach(function(s){
      var li = document.createElement('li');
      li.textContent = s;
      stratList.appendChild(li);
    });

    document.getElementById('warnings').textContent = analysis.warnings;

    var box = document.getElementById('result');
    box.classList.add('show');
    box.scrollIntoView({behavior:'smooth', block:'center'});

    if (typeof window.fsTrack === 'function') {
      window.fsTrack('care_test_analyze', {houseType: houseType, budget: budget, hasNeeds: !!needs, hasPainPoints: !!painPoints});
    }
  });

  document.getElementById('saveBtn').addEventListener('click', function(){
    var houseType = document.getElementById('houseType').value;
    var budget = document.getElementById('budget').value.trim();
    var needs = document.getElementById('needs').value.trim();
    var painPoints = document.getElementById('painPoints').value.trim();
    var analysis = getAnalysis(houseType, budget, needs, painPoints);

    var record = {
      houseType: houseType,
      budget: budget,
      needs: needs,
      painPoints: painPoints,
      analysis: analysis,
      savedAt: new Date().toISOString()
    };

    var existing = [];
    try {
      var raw = localStorage.getItem('care-test-results');
      if (raw) { existing = JSON.parse(raw); }
    } catch(e){}
    existing.push(record);
    localStorage.setItem('care-test-results', JSON.stringify(existing));
    showToast('结果已保存到本地');
    if (typeof window.fsTrack === 'function') {
      window.fsTrack('care_test_save', {houseType: houseType});
    }
  });

  document.getElementById('shareBtn').addEventListener('click', function(){
    var houseType = document.getElementById('houseType').value;
    var budget = document.getElementById('budget').value.trim();
    var needs = document.getElementById('needs').value.trim();
    var painPoints = document.getElementById('painPoints').value.trim();
    var analysis = getAnalysis(houseType, budget, needs, painPoints);

    var shareText = '【客户解码器分析报告】\n';
    shareText += '户型：' + (document.getElementById('houseType').selectedOptions[0] ? document.getElementById('houseType').selectedOptions[0].textContent : '') + '\n';
    if (budget) shareText += '预算：' + budget + '万元\n';
    shareText += '客户画像：' + analysis.tags.join('、') + '\n';
    shareText += '关键需求：' + analysis.needs + '\n';
    shareText += '建议策略：\n';
    analysis.strategies.forEach(function(s, i){ shareText += (i+1) + '. ' + s + '\n'; });
    shareText += '注意事项：' + analysis.warnings + '\n';
    shareText += '—— 来自风声客户解码器 fengsheng.tech';

    try {
      navigator.clipboard.writeText(shareText).then(function(){ showToast('分析结果已复制，可粘贴分享'); }, function(){ fallbackCopy(shareText); });
    } catch(e){
      fallbackCopy(shareText);
    }
    if (typeof window.fsTrack === 'function') {
      window.fsTrack('care_test_share', {houseType: houseType});
    }
  });
})();
</script>
</body>
</html>
