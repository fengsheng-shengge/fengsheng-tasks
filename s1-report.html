<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>带看报告 S1 · 风声</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F1E8;color:#2A2825;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:#2D5A3D;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:900px;margin:0 auto;padding:0 20px}
.skip-nav{position:absolute;left:-9999px;top:0;background:#2D5A3D;color:#fff;padding:12px 20px;z-index:100;text-decoration:none;border-radius:0 0 12px 0}
.skip-nav:focus{left:0}
.header{background:#fff;border-bottom:1px solid #EFE8DB}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand{font-weight:700;font-size:20px;color:#2D5A3D;letter-spacing:1px}
.brand span{color:#D97757}
.breadcrumb{background:#F5F1E8;color:#6B665E;font-size:14px;padding:16px 0}
.breadcrumb a{color:#6B665E}
.breadcrumb .sep{margin:0 8px;color:#B8B1A4}
.breadcrumb .current{color:#2A2825}
.hero{padding:56px 0 40px;text-align:center;position:relative}
.hero h1{font-size:clamp(32px,6vw,54px);line-height:1.25;margin:0 0 18px;color:#2A2825;font-weight:700}
.hero h1 em{font-style:normal;color:#D97757}
.hero p.lead{font-size:clamp(16px,2.2vw,20px);color:#5E5952;max-width:640px;margin:0 auto}
.section{padding:40px 0}
.section h2{font-size:clamp(22px,3.4vw,30px);margin:0 0 8px;color:#2A2825}
.section .sub{color:#5E5952;margin-bottom:28px}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.step{background:#fff;border-radius:16px;padding:24px;border:1px solid #EFE8DB;text-align:center;box-shadow:0 2px 6px rgba(42,40,37,.04)}
.step .num{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;background:#2D5A3D;color:#fff;border-radius:999px;font-weight:700;font-size:16px;margin-bottom:12px}
.step h3{margin:0 0 6px;font-size:17px;color:#2A2825}
.step p{margin:0;color:#5E5952;font-size:14px}
.card{background:#fff;border-radius:16px;padding:28px 28px;border:1px solid #EFE8DB;box-shadow:0 2px 6px rgba(42,40,37,.04);margin-bottom:24px}
.card h3{margin:0 0 18px;font-size:20px;color:#2A2825}
.card h4{margin:24px 0 10px;font-size:16px;color:#2D5A3D}
label{display:block;font-weight:600;margin:14px 0 6px;font-size:15px}
input[type="text"],input[type="date"],input[type="email"],textarea,select{width:100%;padding:12px 14px;border:2px solid #EFE8DB;border-radius:12px;font-family:inherit;font-size:15px;background:#F5F1E8;color:#2A2825}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2D5A3D;background:#fff}
textarea{min-height:120px;resize:vertical}
.radio-group,.checkbox-group{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0}
.radio-group label,.checkbox-group label{display:inline-flex;align-items:center;gap:6px;font-weight:400;margin:0;padding:10px 16px;border:2px solid #EFE8DB;border-radius:999px;background:#F5F1E8;cursor:pointer;font-size:14px}
.radio-group input[type="radio"],.checkbox-group input[type="checkbox"]{width:auto;margin:0}
.radio-group label.checked,.checkbox-group label.checked{background:#E8EDE3;border-color:#2D5A3D;color:#2D5A3D;font-weight:600}
.radio-group label:hover,.checkbox-group label:hover{border-color:#D97757}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:999px;padding:14px 28px;font-size:16px;font-weight:600;font-family:inherit;transition:transform .15s ease,box-shadow .15s ease,background-color .2s}
.btn-primary{background:#2D5A3D;color:#fff;box-shadow:0 6px 16px rgba(45,90,61,.25)}
.btn-primary:hover{background:#234a31;text-decoration:none;transform:translateY(-1px)}
.btn-orange{background:#D97757;color:#fff;box-shadow:0 6px 16px rgba(217,119,87,.25)}
.btn-orange:hover{background:#c06649;text-decoration:none}
.btn-ghost{background:transparent;color:#2D5A3D;border:2px solid #2D5A3D}
.btn-ghost:hover{background:#2D5A3D;color:#fff;text-decoration:none}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
.report-section{background:#F5F1E8;border-radius:16px;padding:28px;margin-top:8px;border:1px solid #EFE8DB}
.report-section h3{margin:0 0 14px;font-size:18px;color:#2D5A3D;border-bottom:1px solid #EFE8DB;padding-bottom:10px}
.report-section h4{margin:20px 0 8px;font-size:16px;color:#2A2825}
.report-section p{margin:6px 0}
.report-section .meta{color:#6B665E;font-size:14px}
.tag{display:inline-block;font-size:12px;color:#D97757;background:#FBEDE5;padding:3px 10px;border-radius:999px;font-weight:600;margin-right:6px;margin-bottom:4px}
.hidden{display:none}
.footer{border-top:1px solid #EFE8DB;background:#fff;padding:36px 0 28px;margin-top:48px;font-size:14px;color:#6B665E}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer a{color:#6B665E}
.required{color:#D97757}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2D5A3D;color:#fff;padding:12px 24px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
@media (max-width:640px){
  .wrap{padding:0 16px}
  .hero{padding:40px 0 28px}
  .section{padding:32px 0}
  .steps{grid-template-columns:1fr;gap:16px}
  .card{padding:22px 20px}
  .footer-inner{flex-direction:column;text-align:center}
}
@media print{
  .header,.breadcrumb,.hero,.section:not(.report-only),.btn-row,.skip-nav,.footer,.toast{display:none!important}
  body{background:#fff}
  .card{border:none;box-shadow:none;padding:0;margin:0}
  .report-section{border:none;background:#fff}
}
</style>
</head>
<body>
<a class="skip-nav" href="#main" aria-label="跳到主要内容">跳到主要内容</a>

<header class="header" role="banner">
  <div class="wrap header-inner">
    <a href="index.html" class="brand" aria-label="风声首页">风声 <span>fengsheng</span></a>
    <nav aria-label="主导航" style="font-size:15px;color:#6B665E">
      <a href="index.html" style="color:#2A2825;padding:6px 10px;border-radius:8px">首页</a>
    </nav>
  </div>
</header>

<main id="main" role="main">
  <div class="wrap">
    <nav class="breadcrumb" aria-label="面包屑">
      <a href="index.html" aria-label="返回首页">首页</a><span class="sep">·</span><span class="current">带看报告 S1</span>
    </nav>

    <section class="hero" aria-labelledby="hero-title">
      <h1 id="hero-title">带看现场，<em>信任交付</em></h1>
      <p class="lead">一份让客户愿意回头的报告</p>
    </section>

    <section class="section" aria-labelledby="steps-title">
      <h2 id="steps-title">使用说明</h2>
      <p class="sub">3 步，让每一次带看都不白跑。</p>
      <div class="steps">
        <div class="step" aria-label="第一步">
          <div class="num">1</div>
          <h3>填写信息</h3>
          <p>记录客户与房源基础信息</p>
        </div>
        <div class="step" aria-label="第二步">
          <div class="num">2</div>
          <h3>描述房源</h3>
          <p>描述客户关注点与反应</p>
        </div>
        <div class="step" aria-label="第三步">
          <div class="num">3</div>
          <h3>生成报告</h3>
          <p>一键生成专业带看报告</p>
        </div>
      </div>
    </section>

    <section class="section" aria-labelledby="form-title">
      <h2 id="form-title">带看信息</h2>
      <p class="sub">以下信息仅在您的浏览器中处理，不会上传到服务器。</p>

      <div class="card" aria-label="带看信息表单">
        <h3>带看信息</h3>

        <label for="customer-name">客户姓名</label>
        <input id="customer-name" type="text" aria-label="客户姓名" placeholder="例如：张先生">

        <label for="visit-date">带看日期</label>
        <input id="visit-date" type="date" aria-label="带看日期">

        <label for="property-address">房源地址</label>
        <input id="property-address" type="text" aria-label="房源地址" placeholder="例如：北京市朝阳区 xx 小区 xx 号楼">

        <label>房源类型</label>
        <div class="radio-group" id="property-type" role="radiogroup" aria-label="房源类型">
          <label><input type="radio" name="property-type" value="新房" aria-label="新房">新房</label>
          <label><input type="radio" name="property-type" value="二手房" aria-label="二手房">二手房</label>
          <label><input type="radio" name="property-type" value="租房" aria-label="租房">租房</label>
        </div>

        <label>客户关注点（可多选）</label>
        <div class="checkbox-group" aria-label="客户关注点">
          <label><input type="checkbox" value="采光" aria-label="关注采光">采光</label>
          <label><input type="checkbox" value="安静" aria-label="关注安静">安静</label>
          <label><input type="checkbox" value="学区" aria-label="关注学区">学区</label>
          <label><input type="checkbox" value="交通" aria-label="关注交通">交通</label>
          <label><input type="checkbox" value="价格" aria-label="关注价格">价格</label>
          <label><input type="checkbox" value="装修" aria-label="关注装修">装修</label>
        </div>

        <label for="customer-reaction">客户反应</label>
        <textarea id="customer-reaction" aria-label="客户的真实反应" placeholder="请描述客户在看房过程中的真实反应，例如：客户对客厅采光表示满意，但对厨房大小有顾虑……"></textarea>

        <label for="next-step">下一步建议</label>
        <textarea id="next-step" aria-label="下一步建议" placeholder="例如：建议 3 天后电话跟进，同时准备 2 套同户型对比方案……"></textarea>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="generateReport()" aria-label="生成带看报告">生成带看报告 →</button>
        </div>
      </div>
    </section>

    <section class="section report-only" aria-labelledby="report-title">
      <h2 id="report-title">带看报告</h2>
      <p class="sub" id="report-sub">填写完上面的信息后，报告将在这里显示。</p>

      <div class="card hidden" id="report-card" aria-live="polite" aria-label="带看报告内容">
        <div class="report-section" id="report-content"></div>
        <div class="btn-row">
          <button class="btn btn-orange" onclick="copyReport()" aria-label="复制报告到剪贴板">复制报告</button>
          <button class="btn btn-ghost" onclick="printReport()" aria-label="打印报告">打印报告</button>
        </div>
      </div>
    </section>
  </div>
</main>

<footer class="footer" role="contentinfo">
  <div class="wrap footer-inner">
    <div>© 2026 风声 · fengsheng.tech</div>
    <div>
      <a href="privacy.html" aria-label="查看隐私政策">隐私政策</a> ·
      <a href="reply.html" aria-label="帮助与反馈">帮助</a>
    </div>
  </div>
</footer>

<div class="toast" id="toast" role="status" aria-live="polite">已复制到剪贴板</div>

<script src="tracker.js" defer></script>
<script>
function generateReport() {
  const name = document.getElementById('customer-name').value.trim();
  const date = document.getElementById('visit-date').value;
  const address = document.getElementById('property-address').value.trim();
  const typeEl = document.querySelector('input[name="property-type"]:checked');
  const type = typeEl ? typeEl.value : '';
  const concerns = Array.from(document.querySelectorAll('.checkbox-group input:checked')).map(i => i.value);
  const reaction = document.getElementById('customer-reaction').value.trim();
  const nextStep = document.getElementById('next-step').value.trim();

  if (!name || !date || !address || !type || concerns.length === 0 || !reaction || !nextStep) {
    showToast('请先填写完整信息');
    return;
  }

  const dateObj = new Date(date);
  const followDate = new Date(dateObj.getTime() + 3 * 24 * 60 * 60 * 1000);
  const followDateStr = followDate.getFullYear() + '-' + String(followDate.getMonth()+1).padStart(2,'0') + '-' + String(followDate.getDate()).padStart(2,'0');

  const concernAnalysis = {
    '采光': '客户对自然光线有明确要求，说明在意居住舒适度，推荐时优先考虑南向/高楼层房源。',
    '安静': '客户对居住环境的安静度敏感，可能有老人/孩子/居家办公需求，需关注小区噪音情况。',
    '学区': '客户有学龄儿童或计划有，需详细了解学区划分、学校口碑、入学政策。',
    '交通': '客户通勤便利性是核心决策因素，需关注地铁/公交/驾车便利性。',
    '价格': '客户对预算敏感，性价比是关键，需准备多套预算内方案对比。',
    '装修': '客户在意入住时间和装修成本，需区分精装/毛坯/装修状态。'
  };

  let concernHtml = concerns.map(c => '<p><span class="tag">' + c + '</span>' + (concernAnalysis[c] || '') + '</p>').join('');

  let typeDesc = {
    '新房': '新房 · 关注交付时间、开发商品牌、样板间与交付标准',
    '二手房': '二手房 · 关注房龄、产权情况、装修保养状况',
    '租房': '租房 · 关注租期灵活性、押金政策、家具家电配置'
  }[type] || type;

  const html =
    '<h3>📋 带看报告 · ' + name + ' · ' + date + '</h3>' +
    '<h4>① 客户信息摘要</h4>' +
    '<p><strong>客户姓名：</strong>' + name + '</p>' +
    '<p><strong>带看日期：</strong>' + date + '</p>' +
    '<p><strong>房源类型：</strong>' + typeDesc + '</p>' +
    '<h4>② 房源概况</h4>' +
    '<p><strong>房源地址：</strong>' + address + '</p>' +
    '<p class="meta">本次带看房源为' + type + '，位于' + address + '。带看过程中与客户就户型、采光、周边配套等方面进行了深入沟通。</p>' +
    '<h4>③ 客户关注点分析</h4>' +
    concernHtml +
    '<h4>④ 客户反应解读</h4>' +
    '<p>' + reaction + '</p>' +
    '<p class="meta">从客户反应来看，整体态度积极/中性，需在后续跟进中重点关注客户明确表达的偏好与顾虑。</p>' +
    '<h4>⑤ 下一步行动建议</h4>' +
    '<p>' + nextStep + '</p>' +
    '<p class="meta"><strong>跟进日期建议：</strong>' + followDateStr + '（带看后 3 天内电话跟进，保持联系热度。</p>' +
    '<p class="meta" style="margin-top:20px;border-top:1px dashed #B8B1A4;padding-top:14px">—— 风声 fengsheng.tech · 带看报告 S1 · 生成时间：' + new Date().toLocaleString('zh-CN') + '</p>';

  document.getElementById('report-content').innerHTML = html;
  document.getElementById('report-card').classList.remove('hidden');
  document.getElementById('report-sub').textContent = '报告已生成，可复制或打印。';
  document.getElementById('report-card').scrollIntoView({behavior:'smooth',block:'start'});

  if (typeof window.fsTrack === 'function') {
    window.fsTrack('s1_report_generate', {concerns: concerns.length});
  }
}

function getReportText() {
  const name = document.getElementById('customer-name').value.trim();
  const date = document.getElementById('visit-date').value;
  const address = document.getElementById('property-address').value.trim();
  const typeEl = document.querySelector('input[name="property-type"]:checked');
  const type = typeEl ? typeEl.value : '';
  const concerns = Array.from(document.querySelectorAll('.checkbox-group input:checked')).map(i => i.value).join('、');
  const reaction = document.getElementById('customer-reaction').value.trim();
  const nextStep = document.getElementById('next-step').value.trim();
  const dateObj = new Date(date);
  const followDate = new Date(dateObj.getTime() + 3 * 24 * 60 * 1000);
  const followDateStr = followDate.getFullYear() + '-' + String(followDate.getMonth()+1).padStart(2,'0') + '-' + String(followDate.getDate()).padStart(2,'0');
  return '【带看报告 S1】\n' +
    '客户：' + name + '\n' +
    '带看日期：' + date + '\n' +
    '房源地址：' + address + '\n' +
    '房源类型：' + type + '\n' +
    '客户关注点：' + concerns + '\n\n' +
    '客户反应：\n' + reaction + '\n\n' +
    '下一步建议：\n' + nextStep + '\n\n' +
    '跟进日期：' + followDateStr + '\n' +
    '—— 风声 fengsheng.tech';
}

function copyReport() {
  const text = getReportText();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('已复制到剪贴板 ✓');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
  if (typeof window.fsTrack === 'function') window.fsTrack('s1_report_copy');
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('已复制到剪贴板 ✓');
  } catch (e) {
    showToast('复制失败，请手动选择文本');
  }
  document.body.removeChild(ta);
}

function printReport() {
  window.print();
  if (typeof window.fsTrack === 'function') window.fsTrack('s1_report_print');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

document.querySelectorAll('.radio-group input[type="radio"], .checkbox-group input[type="checkbox"]').forEach(function(input) {
  input.addEventListener('change', function() {
    const group = input.closest('.radio-group, .checkbox-group');
    if (!group) return;
  });
});

document.querySelectorAll('.radio-group label').forEach(function(label) {
  const input = label.querySelector('input');
  input.addEventListener('change', function() {
    label.parentElement.querySelectorAll('label').forEach(function(l) { l.classList.remove('checked'); });
    if (input.checked) label.classList.add('checked');
  });
});

document.querySelectorAll('.checkbox-group label').forEach(function(label) {
  const input = label.querySelector('input');
  input.addEventListener('change', function() {
    if (input.checked) label.classList.add('checked');
    else label.classList.remove('checked');
  });
});

document.getElementById('visit-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
