<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F1E8;color:#2A2825;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:#2D5A3D;text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:900px;margin:0 auto;padding:0 20px}
.skip-nav{position:absolute;left:-9999px;top:0;background:#2D5A3D;color:#fff;padding:12px 20px;z-index:100;text-decoration:none;border-radius:0 0 12px 0}
.skip-nav:focus{left:0}
.header{background:#fff;border-bottom:1px solid #EFE8DB}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand{font-weight:700;font-size:20px;color:#2D5A3D;letter-spacing:1px}
.brand span{color:#D97757}
.breadcrumb{background:#F5F1E8;color:#6B665E;font-size:14px;padding:16px 0}
.breadcrumb a{color:#6B665E}
.breadcrumb .sep{margin:0 8px;color:#B8B1A4}
.breadcrumb .current{color:#2A2825}
.hero{padding:56px 0 40px;text-align:center;position:relative}
.hero h1{font-size:clamp(32px,6vw,54px);line-height:1.25;margin:0 0 18px;color:#2A2825;font-weight:700}
.hero h1 em{font-style:normal;color:#D97757}
.hero p.lead{font-size:clamp(16px,2.2vw,20px);color:#5E5952;max-width:640px;margin:0 auto}
.section{padding:40px 0}
.section h2{font-size:clamp(22px,3.4vw,30px);margin:0 0 8px;color:#2A2825}
.section .sub{color:#5E5952;margin-bottom:28px}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.step{background:#fff;border-radius:16px;padding:24px;border:1px solid #EFE8DB;text-align:center;box-shadow:0 2px 6px rgba(42,40,37,.04)}
.step .num{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;background:#2D5A3D;color:#fff;border-radius:999px;font-weight:700;font-size:16px;margin-bottom:12px}
.step h3{margin:0 0 6px;font-size:17px;color:#2A2825}
.step p{margin:0;color:#5E5952;font-size:14px}
.card{background:#fff;border-radius:16px;padding:28px 28px;border:1px solid #EFE8DB;box-shadow:0 2px 6px rgba(42,40,37,.04);margin-bottom:24px}
.card h3{margin:0 0 18px;font-size:20px;color:#2A2825}
.card h4{margin:24px 0 10px;font-size:16px;color:#2D5A3D}
label{display:block;font-weight:600;margin:14px 0 6px;font-size:15px}
input[type="text"],input[type="date"],input[type="email"],input[type="tel"],textarea,select{width:100%;padding:12px 14px;border:2px solid #EFE8DB;border-radius:12px;font-family:inherit;font-size:15px;background:#F5F1E8;color:#2A2825}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2D5A3D;background:#fff}
textarea{min-height:100px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
.radio-group,.checkbox-group{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0}
.radio-group label,.checkbox-group label{display:inline-flex;align-items:center;gap:6px;font-weight:400;margin:0;padding:10px 16px;border:2px solid #EFE8DB;border-radius:999px;background:#F5F1E8;cursor:pointer;font-size:14px}
.radio-group input[type="radio"],.checkbox-group input[type="checkbox"]{width:auto;margin:0}
.radio-group label.checked,.checkbox-group label.checked{background:#E8EDE3;border-color:#2D5A3D;color:#2D5A3D;font-weight:600}
.radio-group label:hover,.checkbox-group label:hover{border-color:#D97757}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:999px;padding:14px 28px;font-size:16px;font-weight:600;font-family:inherit;transition:transform .15s ease,box-shadow .15s ease,background-color .2s}
.btn-primary{background:#2D5A3D;color:#fff;box-shadow:0 6px 16px rgba(45,90,61,.25)}
.btn-primary:hover{background:#234a31;text-decoration:none;transform:translateY(-1px)}
.btn-orange{background:#D97757;color:#fff;box-shadow:0 6px 16px rgba(217,119,87,.25)}
.btn-orange:hover{background:#c06649;text-decoration:none}
.btn-ghost{background:transparent;color:#2D5A3D;border:2px solid #2D5A3D}
.btn-ghost:hover{background:#2D5A3D;color:#fff;text-decoration:none}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
/* Report Preview */
.report-preview{display:none}
.report-preview.show{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.report-section{background:#F5F1E8;border-radius:16px;padding:28px;margin-top:8px;border:1px solid #EFE8DB}
.report-section h3{margin:0 0 14px;font-size:18px;color:#2D5A3D;border-bottom:1px solid #EFE8DB;padding-bottom:10px}
.report-section h4{margin:20px 0 8px;font-size:16px;color:#2A2825}
.report-section p{margin:6px 0}
.report-section .meta{color:#6B665E;font-size:14px}
.report-header-card{background:linear-gradient(135deg,#2D5A3D,#3A6B4A);color:#fff;border-radius:16px 16px 0 0;padding:24px 28px;margin:-28px -28px 0 -28px}
.report-header-card h3{color:#fff;border-bottom:1px solid rgba(255,255,255,.2);margin:0 0 12px;padding-bottom:10px;font-size:20px}
.report-header-card .report-meta-row{display:flex;gap:32px;flex-wrap:wrap;font-size:14px;opacity:.9}
.report-header-card .report-meta-row span{display:inline-flex;align-items:center;gap:6px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin:8px 0}
.info-grid .info-item{display:flex;flex-direction:column}
.info-grid .info-label{font-size:13px;color:#8A857B;font-weight:600}
.info-grid .info-value{font-size:15px;color:#2A2825}
.tag{display:inline-block;font-size:12px;color:#D97757;background:#FBEDE5;padding:3px 10px;border-radius:999px;font-weight:600;margin-right:6px;margin-bottom:4px}
.hidden{display:none}
.footer{border-top:1px solid #EFE8DB;background:#fff;padding:36px 0 28px;margin-top:48px;font-size:14px;color:#6B665E}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer a{color:#6B665E}
.required{color:#D97757}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2D5A3D;color:#fff;padding:12px 24px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
/* Saved Reports List */
.saved-list{display:none;margin-top:24px}
.saved-list.show{display:block}
.saved-item{background:#fff;border-radius:14px;padding:16px 20px;border:1px solid #EFE8DB;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;cursor:pointer;transition:box-shadow .15s}
.saved-item:hover{box-shadow:0 4px 12px rgba(42,40,37,.08)}
.saved-item .saved-info{flex:1;min-width:0}
.saved-item .saved-name{font-weight:600;color:#2A2825;font-size:15px}
.saved-item .saved-date{font-size:13px;color:#8A857B;margin-top:2px}
.saved-item .saved-address{font-size:13px;color:#6B665E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.saved-item .btn-sm{font-size:13px;padding:8px 16px;border-radius:999px;border:none;cursor:pointer;font-weight:600;font-family:inherit}
.saved-item .btn-sm-view{background:#E8EDE3;color:#2D5A3D}
.saved-item .btn-sm-view:hover{background:#2D5A3D;color:#fff}
.saved-item .btn-sm-del{background:#FBEDE5;color:#D97757}
.saved-item .btn-sm-del:hover{background:#D97757;color:#fff}
@media (max-width:640px){
  .wrap{padding:0 16px}
  .hero{padding:40px 0 28px}
  .section{padding:32px 0}
  .steps{grid-template-columns:1fr;gap:16px}
  .card{padding:22px 20px}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .info-grid{grid-template-columns:1fr}
  .report-header-card{margin:-22px -20px 0 -20px;padding:18px 20px}
  .report-header-card .report-meta-row{flex-direction:column;gap:6px}
  .footer-inner{flex-direction:column;text-align:center}
  .btn-row{flex-direction:column}
}
@media print{
  .header,.breadcrumb,.hero,.section:not(.report-only),.btn-row,.skip-nav,.footer,.toast,.saved-list{display:none!important}
  body{background:#fff}
  .card{border:none;box-shadow:none;padding:0;margin:0}
  .report-section{border:none;background:#fff}
  .report-header-card{background:#2D5A3D!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>

    <section class="section" aria-labelledby="steps-title">

        <div class="step" aria-label="第一步">

    <section class="section" aria-labelledby="form-title">

        <h4>房源信息</h4>
        <div class="form-row">
          <div>
            <label for="property-address">房源地址 <span class="required">*</span></label>

          <div>
            <label for="visit-date">带看日期 <span class="required">*</span></label>
            <input id="visit-date" type="date" aria-label="带看日期">
          </div>
        </div>
        <div class="form-row-3">

            <label for="property-layout">户型</label>
            <input id="property-layout" type="text" aria-label="户型" placeholder="例如：三室两厅">

            <label for="property-price">价格 (万元)</label>
            <input id="property-price" type="text" aria-label="价格" placeholder="例如：850">

        </div>

        <label>房源类型 <span class="required">*</span></label>
        <div class="radio-group" id="property-type" role="radiogroup" aria-label="房源类型">
          <label><input type="radio" name="property-type" value="新房" aria-label="新房">新房</label>
          <label><input type="radio" name="property-type" value="二手房" aria-label="二手房">二手房</label>
          <label><input type="radio" name="property-type" value="租房" aria-label="租房">租房</label>
        </div>

        <label>客户关注点（可多选）</label>
        <div class="checkbox-group" aria-label="客户关注点">
          <label><input type="checkbox" value="采光" aria-label="关注采光">采光</label>
          <label><input type="checkbox" value="安静" aria-label="关注安静">安静</label>
          <label><input type="checkbox" value="学区" aria-label="关注学区">学区</label>
          <label><input type="checkbox" value="交通" aria-label="关注交通">交通</label>
          <label><input type="checkbox" value="价格" aria-label="关注价格">价格</label>
          <label><input type="checkbox" value="装修" aria-label="关注装修">装修</label>

        <h4>服务记录</h4>

        </div>
        <div>
          <label for="followup-plan">跟进计划 <span class="required">*</span></label>
          <textarea id="followup-plan" aria-label="跟进计划" placeholder="例如：建议 3 天后电话跟进，同时准备 2 套同户型对比方案……"></textarea>

<script>
(function(){
  var STORAGE_KEY = 's1-reports';

  // DOM refs
  var formCard = document.getElementById('formCard');
  var reportPreview = document.getElementById('reportPreview');
  var reportHeader = document.getElementById('reportHeader');
  var reportContent = document.getElementById('reportContent');
  var reportSub = document.getElementById('report-sub');
  var btnGenerate = document.getElementById('btnGenerate');
  var btnSave = document.getElementById('btnSave');
  var btnNew = document.getElementById('btnNew');
  var savedList = document.getElementById('savedList');
  var savedItems = document.getElementById('savedItems');
  var toast = document.getElementById('toast');

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(function(){ toast.classList.remove('show'); }, 2000);
  }

  // Collect form data
  function getFormData() {
    return {
      customerName: document.getElementById('customer-name').value.trim(),
      customerContact: document.getElementById('customer-contact').value.trim(),
      propertyAddress: document.getElementById('property-address').value.trim(),
      propertyLayout: document.getElementById('property-layout').value.trim(),
      propertyArea: document.getElementById('property-area').value.trim(),
      propertyPrice: document.getElementById('property-price').value.trim(),
      visitDate: document.getElementById('visit-date').value,
      propertyType: (function(){
        var el = document.querySelector('input[name="property-type"]:checked');
        return el ? el.value : '';
      })(),
      concerns: Array.from(document.querySelectorAll('.checkbox-group input:checked')).map(function(i){ return i.value; }),
      customerFeedback: document.getElementById('customer-feedback').value.trim(),
      followupPlan: document.getElementById('followup-plan').value.trim()
    };
  }

  function validateForm(data) {
    var missing = [];
    if (!data.customerName) missing.push('客户姓名');
    if (!data.propertyAddress) missing.push('房源地址');
    if (!data.visitDate) missing.push('带看日期');
    if (!data.propertyType) missing.push('房源类型');
    if (!data.customerFeedback) missing.push('客户反馈');
    if (!data.followupPlan) missing.push('跟进计划');
    return missing;
  }

  // Generate report
  btnGenerate.addEventListener('click', function(){
    var data = getFormData();
    var missing = validateForm(data);
    if (missing.length > 0) {
      showToast('请填写：' + missing.join('、'));
      return;
    }
    renderReport(data);
    if (typeof window.fsTrack === 'function') {
      window.fsTrack('s1_report_generate', {concerns: data.concerns.length});
    }
  });

  function renderReport(data) {
    var dateObj = new Date(data.visitDate);
    var followDate = new Date(dateObj.getTime() + 3 * 24 * 60 * 60 * 1000);
    var followDateStr = followDate.getFullYear() + '-' + String(followDate.getMonth()+1).padStart(2,'0') + '-' + String(followDate.getDate()).padStart(2,'0');

    var concernAnalysis = {
      '采光': '客户对自然光线有明确要求，说明在意居住舒适度，推荐时优先考虑南向/高楼层房源。',
      '安静': '客户对居住环境的安静度敏感，可能有老人/孩子/居家办公需求，需关注小区噪音情况。',
      '学区': '客户有学龄儿童或计划有，需详细了解学区划分、学校口碑、入学政策。',
      '交通': '客户通勤便利性是核心决策因素，需关注地铁/公交/驾车便利性。',
      '价格': '客户对预算敏感，性价比是关键，需准备多套预算内方案对比。',
      '装修': '客户在意入住时间和装修成本，需区分精装/毛坯/装修状态。'
    };

    var typeDesc = {
      '新房': '新房 · 关注交付时间、开发商品牌、样板间与交付标准',
      '二手房': '二手房 · 关注房龄、产权情况、装修保养状况',
      '租房': '租房 · 关注租期灵活性、押金政策、家具家电配置'
    }[data.propertyType] || data.propertyType;

    // Header
    var headerHtml = '';
    headerHtml += '<h3>带看报告 · ' + data.customerName + '</h3>';
    headerHtml += '<div class="report-meta-row">';
    headerHtml += '<span>带看日期：' + data.visitDate + '</span>';
    headerHtml += '<span>报告生成：' + new Date().toLocaleString('zh-CN') + '</span>';
    headerHtml += '</div>';
    reportHeader.innerHTML = headerHtml;

    // Content
    var html = '';

    // 1. Customer info
    html += '<h4>客户信息</h4>';
    html += '<div class="info-grid">';
    html += '<div class="info-item"><span class="info-label">客户姓名</span><span class="info-value">' + data.customerName + '</span></div>';
    html += '<div class="info-item"><span class="info-label">联系方式</span><span class="info-value">' + (data.customerContact || '未填写') + '</span></div>';
    html += '<div class="info-item"><span class="info-label">带看日期</span><span class="info-value">' + data.visitDate + '</span></div>';
    html += '<div class="info-item"><span class="info-label">房源类型</span><span class="info-value">' + typeDesc + '</span></div>';
    html += '</div>';

    // 2. Property info
    html += '<h4>房源概况</h4>';
    html += '<div class="info-grid">';
    html += '<div class="info-item"><span class="info-label">房源地址</span><span class="info-value">' + data.propertyAddress + '</span></div>';
    html += '<div class="info-item"><span class="info-label">户型</span><span class="info-value">' + (data.propertyLayout || '未填写') + '</span></div>';
    html += '<div class="info-item"><span class="info-label">面积</span><span class="info-value">' + (data.propertyArea ? data.propertyArea + ' m²' : '未填写') + '</span></div>';
    html += '<div class="info-item"><span class="info-label">价格</span><span class="info-value">' + (data.propertyPrice ? data.propertyPrice + ' 万元' : '未填写') + '</span></div>';
    html += '</div>';
    html += '<p class="meta">本次带看房源为' + data.propertyType + '，位于' + data.propertyAddress + '。带看过程中与客户就户型、采光、周边配套等方面进行了深入沟通。</p>';

    // 3. Concerns
    html += '<h4>客户关注点分析</h4>';
    if (data.concerns.length > 0) {
      for (var i = 0; i < data.concerns.length; i++) {
        var c = data.concerns[i];
        html += '<p><span class="tag">' + c + '</span>' + (concernAnalysis[c] || '') + '</p>';
      }
    } else {
      html += '<p class="meta">未记录客户关注点。</p>';
    }

    // 4. Customer feedback
    html += '<h4>客户反馈</h4>';
    html += '<p>' + data.customerFeedback + '</p>';
    html += '<p class="meta">从客户反馈来看，需要在后续跟进中重点关注客户明确表达的偏好与顾虑。</p>';

    // 5. Follow-up plan
    html += '<h4>跟进计划</h4>';
    html += '<p>' + data.followupPlan + '</p>';
    html += '<p class="meta"><strong>建议跟进日期：</strong>' + followDateStr + '（带看后 3 天内跟进，保持联系热度）</p>';

    html += '<p class="meta" style="margin-top:20px;border-top:1px dashed #B8B1A4;padding-top:14px">—— 风声 fengsheng.tech · 带看报告 S1 · 生成时间：' + new Date().toLocaleString('zh-CN') + '</p>';

    reportContent.innerHTML = html;
    reportPreview.classList.add('show');
    reportSub.textContent = '报告已生成，可保存、打印或新建。';
    reportPreview.scrollIntoView({behavior:'smooth', block:'start'});
  }

  // Save report
  btnSave.addEventListener('click', function(){
    var data = getFormData();
    var missing = validateForm(data);
    if (missing.length > 0) {
      showToast('请先完成表单再保存');
      return;
    }
    try {
      var reports = [];
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { reports = JSON.parse(raw); } catch(e) { reports = []; }
      }
      var record = {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
        date: new Date().toISOString(),
        customerName: data.customerName,
        customerContact: data.customerContact,
        propertyAddress: data.propertyAddress,
        propertyLayout: data.propertyLayout,
        propertyArea: data.propertyArea,
        propertyPrice: data.propertyPrice,
        visitDate: data.visitDate,
        propertyType: data.propertyType,
        concerns: data.concerns,
        customerFeedback: data.customerFeedback,
        followupPlan: data.followupPlan
      };
      reports.unshift(record);
      // Keep max 50 reports
      if (reports.length > 50) reports = reports.slice(0, 50);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(reports));
      showToast('报告已保存到本地');
      renderSavedList();
      if (typeof window.fsTrack === 'function') window.fsTrack('s1_report_save');
    } catch(e) {
      showToast('保存失败，请检查浏览器存储空间');
    }
  });

  // New report
  btnNew.addEventListener('click', function(){
    // Clear form
    document.getElementById('customer-name').value = '';
    document.getElementById('customer-contact').value = '';
    document.getElementById('property-address').value = '';
    document.getElementById('property-layout').value = '';
    document.getElementById('property-area').value = '';
    document.getElementById('property-price').value = '';
    document.getElementById('visit-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('customer-feedback').value = '';
    document.getElementById('followup-plan').value = '';
    // Clear radio
    var radios = document.querySelectorAll('input[name="property-type"]');
    for (var i = 0; i < radios.length; i++) radios[i].checked = false;
    // Clear checkboxes
    var checks = document.querySelectorAll('.checkbox-group input');
    for (var j = 0; j < checks.length; j++) checks[j].checked = false;
    // Reset labels
    document.querySelectorAll('.radio-group label, .checkbox-group label').forEach(function(l){ l.classList.remove('checked'); });
    // Hide report
    reportPreview.classList.remove('show');
    reportSub.textContent = '填写完上面的信息后，报告将在这里显示。';
    reportHeader.innerHTML = '';
    reportContent.innerHTML = '';
    formCard.scrollIntoView({behavior:'smooth', block:'start'});
    if (typeof window.fsTrack === 'function') window.fsTrack('s1_report_new');
  });

  // Print
  window.printReport = function() {
    window.print();
    if (typeof window.fsTrack === 'function') window.fsTrack('s1_report_print');
  };

  // Saved reports list
  function renderSavedList() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var reports = raw ? JSON.parse(raw) : [];
      if (reports.length === 0) {
        savedList.classList.remove('show');
        return;
      }
      savedList.classList.add('show');
      var html = '';
      for (var i = 0; i < reports.length; i++) {
        var r = reports[i];
        var dateStr = new Date(r.date).toLocaleString('zh-CN');
        html += '<div class="saved-item" data-id="' + r.id + '">';
        html += '<div class="saved-info">';
        html += '<div class="saved-name">' + r.customerName + ' · ' + r.propertyType + '</div>';
        html += '<div class="saved-address">' + r.propertyAddress + '</div>';
        html += '<div class="saved-date">保存于 ' + dateStr + '</div>';
        html += '</div>';
        html += '<div style="display:flex;gap:8px">';
        html += '<button class="btn-sm btn-sm-view" data-action="view" data-id="' + r.id + '">查看</button>';
        html += '<button class="btn-sm btn-sm-del" data-action="delete" data-id="' + r.id + '">删除</button>';
        html += '</div>';
        html += '</div>';
      }
      savedItems.innerHTML = html;

      // Bind events
      savedItems.querySelectorAll('[data-action="view"]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var id = btn.getAttribute('data-id');
          var raw2 = localStorage.getItem(STORAGE_KEY);
          var reports2 = raw2 ? JSON.parse(raw2) : [];
          var found = null;
          for (var k = 0; k < reports2.length; k++) {
            if (reports2[k].id === id) { found = reports2[k]; break; }
          }
          if (found) {
            // Fill form
            document.getElementById('customer-name').value = found.customerName || '';
            document.getElementById('customer-contact').value = found.customerContact || '';
            document.getElementById('property-address').value = found.propertyAddress || '';
            document.getElementById('property-layout').value = found.propertyLayout || '';
            document.getElementById('property-area').value = found.propertyArea || '';
            document.getElementById('property-price').value = found.propertyPrice || '';
            document.getElementById('visit-date').value = found.visitDate || '';
            document.getElementById('customer-feedback').value = found.customerFeedback || '';
            document.getElementById('followup-plan').value = found.followupPlan || '';
            // Set radio
            var radios = document.querySelectorAll('input[name="property-type"]');
            for (var m = 0; m < radios.length; m++) {
              radios[m].checked = (radios[m].value === found.propertyType);
            }
            // Set checkboxes
            var checks = document.querySelectorAll('.checkbox-group input');
            var concerns = found.concerns || [];
            for (var n = 0; n < checks.length; n++) {
              checks[n].checked = (concerns.indexOf(checks[n].value) >= 0);
            }
            // Update label styles
            document.querySelectorAll('.radio-group label').forEach(function(l){
              var inp = l.querySelector('input');
              l.classList.toggle('checked', inp && inp.checked);
            });
            document.querySelectorAll('.checkbox-group label').forEach(function(l){
              var inp = l.querySelector('input');
              l.classList.toggle('checked', inp && inp.checked);
            });
            // Render report
            renderReport(getFormData());
            formCard.scrollIntoView({behavior:'smooth', block:'start'});
          }
        });
      });

      savedItems.querySelectorAll('[data-action="delete"]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var id = btn.getAttribute('data-id');
          var raw3 = localStorage.getItem(STORAGE_KEY);
          var reports3 = raw3 ? JSON.parse(raw3) : [];
          reports3 = reports3.filter(function(r){ return r.id !== id; });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(reports3));
          renderSavedList();
          showToast('报告已删除');
        });
      });
    } catch(e) {
      savedList.classList.remove('show');
    }
  }

  // Radio & checkbox styling
  document.querySelectorAll('.radio-group label').forEach(function(label) {
    var input = label.querySelector('input');
    input.addEventListener('change', function() {
      label.parentElement.querySelectorAll('label').forEach(function(l) { l.classList.remove('checked'); });
      if (input.checked) label.classList.add('checked');
    });
  });

  document.querySelectorAll('.checkbox-group label').forEach(function(label) {
    var input = label.querySelector('input');
    input.addEventListener('change', function() {
      if (input.checked) label.classList.add('checked');
      else label.classList.remove('checked');
    });
  });

  // Default date
  document.getElementById('visit-date').value = new Date().toISOString().split('T')[0];

  // Load saved reports on init
  renderSavedList();
})();
</script>
</body>
</html>
